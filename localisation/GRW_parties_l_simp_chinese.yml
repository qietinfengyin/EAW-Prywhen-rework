GRW_faction_window_CPGC_focus_sci_button_tt: "§Y政府工作重心：聚焦科教§!\n§L政府将把科技和教育作为国家发展的根本，培养大量有文化、有技能的劳动者，推动技术进步和社会现代化，夯实国家未来的基础。§!\n\n§Y选择后的效果：§!\n获得§Y政府工作重心：聚焦科教§!，其效果为：\n政治点数: §G+5%§!\n科研速度: §G+5.00%§!\n\n§Y若保持此工作重心：§!\n每隔§Y半年§!我们将获得一项§C工业与电子设备方面§!的§G科技加成§![GRW_CPGC_focus_msg_1]"
GRW_faction_window_CPGC_focus_ind_button_tt: "§Y政府工作重心：聚焦工商§!\n§L政府将集中力量发展工业和商业，增强国家经济实力，促进生产资料的合理配置和社会财富的增长，支撑社会主义建设。§!\n\n§Y选择后的效果：§!\n获得§Y政府工作重心：聚焦工商§!，其效果为：\n生活消费品工厂系数: §Y-10.0%§!\n建造速度: §G+5.00%§!\n\n§Y若保持此工作重心：§!\n§C工业建设相关£decision_icon_small 决议§!花费的£GFX_pol_power 政治点数将减少§Y15§!。[GRW_CPGC_focus_msg_2]"
GRW_faction_window_CPGC_focus_ag_button_tt: "§Y政府工作重心：聚焦农牧§!\n§L政府将优先发展农业和牧业，保障粮食和重要生活资料的稳定供应，提高农牧民生活水平，巩固国家经济的基础。§!\n\n§Y选择后的效果：§!\n获得§Y政府工作重心：聚焦农牧§!，其效果为：\n每月马口: §G+30.0%§!\n地区最大工厂数: §G+15%§!\n\n§Y若保持此工作重心：§!\n§C农业相关£decision_icon_small 决议§!花费的£GFX_pol_power 政治点数将减少§Y15§!。[GRW_CPGC_focus_msg_3]"