GRW_faction_window_CPGC_policy_ag_button_tt: "§Y支持乡村农会§!\n§L乡村农会是团结广大农民、维护农村权益的重要力量，也是推动农村经济发展与社会进步的核心依托，我们将大力支持乡村农会的建设与运作，以确保农民在政治、经济事务中拥有充分的话语权。§![GRW_support_faction_msg]\n\n§Y选择后的效果：§!\n§O正统派影响力将小幅增加§!\n§O正统派满意度将小幅增加§!\n\n§Y持续90日：§!\n政治点数: §R-5%§!\n战略资源获取效率: §G+15.00%§!\n\n§Y在90天内，我们将无\n法颁布新的行政法令。§!\n\n实施该法令需要花费£GFX_pol_power §R30§!政治点数。"
GRW_faction_window_CPGC_policy_int_button_tt: "§Y宣传国际主义§!\n§L国际主义是马科思主义的鲜明特征，也是我们革命取得胜利与巩固成果的根本保障，因此必须持续而深入地开展国际主义宣传，使广大群众树立共同奋斗、团结互助的世界视野。§![GRW_support_faction_msg]\n\n§Y选择后的效果：§!\n§R国际派影响力将小幅增加§!\n§R国际派满意度将小幅增加§!\n\n§Y持续90日：§!\n每日消耗的政治点数: §R+0.10§!\n每周马力: §G+200§!\n\n§Y在90天内，我们将无\n法颁布新的行政法令。§!\n\n实施该法令需要花费£GFX_pol_power §R30§!政治点数。"
GRW_faction_window_CPGC_policy_ind_button_tt: "§Y赋权城市工会§!\n§L我们将着手在全国主要大城市指导建立工鹫委员会，并赋予城市工会必要的行政权力，使无产阶级能够逐步直接掌握和运用国家机器，从而在城市中巩固工人阶级的领导地位。§![GRW_support_faction_msg]\n\n§Y选择后的效果：§!\n§6劳工派影响力将小幅增加§!\n§6劳工派满意度将小幅增加§!\n\n§Y持续90日：§!\n政治点数: §R-5%§!\n工厂产出: §G+10.00%§!\n\n§Y在90天内，我们将无\n法颁布新的行政法令。§!\n\n实施该法令需要花费£GFX_pol_power §R30§!政治点数。"
GRW_faction_window_CPGC_policy_sci_button_tt: "§Y赞助文化教育§!\n§L文化与教育是提高全民素质、培育进步思想的基础工程，更是巩固社会长远发展的精神支柱，因此我们应积极投入资源赞助文化教育事业，使知识与艺术惠及更广泛的群众。§![GRW_support_faction_msg]\n\n§Y选择后的效果：§!\n§P民主党派影响力将小幅增加§!\n§P民主党派满意度将小幅增加§!\n\n§Y持续90日：§!\n生活消费品工厂系数: §Y10.0%§!\n科研速度: §G+10.00%§!\n\n§Y在90天内，我们将无\n法颁布新的行政法令。§!\n\n实施该法令需要花费£GFX_pol_power §R30§!政治点数。"
