GRW_NAAP_department_3_entry_4: "星空政变"
GRW_NAAP_department_3_entry_4_NAME: "中央鹫民政府政务院外交部\n国际革命行动总局"
GRW_NAAP_department_3_entry_4_TITLE: "关于法西斯老卫队党夺取星空共和国政权的报告"
GRW_NAAP_department_3_entry_4_CONTENT: "绝密 · 长期\n\n致[GetGRWPresident]同志：\n\n谨此报告关于星空法西斯政变的近况。\n\n星空“法西斯-共产联合政府”于近日宣告终止。该联盟原为解决政治僵局而建，其既定目标达成后难以维系内部矛盾，法西斯老近卫军党随即全面接管政权。新政权宣布国家进入紧急状态，以“纠正前政府错误”为由，单方面废除此前与我国达成的所有双边协定。立法机关在其主导下通过紧急修法，将共产党及其关联组织定为“威胁国家安全”的非法实体。前联合政府内所有共产党（红党）籍内阁成员遭解职并已处决。全国范围内针对左翼人士、前联合政府支持者及政治异见者的逮捕、拘禁与镇压行动已常态化。星空国家机器正仿效喙索里尼式法西斯模式进行全面改组。\n\n星空政府持续就我方接纳其政治流亡者一事提出抗议，其官方声明指责我“干涉星空内政”“输出颠覆性意识形态”，并诬称我奉行“红色帝国主义政策”，在国际场合公然宣称“普里文共产主义者是11世纪的格罗弗”。双边外交沟通渠道已实质冻结，其官方舆论将我国塑造成主要外部威胁，“反赤化”与“抵御红色凯撒”已成为核心宣传主题。同时可观察到该国军事预算及动员力度显著提升，部分兵力部署指向萨尔玛克等关键地带——此类行动预示双边关系步入高风险对抗期。鉴于其对国内信息封锁加剧，准确预判其下一步行动（如高危军事冒险）的挑战显著提升。\n\n建议革命军事委员会立即提升对牛头怪方向的战备等级，严加关注萨尔玛克地区事态发展；建议政府（特别是外交部门）协调友邦及国际组织，持续揭露星空法西斯政权倒行逆施及对区域安全威胁，对冲其污名化宣传，争取道义支持；建议国家政治保卫局进一步加强反渗透、反心战、反策反、反窃密措施。\n\n抄送：革命军事委员会办公厅、国务院办公厅、外交部办公室、国家政治保卫局\n\n\n[GRW.GetName]国际革命行动总局局长，卡林·霆羽"
GRW_NAAP_department_3_entry_4_EFFECT: "我国与§Y[MIT.GetName]§!先前达成的§Y协议§!将§R悉数作废§!！\n§Y[MIT.GetName]§!的§R共产主义§!同志将流亡至我国。"
GRW_NAAP_department_3_entry_5: "北方战争"
GRW_NAAP_department_3_entry_5_NAME: "中央鹫民政府政务院外交部\n国际革命行动总局"
GRW_NAAP_department_3_entry_5_TITLE: "关于天际纳维亚与[485.owner.GetName]爆发战争的报告"
GRW_NAAP_department_3_entry_5_CONTENT: "绝密 · 长期\n\n致[GetGRWPresident]同志：\n\n谨此报告关于北方新一轮大规模武装冲突的近况。\n\n[485.owner.GetName]当局与天际纳维亚社会主义共和国的紧张关系已突破临界点。自天际纳维亚宣布脱离克梅斯凯政府，成立独立的社会主义共和国以来，双方长期相互指控对方背离革命原则，外交沟通渠道全面中断。当前，天际纳维亚方面公开宣称将“解放受资本压迫的北境民众”，[485.owner.GetName]当局则以“反颠覆”及“领土完整”为由实施军事动员，最终在北方边境地区爆发大规模军事冲突。\n\n经综合研判，[485.owner.GetName]在冲突中优势显著。完成军事改革后，其军队在装备水平、训练体系及作战组织度方面形成系统性优势。双方工业基础与战争潜力差距悬殊，天际纳维亚难以支撑长期高强度消耗战。[485.owner.GetName]境内左翼力量虽对当局存有不满，但组织分散且面临高强度压制，短期内难以形成有效制衡。然而，分析也指出，北狮鹫尼亚地区的恶劣自然条件将持续制约[485.owner.GetName]后勤体系运转效能，为防御方创造战术窗口期。这为我方支援提供了一个可资利用的重要战术窗口。\n\n基于此，建议立即向天际纳维亚提供武器装备、战略物资甚至派出直接援助，重点强化其机动防御与持久作战能力。如果能够协助天际纳维亚建立稳固防御体系，可在北境形成战略支撑点，有效牵制区域反动势力。北境政权的存续将实质性鼓舞全狮鹫尼亚进步势力与受压迫群体的斗争意志，有助于世界革命形势的推进。\n\n抄送：革命军事委员会办公厅、国务院办公厅、外交部办公室、[GetGRWSyndicalismBureau]、国家政治保卫局\n\n\n[GRW.GetName]国际革命行动总局局长，卡林·霆羽"
GRW_NAAP_department_3_entry_5_EFFECT: "获得§Y支援天际纳维亚§!，其效果为\n（§Y[SRS.GetNameWithFlag]§!）$volunteer_limit_plus_two_tt$\n解锁§C决议§!以支持§Y[SRS.GetName]§!的§t革命斗争§!"
GRW_NAAP_department_3_entry_6: "共和国大选"
GRW_NAAP_department_3_entry_6_NAME: "中央鹫民政府政务院外交部\n国际革命行动总局"
GRW_NAAP_department_3_entry_6_TITLE: "关于[FAT.GetName]国会通过克梅斯凯政府不信任投票的报告"
GRW_NAAP_department_3_entry_6_CONTENT: "机密 · 五年\n\n致[GetGRWPresident]同志：\n\n谨此报告关于[FAT.GetName]政局变动的近况。\n\n[FAT.GetName]国民大会于今日举行关于对克梅斯凯政府的不信任投票，最终以221票赞成，30票反对，6票弃权的结果通过弹劾总统的决议。此举直接导致克梅斯凯总统职权被终止，自决议通过起，持续多年的国家紧急状态自动解除。\n\n在随后举行的国民大会选举中，持“民主社会主义”立场的国民共和党左翼取得显著优势。由社会主义者联合提名的里卡德·艾斯德勒宣布就任[FAT.GetName]总统。其早年对天际纳维亚革命持同情立场，后长期组织社会主义性质工会运动。新政府正积极推动改革议程，宣布引领革命进入全新阶段，并启动对克梅斯凯时期政治遗产的系统性清算。在经济上，新政府宣布将确立国家资本占主导的混合所有制框架，计划逐步引入“劳工自主管理”的元素。\n\n据信，前总统克梅斯凯对选举结果表示“遗憾”，保守派势力持续指责艾斯德勒及其支持者正将共和国“推向赤化独裁深渊”。然而此类指控未能改变当前政治格局。值得注意的是，新政府已经声明，如果亚历山大·克梅斯凯向其宣誓效忠，将批准其继续在军队服役。克梅斯凯尚未对此事发表评论。\n\n在国际关系层面，新政府宣布将寻求实现与天际纳维亚的关系正常化，现已第一时间承认其政权合法性，提议建立外交关系，倡议进一步合作。然而，由于双方意识形态存在理论分歧与战略互信的缺失，双方关系破冰势必将受到巨大阻力。建议我方主动出面居中斡旋，缓和两国紧张局势，促成北方左翼势力的联合，从而振兴狮鹫尼亚的革命事业，以完成978年革命的未竟之事。\n\n抄送：国务院办公厅、外交部办公室\n\n\n[GRW.GetName]国际革命行动总局局长，卡林·霆羽"
GRW_NAAP_department_3_entry_6_EFFECT: "我国将以§C中间人§!的身份在§Y[SRS.GetName]§!与§Y[FAT.GetName]§!间牵线搭桥，实现狮鹫尼亚§R共和革命§!的§G复兴§!！"
GRW_NAAP_department_3_entry_7: "北斑战争"
GRW_NAAP_department_3_entry_7_NAME: "中央鹫民政府政务院外交部\n国际革命行动总局"
GRW_NAAP_department_3_entry_7_TITLE: "关于骏鹰菲亚陷入北斑马里加战争的报告"
GRW_NAAP_department_3_entry_7_CONTENT: "绝密 · 长期\n\n致[GetGRWPresident]同志：\n\n谨此报告关于骏鹰菲亚与北斑马里加战争的近况。\n\n自泽玛协议签署，确立驽米底亚由骏鹰菲亚实施托管管辖的地位以来，骏鹰菲亚在北斑马里加的地缘影响力显著增强。这招致其邻国，特别是翼蝠地与迦骀基的极度不满。\n\n据信，翼蝠地方面高层认为，为实现其“第二次伟大征服”的宏伟目标，需在斑马里加建立其势力范围的绝对存在，而骏鹰是最大障碍。多国基于地缘政治考量，已经组成反对骏鹰菲亚的军事同盟；为强化其优势，该同盟还积极争取翼巴第等外部力量加入骏鹰菲亚和平革命后，其邻国，特别是翼蝠地对于新生的共产主义政权极度仇视，加剧了地缘对抗的紧张局势。\n\n翼蝠地近年持续强化军事投射能力，在完成区域性力量整合后，将瓦尔宰那地区纳入战略行动方向。面对严峻的安全形势，革命骏鹰菲亚政府被迫升级应对等级。双方在爆发武装冲突后正式宣战。北斑马里加已经陷入全面战争状态。\n\n当前战局对骏鹰菲亚构成严峻挑战，主要防御体系面临多重战线压力。若其外海控制权遭到持续削弱，其在斑马里加大陆，亦即驽米底亚战区的军事存在恐难以为继，从而影响其战略投射能力。出于国际主义义务，我方在道义层面需对骏鹰菲亚保持必要支持；但鉴于当前战场变量持续增加，具体援助措施应基于动态风险评估分级实施。\n\n抄送：革命军事委员会办公厅，国务院办公厅，外交部办公室，[GetGRWSyndicalismBureau]，国家政治保卫局。\n\n\n[GRW.GetName]国际革命行动总局局长，卡林·霆羽"
