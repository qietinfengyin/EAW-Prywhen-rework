GRW_NAAP_department_3_entry_8: "新狮鹫尼亚内战"
GRW_NAAP_department_3_entry_8_NAME: "中央鹫民政府政务院外交部\n国际革命行动总局"
GRW_NAAP_department_3_entry_8_TITLE: "关于新狮鹫尼亚爆发内战的报告"
GRW_NAAP_department_3_entry_8_CONTENT: "绝密 · 长期\n\n致[GetGRWPresident]同志：\n\n谨此报告新狮鹫尼亚地区革命的近况。\n\n自新狮鹫尼亚总督茶羽遇刺以来，该地区军国派与社会主义力量间关系持续紧张。近期，军国派领袖埃尔温·高丘元帅联合极端民族主义武装“猎鹰队”，对共和派及社会主义民兵发动全面进攻，导致冲突迅速升级。为应对严峻局势，新狮鹫尼亚联邦社会主义党主席海因里希·红尾已动员进步力量展开抵抗，并公开宣布新狮鹫尼亚革命正式开始。\n\n目前，军国派武装已控制多个主要城市，并持续向外推进。据我驻谢伟良纳使馆反馈，战事现已蔓延至广大乡村地带。由于多数正规军单位效忠于军国派，且其装备水平占优，共和阵线在交战中暂处守势，控制区域虽广但态势被动。另据多方消息，“猎鹰队”在所控区域军纪涣散，已发生多起针对平民的暴力事件，人道状况持续恶化。驻谢伟良纳使馆同志还报告称，共和阵线为扭转当前不利战局，已主动与嘶大林格勒方面进行接洽，其会谈核心极有可能包含请求红军直接进行军事干涉的议题。然而，此类涉及重大战略调整的外部介入，其决策周期注定漫长，难以解共和阵线当下之燃眉之急。\n\n形势危急，刻不容缓。建议我方立即采取行动：一方面，迅速协调国际友好组织，向冲突区域投送紧急人道主义援助，以缓解平民困境；另一方面，应果断授权革命军事委员会，立即向新狮鹫尼亚共和阵线派遣以“志愿人员”为形式的、具备实战经验的武装部队，规模至少达到旅级，以期在短期内稳定战线。此次干预已超越单纯的国际主义义务与地缘政治考量。可以预见，若我方坐视军国派，其极端民族主义意识形态与涣散的军纪必将引发更大规模的人道主义灾难。及时的军事援助不仅是阻止暴行蔓延的关键，更将为我方在新狮鹫尼亚乃至整个地区赢得决定性的道义与战略主动。\n\n抄送：革命军事委员会办公厅，国务院办公厅，外交部办公室，[GetGRWSyndicalismBureau]，国家政治保卫局。\n\n\n[GRW.GetName]国际革命行动总局局长，卡林·霆羽"
