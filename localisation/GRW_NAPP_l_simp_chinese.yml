GRW_NAAP_department_3_entry_2: "长剑内战"
GRW_NAAP_department_3_entry_2_NAME: "中央鹫民政府政务院外交部\n国际革命行动总局"
GRW_NAAP_department_3_entry_2_TITLE: "关于长剑伯国反改组派起义形势的报告"
GRW_NAAP_department_3_entry_2_CONTENT: "绝密 · 长期\n\n致[GetGRWPresident]同志：\n\n谨此报告关于长剑伯国爆发反“改组派”起义的近况。\n\n长剑伯国自978年革命后宣布脱离狮鹫尼亚帝国，政权长期由“改组派”主导。该派推行以狮鹫种族优越性为核心的政策导向，强制同化小马群体并实施系统性压制政策。此类政策加剧社会矛盾，导致境内抵抗活动频发，成为其政权稳定的主要挑战。\n\n目前最值得注意的进步力量，是由繁星皎皎领导的长剑解放军。该组织整合多支地方抵抗武装，其社会基础主要是遭受压制的小马群体，核心诉求为推翻“改组派”统治。此外，当局废除骑士团顾问会议及推行激进举措，致使蔷薇木骑士团等内部温和派系离心倾向加剧。尽管该骑士团仍将解放军视为主要敌对方，但对政权的不满持续深化，行动独立性增强。\n\n日前维萨吉纳斯的起义引爆长剑内战，长剑解放军借此机会成立南方临时政府，号召各力量对“改组派”政权展开攻势。与此同时，蔷薇木骑士团已于伯国西北方自立，武装反抗“改组派”。当前战况高度胶着：鉴于“改组派”控制区锐减及各派力量相互制衡，任何外部介入或内部力量对比变化均可能影响冲突走向。长剑解放军作为最能广泛动员民众、最坚定反对“改组派”的力量，具有反压迫的进步属性，显示出对社会主义原则的同情。其面临挑战主要是组织整合度不足与重型装备短缺——若其取胜，将显著改善北方战略形势并鼓舞被压迫群体的斗争。建议立即对其施以全面援助。\n\n抄送：革命军事委员会办公厅、国务院办公厅、外交部办公室、[GetGRWSyndicalismBureau]、国家政治保卫局\n\n\n[GRW.GetName]国际革命行动总局局长 卡林·霆羽"
GRW_NAAP_department_3_entry_2_EFFECT: "获得§Y支援长剑解放军§!，其效果为\n（§Y[LSC.GetNameWithFlag]§!）$volunteer_limit_plus_one_tt$\n解锁§C决议§!以支持§Y[LSC.GetName]§!的§t革命斗争§!"
GRW_NAAP_department_3_entry_3: "格里富斯内战"
GRW_NAAP_department_3_entry_3_NAME: "中央鹫民政府政务院外交部\n国际革命行动总局"
GRW_NAAP_department_3_entry_3_TITLE: "关于格里富斯发生共产主义革命的报告"
GRW_NAAP_department_3_entry_3_CONTENT: "绝密 · 长期\n\n致[GetGRWPresident]同志：\n\n谨此报告关于格里富斯革命形势的近况。\n\n格里富斯局势近期急剧恶化。前评议会政府因无力调和国内主要派系矛盾导致权威瓦解。该国核心势力“狞鹫骑士团”与“格里富斯南方陆洲公司”（下称“南洲会”)为争夺国家控制权，在主要城市区域爆发持续性武装冲突。全国性秩序崩溃致使格里富斯陷入实质性无政府状态，权力分裂持续加深。\n\n在此权力真空期，左翼革命势力迅速整合劳工力量，提出终结骑士团系统性压迫及南洲会资源垄断的政治纲领。尽管对峙中的前政府势力曾为应对新兴革命力量而短暂搁置分歧，但其未能遏制革命同盟在西部地区的扩张。革命同盟通过接管南洲会资产实施物资再分配，短期内获得广泛社会支持，其动员范围已扩展至劳工、农民及部分骑士阶层成员。\n\n当前格里富斯濒临联邦解体的临界点。建议立即向革命同盟提供精准战略物资援助与政治支持——此举将显著提高革命成功概率。若成功建立革命政权，既可直接削弱区域性反共协定体系，亦可为我国争取具备共同意识形态基础的稳固盟友。\n\n抄送：革命军事委员会办公厅、国务院办公厅、外交部办公室、[GetGRWSyndicalismBureau]\n\n\n[GRW.GetName]国际革命行动总局局长，卡林·霆羽"
