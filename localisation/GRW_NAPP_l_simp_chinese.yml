GRW_NAAP_department_3_entry_1: "翼巴第内战"
GRW_NAAP_department_3_entry_1_NAME: "中央鹫民政府政务院外交部\n国际革命行动总局"
GRW_NAAP_department_3_entry_1_TITLE: "关于翼巴第王国反法西斯斗争形势的报告"
GRW_NAAP_department_3_entry_1_CONTENT: "绝密 · 长期\n\n致[GetGRWPresident]同志：\n\n谨此报告关于翼巴第反法西斯斗争形势的近况。\n\n自经济大萧条对翼巴第王国造成严重冲击以来，该国社会矛盾持续激化。以朱里奥·喙索里尼为首的翼巴第法西斯党建立准军事组织“黑翼军”，并通过大规模游行向保守党政府及国王加里波德·塔洛努埃尔三世施压，试图获取该国政治主导权。面对法西斯势力扩张，翼巴第共产党与社会党与民主自由派力量已经组建起反法西斯统一战线。在民间，赤卫队作为左翼民兵组织，于多次街头冲突中与黑翼军形成对峙。\n\n在喙索里尼指挥黑翼军向首都卡廷进发之际，统一战线方面视其为武力夺权尝试，率先组织抵抗运动。赤卫队与政府武装力量爆发直接军事冲突。事态很快升级，当前翼巴第已形成两个对立的权力中心：喙索里尼主持的卡廷政府，与南方统一战线领导的反法西斯政府。当前政府军虽具装备优势，但遭遇各地民兵的持续性抵抗。加之喙索里尼政权内部存在显著离心倾向，部分军官与士兵因反对违宪夺权而倒戈。而统一战线方面，赤卫队成员普遍面临武器短缺困境，但其作战意志构成重要战力补充；尽管其内部存在政治理念差异，但在阻止法西斯执政的核心目标上保持高度一致。\n\n现阶段，翼巴第的军事僵局为外部力量提供了战略介入窗口。通过向统一战线提供必要物资援助，既可有效遏制法西斯扩张态势，亦有助于在翼巴第建立长期政治合作关系。\n\n抄送：革命军事委员会办公厅、国务院办公厅、外交部办公室、[GetGRWSyndicalismBureau]、国家政治保卫局\n\n\n[GRW.GetName]国际革命行动总局局长，卡林·霆羽"
