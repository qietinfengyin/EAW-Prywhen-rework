 EAW_WS_TAB_3_TXT_HEADER_1:0 "扩展&种族科技和单位"
 EAW_WS_TAB_3_TXT_HEADER_2:0 "社会&科研发展度，文盲率与贫困"
 EAW_WS_TAB_3_TXT_HEADER_3:0 "回形针行动——战后研究奖励"
 EAW_WS_TAB_3_TXT_HEADER_4:0 "核战争变化"
 EAW_WS_TAB_3_TXT:0 "\n\n£eaw_text §Y马国戡乱史§!包含由§YRoad to 56§!制作的§Y扩展科技+工业+武器§!的新分支，（已经获得许可），经过编辑和简化，以更好地达到我们的设计目标。这提供了更长的游戏时间与更多的科技研究。\n\n马国戡乱史引入了§Y魔法武器§!和一个新的，用来生产它的资源 - £resources_strip|7 §Y水晶§!。§Y魔法武器§!是一种消耗更多资源，IC密集型，不太可靠，但是比普通武器更强大的§Y步兵武器§!。\n \n§Y前工业化步兵武器§!和§Y前工业化火炮§!已被添加，以代表尚未工业化的国家使用的武器。\n\n此外，戡乱史引入了§Y种族§!系统。每个国家都是二十三种种族中的一种——§Y小马§!、§Y幻形灵§!、§Y狮鹫§!、§Y鹿§!、§Y钻石狗§!、§Y龙§!、§Y野牛§!、§Y北极熊§!、§Y企鹅§!、§Y牛头人§!、§Y斑马§!、§Y骏鹰§!、§Y麒麟§!、§Y马§!、§Y骆驼§!、§Y长颈鹿§!、§Y驴§!、§Y阿比西尼亚猫§!、§Y羊驼§!、§Y石像鬼§!、§Y半人马§!、§Y雪人§!或§Y其他种族§! （使用通用科技树的种族）。许多种族都有自己独特的种族科技树文件，在某些情况下还有种族独特的部队单位。游戏期间不能改变种族。\n\n\n\n为了更好地表现马国戡乱史中国家的工业/社会和科研发展的差异，§Y社会发展§!和§Y科研水平§!之类的民族精神已经添加。\n\n§Y社会发展§!代表工业化的状态和经济社会的进步。低水平的§Y社会发展§!在§R工业§!，§R科研§!和§R政治§! 上施加负效益。§Y社会发展§!可以通过§Y国策§!或§Y决议§!提升，这取决于国家自身。\n\n§Y科研水平§!代表了国家的教育和研究能力。低水平的§Y科研水平§!在§R科研§!上施加负效益。\n\n§Y科研水平§!可以通过§Y国策§!或§Y决议§!提升，不同国家有不同的提升方法。这也不是马奎斯诸国专属的机制，拥有§Y狮鹫尼亚§!主要学术中心的国家同样可以进行提升§Y科研水平§!。文盲率代表有多少民众拥有读书写字的能力，贫困率则代表经济的运转情况。都可以通过§Y国策§!或§Y决议§!提升。\n\n\n\n\n\n如果一个国家在战争中被击败，在和谈结束后，胜利者将有机会在失败者已经研发的§Y科技§!上获得§G单次200％研发速度奖励§!。\n\n奖励获得是随机的，每个科技都会计算一次。失败者的被胜利者夺取（吞并或者傀儡）的§Y工厂§!越多，获得奖励的机会就越高，这意味着不是每个胜利者都有相同的机会。胜利者§Y社会发展§!的水平也是一个因素——发展水平越差，机会越小。\n\n\n\n核战争的潜力和释放如此可怕的武器所造成的恐惧在原版中表现并不佳。为了纠正这个问题，戡乱史引入了以下设定：\n1.核攻击现在将减少§Y地区§!居民的数量，他使用可靠的伤亡数据，实际取决于地区的居民数和发展程度（但在短期中连续使用多个核弹并不会大幅减少居民数）。\n2.一个§Y地区§!遭受核攻击后将获得§Y辐射§!修正，这将减少地区工厂，补给，部队组织度和增加部队损耗。这将持续§Y整年§!。随后的核攻击不会叠加修正，但会重置一年计时。\n-生产§Y核弹§!需要提供 £resources_strip|7 §Y水晶§!。如果没有资源可供提供，将不会有新的§Y核弹§!被生产。每个§Y核反应堆§!将消耗12 £resources_strip|7 §Y水晶§!。"
