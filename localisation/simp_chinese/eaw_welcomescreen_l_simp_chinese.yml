 EAW_WS_TAB_4_TXT_HEADER_3:0 "动态领袖名称生成"
 EAW_WS_TAB_4_TXT_HEADER_4:0 "平衡修改"
 EAW_WS_TAB_4_TXT:0 "\n\nSince 1.6 Ironclad update, new Game Rules for various countries and game setups have been added, to allow the player to customize their £eaw_text  §YEquestria at War§! experience. Furthermore, the effects of a negative research speed bonus have been adjusted to their pre-1.6 values. In vanilla currently, a value of -50% cuts your research speed in half, while in EAW it merely makes it take 50% longer. Additionally, a -100% research speed in vanilla means you will have no ability to research anything! Conversely, -100% in EAW means it will take twice as long. Essentially, countries with terrible research speed will not be totally destroyed.\n\n\n\nAn effort was made to improve the AI. While it is by no means perfect, and most of the real improvements can only be implemented by Paradox, we have done our best to tweak AI's behaviors, and improve AI's handling of Division Templates. AI will use all of the added units and technologies. AI will intelligently choose Doctrines based on the bonuses they recieve in their Focus Tree. AI will use dynamic strategies to respond to events and changes on the world stage. Peace Conference AI has been improved, though it is not perfect.\n\n\n\n£eaw_text  §YEquestria at War§! provides a new, flavorful system of general, admiral and, for players with the La Resistance DLC, operative generation. Various nations will generate different leaders of different races depending on their circumstances. For example, a nation may have both pony and griffon generals, or use multiple namelists. This does not carry any gameplay changes.\n\n\n\nUnfortunately, the full list of balance changes is larger than can be fit in this tab! Therefore we have moved it to a wiki page. Click the button below to read it!"
 EAW_WS_Zebrica:0 "斑马里加 - 文明的十字路"
 EAW_WS_Zebrica_desc:0 "斑马里加是个广阔而多元的大陆，比马奎斯和狮鹫尼亚拥有更丰富的种族多样性，光看面积也几乎与两块大陆相加一样大。气候范围从§G金笃§!的热带雨林一直到炽热的§Y斑哈拉§!沙漠以及冰封的§C赫斯提拉亚海角§!沼泽应有尽有。大陆上最为先进的社会在各方面都能与小马利亚媲美，但最为落后的社会却无异于原始部落。因此，几乎没有办法用几个词语概括整块大陆。尽管如此，斑马里加就是由这些大相迳庭的部分所组成的大陆，各个区域都有自己独特的文化与历史。\n\n西斑马里加是马（horses）的领域，是小马（pony）体型较大的表亲。除了他们之外，在§C阿比西尼亚§!还住着用两条腿行走的猫——也是智慧生命。在§g亚提述§!和§g安塞鲁克§!则能看到好战的驴子们。此地绝大部分的区域曾处于大一统的§G沙特鞍拉伯§!（马建立的国家）统治之下，但经过数百年的战乱和衰败后，帝国崩解，并在1007年爆发了残酷的内战。\n\n南斑马里加则更加多样化了，有斑马（zebra）、鬣狗（hyena）、石像鬼（gargoyle），和居住在寒冷南方的半人马（centaurs）。除了这些种族之外，§C风暴地§!的雪人（yeti）也是股不容小觑的势力。这是支凶猛的种族，在§C风暴大王§!的黑旗下团结起来，在整个大陆上造成了严重破坏。但是，随着风暴大王的战死，雪人种族很快的分裂成数个势力。但对于曾被征服过的其他国家来说，他们希望雪人永远选不出他的继任者，拖越久越好。\n\n中斑马里加的支配者则是广袤的沙漠，沙漠中心则有个大湖（Great Lakes）。过去，§Y马兹维帝国§!曾一度将湖泊周围的斑马各部团结起来，但风暴大王的入侵结束了她的统治，现在，斑马军阀们在帝国的残骸之上互相厮杀，争夺此地的控制权。虽然此地的主体种族是斑马，东部也有不少骆驼的聚落，但此刻，大多数骆驼仍处于风暴大王部下各个将领的统治之下，风暴大王死后，他们纷纷占地为王，建立了自己的国家。\n\n北斑马里加相比其他区域与马奎斯和狮鹫尼亚的联系更深许多，大陆上的海军强国主要也分布于此。沿海地区的主要种族是斑马，西北方的岛屿群则是骏鹰（hippogriff）和哈比鸟（harpy）的势力范围。§g翼蝠地§!（Chiropterra）有群小马利亚的流亡者，他们主要崇拜梦魇之月，并一直试图为她的再度崛起争取时间。东北方的金笃次大陆上居住着一群鹿，主要分成两个群体：奥伦尼亚征服者组成的统治阶级，还有受到压迫的原住民鹿群。居于群山之间的驼（llama）则与世无争的过着他们的和平生活，他们将统治者视为神祇般的崇拜。\n\n东斑马里加通常被认为是最落后的区域，这也就是为什么风暴大王几乎对此地完全没有兴趣的原因之一。此地的主要居民为斑马、长颈鹿和麒麟，但近来，弗羽西亚的狮鹫冒险家们被所谓东南方迷幻森林中某处的§Y黄金城§!传说给吸引而来，他们来此寻找宝藏和有商业价值的物品，并在此地建立了自己的据点。至于麒麟，目前仍然如漫长的过去那样遗世而孤立，但他们正慢慢向外界开放。\n\n然而，这一切叙述都只触及了斑马里加的表面而已。此地有许多的国家和部落，他们都有自己的故事，也有自己的生存之道，真不是三言两语能讲完的啊。"
 EAW_WS_Northern_Equestria:0 "北马奎斯（Northern Equus）"
 EAW_WS_Northern_Equestria_desc:0 "寒冷且多山的北马奎斯是一片荒芜的大地，但仍有些种族顽强地在此生存了很长的一段时间。幻形灵、牦牛、北极熊和企鹅——最近迁移过来的狮鹫开拓者们也许也算——都已经适应了此地的寒冷。据说当过去气候仍然温暖的年代，小马们也曾经生活在此地，然而，因气候的变化，他们逐渐地往南或向东迁移，最后只剩下了少量的废墟能证明这的确是事实。\n\n幻形灵是北方最为可怕的族群，在§G邪茧女王§!强势的统治下生活。而直到近代，牦牛才成功的联合起来，建立了名为§C牦牦斯坦§!的国家。起初他们奉行的是孤立主义，但当小马利亚的影响力与日俱增之后，一群名为§D毛牛氏族§!的保守派牦牛感到不满，最后发起了叛乱。残酷的战争持续了一段时间，但两方都无法彻底击垮对方，近期双方签署了一份临时的停战协定。再往北，就到了最近几年才成立的新兴国家§g北极熊社群§!。长年分裂的北极熊组成的这个政治实体根基还不稳，只有时间才能证明这个国家是否能经得起时代的考验。在东北海岸，历史悠久的§P企鹅王国§!正因老国王的去世而面临着继承危机。在企鹅王国的南方是已步入工业化时代的狮鹫殖民地§O新狮鹫尼亚§!，但目前因东方宗主的崩溃而陷入了停滞状态。现在，这个被迫独立的国家必须尽快寻找自己在世界舞台上的角色，学着靠着自己的力量生存下去。同时，他们的小自治领§Y狮鹫边疆§!正饱受土匪猖獗之苦。如果没有新狮鹫尼亚的支持，他们可能撑不了太久。\n\n幻形灵有着宏大的野心，认为小马利亚腐朽落后，他们自己才是全马奎斯的合法统治者。牦牛们忙于内斗，北极熊和企鹅还在逐渐成长为正常国家，而新狮鹫尼亚则繁荣发达。北方国家的未来充满机遇，也充满危险。幻形灵会做什么呢？其他北方的种族会团结起来，还是各自分裂呢？"
 EAW_WS_Southern_Equestria:0 "南马奎斯（Southern Equus）"
 EAW_WS_Southern_Equestria_desc:0 "马奎斯南部地区范围广大，气候和地形可说是天差地别，从北方的寒冷沼地一直到南方的炎热沙漠都有。有一个种族主宰了这里，那就是小马。但是这里也有鹿、野牛、龙和狮鹫。小马主要生活在平原、旱地和稀疏的林地上；鹿的家园则是针叶林、高山和沼泽；而野牛和龙的小小国家则笼罩在他们庞大邻居的阴影之下。\n\n§G小马利亚§!是目前为止世界上最大、工业化程度也最高的国家，被视为小马的避风港。在谐律原则之下，他们已维持和平与繁荣达一千年之久。马奎斯上的其他小马国家分别为：§P水晶帝国§!。小马利亚的亲密盟友，最近刚刚摆脱了黑晶王的诅咒而重生的国家；§R嘶大林格勒§!。脱离小马利亚统治的前省份、共产主义的摇篮；小城邦§r星光镇§!。一个刚刚摆脱疯狂邪教控制，正处于恢复期的小城邦。§g奥伦尼亚王国§!。地处小马土地的西北方，腐败的王室统治着此地的鹿民。除了两个较大的国家以外，还有较小的§O野牛酋长国§!（小马利亚内的一个部落制国家，飞地）以及§L龙族联合部落§!（新近上任的统治者为亲小马派）。\n\n南马奎斯曾经是个和平的区域，但最近的冲突让状况改变了。嘶大林格勒的起义、试图夺取小马利亚控制权乃至于征服大陆的§G幻形灵之地§!、奥伦尼亚内部的权力斗争等等。各主要国家之间的矛盾已濒临破裂点。北面的幻形灵正在备战，但他们的敌国似乎没能做好什么准备。奥伦尼亚因内乱而遭到削弱、小马利亚则坚守着反战主义，周边小国正屏息以待，有些正决定应加入未来巨大冲突中的哪一方。雪上加霜的是，这几个大国都是世界上技术最先进和工业化程度最高的国家之一，因此她们之间的任何战争都将导致前所未有的伤亡。诚然，不是所有势力都愿意让冲突升级，但随着战云密布，战争似乎已然不可避免。"
 EAW_WS_Northern_Griffonia:0 "北狮鹫尼亚（Northern Griffonia）"
 EAW_WS_Northern_Griffonia_desc:0 "长期以来，寒冷的北狮鹫尼亚虽说是地广民稀，但与气候类似的马奎斯极地地区不同，此地没有北极熊或者企鹅居住。有些顽强的狮鹫和小马移民分别从南方和西方迁徙到此后，便定居了下来。狮鹫主要定居在§g白尾山脉§!以南，沼地遍布的山谷之中；小马从西方则跨过海峡而来，聚落散布在北方沿海的冰封林地之中。当然，大多数的小马仅仅是路过，并持续往东往南寻找更舒适的定居点，不过仍有些决定定居在此地，数百年的艰辛生活让他们适应了此地的寒冷。\n\n这些小马被统称为§g北方部落§!，在狮鹫尼亚革命者跨越山脉，建立属于他们的国家§R天际纳维亚§!之前，他们一直与世隔绝的生活着。§G韦迪纳王国§!一直是个独立的国家，即使在帝国统治时期，由于距离帝国核心十分遥远，拥有高度自治权的他们也因此维持住了自己的传统。再往东，§O狮鹫共和派§!的残党于数十年前攻破了漫云公国的最后防线，占据了此地。革命者们目前身处流亡状态，时时渴望重返狮鹫海姆。野蛮的§L击日者氏族§!盘踞在白尾山脉之中，虽说名义上他们忠于帝国，但一旦情况有变，他们随时可能会脱离帝国的控制。东北方则是§Y阿克图里亚骑士团§!和§g恐惧联盟§!，这对与世隔绝的世仇并不与外界交流，仍然活在过去的时代之中。\n\n北方的狮鹫曾经是帝国的臣民，但在帝国灭亡之后获得了独立。如果帝国能浴火重生，他们失而复得的自由又将很快地失去。北方各国既贫穷、发展程度也不高，对于真正的强国来说，他们几近毫无自卫能力。狮鹫尼亚共和国虽说是北方最强的国家，但如果孤军奋战的话，他们并没有比邻居们更有能力阻挡帝国的进攻。在山脉的另一头，天际纳维亚和北方部落陷入了激烈的战争之中，小马们试图将入侵者驱逐出去，而狮鹫们则是想用共产主义的光辉照耀黑暗的北方。而在大陆的黑暗角落，恐惧联盟正在蓄积力量，一旦他们一劳永逸的歼灭骑士团之后，就没有任何办法能阻挡他们前进的步伐了。"
 EAW_WS_Central_Griffonia:0 "中狮鹫尼亚（Central Griffonia）"
 EAW_WS_Central_Griffonia_desc:0 "尽管§O狮鹫尼亚帝国§!的权威在其他地区早已荡然无存，但他们在狮鹫尼亚中部地区仍有影响力——虽然也早已今非昔比。狮鹫尼亚帝国的核心地区位于水量充沛的§C鹫王河§!那肥沃的河畔平原之上，格罗弗一世皇帝在那里建立了他的都城狮鹫海姆，也是帝国往后几百年来的首都。此地区的主体民族为狮鹫，不过在北方的§L青铜山脉§!还居住着一群被称为钻石狗的生灵。在东方，数百年来，魔幻的§G沙伊斯森林§!一直是当地狮鹫难以逾越的障碍，与南方辽阔的§D卢梅尔湖§!和§g黑空§!山脉共同构成了此地区的天然边界。\n\n§R共和革命§!后，此地业已四分五裂。帝国退缩到了§Y赫兹兰§!区域，皇室能直接管辖的范围仅止于狮鹫海姆周边，外围则是仍隶属于§O帝国公约§!名义上的封臣。再往南是饱受家族战争所苦、内战中的§Y维雷尼亚§!公国。大湖东方的§r狮鹫岩§!王国，在多年前国王骤逝后，由于没有继承者的关系，国家正缓缓的在停滞中走向死亡。小小的§G卢梅尔§!男爵领仍有机会拯救他们垂死的文化，而东方的黑空公国已经被§g黑石匪帮§!推翻。\n\n尽管帝国目前处于逆境之中，但她仍有机会浴火重生。如果这种状况发生，封臣们与前附庸则有丧失自治权的危险，当然，他们是不可能一枪不发，坐视这种情况发生的。不幸的是，目前赫兹兰只有透过武装冲突才有机会回归一统。对于维雷尼亚公国来说，相对幸运的是，他们仍有机会寻求和平解决内战危机的方案。在南方，卢梅尔可能透过对狮鹫岩土地的宣称来壮大自己；野心勃勃的黑石则可能会将目光转向东方——前提是要先避免自己遭到推翻。如果帝国成功统一赫兹兰，那中狮鹫尼亚诸国必须提高警觉，帝国随时有可能试图收复过去辉煌时期的领土。§D西方§!和§P南方§!的阿奎莱亚和翼巴第也不断试图在此地扩大影响力，这可能会导致他们未来与帝国不可避免的冲突。未来很难预料，但可以肯定的是：不流血是不可能的。"
 EAW_WS_Eastern_Griffonia:0 "东狮鹫尼亚（Eastern Griffonia）"
 EAW_WS_Eastern_Griffonia_desc:0 "东狮鹫尼亚在地理上的界线比较模糊，通常是以历史上§O狮鹫尼亚帝国§!影响力之外的区域来认定的。也就是说，这块区域占据了狮鹫尼亚大陆的很大一部分。除了狮鹫之外，此地也生活着许多其他的种族。东狮鹫尼亚地区传统上划分为三个子区域：南部的§D埃维河谷§!。狮鹫主要居住在埃维和与其繁多的支流沿岸；§G河间地§!。此地主体种族为小马，但山区也能找到钻石狗和狮鹫的聚落和国家；最后是§LBeorgfordas§!，也就是所谓的丘陵地（Hill-land），是隐蔽于世的山丘小马的家园。水量丰沛的§C鹫王河§!也正是发源于河间地山区。河水滚滚向前，几乎横贯整块大陆。此地另一个著名的地区是魔幻的§G埃格希奇森林§!，传说此地居住着巨型蜘蛛。\n\n总体而言，该地区的国家比起西方的国家要更加落后些，主要是由于此地区与小马利亚和其他先进国家相距甚远。在这三个分区中，要属河间地最为发达。此地的七个小马国家和（最近才加入）邻近的§g钻石山§!组成了一个被称为§G河间同盟§!的防卫同盟。同盟西方有两个狮鹫国家：§g冥翎§!和§g长剑§!，这两国是格罗弗二世皇帝远征军的残党。河间地南方的海岸地区有三个在此地法律和秩序恶化后迅速崛起的国家，至于种族组成就复杂了，包含小马、斑马、鹿和狮鹫。河间地南方的埃维河谷地区相比河间地要更加落后，此地的狮鹫仍然坚持着旧日的传统。但，也有想要改变的声浪开始出现：§Y布罗德费尔德§!正陷入与§R普里文解放军§!共产主义者的残酷内战之中。北方的山丘小马则是完全没有任何拥抱现代社会的欲望，他们的部落和生活型态就好像一个历史的时空胶囊，部落首领靠着河间同盟的支持，仍旧统治着自己的部落。河间地往东，隔着海洋，有个岛屿叫做§L绿崖§!，此地是东方幻形灵的家园，目前他们仍处于与外界隔绝的状态。\n\n帝国的崩溃给该地区带来了许多变化。河间同盟的主要对手已经消失，现在同盟必须寻找新的存在价值。有些意见认为应该推动联邦化，也有声音表示同盟应该就此走入历史。埃维河谷虽说已摆脱了帝国的统治，但自身却也陷入了动荡。如果不尽快进行改革，落后的狮鹫国家迟早会自行崩溃，而红星则将从废墟之中冉冉升起……丘陵地国家受到的压力较小，但即使如此，仍有小马在推动现代化。变革之风正吹向东方大地，但目前，未来仍是无法预料的。"
 EAW_WS_Southern_Griffonia:0 "南狮鹫尼亚（Southern Griffonia）"
 EAW_WS_Southern_Griffonia_desc:0 "狮鹫尼亚南方的沿海地带是整块大陆最为温暖的区域，最南端的地区甚至还有潮湿的丛林。但除此之外，南方各地基本都是干旱的平原和丘陵，偶有山脉点缀其中，而附近海洋上的岛屿星罗棋布。主体种族为狮鹫，但西方也有一定数量的小马，东方则有牛头怪，他们主要生活在大陆南端和群岛之上，其中最大的是§D星空新领§!。该地区的北部边界则为§C卢梅尔湖§!和§g黑空山脉§!。\n\n小马则主要居住于§G新马尔兰§!——一个由野心勃勃的殖民者建立的§G小马利亚§!海外殖民地。几个世纪前，他们向§R塔卢兹公国§!购买了一块有怪物出没的荒地，将其清理干净后定居了下来。§O狮鹫尼亚帝国§!崩溃之后，塔卢兹和此地的其他小国加入了由强大的§P翼巴第王国§!主导的§Y卡廷公约组织§!。当然，他们的世仇§g隼尔科§!并没有加入，不过他们近期才在与翼巴第的战争中惨败，连首都都割让了出去。§R西卡梅翁§!教区并不信任西方和北方的君主国，长年以来被誉为南方自由的灯塔，他们倾向选择与关系亲密的§D星空§!牛头怪建立同盟。他们多年来都试图从§C蓝百合伯国§!和狮鹫的压迫之下解放自己的同胞。\n\n目前，翼巴第仍是南方地区最强大的国家，他们在此区拥有首要的政治影响力。然而他们近期却饱受政治和经济不稳定的困扰，这可能会导致政府的根本性变化。这种变化可能不只会影响公约组织的成员国而已，更可能对整个区域造成影响。而同时，目前为止，新马尔兰仍然忠于小马利亚，但低迷的经济则使一些小马希望切断纽带，获取完整的独立地位。在东方，星空正为了与蓝百合的战争做准备，他们也有可能会与盟友西卡梅翁共同行动。而在南方国家彼此征伐的时候，北方的帝国可能浴火重生。虽然他们离狮鹫海姆的距离遥远，但新生帝国的怒火可不是这么轻易可以摆脱的……"
 EAW_WS_Western_Griffonia:0 "西狮鹫尼亚（Western Griffonia）"
 EAW_WS_Western_Griffonia_desc:0 "传统上，狮鹫尼亚西部由于距离因素，与小马利亚有着更紧密的纽带。此地有许多的天然良港，内陆地区则多为丘陵和茂密的森林，因此主要城市和开发都集中在沿海地区。尽管西南部有相当多的小马少数民族已经融入了当地文化，但大多数居民都还是狮鹫。在地区北方沿海地区，有着所谓的§L豪克兰§!群岛，位于主要的跨大陆贸易路线附近。\n\n尽管在西部地区进入历史时代以来，大多数的时间都是受到§R阿奎莱亚王冠领地§!统治的，尽管其随后被§O狮鹫尼亚帝国§!征服。在共和革命之后，帝国轰然崩解，王国迅速的独立、镇压国内革命、并下放了部分的权力。现在，阿奎莱亚王国分割成许多名义上仍属于国王统治的领国。阿奎莱亚北部是§GPeriphery§!（边境地），如今分裂成许多小型邦国。西北方则是§g天落贸易联邦§!，曾经是帝国最繁荣的省份，如今是一个独立的国家和海军强国。§L豪克兰§!群岛也是独立的区域，由逃兵、海盗和其他不法分子所统治。\n\n跟帝国的同行不同，阿奎莱亚的革命者们并没有逃走或躲藏起来。现在，他们正准备再次发起袭击，并寻求推翻君主制。国王和他的诸侯们正在尽力在起义开始之前试图将起义镇压下去，但事情未必会按计划进行。当阿奎莱亚忙于解决内部问题时，周围的小国也力求在相互冲突的同时建立自己的势力范围。最终，阿奎莱亚会向北扩张，并试图收回他们过去的领土，因此他们必须做好准备。天落目前的状况仍然很稳定，但领袖的年纪已经很大了，行将就木，这导致了本来的权力结构起了变化。至于豪克兰呢？他们就自己玩自己的，并没有外力想去干预他们。但是，位处赫兹兰的狮鹫尼亚帝国相距此地并不远，这个过去的强权仍有可能恢复实力。如果这种状况发生，帝国很可能会将目光转向西方这块富饶的土地。阿奎莱亚长期以来对帝国可说是怀恨在心，但如果他们不为风暴做好准备，光靠仇恨也无济于事。"
 EAW_WS_Kiria:0 "东斑马里加（Eastern Zebrica）"
 EAW_WS_Kiria_desc:0 "麒麟的家园，被通称为“麒里亚”的东斑马里加，地形景观十分多样，北方几乎不可逾越的高耸山脉成了与北方鹿和羊驼土地的天然边界，汹涌的马公河则将西部和南部的斑马国家与这个区域相隔开来。区域北方的地形主要是平原和丘陵，散布着大量茂密的森林。此地由面积最大、也最为强大的麒麟国家§Y麒里亚§!所控制。两个重要的水系让此地适宜居住，并造就了蓬勃发展的农业社会。其中最重要的是麒里亚的命脉，宏伟的§C蜜流江§!和其诸多支流，一同将该地区的大部分地块串连在一起，在河流与河流之间，形成了肥沃的农田。蜜流江经过§G葱翠§!这个将南方麒麟国家串连起来的贸易都市后便流入南麒麟海。帝都§O朱京§!正坐落蜜流江最东端的支流上，位于一个被群山环绕的肥沃山谷之中，将这座城市与周边乡间地区安全的隔绝开来。\n\n在北方，是一个更小但是同样重要的水系。§C洋红江§!流经港口城市§G馨郁§!后奔流入海，此地曾是整个国家的主要贸易枢纽，将§Y麒里亚§!的商贩送往§Y斑马里加§!的其他地区，建立起了繁荣的贸易网络。如今，河上的船只数量已大幅渐少，大多数麒麟返回到河流间的平原上，回到了自给自足的农耕生活，曾经宏伟的城市居民数量不断减少、基础设施严重失修。但是，此地有着丰富的自然资源、广袤的土地和深厚的文化底蕴，一旦“§R沉默§!”终结，河流将让此城成为工业化发展基地的理想选择。\n\n沉默开始时，§Y麒里亚§!南方的§Y[NVA.GetName]、[KXN.GetName]和[KHM.GetName]§!，三个自治国全都挣脱了麒里亚的控制。这三个国家的国土大半都被茂密的丛林和森林所占据，与北部的同胞相比，资源和国民数量都要少得多。对这几个发展程度较低的国家来说，由于土地大多都尚未开发和驯服，如果要推行现代化以达到与北方相同的水准，则有必要付出巨大的努力。在这三个国家中，§Y[NVA.GetName]§!的情况最好，因为即使在北部贸易路线崩溃之后，§G绽花§!市仍然是重要的贸易港口，其土地的森林覆盖率也不如两个西方邻国那么高。也许这三个南部麒麟国家有一天能团结起来，足以与北方重新站起来的麒里亚抗衡。当然，这需要巨大的努力和强大的领导者，但也许……"
 EAW_WS_Northern_Zebrica:0 "北斑马里加（Northern Zebrica）"
 EAW_WS_Northern_Zebrica_desc:0 "阳光明媚的北斑马里加海岸地区位于赤道以南，气候范围横跨热带到亚热带。此地多山、岛屿也众多，最有名的便是§D阿里斯§!和§G鹦鹉维亚§!。而越接近南方那广阔的斑哈拉沙漠，环境就变得越加干旱和荒凉，但丘陵也逐渐减少。\n\n北斑马里加的国家与马奎斯和狮鹫尼亚之间有着密切的联系，堪称大陆上最先进的区域之一，尤其是骏鹰菲亚和鹦鹉维亚这两个岛国的发展程度更是超出大陆其他国家甚远。但此区也有§g翼蝠地§!和§G托蹶克§!“共和国”这种与世隔绝的国家。古老的海上共和国§L迦骀基§!和由仁慈的国王所统治的君主立宪制国家§P瓦尔宰纳§!正迈向工业化的道路之上。利用风暴大王造成的混乱，可汗夺取了§g斑驴台§!的统治权，至于§O扎兰佳§!则是沙漠游牧民组成的联邦，是不发达的农业国家。\n\n沿海地区是§C风暴大王§!掠夺和破坏行动最后的受害者，但骏鹰菲亚、鹦鹉维亚和翼蝠地毫发无损地逃过了一劫。实际上，骏鹰菲亚躲藏在§D海马国§!之中，并在局势转变时果断出击击败了风暴大王；鹦鹉维亚则靠着强大而现代化的舰队确保了群岛的安全；翼蝠地堪称是个巨大的“要塞”，由于防卫军力过强，风暴大王认为并不值得花费力气攻打此地。至于其他国家，直到如今仍挣扎着从这场灾难中恢复过来。\n\n翼蝠地是最有可能利用各国虚弱之时和当前混乱局势的势力，但他们的行动完全取决于§7小马利亚§!局势的变化。如果他们在那里的计划失败了，他们就可能转而采取侵略性的立场，对周边较小国家形成重大威胁。尽管饱受内部不稳的困扰，为了对抗骏鹰菲亚，迦骀基仍可能选择与翼蝠地结盟。身为谐律的堡垒，骏鹰菲亚将不得不挺身而出对抗他们，但不管如何，骏鹰菲亚得先解决内部的问题才行。鹦鹉维亚不会干预这场冲突，而且通常对大陆事务也不感兴趣。"
 EAW_WS_Northeastern_Zebrica:0 "东北斑马里加（Northeastern Zebrica）"
 EAW_WS_Northeastern_Zebrica_desc:0 "东北斑马里加的地理环境千差万别：这里有被雪覆盖的世界屋脊§g安第拉雅§!，生活着骆驼和羊驼的干旱高原，还有居住着金笃鹿和他们的奥伦尼亚领主的潮湿的丛林谷地和金笃沼地。高松巍峨的安第拉雅山脉，让从陆地入侵变得接近不可能、保障了金笃的安全，也让此区与大陆其他区域接近完全隔绝。但，这并无法防止从海上来的入侵，长船载着这些入侵者自广袤的东部海洋而来。\n\n由于这种隔绝，东北的大部分地区都不发达。生活在高原的骆马和羊驼享受着他们的光荣孤立，由神圣专制的君主§Y萨帕驼师§!所统治。国家几乎控制着一切，并希望确保现状没有任何改变的可能。在山坡地区，有个名叫§L鹿钵尔§!的小国，统治者是个雄心勃勃的鹿征服者，但当地主要居民为骆马和羊驼。再往深处就到了金笃，此地区分成4个国家：在许多个世纪之前飘洋过海征服了这块次大陆、奥伦尼亚维京征服者的继承者领主国§D坻花§!和§g水钵§!；以及当地鹿建立的公国§P陀利§!和§G婆罗僧诃§!。在海岸附近，还有名为§L新麋鹿岛§!的群岛国家，这里曾经是奥伦尼亚统治次大陆的权力中心，现在它是一个被§G鹦鹉维亚§!征服的保护领。\n\n此地并未受到§C风暴大王§!怒火的肆虐，主要原因是距离雪人的家园过于遥远，高耸的山脉对于飞艇来说也是个极大的障碍。但即使如此，此区仍饱受广泛贫困和文盲的困扰，阻碍了国家进步。此外，当地众多的橡胶种植园也成了经济上的希望之一，也许一个能统一金笃的政权能藉此一跃成为世界最重要的橡胶生产者之一。\n\n然而，一个统一的金笃在1007年时的现在看来不过是个幻想。维京征服者的继承者和本土王公之间的紧张关系不断高涨，但领主国和公国却也同时面临着严重的内部不稳定问题。和平解决似乎已经不太可能了，整个区域的冲突一触即发。也许最后，战火的硝烟散去之后，有机会看到一个团结在一个旗帜之下的金笃吧。"
 EAW_WS_Central_Zebrica:0 "中斑马里加（Central Zebrica）"
 EAW_WS_Central_Zebrica_desc:0 "斑马里加大陆的中心几乎完全被世界上最大的沙漠§Y斑哈拉沙漠§!所占据。沙漠对待旅客和居民并不友善，居民稀少，仅在四散各地的绿洲和内河中，可以看到一些主要由斑马和骆驼所建立的聚落。相比于这个荒漠，周边地区的环境要宜居多了：东方的§g安第拉雅§!山脉山脚、西方则有§D大湖§!（Great Lakes），雄伟的§C呢骡河§!水系发源地。\n\n沙漠本身是荒凉的，主要的居民为游牧部落。斑哈拉的北部名义上由§R阿齐尔§!部落控制，而南部则由§C中斑马里加帝国§!及其疯狂的雪人军阀统治。在东部，§O自由骆驼部落§!正在拼命抵抗另一名雪人军阀的统治——自封为§D巴雷特里亚国王§!的§g巴雷特儒斯§!，他占领了查梅骆坎德，统治了大部分的骆驼聚落。在西方，§Y马兹维帝国§!崩溃之后，大湖周围和呢骡河沿岸，许多小型的斑马王国和军阀国家如雨后春笋般地冒出来。由于大多数国家都是最近才宣布独立的、也有些国家希望取代马兹维帝国成为大湖区的新霸主，这个区域简直像一个巨大的火药库。一个由马（horse）建立的神权小国§g拉艾姆§!（Re'em，意为独角兽）不想直接卷入即将爆发的冲突之中，但可能会选择支持某些军阀。\n\n中斑马里加比大陆的北部和西部更贫穷、发展程度更低，§C风暴大王§!的征服运动更是雪上加霜。庞大而繁荣的马兹维帝国被洗劫一空并受到了严重打击，现在仅仅是个被愤怒的前附庸所包围的弱小国家。在更远的东部，雄心勃勃的雪人将军在风暴大王去世后建立了自己的王国，用残酷的专制手段统治着臣民。此区的许多财富被掠夺并转移到其他地方，此区如果要恢复生机，那就得尽快消除现在日益升高的紧张局势才行。\n\n大湖区可能重归一统，但很难预测会是由哪个王国、部落或军阀完成这一伟业。本来最有可能成功的中斑马里加帝国可能会在疯狂的皇帝去世之后崩溃，骆驼则只愿为自己的自由而战——或为之而战死。此区域潜力巨大，但任何尝试将其潜力发挥的举动，都可能会造成腥风血雨。"
 EAW_WS_Southern_Zebrica:0 "南斑马里加（Southern Zebrica）"
 EAW_WS_Southern_Zebrica_desc:0 "斑马里加的南部海岸有许多被冰雪覆盖的山脉，这些冰川是水量充沛的§C呢骡河§!的源头，而山脉下方的平原和山谷则被寒带针叶林所覆盖。此区域海拔高、临近南极，因此气候从温带横跨到亚极带。这里生活着许多种族：斑马、鬣狗、雪人、石像鬼和半人马。过去，大多数种族之间的关系虽说不算融洽，但也能和平相处。而在§C风暴大王§!将雪人统一在一面旗帜之下之后，一切都改变了。\n\n如今，风暴大王已死，他创建的王国核心地带被四个军阀分割统治，每个军阀都声称自己是他的正统继业者。当他们忙于互斗之时，其他的种族正试图从雪人造成的破坏之中恢复过来。鬣狗尼亚王国的残骸§L尖吠苦行者§!，如今由一群尝试解放家园的灵能战士（spiritual warriors）所统治。在东方，§g石像鬼洛亚§!和§R森图尔亚§!长年的联盟关系仍然存在，但以目前的局势看来，这个历史悠久的联盟已看似摇摇欲坠。西北方，并未受到雪人影响的§R海泽布§!斑马目前正将注意力集中在大湖地区的权力斗争中，但是毫无疑问，他们终究会将注意力转移到南方，并设法解放被压迫的同胞。\n\n南部在风暴大王的战役中受害最大。许多国家被完全摧毁，或被风暴大王直接吞并，或被洗劫一空。而雪人的家园也靠着战士带回来的战利品而繁荣起来。然而，随着内战爆发，国家分裂成数块、过去繁荣的前景也受到了威胁。即使最终真正继承风暴大王衣钵的势力也将不得不面对漫长的重建过程。\n\n当雪人专注于他们的内战时，尖吠苦行者将进行干预并试图收回他们的家园。海泽布联邦虽说主要将注意力集中在大湖地区，但干涉周边地区对他们来说还不成问题。在更远的东方，石像鬼和半人马势必得专注在内政问题之上，确保国家内部团结的同时也得尝试维持两国之间长久的联盟关系。但，一旦雪人内战结束，周边国家绝对不乐见重现风暴大王的征服行动，反雪人包围网正隐然成形。南方的种族虽说追求和平，但在雪人威胁彻底解除之前，他们恐怕没有这种余裕啊。"
 EAW_WS_Southeastern_Zebrica:0 "东南斑马里加（Southeastern Zebrica）"
 EAW_WS_Southeastern_Zebrica_desc:0 "纯粹从地理位置上来看，位于南半球的东南斑马里加气候应比较温和，只有在边缘地带才会出现亚极地气候。但事实上，此地气候却基本上属于热带，边界为亚热带。东南半岛遍布着茂密的雨林，即使在冬季夜晚相当漫长，气温仍然很高。对于这种奇怪的现象，科学上仍无法找出能被广泛接受的解释，但谣传在丛林深处的§Y黄金神殿§!，会释放出能影响气候的魔法。§G弗羽西亚§!的冒险家也被黄金神庙的传说、有价值的热带植物以及珍稀的贵重矿产所吸引，纷纷前来此地建立殖民地，希望能取得当地的资源。\n\n这样的殖民地有三个；位于离岸群岛上的§O南泽布里德§!、沿海丘陵上的§Y自由邦§!以及北方干旱山地的§L塔隆士瓦§!。虽然这些地区主要由狮鹫管理，但当地居民主要仍是斑马原住民，特别在泽布里德，除了斑马之外还有数量不少的麒麟。当地土著也建立了不少自己的国家。在西北方有长颈鹿的§Y特维赞伊卡§!王国、好战的§g泽布鲁帝国§!，以及率领着一支失落罗马坞军团的斑马国王所建立的§R罗阿谟§!。在东南地区的丛林以及大海中的岛屿上，还有许多大大小小的部落和王国，其中最大的是§g宗果§!。\n\n风暴大王基本上碰都没碰东南地区，仅仅对特维赞伊卡发动过小规模的突袭而已。狮鹫殖民者和他们的原住民邻国都“过于军事化”，其他的区域则是贫穷且发展程度不高。风暴大王对黄金神庙十分感兴趣，但他打算在完成其他征服之后再来寻找。值得庆幸的是，他在实际行动之前就死了。\n\n由于东南部的所有国家都不必担心重建问题，因此他们可以专注在与周边势力打交道之上。狮鹫殖民者与原住民的紧张关系不断提高，塔隆士瓦也在与罗阿谟的作战中面临惨败；新崛起的强权泽布鲁正在寻求成为地区绝对霸主的机会；在丛林深处，一些农耕王国正寻求最终实现现代化的道路，并可能向邻国发动战争，也导致了丛林各部落间日益严重的骚动。东南各国也许能幸运的躲过风暴的肆虐，但他们恐怕躲不过来自于彼此之间的怒火。"
 EAW_WS_Northwestern_Zebrica:0 "西北斑马里加（Northwestern Zebrica）"
 EAW_WS_Northwestern_Zebrica_desc:0 "西北斑马里加有着绵长的海岸线，从§G鞍拉伯§!半岛一直延伸到§D阿比西尼亚§!的最北端。海风微弱，而从内陆的§Y斑哈拉沙漠§!却终年吹来干热的风，造成此区域北段为干旱气候，但南方气候则更加温和。鞍拉伯半岛的东半部被沙漠覆盖，这是因为雨水被山区遮挡，而鞍拉伯海形成的云层则向东前往了里塞安。由于西北大多数地区较为干旱，大多数生灵例如猫、马（horse）、小马（pony）、驴子等主要集中在沿海地区以及发源于山区河流的肥沃冲积带旁，后者最显著的例子就是水量丰沛的§C呢骡河§!流经的§F埃驹§!了，在干旱沙漠中，这条河流可是重要的水源。\n\n沙特鞍拉伯在内战爆发、分裂成五个势力之前，是此区域最大的国家。沙特鞍拉伯马（horse）曾经是整个西部地区的霸主，但百年来的持续衰弱让这个帝国最终面临崩溃。沙特鞍拉伯的东北方是好战的驴子国家§r亚提述§!和§g安塞鲁克§!，而猫则居住在山区的阿比西尼亚王国中。埃驹的主要种族则为小马——小马利亚小马的同胞，而夹在阿比西尼亚和埃驹中间的则是§G鞍达卢西亚§!。驴的南方是多年前脱离沙特鞍拉伯的§R也马§!埃米尔国的领土。\n\n这个地区大概有一半逃过了§C风暴大王§!的怒火，但另一半则遭到了他的掠夺。当时仍为统一国家的沙特鞍拉伯还有能力组织一支强大的现代军队反抗风暴大王的入侵，他们甚至还有能力保护当时仍在势力范围之内的驴子。阿比西尼亚、埃驹和也马就没这么幸运了——风暴大王制造了无尽恐慌，夺走了所有拿得走的财物，并在这些国家境内大肆破坏。由于曾经激烈地反抗风暴大王的进攻，高傲的阿比西尼亚受到的破坏尤其严重。\n\n风暴大王死亡之后，现在对于沙特鞍拉伯来说，本是重建西部霸权的最佳时机，但由于内部动荡已不可弥合，而这个曾经强大而富裕的国家现在正在瓦解。现在，驴子失去了保护者，但反过来说，他们现在可以自由决定自己的外交政策。也马、阿比西尼亚和埃驹则必须首先专注在重建自己被摧残的国土，但这三个国家都与邻国关系不睦。不仅如此，狮鹫尼亚的§P翼巴第王国§!在阿比西尼亚拥有一小块领土，他们可能会寻求在南方大陆扩大势力范围。一旦沙特鞍拉伯重归一统，一度沉睡的巨兽即将苏醒，如果到时其他国家仍然衰弱且分裂，他们或将面临灭顶之灾。"
 EAW_WS_Southwestern_Zebrica:0 "西南斑马里加（Southwestern Zebrica）"
 EAW_WS_Southwestern_Zebrica_desc:0 "西南斑马里加是大陆最接近南极、也最冷的地区。此区由两个半岛组成：较长的赫斯提拉亚（得名于其末端的海角）和较宽且较短的里塞安，这个半岛被鞍拉伯海包绕着。两者居民几乎都是马（horse）和小马（pony），只有很少量的斑马居住在此地。两地中，赫斯提拉亚更靠南极，气候较为寒冷，有着广大的针叶林和沼泽地；至于里塞安的气候就较为温和许多，而且由于有来自鞍拉伯海的水气，此区降水较为充足，土地也更加肥沃。除了赫斯提拉亚，此区还有个神秘的§C彭盖亚§!岛——那里是可怕的冰龙的故乡。\n\n这整个地区曾属于§G沙特鞍拉伯§!的势力范围，但他们的统治早已烟消云散。现在此地分裂成了许多大小国家。由于鞍拉伯的遗产仍在，此区的发展程度相对较高。赫斯提拉亚海角西半部主要国家为§G马雷托尼亚公国§!和§D爱沙洛尼亚§!，两国之间透过Kyrippos二世公爵和塞伊达公主的妹妹联姻而紧密的联系在一起。他们共同反抗着此区新兴的大国§G卡尔卡丹尼斯坦§!——一个雄心勃勃，立志于与沙特鞍拉伯竞争地区霸权的国家。里塞安的主要国家则为§O乌斯加特埃米尔国§!、§R黑米尔王国§!和§G马尔塔尼亚§!魔权国——传闻提到这个国家的法师一直致力于收藏并寻找具有危险潜力的魔法文物。\n\n由于此区各国彼此无法齐心，他们在§C风暴大王§!的军队面前几乎可说是不堪一击，他顺利地横扫、掠夺了整个区域。但是对于卡尔卡丹尼斯坦来说，这却是个机遇，而不是灾难。曾为风暴大王麾下佣兵团的卡尔卡丹尼斯坦利用了这个混乱局势，建立了一个强大的国家。\n\n在此地区各国仍然受创颇深的情况之下，卡尔卡丹尼斯坦已经准备好确立自己的霸权。马雷托尼亚和爱沙洛尼亚之间的联盟只要能维持下去，就为双方提供了生存的机会。而里塞安则必须尽快想方设法团结起来，如果仍然如现况一般一盘散沙，他们将无法有什么作为。至少，较小的国家不必太担心现代化的问题，他们的社会已经相对先进，而卡尔卡丹尼斯坦虽说是强国，但在这方面尚处于劣势。各国如要生存下去，他们需要为了生存而把握一切的优势才行。"
 EAW_WS_DED:0 "[Root.GetNameDefCap]——亡者的帝国"
 EAW_WS_DED_desc:0 "§R本国家拥有特殊的游戏体验，不能代表本模组内其余国家。我们不建议您在初次游玩时选择本国家。如果您刚刚开始游玩本模组，我们建议您在“有趣的国家”栏目中进行选择。§!\n\n\n\n§Y恐惧联盟§!（The Dread League）只不过是一群生活在社会边缘的亡灵巫师的聚落。他们几无工业或科技、墨守着上古魔法和过时的工艺。\n\n从官方纪录看来，§Y恐惧联盟§!的土地现在是属于§Y阿克图里亚骑士团§!（the Arcturian Order）所统治，而且已经持续了数百年。然而，那些骑士们了解的更深……即使死灵帝国早已毁灭，但§Y恐惧联盟§!仍在社会的边缘地带继续存在下去。毕竟，古老的黑暗魔法总是会吸引生灵的好奇心。\n\n一种邪恶的未知召唤，使来自世界各地的亡灵巫师们聚集在一起，聚集在这个亡灵帝国久远之前被击败的地方，这个冰冷的北地。在那里，他们组了成死灵法师理事会，并在等待着在合适的时候选择一位领导者，再次引领他们走向世界的王道征途。\n\n远古亡者正在骚动。凡夫们准备好面对即将来临的尸潮了吗？还是会被成群的血肉与骸骨吞噬呢？"
 EAW_WS_HLR:0 "[Root.GetNameDefCap]——北地的看守者"
 EAW_WS_HLR_desc:0 "§R本国家拥有特殊的游戏体验，不能代表本模组内其余国家。我们不建议您在初次游玩时选择本国家。如果您刚刚开始游玩本模组，我们建议您在“有趣的国家”栏目中进行选择。§!\n\n\n\n北地（The North）——冰冷、阴暗、地广、生灵稀少。§Y阿克图里亚骑士团§!（the Arcturian Order），一个古老的神圣骑士团，正位于这样的一块大地之上。建立在十二圣殿的信仰和理想之上，致力于维护圣光的纯洁。\n\n千年以前，在一个不详的长夜之中，东方的死灵法师突然大举侵入。亡者的大军如浪潮般袭来，现在被称为§Y阿克图里亚骑士团§!这一集团控制的这块土地在当时几乎被不死者的狂潮给淹没。地方教会中的激进分子是残存能够采取措施来遏制潮流并将其击退的唯一团体了。\n\n接下来的一个世纪，太阳女神的圣父§Y“烈爪”德斯蒙德§!（Desmond the Fell-Claw）创立了§Y阿克图里亚骑士团§!。§Y阿克图里亚骑士团§!的创建仅仅是为了保护生命免受来自东方污秽存在的伤害。\n\n自九百年前的那个命运之日以来，他们的确坚守住了他们的岗位。\n\n然而，近年来，历史翻开了新的篇章——恐惧半岛正在发生异变。边境袭击的频率增加，骑士团中的独角兽察觉到黑暗能量正在边界之外聚集。即便如此，十二圣殿仍确信自己已为风暴做好准备。\n\n但问题是，他们真的准备好了吗？"
 EAW_WS_EQC:0 "[Root.GetNameDefCap]——大洋对岸的朋友"
 EAW_WS_EQC_desc:0 "400多年前，由§Y马伦布§!（Coltlumbus）带领的第一批商马在南狮鹫尼亚海岸定居，并建立了§G新马尔兰§!殖民地。那片土地鹫口稀少，§R怪物§!横行，却是一个同§Y翼巴第§!与其他狮鹫国度贸易的好场所。然而，这些定居者很快就意识到，这片土地严格意义上是属于§Y塔卢兹公爵§!的。因此在673年，条约签订，交换了大片土地。新马尔兰与塔卢兹的新边界也确定了。殖民地的东部边界保持至今。\n\n尽管名义上仍然是§Y小马利亚§!的一部分，新马尔兰拥有自己的政府，名为联邦议会，并受自设法律法规的约束。宽松的工业规范和就业法律，加上高价值的狮鹫市场，导致许多小马利亚企业在新马尔兰设立。\n\n然而，在999年10月29日，新马哈顿股市崩盘。在这场后来被称为§R黑色星期三§!的事件中，数以千计的新马尔兰马突然发现他们失去了工作，国家发生经济骚动。许多新马尔兰马向小马利亚寻求帮助，但小马利亚几乎没有采取措施帮助他们缓解苦难。\n\n许多新马尔兰马，现在感到自己已经被§Y塞拉斯蒂娅公主§!抛弃，开始为联邦寻求完全独立而奔走。这场运动由几个富有魅力的小马，比如§Y乐善§!（Gladmane）、§Y王鱼§!（Kingfisher）、§Y海格尔公爵§!（Duke Haygle）所领导。但是，新受任命的总督§Y奢华§!（Jet Set）在新马尔兰联邦议会中仍保持着坚实的权力基础，并拥有广泛的民意支持。在小马利亚的支持下，他有自己的计划来修复国家，并在政治上维持现状。\n\n新马尔兰必须解决迫在眉睫的问题：§Y经济萧条§!。尽管许多小马对新马尔兰应该如何复苏有自己的看法，但有些马的观点更为极端。新马尔兰也是一个§Y和平主义国家§!。如果面临一场战争，公众需要一个集结起来的理由。在这个国家里，存在一个相当庞大的§Y狮鹫少数族群§!，他们会强烈反对参加任何“小马的战争”。然而，新马尔兰在游戏开始时拥有强大的工业基础，并且是全世界最大的铝生产者。一支强大的空军，加上一支做好防御准备的陆军，将是新马尔兰防御的关键。\n\n新马尔兰的小马们发现自己陷入了危机，在这片陌生的土地上被潜在有敌意的国家包围。他们能坚持下去吗？还是说这将是新马尔兰漫长历史中的最后几年？"
 EAW_WS_GRF:0 "[Root.GetNameDefCap]—— 被遗弃的殖民地"
 EAW_WS_GRF_desc:0 "在远古时代，小马利亚东北地区是个更加温和的土地，也是小马最早的故乡。传说中，三个小马种族之间永无休止的竞争引来了魔法种族§C雪魔§!，他们以仇恨为食，给此地带来了永恒的寒冬。小马向南或跨过海峡向东逃跑，抛弃了过去的聚落。时至今日，此地仍残存与今日小马建筑类似的废墟，也许可以作为这种神话的佐证之一吧。但不管怎么说，可以肯定的是在其大部分的历史之中，东北地区生灵稀少，只有§C牦牛和企鹅§!的游牧部落生活在这片冰封大地之上。\n\n随着来自狮鹫尼亚的§Y狮鹫殖民者§!到来，自纪元600年开始，情势发生了变化。他们是渔民、捕鲸者、商贩、探险家、冒险家和探矿者，他们来自韦迪纳、弗羽西亚、漫云、赫兹兰和阿奎莱亚等地。虽然最初他们并不打算建立永久定居点，目标也只是开发当地的自然资源、与原住民进行贸易并调查未知的土地，但最终他们确实这样做了。第一个聚落名为§Y新天鹰城§!，前身为杜里河口附近的一个小渔村。但狮鹫聚落仍然规模不大、互不联系且基本上是自治的，直到§Y格罗弗一世皇帝§!将狮鹫团结在单一的§O狮鹫尼亚帝国§!之下为止。\n\n在纪元783年，皇帝设立了§Y新狮鹫尼亚§!殖民领，将领地首都设在了维特。在接下来的数年中，跨海而来的移民暴增，殖民地的边界不断扩大，也侵蚀到了牦牛和企鹅原住民的生存空间，但各定居点逐渐发展为繁荣的城市。免费的耕地、矿山、渔场等承诺，以及非正式的承诺—免于帝国直接统治的自由—造成了巨大的拉力，吸引了大量的移民。实际上，新狮鹫尼亚一开始正是因为许多政治异见者和犯罪份子被流放到此地而出名的，许多的移民最初只是在矿山中被强迫服劳役的罪犯罢了。\n\n不幸的是，尽管多年来规模不断扩大，但新狮鹫尼亚仍未摆脱对宗主国的依赖。这意味着当帝国于§R978年共和革命§!轰然崩解之后，新狮鹫尼亚瞬间陷入困境，经济在一夕之间几乎崩盘。殖民地陷入一团混乱，政治流亡者开始组织并建立激进的反政府派系。幸运的是，§Y茶羽总督§!设法透过他的感召力和意志力稳定了国家，因此成为了新狮鹫尼亚的实质领袖。如今，殖民地的局势在某种程度上已经稳定下来，但是经济仍然处于混乱状态，激进分子仍继续造成麻烦——仅仅十年前，§R乌拉·红尾§!尝试效仿嘶大林格勒模式掀起革命。而它的失败导致政党的合法化，其中也包括臭名昭著的§Y猎鹰队§!。\n\n只有时间能证明他建立的这个脆弱和平能否持续下去。"
 EAW_WS_GFF:0 "[Root.GetNameDefCap]——蛮荒的边疆"
 EAW_WS_GFF_desc:0 "如果说§Y新狮鹫尼亚§!（Nova Griffonia）被看作是§Y狮鹫尼亚帝国§!内的一滩死水，你就能想象本土大多数文明鹫是怎么看待§Y狮鹫边疆§!（the Frontier）的了。\n\n边境地的乡村地带被强盗，食鹫族和其他类似的疯子污染着，那里仅有的几个镇子依靠为各种犯罪组织提供食物和货物才得以存活。\n\n当地政治家和公务员腐败又无用，这让情况变得更糟。\n\n§Y帝国§!崩溃分裂后，§Y新狮鹫尼亚§!宣布正式独立，将§Y边境地§!作为自己的领土。然而，这个统治权的变动只是造成了边境地更严重的被忽视。由于其所谓的“社会”密布阴谋，政治骚乱造成本就情况恶劣的边境地现在§R处于崩溃的边缘§!。\n\n现在，差不多是边境地官员前往§Y新狮鹫尼亚§!并正式请求资助的时候了。到现在为止，他们的恳求每次都毫无回报，边境地被迫独立求存。如果这次结果不同，那将非常惊奇，尽管这不太可能发生。边境地的狮鹫已经习惯性的认为他们不会得到任何真正的资金支持。\n\n§Y狮鹫边境地§!不稳定而且虚弱，极度需要改变，无论这改变有没有新狮鹫尼亚的参与都可以。有些事情需要发生，它们马上就要发生了。"
 EAW_WS_LAK:0 "[Root.GetNameDefCap]——Hen Wlad Fy Nhadau（父辈的土地）"
 EAW_WS_LAK_desc:0 "§G卢梅尔男爵领§!（The Barony of Rumare），它是狮鹫尼亚文明的摇篮之一，被大多数生物认为是世界上的天堂，拥有美丽的沙滩、优美的景色、古老的建筑和有趣的历史。田园风光的美名近些年才逐渐远扬，而§Y卢梅尔§!能够在§Y帝国§!的崩溃中幸免于暴力和血腥，这也使得这一印象深入鹫心。\n\n然而，对于卢梅尔民众来说，在外部看来的黄金时代其实是§g衰落的黑暗时代§!。他们称它为§g颓垣断壁§!——他们的语言、文化和传统逐渐被帝国的语言、文化和传统所取代。即使在卢梅尔作为独立国家的今日，这种情况仍在继续，但是许多狮鹫看到，他们终于有机会在为时已晚之前挽救自己。\n\n几代以来，卢梅尔都是由§G破晓家族§!（the Dawnbreaker family）仁慈的利爪统治的，他们是帝国§Y格罗弗王朝§!（Groverian dynasty）和狮鹫岩的母系后裔。最近，§Y雷西米尔男爵§!（Baron Recimir）刚刚去世，这彻底动摇了这个小国。他的儿子即继承者§Y阿拉里克§!（Alaric）已经以雇佣兵身份从国外回来了，现在他打算把他在国外学到的一切都付诸实践，希望能结束§Y卢梅尔§!文化的衰落。"
 EAW_WS_ROU:0 "[Root.GetNameDefCap]——永恒之城"
 EAW_WS_ROU_desc:0 "1600年前由§Y阿布鲁诺戈斯（Arantigos）大帝§!建立的§Y罗马坞城§!（the City of Romau）保持独立已有千年，维持着一套独特的元老院体系和武士文化，并由罗马坞军团保卫这座富裕的城市抵抗一切敌鹫。559年，卡特尼王国入侵，罗马坞在一场血战后击败卡特尼军队，保卫了这座伟大的城市。这座军事共和国以其元老院中数不清的政治阴谋和暗害闻名于世，无数政治家和将军们在权力斗争中枉送了性命。\n\n八世纪的罗马坞再次繁荣起来，其商品遍布赫兹兰的各个角落。而格罗弗一世携狮鹫岩大军与北风之神神力抵达无疑大大加速了城市的发展进程——罗马坞选择了屈服，并由此开始了帝国治下的繁荣新纪元。728年罗马坞大学建立，至今仍是狮鹫尼亚最负盛名的大学之一。\n\n785年，由于一场失败的叛乱，正在对抗阿奎莱亚起义的§R格罗弗二世大帝§!（Emperor Grover II）愤怒地剥夺了罗马坞绝大多数的土地。被激怒的格罗弗二世劫掠并破坏了整座城市，罗马坞军团也被从皇宫卫队的位置上赶走，被限制于罗马坞市区中。好在之后仁慈的格罗弗三世给予了罗马坞帝国自由市的特殊待遇。在接下来的数个世纪里，这座最后的帝国自由市面临着重重苦难，社会主义者、国民共和党、乃至于厄耳神官都争相试图控制元老院并扩大自己的影响力。当共和派突袭帝国时，元老院仅仅只能说是勉强幸存，如今格罗弗五世重病在床，城市笼罩在另一场革命的恐惧之中。\n\n992年，元老院选出元老拉维奥利领导动荡的罗马坞。之前的诸多元老都死于共和派、社会主义者和政敌的刺杀，因此拉维奥利十五年的统治几乎可以称得上是一个奇迹。不过仍有许多狮鹫质疑他能否领导城市度过下一场危机。\n\n§Y帝国§!的黑暗时刻正在迫近，而帝国的命运很大程度上也就是小小§Y罗马坞§!的命运，狮鹫们窃窃私语着阴影中的叛乱，谈论着革命、自由、重申故土、以及罗马坞军团的胜利进军……但到现在为止，这都还只是小巷里的低语罢了。\n\n直到现在为止。"
 EAW_WS_FAT:0 "[Root.GetNameDefCap]——共和国之梦"
 EAW_WS_FAT_desc:0 "两个半世纪以来，§R狮鹫尼亚帝国§!（Griffonian Empire）以它的独裁爪段统治着狮鹫们。而恰巧在新的科技与思潮涌入大陆的时候，它渐渐地腐朽堕落了。鹫民们开始呼吁自由与正义。978年，他们决定亲自解决，向帝国首都§Y狮鹫海姆§!（Griffenheim）进军。§Y克梅斯凯§!（Kemerskai），作为帝国军官和革命的同情者，召集了一些首都的军队，和鹫民们一起闯入了宫殿，在皇帝和贵族逃走后成立的全新的§Y狮鹫尼亚共和国§!（Griffonian Republic）。\n\n这次对帝国心脏的袭击可谓致命一击。整块大陆上，新的国家此起彼伏地出现，很快，民主、民权、民生将会是全体狮鹫们都享有的权利！\n\n但好景不长。皇帝与贵族再度集结，将我们赶出了首都，甚至是帝国。我们的由被排斥者、革命者、理想主义者和忠诚士兵组成的运动被迫向冰冷的北方长征。\n\n在这寒冷的北方，我们遭遇了§Y漫云公国§!（Duchy of Cloudbury），此时年轻的§R奥托·翎坛二世§!（Otto Plumenjar II）公爵正试图从帝国的灾难性崩溃中重建自己的领地。他的政权严重依赖来自§Y狮鹫海姆§!的供给，在缺乏武器、食物以及工业品输入的情况下，他治下的民众开始§R愤怒§!。我们北征的部队则§G召集了这些农民§!，将其整合进共和国军队并开始§Y进攻§!公国。奥托二世采取了§R极端措施§!以保证他的统治持续下去——他摧毁了无数怀疑藏有共和国军队或者弹药的田野与工厂。但是§G他的统治还是到头了§!，漫云城中共和国的支持者们§Y绞死了他与他的妻子芙蕾雅§!，杀死了他唯一的孩子弗雷德里克，以§Y确保共和国的统治§!继续下去。公国的掌控权随后落入了其叔叔§Y奥斯卡·翎坛§!（Oskar Plumenjar）爪中，随后他带领着仅存的支持者向北方部落方向逃窜。共和国之梦安全了。\n\n但之后情况不容乐观。我们身处他乡，缺乏枪支弹药和食物。军队逐渐不服管教，土匪霸占着乡下。\n\n但是§G共和国之梦§!在我们心中燃烧，并照亮这寒冷的北方。整块大陆上的狮鹫们都有着我们共同的自由理想。我们将重建这里，夺回帝都，确保所有鹫都享有§G民主、民权、民生§!（Liberty, Prosperity and Democracy）！"
 EAW_WS_GRI:0 "[Root.GetNameDefCap]——狮鹫尼亚的病鸟"
 EAW_WS_GRI_desc:0 "§O狮鹫尼亚帝国§!（The Griffonian Empire）曾经是气吞八荒的世界第一帝国，当时将近三分之二的狮鹫尼亚，甚至马奎斯的东北角都是帝国疆域。但大起后的§Y帝国皇朝§!只能迎接大落的残酷命运了，帝国已气数将尽。\n\n自§O狮鹫岩的格罗弗一世§!（Grover I of Griffonstone），神圣的§Y北风神神像§!的持有者在705年将大多数狮鹫族群统一于一面旗帜之下，并称帝开始，这个帝国在§Y狮鹫岩皇朝§!（the Griffonstone dynasty）严谨而公正的统治下，羽翼渐丰，于是开始了对狮鹫尼亚的大征服。这征服到格罗弗一世死后仍在毁誉参半的§O“战士皇帝”格罗弗二世§!（Warrior-Emperor Grover II）的接棒下继续，直到帝国东征河间却反被当地的小马击退，小马们随后组建了§R河间同盟§!（River Coalition）以防御帝国侵犯其主权。随着大征服的中止，许多被征服的方国遗民和贵族开始致力于抺黑和算计皇帝，导致皇帝从万众景仰的明君变成为鹫不齿的欺压异族的暴君。但§O格罗弗三世皇帝§!（Emperor Grover III）还是设法保持住了帝国的稳定和统一，并保持了大多数臣民对他和帝国的忠诚，而那小部分的仍在反抗很快也无影无踪了。他也组建了正式的§Y帝国常备军§!，该军队也很快成为当世上最庞大的武力，另外还试图创建了一种帝国身份，以尝试将这偌大帝国的无数种文化联合起来。\n\n但是，当§O格罗弗四世§!（Grover IV）登基时，这个已历近二百载的帝国渐渐风雨飘摇。虽然他是普通官员喜欢的行政程序专家，但贵族鄙视他，他们对如今庸君当政的格罗弗皇室的敬畏之心日益淡簿。当他骤然病死，让体弱多病的幼帝§O格罗弗五世§!（Grover V）不得不继位时，贵族们采取了行动，成立了能凌驾于皇帝之上的§R摄政委员会§!（Regency Council）。但§R帝国真正的倾颓§!是在狮鹫岩的外戚古托失去§Y北风神像§!（Idol of Boreas）时才开始。北风神像是上古圣物，象征着皇朝的权威和天佑之皇的正当性。971年，名叫阿里玛斯皮（Arimaspi）邪恶的独眼巨怪强行抢走了北风神像，他还在跌下悬崖前杀了§O古托六世§!（King Guto VI），他也就是格罗弗五世的摄政王。\n\n当国王甘贝托（King Gumberto）神秘遇刺后，在972年加冕的§R加里波德·塔洛努埃尔三世§!（Garibald Talonuel III）的领导下，§R翼巴第王国§!（The Kingdom of Wingbardy）和其他§Y卡廷公约§!（Karthinian Pact）的成员国一起成为首批脱离帝国的前诸侯，随后，§R阿奎莱亚迪斯克里家族§!（the Discret family of Aquileia）亦伺机自立，并带走了帝国西部的大部分沿海地区。另外如布罗德费尔德（Brodfeld）小封臣也纷纷效仿。\n\n但一切危机都在978年才彻底爆发。当是时的帝国仍处于§Y摄政时期§!，在皇族已经没长君可担摄政之时，思变多年的帝国贵族甚至到格罗弗五世（Grover V）已经成年时仍千方百计的阻碍他登位亲政。这不合理的摄政在§R978§!年冬天终于结束，因为成千上万愤怒的农民和下层贵族已发起革命，冲进皇宫。幼帝在§Y神官厄洛斯七世§!（Archon Eros VII）的帮助下存下来，随后逃到了乡间，而其余的无数贵族则在兵荒鹫乱中死无全尸。§R狮鹫尼亚共和国§!（Griffonian Republic）成立了，在接下来的混乱中，§R天落§!（Skyfall）屠杀了帝国守军，夺取了§C海军舰队§!并独立建立贸易联邦。一年后，幸存的贵族在§G施塔莓女公爵嘉比蕾拉·鹰爪§!（Duchess Gabriela Eagleclaw of Strawberry）领导下对共和国发起了§Y反攻§!，§O格罗弗五世§!最终在逃往寒冷北地的§Y共和党鹫§!的背影中登基，坐上了那只属于他的宝座。\n\n共和党革命后，在帝国中心一带的赫兹兰（Herzland），许多有功更有兵有地的§Y大贵族§!恃镇叛之功取得了非同小可的自治权，而皇帝只换取到他们名义上的一声效忠的承诺。走到这个地步的帝国只是徒有往日威名的空壳了。\n\n在领土所剩无几，§O格罗弗五世§!的健康状况迅速恶化的情况下，帝国的残余势力必须寻找一位强势的，能干的§Y摄政王§!来带领他们前进，直到下一任皇帝§O格罗弗六世§!准备好亲政为止。许多鹫担心六世在面临这样一个和五世幼年相似的局面时，会重演历史。\n\n帝国危在旦夕。它会恢复昔日的荣耀，击败狮鹫尼亚上的各种叛徒吗？只有天知道。"
 EAW_WS_NCH:0 "[Root.GetNameDefCap]——伟大盟约的家乡"
 EAW_WS_NCH_desc:0 "§R我们不建议您在初次游玩时选择本国家。如果您刚刚开始游玩本模组，我们建议您在“有趣的国家”栏目中进行选择。§!\n\n\n\n没有一个确定的说法关于§Y幻形灵§!是如何来到§Y绿崖§!（Greneclyf）的，这个避难所周围冻洋与火山反复无常。出于这样或那样的原因，幻形灵定居在绿崖大部分时间都与世隔绝，偶尔劫掠狮鹫尼亚。这些幻形灵与§Y马奎斯§!（Equss）的非常相似。但是，它们从来没有像最近臭名昭著的§Y邪茧§!（Chrysalis）那样张扬。有一段时间，他们被赶回了岛上，那是一段艰难的时期，大多数幻形灵都在饥饿的边缘挣扎。\n\n直到一支§Y远溪§!（Farbrookian）小马钓鱼探险队来到了绿崖的海岸。远溪小马从来没有见过幻形灵，他们遇到了饥肠辘辘的§Y迪丽斯女王§!（Queen Dylis）。远溪酋长§Y芬盖尔§!（Fingal）决定公开地帮助女王，自由地分享他的感情和同情。\n\n这就是有名的§Y最初分享§!（First Sharing）。它在绿崖和§Y远溪§!的§Y小马§!之间。形成了第一个稳定的关系，两家之间的友谊持续了800多年，直到今天。\n\n与此同时，绿崖幻形灵和远溪小马形成了一种关系，这种关系通常很牢固，但从不亲密。§Y女王蝶瑞§!（Queen Diedre）曾试图进一步加强她与酋长§Y阿巴尔§!（Albar）的友谊！\n\n不幸的是，她遭到了拒绝，即使在特别寒冷的冬天，她也曾向他和他的追随者们提供庇护。\n\n尽管如此，这一友好姿态仍然在§Y伟大盟约§!的编结过程中被大家记住了！小马和幻形灵制作了四幅挂毯，详细描述了第一分享和§Y寒冬避难所§!（Frozen Refuge）。这些将由两国的议院共同分享，以不断提醒两国领导者他们共同的历史和彼此之间不可分割的友谊。现在，§Y女王吉莎§!（Queen Gytha）是绿崖的领袖，§Y勇盔§!（Cenhelm）统治着远溪。感觉到气氛的变化，她决定召开§Y皇家议会§!（Council of Royals）制定了一个新策略，听说了世界很大，吉莎渴望向每个生物展示她和她的子民不是寄生虫，而是可靠和坚定的朋友。\n\n但是有很多事情是吉莎不知道的，所以她必须先派特使去见远溪在§Y河间同盟§!的朋友们！看看是否有成员国会接受她的贸易和友谊提议。那里是否有着想要利用绿崖幻形灵来完成自己阴谋的小马……"
 EAW_WS_WNG:0 "[Root.GetNameDefCap]——南方的宝石"
 EAW_WS_WNG_desc:0 "翼巴第王国自§C卡廷帝国§!——古代§R斯帕雷奥斯王国§!的继承者之一——的废墟中崛起。该王国由来自北方，侵占了卡廷西半部分的翼巴第部落建立起来，而§R隼尔科§!部落则夺取了东半边。很快，两个王国间便成为了苦大仇深的宿敌。冲突直到705年§Y格罗弗一世皇帝§!征服了两国才停止下来。\n\n几个世纪以来，§Y翼巴第§!一直是§O狮鹫尼亚帝国§!皇冠上的宝石。由于广泛的跨海贸易与帝国的保护，它成为了狮鹫尼亚最富裕、最繁荣的邦国之一，一直是北方各邦的羡慕对象。虽然帝国尝试整合这个王国，但统治它的§Y迪·阿尔米耶里§!王朝尽己所能维持翼巴第的自治。\n\n972年，这一状况结束了。起因是翼巴第国王甘贝托（Gumberto）前往狮鹫海姆参加聚会时猝死，死因可疑。他的儿子，新加冕的§Y加里波德·塔洛努埃尔三世国王§!（King Garibald Talonuel III），要求狮鹫海姆和帝国赫兹兰的领主针对该事件进行全面调查，但他的要求被忽视了。为了抗议，翼巴第正式脱离了帝国，并带走了曾为其盟友的§O塔卢兹§!（Talouse）、§C弗朗齐斯特里亚§!（Franmisria）和§R阿布鲁诺戈§!（Arantiga）。由于帝国处于摄政议会统治之下，以及局势愈发不稳定，帝国无能为力，只能口头上进行抗议，这也导致越来越多的国家效仿翼巴第，纷纷脱离帝国。由于其早已在934年设立了§Y议院制度§!，她没有被任何形式的革命浪潮席卷。\n\n虽说脱离了帝国，但狮鹫尼亚经济的崩坏仍旧造成了巨大的冲击，其后与§Y隼尔科§!（Falcor）那漫长而血腥的战争又大大削弱了国力，使得翼巴第陷入了危机。政府如同跑马灯一样不断更迭，虽说他们都有志于将翼巴第恢复到以前的辉煌，但是每个政府都在压力和内部冲突中垮台。这个困境迫切需要解决，而翼巴第的狮鹫已然失去了耐心，转向了更激烈的解决方案。\n\n§Y朱利奥·喙索里尼§!（Giulio Beakolini）领导的§Y国家法西斯党§!（Partito Nazionale Fascista）支持度激增，尤其得到了在与隼尔科之战中梦想幻灭的退伍老兵的大量支持。喙索里尼呼吁向卡廷进军（a march on Karthin），以夺取政府的权力，开始重建国家。同时，一群§R反法西斯主义者§!发誓要制止任何此类行动。§R内战§!的威胁不断升高，但目前政府仍对这一问题保持沉默。但是他们在接下来的几周中所做的决定将永远改变王国的命运。\n\n不管是谁能组成新的政府，他们的首要任务都应该是解决国家的经济困难。§Y失业§!情况严峻，而曾经强大的工业实力，也已经远远落后于§Y小马利亚§!（Equestria）和§Y新马尔兰§!（New Mareland）之类的国家。这些问题也导致许多翼巴第最优秀、最聪明的头脑和专家纷纷离开了翼巴第，转而到其他地方寻求财富。最后，北方的帝国仍旧垂涎着这颗南方宝石……"
 EAW_WS_EQS:0 "[Root.GetNameDefCap]——小马大地"
 EAW_WS_EQS_desc:0 "§G小马利亚§!（Equestria），小马的和平家园，尽管它并不总是如此和平。\n\n在几千年马族向南迁徙前，小马的三个部落——独角兽（unicorns），天马（pegasi）和陆马（earth ponies） - 并没有如现代一般团结起来，而是争论不休，并互相内斗。随着气候变得越来越寒冷，事情也变得越来越糟糕。小马们被迫离开家园，不断向南迁徙开荒流浪。每个小马部落都认为他们在某种程度上是优越的，他们各自占据着自己的土地，但事实上只有团结一致他们才能生存下来。小马利亚传说描述道，部落的三位首领被困在暴风雪中的一个洞穴中，他们幸存的唯一原因是合作和友谊。从此以后，部落便在一个共同的信条和旗帜下团结起来：§G小马利亚§!诞生了。\n\n在建国后不久，§Y塞拉斯蒂娅公主§!（Princess Celestia）和她的妹妹§C露娜公主§!（Princess Luna）便被共同推举来统治领导小马的§G小马利亚§!。这两位公主是不朽的天角兽（Alicorns），集三族能力于一身。她们可以升起和降下太阳和月亮。两姐妹长期以来一直守护着§G小马利亚§!，并通过§Y谐律精华§!（the Elements of Harmony）来对抗邪恶，击败了诸如§R无序混沌之王§!（Discord, the Spirit of Chaos）或是水晶帝国（Crystal Empire）的§R黑晶王§!（King Sombra）等强大而危险的邪恶生物。然而§C露娜公主§!，最终成了嫉妒的牺牲品，因为小马们不喜欢她带来的夜晚，而是喜欢她姐姐的白天。孤寂与叛逆日益蔓延使得她变成了邪恶的§R梦魇之月§!（Nightmare Moon），以月亮侵蚀了太阳并袭击了§Y塞拉斯蒂娅§!与她进行决斗，别无选择的大公主只得将其驱逐囚禁至月球§Y一千年§!。新的时代开始了，§G小马利亚§!只有一个同时升起着太阳与月亮的统治者。\n\n这个时代是和平，成长与发展的时代。小马利亚通过与§Y奥伦尼亚§!（Olenia）的鹿族签订友好协议，永久地结束了他们作为海盗侵扰海岸的历史。著名探险家溪流小池（Meanderly Pool）跨越海洋，向极东航行，并在那里发现了§C河间地§!（Riverlands）的东方小马亲族。另一位名叫马伦布（Coltlumbus）的探险家，在南狮鹫尼亚开辟了§Y新马尔兰§!（New Mareland）。后来，酱姆斯·瓦塔（Jam Wutt）发明了蒸汽机，吹响了小马利亚工业革命的汽笛。随着国家城市化不断发展，现代化不断推动，新型现代都市将会出现并迅速发展。但是不断的发展并未使所有群体受益，地区不断分化。由于§Y谢韦良纳§!（Severyana，当地语言意为北境）地区天马天气管理不善所致的粮食短缺，最终酿成了当地的起义。§R冬季革命§!（Winter Revolution）的爆发象征着小马利亚漫长的和平已经结束。由于担心爆发全面内战。塞拉斯蒂娅又一次别无选择，只得被迫与革命军保持和平，让共产主义政权自由存在。\n\n七年之前，在露娜被放逐一千年，即新千年来临之际，梦魇之月又回来了，但是有六匹小马追随到了她们的命运，成为§Y谐律精华§!庇护者，并利用友谊的魔法将露娜带出了邪恶，回到了她姐姐的身边。在庇护持有谐律精华的六匹小马中，最出色的就是§Y暮光闪闪§!（Twilight Sparkle），魔法元素和友谊公主，她们一次又一次地战胜了邪恶，保护了§G小马利亚§!免遭暴政和末日。\n\n然而，§G小马利亚§!仍需面对新的黑暗，邪恶的§R邪茧女王§!（Queen Chrysalis）已在自己的强势统治之下统一了分裂的§G幻形灵之地§!（Changeling Lands），而几年前就已经对§G小马利亚§!的首都§Y坎特洛特§!（Canterlot）进行了一次失败的入侵！§Y塞拉斯蒂娅公主§!担心她会卧薪尝胆卷土重来。\n\n天空渐暗。当黑暗的云层聚集在地平线上时，许多小马意识到友谊与和平可能无法抵御并克服即将来临的风暴。\n\n新的时代来临了——一个§G小马利亚§!及其爱好和平的公民可能没有做好准备的时代。"
 EAW_WS_CHN:0 "[Root.GetNameDefCap]——幻形者"
 EAW_WS_CHN_desc:0 "§G幻形灵§!（Changelings）的黑暗土地上深藏这许多秘密和可怕的事物。\n\n更偏向昆虫而不是小马的他们因他们能完美幻形，暂时改变外貌，声音，甚至体型而得名。他们使用这欺骗的力量来接近受害者并以他们的爱为食，那是一种他们极度渴望的资源，尽管他们主要靠鲜肉度日。他们大部分的历史就是生活在§G虫巢§!（Hives）之中并服从§G女王§!的命令，但他们并没有真正意义上的虫巢思维并且有着自由的思想。\n\n对他们的邻居来说，幸运的是，他们的侵略性和地理上相对的孤立让他们自相残杀的时间远比对外敌的时间多，这让鹿族和小马们能击退分散的入侵者。尽管他们天生孤立，但在小马利亚§Y工业化§!时，女王派出了间谍将科技和经验带了回来。各虫巢开始了现代化，而资本家们和军方也聚集起了能和女王对抗的力量。\n\n冲突变得频繁，到953年，一位野心熊熊的年轻的§G邪茧女王§!（Queen Chrysalis）幸运地在最强大的虫巢之一-韦萨利波利斯（Vesalipolis）登基。那时韦萨利波利斯已经与海岸虫巢孔翅城（Ditrysium）联盟。邪茧则带领着军队击退了多次瓦克斯（Vraks）和其他北方小虫巢的进攻，这进而确立了她作为一位强有力的领袖的地位。在962年，在邪茧帮助粉蠹城（Lyctida）击退了狂热鹿族掠夺者的进攻后，他们也加入了联盟。她在971年带领着联军征服了瓦克斯，§G虫巢联合§!也在下一年建立。索利斯（Soryth）于985年志愿加入，其他虫巢也在不久后追随而来。987年，各虫巢历史上第一次团结在一个政府之下，988年，邪茧加冕为§G幻形灵之地的唯一女王§!（the One Queen Of The Changeling Lands），拥有高于其他女王的绝对权威。\n\n在接下来的几年，发生了与奥伦尼亚的边界冲突和共产主义的叛乱，但那时，邪茧女王大胆地密谋了一场小马利亚政变，保证了近乎无穷的爱的补给并立自己为永远的幻形灵女王。在§Y坎特洛特§!（Canterlot），§R银甲闪闪§!（Shining Armour）和§R韵律公主§!（Princess Cadance）皇家婚礼期间，她成功假扮了公主并削弱了内部的防御，让大批虫群进攻§Y小马利亚§!的伟大首都并轻而易举的捉住了小马利亚的公主。可在最后一刻，在谐律元素的干涉和这对相爱夫妻的爱的压倒性力量下，小马利亚从被征服中解救了出来。\n\n随着政变的失败，幻形灵们开始质问邪茧的权威，§R索拉克斯§!（Thorax）的谐律派和§R金玛芬§!（Gold Muffin）的共产派在各个虫巢发动暴乱。邪茧用大规模的政治宣传回应他们，并摧毁异议者，逼迫他们藏起来或是流放他们。在彻底的耻辱下，邪茧发誓复仇。既然阴谋让她失败，那很明显，直接，野蛮，极端的行动才会给她和她的子民们带来对和平主义小马的胜利。\n\n邪茧开始了现代化和扩张§G幻形灵军队§!的庞大项目。一位有着对冲突丰富经验的专员被派到§Y狮鹫尼亚帝国§!（Griffonian Empire）。有了庞大的军队并在快速的现代化下，只要邪茧能维持军事优势，就有希望轻易征服她的对手。\n\n不过，幻形灵之地缺少战争中的众多至关重要的战略资源。一个可行的机会出现在了眼前，而且还是个容易征服的目标：§C奥伦尼亚王国§!（The Kingdom of Olenia）。它正处于政治动荡，而且军事薄弱。对这样一个残废的国家，大摇大摆地走进去，夺走他们的土地 —— 还有其中大量的战略资源 —— 是十分容易的。这些§R鹿§!大概是第一批感受到§G幻形灵女王国§!的力量和愤怒的家伙。\n\n很快，§R小马们§!将会恐惧地颤抖，§G幻形灵§!将会至高无上！女王万岁！\n"
 EAW_WS_STL:0 "[Root.GetNameDefCap]——平等的家园"
 EAW_WS_STL_desc:0 "他们都说§Y嘶大林格勒§!（Stalliongrad）是共产主义的家园，但是那是个谎言。在§Y平等镇§!（Our Town），§Y星光熠熠§!（Starlight Glimmer）建立了一个真正平等、没有可爱标记的社会，或者说表面上如此。在1004年§Y暮光闪闪§!（Twilight Sparkle）和其他§Y谐律元素§!（Elements of Harmony）来到了平等镇，揭发了星光熠熠的骗局。尽管她一直在宣传平等主义，她自己却没有接纳这一点，拒绝消掉自己身上的可爱标记。\n\n自此之后，平等镇就过上了一段繁荣的时光。但是被困在§Y嘶大林格勒§!和§Y新狮鹫尼亚§!（Nova Griffonia）之间，平等镇发觉自己已经被隔离于那广阔的世界。在嘶大林格勒方面的压力下，平等镇组建了一个共产主义主导的政府，以尝试讨好南边的邻居。这个政府由§Y双钻§!（Double Diamond），星光熠熠的二把蹄领导，平等镇的公社继续努力追求着平等与和谐的生活。\n\n隔离于世的平等镇必须依赖嘶大林格勒提供帮助与支持。但是不要走得太近，嘶大林格勒可是把平等镇看作自己的正当领土。"
 EAW_WS_CRY:0 "[Root.GetNameDefCap]——爱的帝国"
 EAW_WS_CRY_desc:0 "§Y水晶帝国§!（The Crystal Empire）是由一位古代公主初次建立，那位天角兽为她的子民鞠躬尽瘁，坚信爱，就像友谊一样，是众生最伟大的礼物，而使用那被称作“爱”的力量就是繁荣的关键。因此，她创造了帝国最古老，最重要的圣器，§Y水晶之心§!（the Crystal Heart），它就被放在首都的水晶城堡之下，向整个帝国辐射出§Y爱的力量§!。\n\n但并不是帝国的所有小马相信靠爱繁荣。一只邪恶、腐化的独角兽—§R黑晶王§!（King Sombra）—走了出来并宣称帝国的王座。他黑暗、扭曲的魔法§R腐化了水晶之心§!，进而增强了他的力量并控制了整个帝国。他最后用他的黑魔法奴役了自己的子民，将她们洗脑成唯命是从的奴隶。在这支奴隶军队下，他向南进军§Y小马利亚§!（Equestria），但却被§Y皇家姐妹§!阻止并驱逐。\n\n之后，在遮蔽的风雪中，帝国§Y消失§!了近几百年，直到几年前才神奇般地重现。当§R黑晶王§!的邪恶灵魂还未放弃他的王国，重归这片土地时，§Y小马利亚§!同§Y水晶小马§!（Crystal pony）携手拯救这场危机。在联合§Y水晶之心§!的力量下，这邪恶的国王再一次被放逐。不过，他再次准备好从放逐中归来，小马们只能希望他无力再一次突破封印……\n\n在黑晶王的二次放逐之后，§Y塞拉斯蒂娅公主§!（Princess Celestia）安置了§Y米娅摩·凯登萨公主§!（Princess Mi Amore Cadenza），亦称韵律登上了帝国的王位，有效地将帝国扶植成了一个同她南方邻居的§G傀儡国§!。§Y韵律公主§!（Princess Cadence）在帝国仍然是为受欢迎的小马，即便现今在风雪中的帝国还有许多事情发生，包括王位的潜在继承者—§Y凝心雪儿公主§!—的出生。\n\n这个冰与雪的帝国靠爱和友谊的力量保护，但是，水晶之心还能跳动多久？§Y公主§!还能在这个新的、变幻的世界中维持权力吗？"
 EAW_WS_STG:0 "[Root.GetNameDefCap]——革命的故乡"
 EAW_WS_STG_desc:0 "古往今来，§Y嘶大林格勒§!（Stalliongrad）和很多其他地区一样，都曾是§Y小马利亚§!（Equestria）的行省。但是，该地区的食物短缺逐渐导致的§R饥荒§!，与向§Y小马利亚政府§!呼救的无济于事改变了这一切。一场革命开始在§Y嘶大林格勒城§!（the City of Stalliongrad）内外饱受饥荒的小马中酝酿。在995年，在包括我们现任总书记§Y阿尔纪季娅§!（Altidiya）在内伟大的§Y最高苏维埃§!（the Supreme Soviet）的领导下，§Y嘶大林格勒宣布从小马利亚独立§!。§Y小马利亚§!反动派试图通过军事力量武装镇压革命，但无产阶级是不可战胜的，敌马最终夹着尾巴逃跑了，§Y嘶大林格勒§!安全了，也自由了。\n\n不过，独立也带来了更大的责任和问题。我们的国家仍然受食物短缺的困苦并且处在饥荒的边缘，我们经济集体化的尝试只让事情变得更糟。我们必须确保尽快解决这个问题，否则我们将面临一场真正的§R饥荒§!，并要为成百上千甚至成千上万的生灵而负责。\n\n更糟的是，§Y最高苏维埃§!正处于一场政治派系斗争的风暴中。我们的老书记——§Y阿尔纪季娅§!正在失去苏维埃的支持，而后者愈来愈看好另外两位革命同志，§Y瓦西里§!（Vasily）和§Y西尼斯捷尔§!（Sinister），这两位小马对如何领导§Y嘶大林格勒§!走向未来和如何解决它的问题有着完全不同的方法。\n\n随着§Y新总书记§!的选举将至，§Y嘶大林格勒§!前途未卜。§G革命的家园和堡垒§!的未来充满着未知与不确定。"
 EAW_WS_OLE:0 "[Root.GetNameDefCap]——鹿的故乡"
 EAW_WS_OLE_desc:0 "§Y国王约翰“恶魔”§!（King Johan 'Djavulen'） - 约尔特兰的恶魔 - 鹿城的纵欲者 - 御浪堡的嗜血狂 - 阿尔达二世国王（King Aldar II）的私生子，在他父亲去世后夺取了权力。他的姐姐，正统的§Y薇薇女王§!（Queen Velvet）已经逃往§Y小马利亚§!（Equestria），通过恐吓和贿赂奥伦尼亚的贵族和公爵，他们向他宣誓了自己的忠诚。\n\n但对约翰国王来说，一切并不顺利。鹿族平民们在他残暴的法律下受苦受难，不满正在增长。最近几个月，鹿们要求约翰退位的抗议在整个王国爆发。但他们被那些忠于约翰和他收买的鹿迅速而残暴地粉碎了。\n\n但是奥伦尼亚（Olenia）的问题不仅仅是内部的。在北方，§Y幻形灵§!（Changelings）贪婪地望着奥伦尼亚山中丰富的资源，而东边，薇薇女王正与坎特洛特贵族交好并致力于为一场针对约翰国王的干涉积聚小马利亚的支持。在这些威胁下，最近被任命为奥伦尼亚教会总教，强大而狂热的§Y大祭司尤尔瓦§!（Allsherjargoði Jurva），为了用更军事主义的方法解决国家威胁寻求支持。他希望奥伦尼亚回到他自我臆想中的古代，恐惧将深深插在任何看到奥伦尼亚长船的生物心中。\n\n当然，民众最终可能起义，转而支持薇薇女王或者§Y鹿民党§!的§Y库勒沃·西罗拉§!（Kullervo Sirola），推翻国王和他的走狗，为奥伦尼亚带来一个新的未来 - 一个他们将从他们北方的邻居的蹄下包围国家的未来。\n\n奥伦尼亚正在刀尖上跳舞。这将需要高超的技巧和诡计才能让他存在下去。\n\n第一项要务就是处理§R上升的不满§!。接下来，如果奥伦尼亚想要建立自己的军事力量，在对抗幻形灵和小马利亚的威胁中存活下来，那就要铲除猖獗的§R腐败§!。奥伦尼亚十分了解他的山中家园，它是一个坚固的防御阵地，也必将抵抗任何虫子或者小马的进攻。"
 EAW_WS_YAK:0 "[Root.GetNameDefCap]——牦牛真正的生活之道"
 EAW_WS_YAK_desc:0 "伟大的§Y牦牛§!之神注视着北方，下方§Y牦牦斯坦的牦牛§!们也在捍卫着自己的土地。亘古以来，他们都在和其他北方民族交战——从§g北极熊§!到§9狮鹫§!，从§g企鹅§!到§7幻形灵§!，直到§r黑晶王§!的水晶小马和边界之外的§R怪物§!们。我来，我见，我征服，那伟大的§D可汗国§!曾经覆盖着从冰海到维特的广大土地。\n\n在传说中，牦牛是第一批抵挡传说怪物的§Y食草动物§!。小马们从§3雪魔§!之祸逃离，企鹅和幻形灵在北极熊及怪物的淫威下屈服，但牦牛却迈入北风，§3拒绝向极夜中游荡的梦魇投降§!。虽说他们也曾被征服，但从未持久过。也许是§2牦牛灵魂§!中的什么，让异族统治绝无实现的可能。\n\n但是牦牛的历史并非一帆风顺。最近，东部的领土被§9狮鹫§!侵吞，远古的信仰遭遇质疑。狮鹫不仅仅占据了领地，还定居下来，无力夺回。\n\n芒其吉德氏族先王§7温福德§!宣布了与世隔绝、严守中立的政策，避免对外进一步纠缠。他在1003年逝世后，长子§6卢瑟福王子§!继承王位，但下一年他就宣布隔离结束，欢迎小马利亚马来到这个国家，年轻的§8布拉德福王子§!就在毛牛其赫氏族的拥护下脱离。这场小战斗没有胜者，双方签订和约。\n\n现在卢瑟福王子的统治似乎很安稳，而叛徒弟弟则陷入困境。但是他自己的氏族联盟还在吵闹不休，盖尼汗氏族还想推翻芒其吉德建立§t共产主义共和国§!，胜者是谁，悬而未决……"
 EAW_WS_PLR:0 "[Root.GetNameDefCap]——冰封的北地"
 EAW_WS_PLR_desc:0 "§Y北马奎斯§!（Northern Equestria）的冰冻废土是世界上最不适合生灵居住的区域。然而，即使在这里，文明与社会早已存在。\n\n极冷的北地是§Y北极熊§!（the Polar Bears）和§Y企鹅§!（the Penguins）的家园。虽然他们被大部分的世界所忽略，环境让这两个文明更加的坚强，使他们在面对危险时骄傲而勇敢。\n\n然而，在这个新的工业时代，他们仍然软弱且无影响力。由于工厂在这冰冻沙漠中付之阙如，因此对于§Y企鹅§!和§Y北极熊§!来说，要想迎头赶上将是非常困难的。\n\n北方的大地已经历经了数百年的狂风暴雪，但是，时代的风暴可能是连他们都难以克服的。"
 EAW_WS_BUF:0 "[Root.GetNameDefCap]——野牛飞地"
 EAW_WS_BUF_desc:0 "虽然处于其巨大邻居§Y小马利亚§!（Equestria）的阴影之下，§Y野牛酋长国§!（the Buffalo Chiefdom）仍是属于野牛自己的单一种族社会。由于边界完全被§Y小马利亚§!所包围，这个国家被视为一个小小的§G飞地§!。\n\n然而，最近的一条大新闻指出，§Y小马利亚§!表达出想与§Y野牛们§!重新接触的兴趣，以改善§Y小马和野牛§!之间的关系。这可能导致任何局面，无论是彻底§R反抗小马利亚§!、§G亲近小马利亚§!乃至于直接§Y融入小马利亚§!的社会里去\n\n不管如何，§Y野牛§!们顽强又固执，并准备为他们认为正确的事情加紧努力。"
 EAW_WS_JER:0 "[Root.GetNameDefCap]——失落的共和国"
 EAW_WS_JER_desc:0 "§Y阿奎莱亚王国§!（The Kingdom of Aquileia）由与她一般古老的王朝--§Y迪斯克里家族§!（the Discret family）所统治。她是狮鹫尼亚大陆上最古老的王国之一，其建立时间约在ALB100年。但无论长幼，他们都无法抵挡§Y格罗弗一世大帝§!（Emperor Grover I）的铁蹄，并被迫宣布效忠于§Y狮鹫尼亚帝国§!（Griffonian Empire）\n\n但迪斯克里家族很快就打破了这一誓言，在§R格罗弗二世皇帝§!（Emperor Grover II）加冕的后一天，阿奎莱亚王国便宣布独立，并煽动其他王国、公国与伯国希望能效仿于此。但是，好战的皇帝和他强大的§R帝国军队§!击溃了起义军队并§R焚毁了§!阿奎莱亚的大部分地区。国王被他愤怒的亲属们废黜，并作为礼物送给了皇帝，而皇帝随后便将其打死。和平重归了，公主吉塞尔达·迪斯克里（Princess Giselda Discret）在天鹰城被毁的阿克图里亚神庙（Temple of Arcturius）中同皇帝结婚，从而将两个王朝紧密的联合在一起。\n\n尽管家族根深蒂固于帝国之中，但在统治一个真实的国家的时候，他们的家族成员却变得越来越粗心和无能。如此以来，反专制的情绪自该国建立以来就在全国久兴不衰，并引发了历史上的多次起义，而其中一次几近成功。\n\n即使面对格罗弗二世的愤怒，阿奎莱亚鹫仍然渴望自由与独立。如此，当神圣的§Y北风神像§!（Idol of Boreas）丢失且§Y翼巴第王国§!（Kingdom of Wingbardy）独立时，§Y国王热拉·迪斯克里§!（King Gerad Discret）看到了他的机会，并于972年再次宣布独立，重新建立了王国。但仅八年后，在§Y978革命§!引领下，阿奎莱亚的公民站起来，废黜了国王并将其斩首，迫使他的许多亲戚逃离了这个国家。阿奎莱亚的北方地区在随后的混乱中依照自己的独立愿景宣告分离。在阿奎莱亚，一个新的§C共和国§!宣布成立以捍卫全狮鹫的§Y权利与自由§!。这是一个光辉的政权，尽管他注定最终会失败。在共和国成立后不到四年，§R阿尔贝·贝特洛§!（Albert Berthelot）和他最有力的支持者领导了§R保皇党的反革命§!，并迅速取得了胜利。§Y莫里塞·迪斯克里§!（Moriset Discret）登上了宝座，§Y共和国之梦§!失败了。\n\n也许表面上是如此，即使在今天，在§Y迪斯克里家族§!无能和分散的统治持续下，§Y阿奎莱亚§!的狮鹫仍然忠贞不屈，§G二次革命§!的思潮在阿奎莱亚的狮鹫中越传越广。火花会点燃革命的火焰吗？还是这些活动会及时被阻止。"
 EAW_WS_TRD:0 "[Root.GetNameDefCap]——无际微城"
 EAW_WS_TRD_desc:0 "许多年前，在§Y天落§!是一个§Y帝国自由市§!的时候，它首次变得重要起来。这里很快就成为了帝国境内§G最著名的贸易港口§!，甚至对整个狮鹫尼亚都是如此。渐渐地，天落的码头也成为了§Y帝国海军§!的驻地。\n\n但是那些时刻已经过去了。随着帝国的§R崩溃§!以及978年发生的§R革命§!，§g铁血总理黑哈尔德§!以“保护这里免受共和国极端分子”为名夺取了此城的控制权。他控制的狮鹫们§R屠杀了帝国守军§!并控制了§Y整个帝国海军§!。在他巩固权力之后，他宣布独立，让这里免受席卷狮鹫尼亚混乱风暴的影响。§Y鹫弗顿§!以及其他邻近的小镇与农村加入了天落，§Y贸易联邦§!就此形成。在§Y反革命§!胜利之后，天落没有表现出重返帝国的意愿，不过黑哈尔德还是给五世皇帝一年一枚北风币作为“贡奉”。\n\n在接下来的数年间，黑哈尔德残酷地§R粉碎§!了任何潜在的反对者与抵抗势力，为他赢得了那个绰号。这一决心确保了天落的和平与秩序，尽管狮鹫尼亚经济衰退，但是这里更加富饶。但是这样的富饶并没有在民众间均等分配。资本家、实业家与犯罪头目日益富裕，但是普通劳工的苦难日益深重，愈发贫困。黑哈尔德机智地在工会势力成长到可以威胁他的地步前就把它们尽数取缔，意味着没有鹫站出来为他们说话。\n\n随着黑哈尔德日益变老，他去世的谣言也越来越多。所有鹫都很清楚，这位§g铁血总理§!的统治即将终结。和天落普通的鹫民们一样，任何鹫都会在发现机会时好好把握它，无论他们是§Y冷酷的资本家§!，§C理想的共和派§!，§g帝国的忠诚者§!还是§R工团的革命者§!。"
 EAW_WS_RIV:0 "[Root.GetNameDefCap]——山川间的家园"
 EAW_WS_RIV_desc:0 "§Y东狮鹫尼亚§!的§Y河间小马§!长期生活在他们的西方邻居的威胁下。§Y狮鹫§!一次又一次的§R进攻§!，每次河间小马都团结起来来抵御威胁。\n\n在898年§Y狮鹫尼亚帝国§!又一次征服小马失败后，§Y湖城§!，§Y德马尼亚§!，§Y大江城§!和§Y宁部西亚§!共同签署了§Y《走马川条约》§!，旨在外部攻击下相互帮扶团结起来共同御敌。\n\n随着时间的推移§Y威腾兰§!，§Y巴卡拉§!和§Y驹纳延§!也加入进来。在972年§Y冥翎骑士团§!劫掠§Y钻石山§!后，也迫使Tug the Boneless国王签署条约，成为条约中第一个非小马国家。\n\n即使是在狮鹫尼亚帝国解体后，《走马川条约》也依旧保留，许多声音呼吁条约成员国间进行进一步的密切合作。甚至团结为一个统一的§Y河间联邦§!。但是，河间小马并非没有自己的问题。意识形态，宗教信仰以及经济和社会发展水平都进一步阻碍了共同进步。尽管旧时代的狮鹫威胁已经平息，但未来的西方是否会出现新的威胁仍是一个未知数。"
 EAW_WS_MNC:0 "[Root.GetNameDefCap]——土匪王国"
 EAW_WS_MNC_desc:0 "在§Y狮鹫尼亚帝国§!不远的北方，§Y击日者氏族§!的盗匪王国正存在于此地。\n\n以其国王§Y艾瑞维尔·击日者§!（Eriviar Sunstriker）的名字命名，击日者氏族长期以来一直反对着帝国的统治，其多山的地形偏还缺乏基础建设使帝国几乎无法在此实施任何统治。\n\n因此，当§R帝国§!崩溃时，§Y艾瑞维尔·击日者§!迅速抓住了机会，宣布自己为土匪之王，并在帝国北方边界建立了自己的基地。然而，事实证明，对一群土匪用王权来统治不是很有效也不容易，§Y艾瑞维尔§!很快就失去了对他大部分“臣民”的控制。\n\n然而，有一件事能使土匪团结起来：他们对§R帝国§!的仇恨。他们在帝国土地上的袭击破坏了南方帝国的乡村和经济，迫使帝国现任君主§Y格罗弗五世皇帝§!寻求与盗匪的和平。\n\n很快的，两方针对这些问题提出了解方。§Y艾瑞维尔和格罗弗§!达成了一项临时协议，该协议禁止§G盗匪袭击§!帝国疆土，以换取帝国在这段时间于经济和军事上支持§Y艾瑞维尔§!。尽管§Y格罗弗五世§!已经垂垂老矣，他的健康状况也正迅速恶化当中。\n\n一旦§Y皇帝§!去世，这份与§Y盗匪§!的协议将结束。但艾瑞维尔的§Y盗匪王国§!真的安定了吗？盗匪之王有足够的力量与行动去压制和防止§R激进派§!夺权吗？他能找出问题的症结、寻求改革好收拾这团他从前执政留下的烂摊子吗？\n\n§Y皇帝§!已经来日无多了。艾瑞维尔得小心，小心避免步上相同的后尘"
 EAW_WS_AET:0 "[Root.GetNameDefCap]——困于巨鹫之间"
 EAW_WS_AET_desc:0 "§Y格赖夫瓦尔德§!公国是在§R狮鹫尼亚帝国§!艰难挣扎并走向崩溃时获得§G独立§!的众多公国之一。\n\n当它出现时，§Y格赖夫瓦尔德§!发现自己处于摇摇欲坠，甚至可以说非常危险的境地。§Y格赖夫瓦尔德§!夹在§R狮鹫尼亚帝国§!和§R阿奎莱亚§!这两个狮鹫尼亚巨鹫中间，他必须小心，不要越界，否则他们就有可能惹恼他们，再次失去独立。\n\n在这个国家内部，针对这个问题已经提出了多种不同的解决方案。双方都有§R激进分子§!和§R温和派§!，其中一些比另一些更加……“合理”。§Y共产党§!认为，我们北方和南方的两个大贵族正在威胁我们劳工的主权，我们必须尽一切努力保护自己不受这种§R威胁§!。而另一方面，§Y温和派§!则将这一挑战视为一种平衡行为，认为我们必须寻求与双方都成为朋友，或平抚他们，以维持一个独立国家的地位。\n\n不过，国内还有第三个声音。§Y主教§!已经找到了§Y公爵§!，并表示愿意帮助解决这个问题。他看到我们是多么的软弱和不堪，让神庙提供§Y帮助§!以支持我们的努力。这帮助确实很多……不过，到了最后，这只狮鹫真的值得信任吗？\n\n无论如何，§Y格赖夫瓦尔德§!在重建后不久就处于灭绝的边缘。这个国家必须自己决定是要通过战斗还是通过谈判来摆脱困境，如果这两种策略中的任何一种都失败了，她就必须付出代价。§Y格赖夫瓦尔德§!这个小公国的未来仍然不确定。"
 EAW_WS_GRW:0 "[Root.GetNameDefCap]——狮鹫尼亚的星星之火"
 EAW_WS_GRW_desc:0 "河网与沃土滋养着她的富饶，密林与泥沼庇护着她的独立，这片§D埃维河§!赐福的土地名为普里文；下定决心，不怕牺牲，排除万难，争取胜利，这支席卷普里文的燎原之师自名为§O普里文民主联军§!。\n\n数个世纪以来，普里文地区一直为分裂与落后所困扰，直到雄心勃勃的§Y基绍大公§!再次统一三公国，建立起§Y布罗德费尔德王国§!，并利用出口稻米为王国带来了§G工业化与繁荣§!。\n\n但好景不长，995年的一场§R水稻枯萎病§!彻底摧毁了王国的出口贸易，并造成了惨绝鹫寰的大饥荒。无数鹫民流离失所，露骨荒野，而王国政府无能的赈灾行动更加剧了这一惨剧。面对无能的议会，基绍国王也变得越来越独裁，越来越偏激，最终在999年以一纸§0《国家紧急法案》§!终结了普里文的民主，这也为1002年的“九一四”学生运动埋下了伏笔。\n\n1003年开春的阅兵式上，刺客的一颗子弹彻底引爆了王国的内部矛盾。王后倒在了国王的怀里，而§R普里文共产党§!也被勒令解散。同年8月1日，§Y红兴§!领导的红军正式在白花起义，揭开了普里文解放战争的序幕。\n\n时间来到1007年，自§t白花起义§!已过去将近四个年头，从建立根据地到整编军队，从粉碎围剿到团结§4民主力量§!，§R普里文共产党§!领导下的鹫民武装付出了无数牺牲，克服了无数困难，战胜了无数敌鹫，终于从一支孤立无援的游击队发展到了今天的§O普里文民主联军§!。\n\n进入新的一年，拉里奥斯的总指挥部内，§O联军§!的指挥者们正在规划着接下来将要进行的战役。这场战役将是联军与王国军两军的决战，也是§Y普里文§!两种命运的决战。漫漫战线上，联军的指战员已经准备好为一个和平、民主、团结的§Y普里文§!、§Y埃维§!甚至§Y狮鹫尼亚§!，英勇顽强地投入战斗。"
 EAW_WS_BAN:0 "[Root.GetNameDefCap]——土匪女王国"
 EAW_WS_BAN_desc:0 "跟在北方的§Y击日者氏族§!很像，§Y黑石（Blackrock）的匪帮§!是由§R流浪军和雇佣兵§!组成的，他们打家劫舍、掠夺农场、抢劫毫无戒心的敌方。而在这盗匪食物链顶端的，是§R黑石§!。她曾是一个心里有着骄傲的叛军、勇敢的斗士、前共和党徒，她多次从生命的变化当中，靠着自己的力量重新站了起来。\n\n§Y黑空伯爵领§!的陷落和她的崭露头角始于979年，当时的§C加百列·蓝冠伯爵（Count Gabriel Bluecrest）§!协助他的封君在狮鹫岩对抗当地的革命党徒。像§Y狮鹫尼亚帝国§!的封臣一样，他也要求增加自治度作为奖励，但狮鹫岩的摄政委员会拒绝了这个要求。伯爵对此感到愤怒，他于985年宣布§R独立§!，990年死亡。他的继承者§C凯兰·蓝冠（Caelan Bluecrest）§!拒绝了向狮鹫岩屈膝，并坚决抵抗他们对于黑空的入侵。\n\n但是，这个新伯爵赢得胜利后，§R黑石§!说服了两军的逃兵加入她的行列，一举推翻了君主制。一场漫长而艰苦的山区战争开始了，战争一直持续到1001年，凯兰伯爵死了为止。从这时起，这里便由§R强盗女王§!黑石来统治。\n\n但这新生的§g强盗女王领§!的未来可不全是光明一片。在国内，贵族们依然躲藏在他们的山区堡垒中，并聚集在凯兰的女儿§C希里尔·蓝冠（Cyrille Bluecrest）§!的旗下，伺机夺回政权。厌倦了被匪徒压迫的农民，受到一个国外来的激进革命党徒§R里夫·布莱丁（Reeve Blyeddin）§!所鼓动，不断地制造骚乱。而东方，一个新兴的共产力量在§R普里文§!中发展茁壮，很快的已经威胁到了匪帮们。而更危险的是，假如北方的§Y帝国§!真能重建她过去的强权……那这可能真是§Y黑石匪帮§!过早迎来的末日来临。\n\n但§Y土匪们§!可不会浪费精力在哭泣和发抖之上，他们会奋战，直到那可能到来的苦涩末日为止！他们会试着坚持下去，或是在这尝试过程中死去！"
 EAW_WS_LCT:0 "[Root.GetNameDefCap]——黄金城"
 EAW_WS_LCT_desc:0 "在逐月后66年，§Y祝福圣剑§!大亲王在喀马尼亚战役中对阵宁部西亚的阿底那托斯将军并打败了他。扫除了湖城统一河间地的最后一个障碍，开启了湖霸天下的时代。这一时代持续了几个世纪，并被后世视为湖城千年历史的黄金时代，甚至连南方的扎菲亚狮鹫部落也臣服于蹄下。但，快乐的时光总会结束。\n\n在353年，扎菲亚不断崛起，他们厌恶了小马长期套在他们脖子上的铁套项。东方各地也渴望自由，很快，动乱蔓延开来。湖城甚至来不及镇压，就被叛军所击败。扎菲亚、宁部西亚、江源和其他各政权也随之独立并分裂了河间地。\n\n在752年，湖海城遭到§R格罗弗一世大帝§!的雇佣军§R劫掠§!。在遭受这一重创后，大亲王纤枪被迫退位，湖城亲王国也随之垮台。\n\n在旧政权的灰烬中，建立了一个被视为是东狮鹫尼亚全马族的灯塔的同名共和国。\n\n像这一地区的许多小马国家一样，湖城也是§G走马川条约§!的签署国，组成一个联合§G东狮鹫尼亚各个小马共和国与王国§!的防御性同盟。虽然最初这仅是一项军事条约，但近年来随着§Y加深伙伴关系§!的思潮，同盟的涉猎范围开始扩大，这将使§G走马川§!国家在教育、经济发展与货币上走向统一。\n\n虽然湖城与小马邻国有着友好关系，但与南方和西方接壤的§R狮鹫§!国家却并非如此。752年的记忆仍然深深地刻在每个湖城马的脑海中，并在数年的§R袭击§!与§R冲突§!下不断增强。于是在湖城与§R长剑伯国§!间形成了一种特别的仇恨。§R伯国§!现在正由暴君§R帕拉斯·暮爪伯爵§!所领导，他漠视在他领土内的§Y大量小马少数民族§!的权利。处了她的邻居，湖城政府还对§R狮鹫海姆中的皇帝§!和§R各种左派政权§!怀有血海深仇。\n\n像狮鹫尼亚的大部分地区一样，湖城的经济由于工业基础§R欠发达§!与长期以来席卷全大陆的§R大萧条§!而低迷。与此相伴，湖城的经济长期以来受到§Y公会§!所控制，它们是许多大垄断企业，占据了该国的许多资源。任何希望改变§R经济低迷§!的政府都必须在对§Y公会§!投资或安抚亦或收回权利等政策中寻找平衡。\n\n作为§Y民主国家§!，湖城将在§Y1007年§!举行选举，现任大市长§Y春时冰霜§!不愿继续连任。他的两位潜在继任者是§Y碎浪§!和§Y西风·李沃德§!\n\n§Y碎浪§!是与§Y公会§!有联系的独立候选者。控制着该国最大的两个政党§Y社会民主党§!与§Y立宪民主党§!。§Y社民党§!是一个谐律政党，其基础政策为更大程度地开放经济与增加社会支出。而§Y立民党§!则更多倾向保守主义，它试图基于政府与§Y公会§!，§R狮鹫§!及§G河间同盟§!关系来改善现状。\n\n与此相反，§Y西风·李沃德§!是一位极端主义候选者。他是§Y共和国先锋队§!的领导者，一个极端民族主义组织，希望利用湖城盛行的§Y排外主义§!，以增加军事开支和武力影响，借此保障共和国的安全免受外界威胁。\n\n值得一提的是，无论何者胜出，新政府都不得不应对§Y军方对湖城政治的干预§!。军队因使用暴力来操控准军事团体而臭名昭著。曾经正是军方暗杀了上一任大市长并安插§Y春时冰霜§!于现位。不过，即使是如此放任使用下三滥措施，由于湖城士兵在§R狮鹫§!威胁下捍卫了共和国的尊严与安全，普通民众对于军队看法仍然相当积极。\n\n然而，目前最令马震惊的还是§Y皇室复辟§!的传言。虽然到目前这些流言基本毫无证据，但是军队中存在§Y极端主义派系§!，希望消灭共和国的官僚主义体制，并实行更简化的治理体系早已不是什么秘密。\n\n不过，无论湖城未来如何，只要她与她的§G盟友§!团结一致，马族的旗帜就会永远在东狮鹫尼亚飘扬。"
 EAW_WS_RCT:0 "[Root.GetNameDefCap]——三江源城"
 EAW_WS_RCT_desc:0 "§R说明：本国家原先汉化者依据个人观点加入过大量私货，目前部分词条仍处于待修订状态。请曾经有玩过并产生印象的玩家注意，过去的内容并不能体现原文含义。§!\n\n陡峻的山岭，丰饶的谷地，§G大江共和国§!位处河间地的心脏地带，充当着和平与繁荣的庇护所。自357年从§Y湖城§!赢得独立以来，大江共和国一直维持着自由独立的地位，无论是狮鹫还是小马都难以攻克她的天然屏障。854年，帝国军与河间地联合军交战于马瓦克峪，狮鹫尼亚皇帝§R格罗弗二世§!正是在此役中阵亡。那场战争后，大江共和国与她的邻国通力合作，为实现§G河间地统一§!而奋斗。\n\n然而，情况并非总是这样。在亲王国时代常常是操戈同室、兵戎相见，大江于807年挥师§Y威腾兰§!，以沉重的代价夺得了§Y走马川§!，许多王室成员丧生于惨烈的§R高鬃城之围§!中。与狮鹫尼亚帝国开战后两国达成了和平，但江源城的末代女亲王§C柔水§!在战争中身受重伤，她明白自己的死亡即将来临，担心其引发血腥的国本之争，于是在814年决定将全部权力授予§Y民选议会§!。在那一日，现代民主的§G大江共和国§!诞生了。\n\n如今，大江共和国是河间地最为发达和富裕的国家，其首都§Y江源城§!成为了声名远扬的工商业中心。她也是§C河间同盟§!的创始国，走马川条约在她的国土上签署。\n\n§Y江·漩§!于1001年当选为共和国总理后，启动了一项覆盖面广泛的现代化计划，她梦想着将大江共和国打造成东方的§Y小马利亚§!——她年少时一度留学过的地方。江·漩的计划大抵成功，共和国创造出了前所未有的生产力，但是财富并未如她所愿的那样平均分配，而工业化所制造的社会问题最尖锐最露骨地表现在劳工阶级身上。\n\n江·漩设法二度赢得了选举，不过这一回在§R旋·长庚§!的领导下，§R社会主义者§!整合为左翼联盟，他们的势力比以往都更加强大。数月以来议会大厦里聚讼纷纭，恐将形成§R政治僵局§!。§G大江谐律情报局§!是共和国的特勤局，其职责是确保谐律存续下去，这场危机已经引起了其成员的关注，他们对干政跃跃欲试。如果不尽快采取行动，共和国的稳定岁月就将迎来终结。"
 EAW_WS_FRE:0 "[Root.GetNameDefCap]——长屋的小马"
 EAW_WS_FRE_desc:0 "长屋驹纳延（Pònaidhean An Taigh-Fada），亦简称§Y驹纳延§!（Pònaidhean），是§G河间同盟§!东南的高地国家。这个国家并不是一个中央集权的单一国家，而是由许多不同克兰（clanns，苏格兰语的氏族）的小马部落联盟而成。这些氏族由被称为§Y领主§!（Triaths）的族长所领导。尽管氏族通常以家族血缘为联系构建，但经领主允许后，外界小马也可以冠名其姓氏并加入氏族。领主们通常由首席所领导，并且一同在§Y中央委员会§!（Prìomh Chomhairle）之中拥有席位。此议院代表全体氏族，并且在此经氏族全体选举出§G酋长§!（Taoiseach，爱尔兰语）以保护全体氏族。\n\n在古老的传统下，驹纳延的经济以农业为主体，这在世界大多数地方似乎都十分落后。但驹纳延的小马们却怡然自得，并用蹄子织出了精美的格子呢，并成为了全河间地的奢侈品。然而，最近酋长宣布了经济现代化的计划，这一计划遭到了大规模争议。无论是忠于§Y老路§!，还是§R奔向现代社会§!，驹纳延必须作出选择。\n\n更为复杂的自由马社会则由灵火僧侣（Monks of Anam-Teine）构成，他们长期在山中寺庙中祭拜，供奉祖神与山神。独特的是，这些僧侣传授的魔法，陆马，天马和独角兽均可掌握。这些僧侣教授年轻的小马们，并保持与神秘的§Y异世界凤仙子§!（Breezies of the Otherworld）融洽相处。如果驹纳延受到§R恶魔§!（Demons）的威胁，这些僧侣还会出击保护小马不受伤害。\n\n驹纳延的传统与文化十分复杂，因此明智的统治者应对此高度重视，深思熟虑。但外界却更加危险，现状下的驹纳延可能无法保护自己。"
 EAW_WS_FAL:0 "[Root.GetNameDefCap]——失去心脏的国度"
 EAW_WS_FAL_desc:0 "虽然两国的文化和语言完全相同，但要探讨隼尔科（Falcor）和§R翼巴第§!（Wingbardy）的历史可说是极为麻烦的。超过一千年之前，北方的翼巴第和隼尔科部落征服了从§R斯帕雷奥斯王国§!（Kingdom of Sparléos）分裂出去的§Y卡廷王国§!（Kingdom of Karthin）。在接下来的几百年内，两者之间爆发了无数的战争，造成了数不尽的边界更动，支配对方的主导权也随着胜败轮流更替。直到§Y格罗弗一世皇帝§!入侵并同时征服了两者之后，这种痛苦的竞争才宣告结束。\n\n随着被征服而来的是长达两个世纪的和平，一个隼尔科和翼巴第已经好长时间以来，都没有享受过的一个概念。在帝国的保护下，两国都发展茁壮。女王国的首府§G隼尔科§!（Falcor）也成长为了一个繁荣的工商业城市，而§G马顿§!（Matton）则是吸引了许多矿工和铸造厂劳工。帝国各个附庸之间的贸易开放意味着与翼巴第的边界实际上已不复存在，从而实现了自由贸易和共享财富。\n\n然而，所有美好的事物都肯定会走到尽头的。\n\n972年，翼巴第国王遭到暗杀，继承王位的§Y加里波德·塔洛努埃尔§!（Garibald Talonuel）正式宣布脱离帝国。当时，隼尔科仍然是帝国的附庸，但突然，与翼巴第之间的边界再次变得重要起来。关于哪个村庄和城镇属于哪个国家已经引起了争议，但隼尔科还能仰赖帝国来保护它们。\n\n帝国，于§R978年的狮鹫尼亚大革命§!之中，轰然崩解。\n\n现在隼尔科的女王孤立无援了，但紧张情势仍然不断的升高。翼巴第现在可以肆无忌惮的索要他的宣称，而隼尔科也被迫要出面捍卫自己的领土。985年，在边境城镇梅朗爪（Meranclawo）爆发了边界冲突，两国都做出了增援的决定。很快，冲突成了战斗、战斗又成为了战争。\n\n翼巴第一开始取得了初步进展，但随后战争陷入了僵局，直到987年，隼尔科军在孔雀爪（Clawporetto）战役中发动了§Y北部大反攻§!，这次攻势突破了翼巴第军的防线，并击溃了第二军团。隼尔科军迅速的推进，直到他们被洪水泛滥的皮玛韦（Piumave）河阻止为止。喘了一口气后，翼巴第有机会稳住防线并重组了军队。翼巴第召集了盟友§R弗朗齐斯特里亚§!（Francisria）加入战争，他们进攻了过度延展的北方隼尔科师团，989年，§R加里波德总攻击§!（Garibald Offensive）开始。隼尔科军的防线被冲破，翼巴第夺回了所有失去的土地，甚至兵临§R隼尔科城§!之下。女王别无选择，只能签署停战协定，以防止其国家被彻底吞并。厌倦战争又“仁慈”的国王加里波德只提出了一个苛刻的条件：§R将隼尔科城割让给翼巴第§!。\n\n隼尔科女王国随后陷入混乱。军队失去秩序、经济崩溃、海军几乎解体，甚至§Y西卡梅翁§!还趁隙占领了乔乔群岛。四面八方而来的压力不可避免地让女王病倒了，这让她的女儿，§G马克西米利安娜公主§!（Princess Maximilliana）成为这个国家的统治者。现在，她必须在太迟之前从厄运中拯救自己的国家。但是，由渴望收复失地的老兵组成的非正规组织§g隼尔科雄鹰§!（Falcorian Eagles）有不同的计划……"
 EAW_WS_WIT:0 "[Root.GetNameDefCap]——古老的法师国家"
 EAW_WS_WIT_desc:0 "位处山区的§Y威腾兰王国§!历史悠久，是河间地最古老的国家。早在长湖和江源小马建立第一个城镇之前，威腾兰至高王国早就已然统治了狮鹫尼亚东部的山区和谷地，从南部海岸一直延伸到埃格希奇森林。这是一个由强大的§C独角兽法师§!所统治的王国，他们成为了社会的顶层，对法术的研究无生灵能出其右。\n\n但这都已经是一千多年以前的事了，过去的辉煌早已烟消云散。时代变迁、兴衰迭起，威腾兰的影响力也逐渐消逝。随着法师阶级成为了颓废的世袭贵族，这套菁英统治的体制崩溃了。贵族们只关注他们在山丘堡垒内的奢华生活。而其他独角兽、陆马和天马和其他少数民族被贬为农奴，为了满足他们主子的需求而辛勤劳动。威腾兰成了一个孤立且落后的国家。\n\n在悠久的历史中，威腾兰虽然始终受到来自西方狮鹫和北方小马的威胁，但他们仅仅被湖城的§R大王子 祝福圣剑§!征服过。纪元前66年的惨败结束了威腾兰的黄金时代，也加速了他们的衰退。直到纪元353年，威腾兰挣脱了枷锁。英勇的§Y“湖城小马屠夫” 海西尔二世国王§!雇佣了遥远异域的鹿佣兵将湖城压迫者驱逐了出去。作为奖励，鹿被允许在东南半岛（现在被称为“§Y东鹿地§!”）定居。根据纪载，海西尔二世是威腾兰最后的一任贤王。\n\n虽然获得独立，威腾兰的领土却不断萎缩。数百年来，由于海盗和蛮族入侵，南部海岸脱幅而去；驹纳延部落也早已是实质独立状态。纪元807年，§G江源公国§!攻下了走马川，甚至围攻了高鬃城。虽然最后攻城未果、损失惨重，但不信任的种子也就此萌芽。因此，在纪元898年，§G河间同盟§!成立之初，威腾兰并没有参加的意愿。直到格里菲亚哥萨克入侵，并将艾宛角烧成白地后，威腾兰才迅速转向，决定加入同盟——尽管这并没有起到阻止劫掠者的作用。纪元967年，§C安布罗修斯§!领导下的巴拉德也实质上独立出去，威腾兰也失去了对南部山区的控制力。\n\n当然，并不是所有小马都愿意眼睁睁的看着国家就此沉沦。白星，一个女法师贵族，她决定要采取行动来拯救威腾兰和正在受苦的马民们。纪元994年，在§Y贤马会议§!的支持下，她向执政的腐败国王发起了一次魔法决斗挑战——国王退缩了，不敢接受挑战，黯然下台。从那时以来白星集团进行了无数次渐进式和现代化的改革、解放了农奴、恢复了菁英统治体系，并开始了工业化。但是，由§Y乌弗里克勋爵§!领导的保守派法师贵族反对她的改革，他们在阴影中密谋着什么……"
 EAW_WS_FEA:0 "[Root.GetNameDefCap]——危机边缘"
 EAW_WS_FEA_desc:0 "§Y弗羽西亚§!是§Y狮鹫尼亚帝国§!中一个古老的大公国。数个世纪以来，在许多任皇帝的统治下，弗羽西亚繁荣昌盛。979年的反革命战争以后，作为对他们站在帝国一边的奖励，它也从帝国手中获得了相对较大的自治权。\n\n作为帝国相对最为自治的附庸，§Y弗羽西亚§!自豪地称自己为§G立宪君主制§!，以其大公§Y赫拉克四世§!为国家首脑。由谐律主义的§G自民党§!和君主制支持者§G公爵党§!组成的§R联盟§!几十年来一直统治着大公国，形成了稳定和最为温和的政治气候，这与当时其他国家更激进的政治运动完全不同。激进右翼民联党和左翼联盟工党都有自己的席位，但这四个政党都没有赢得过大多数选票。\n\n然而，时局正在慢慢地变得对弗羽西亚不利。§Y帝国§!的迅速衰落以及随之而来的再一次§R经济危机§!严重削弱了国内的温和派势力。随着政府持续的优柔寡断，政治派别两端的激进分子在民众中获得了更多的支持。\n\n随着新时代的到来，§Y弗羽西亚§!将不得不决定自己的命运。如果目前的政党联盟解体，所有四个政党都有机会被选为下一任首相。这一切将取决于各方的政治操纵和进行的交易。工党的赤色分子和民联的民族主义者内部也有更为激进的一部分，但在目前的政治气候下，他们永远无法上台。\n\n第一笔业务是提交§Y新预算§!给议会，因为财政部和经济部都已经有了各自的如何摆脱经济衰退的想法。同时，我们也希望§R联合执政危机§!不会发生剧烈的变化。\n\n如果你能很好地引领这个国家，那么弗羽西亚注定伟大。"
 EAW_WS_BRF:0 "[Root.GetNameDefCap]——为国王和王国！"
 EAW_WS_BRF_desc:0 "§Y普里文§!，坐落在§R黑石匪帮§!控制区以东，一直以来都是狮鹫尼亚上最孤立的几个区域之一。这片充斥着森林，沼泽和金色的田地，种满了小麦、大麦和燕麦的土地，几个世纪以来一直被布罗德费尔德、基韦辛和西迪亚三个公国所瓜分。普里文从来没有像自己的某些西方邻居那样享有威望和权力，但它的狮鹫们满足于他们和平，简单的生活。然后，§R帝国§!到来了。\n\n§Y格罗弗一世皇帝§!率领一支军队翻越爬行者山脉，征服并统治了东部狮鹫。但没过多久，普里文变的高度自治，因为普里文狮鹫心中对帝国皇室从来没有热情可言。仅仅当853年§Y基海·德·基绍§!统一了三公国时，西部才感到警惕，甚至那次问题也很快被7年后基海·德·基绍遭到§R暗杀§!所引发的普里文再次分裂所解决。\n\n当帝国愈发动荡，§Y普里文§!只受到了最小程度的影响。普里文狮鹫们从未真正地依赖帝国去维持自己的生存或国防。这种也让§Y布罗德费尔德王公克洛苏·德·基绍§!成为了基韦辛和西迪亚的统治者，并在973年——§R狮鹫海姆共和革命§!的五年前——自封为布罗德费尔德国王。普里文的新时代开始了。\n\n几十年过去，旧的农作物完全被高利润的大米所取代，布罗德费尔德成为了狮鹫尼亚的米篮子，它的地主们通过向翼巴第和西卡梅翁等城市化国家大量出口粮食致富。然而，贪婪的贵族权力日益增长，意味着农民的处境变糟。没过多久，诸如§R共产主义§!之类的新思想就缓慢的，但真实不虚的渗透到布罗德费尔德狮鹫平民中。\n\n995年的大饥荒是一场灾难。水稻枯萎病到来了，由于栽培品种单一，其影响是毁灭性的。多次收获季都歉收，商店里的大部分食物都卖到了国外。§R五分之一的狮鹫死亡§!。随后数年，社会骚动，经济失稳，直到1001年克洛苏宣布国家进入紧急状态才停止，这给予了他独裁的权力。秩序重建了，经济也恢复了，但没过多久，一切都变得更糟。\n\n1003年，当克洛苏和他的妻子在基韦辛检阅军队阅兵时，遭到了一次暗杀。他仅仅面颊上受了伤，但王后却在他怀抱中死去。刺客被立即射杀。很快，克洛苏指责恐怖分子§R普里文解放军§!和普通的共产主义者应该为暗杀负责，并开始了猎杀。数以百计的共产主义者和社会主义者被逮捕，但更多的，数以千计的狮鹫拿起武器，发起反抗。在§R菲利普·红兴§!号召下，公众开始公开反抗国王。战线在地图上画下，双方互相射击，§R内战§!开始了。\n\n保皇党军队被击退到更忠诚的地区，而共产主义者继续向他们施压。一场兄弟之间的战争，鲜血满溢在曾经宁静的普里文大地上。尽管整个国家再次面临饥荒，但田地仍被烧的焦黑。现在，经过两年可怕的战争，赤匪走狗已经做好准备，他们希望这将是§R最后一击§!。而那些忠于国王陛下的狮鹫则决定击退§R红潮§!，不惜一切代价恢复这个支离破碎的王国的秩序。\n\n是时候让保皇党和所有忠于国王的狮鹫们团结如一，拯救祖国了！国王万岁！基绍家族万岁！布罗德费尔德必胜！"
 EAW_WS_LUS:0 "[Root.GetNameDefCap]——贵族和农民"
 EAW_WS_LUS_desc:0 "这片被我们称为§G卢什§!的土地，自古以来，已经见证了许多冲突。不论是狮鹫和河间同盟的小马之间，还是狮鹫自己之间。许多贵族发动战争，使卢什团结在他们的家族下，而他们当中有些至今仍存在，而§G白冠家族§!最终在他们中脱颖而出。但是人外有人，天外有天，白冠家族的狮鹫们也在747年当§Y格罗弗一世§!率军越过爬行者山脉像征服§Y普里文公国§!一样征服他们时领悟了这个道理。当西狮鹫尼亚正进行工业化时，卢什依然保持着§Y封建制度§!。在埃维河的注视下，卢什的农奴像他们的祖先在几百年前那样生活。\n\n然而，随着意识形态的纪元横扫狮鹫尼亚，一个充满巨大变革的时代即将来临。受到§R普里文§!共产主义起义的鼓舞，一些农奴寻求主宰自己的命运，而不是被领主和亲王掌控。如果不改善平民的生活条件，§R革命的烈火§!就有可能会在公国中燃起。\n\n§G艾利亚斯·白冠亲王§!于1006年1月开始在卢什亲王国执政。他仍年轻，雄心勃勃，并知道卢什有潜力实现现代化。艾利亚斯亲王致力于奉行和平外交政策，并把主要精力放在改善公民的生活质量上，艾利亚斯是卢什很久以前就需要的领袖。亲王曾被警告说，把农奴从农奴制中解放出来并照顾他们，可能会在经济结构从农业转向工业时使经济陷入§R混乱§!。\n\n另一只狮鹫在阴影中等待机会。艾利亚斯的弟弟，§Y盖拉尔·白冠亲王§!，认为卢什是一个强大的国家，可以占领整个埃维河流域。在臭名昭著的翼巴第法西斯主义者喙索里尼的著作启发下，他想要建立一个以宗教和军事为根基的法团民族主义国家。然而，如果盖拉尔想要统治国家，他就需要想办法让贵族们相信他的哥哥不适合履行他的职责。\n\n在适当的指引下，卢什的贵族可以团结一致，而这个国家也可以自豪地面对未来。卢什万岁！"
 EAW_WS_ARA:0 "[Root.GetNameDefCap]——征服者遗产剩几何？"
 EAW_WS_ARA_desc:0 "§Y阿布鲁诺戈§!的名字就像狮鹫大陆一样久远。在古代，当世界初生不久的时候，§G阿布鲁诺戈斯·硬羽§!率领着强大的狮鹫战士大军统治了狮鹫大陆的大部分地区。这位伟大的战略家在战场上无双无对，阿布鲁诺伽被全世界所敬畏！然而命运确实是一位无情的女士。阿布鲁诺戈斯死后，帝國冰消瓦解。他的继业者们在无数微不足道的内斗中将征服成果挥霍殆尽！现在，少有狮鹫仍记得阿布鲁诺戈斯之名。\n\n然而，如今命运之轮又一次转向。变化之风消灭了§Y狮鹫尼亚帝国§!，现在它徒有自己过去的外壳。对阿兰蒂戈来说，幸运的是男爵领和§Y翼巴第王国§!结盟，因此帝国的崩塌没有对阿兰蒂戈造成大陆北半部分所承受的那样严重的损失。阿布鲁诺戈经济上可以选择继续依靠翼巴第，翼巴第自身的经济状况目前也出现了问题，或者也可以松开和翼巴第的联系，脱离其影响。\n\n硬羽王室仍然领导这个国家，但是其家族成员再也没有到达阿布鲁诺戈斯的高度。§G玛格丽特·硬羽§!是国家的现任领袖，她无法同伟大的阿兰蒂戈旧日统治者相提并论。在又一代平庸统治者的统治下，有些鹫想要掩埋复兴古代帝国之梦，按照这些年狮鹫大陆流行的意识形态改革国家。但是，女男爵的弟弟，§Y多罗修斯§!，是一位有天赋的将领。他的双眼和伟大征服者同样闪耀！有些鹫暗中认为他将会夺取宝座。有些鹫仍然相信阿布鲁诺伽将会再次统治，一位新的阿布鲁诺戈斯将崛起，带领他的鹫民走向伟大。按征服者的愿景重塑世界，阿布鲁诺伽军队行进到世界的尽头。骰子即将掷下，阿布鲁诺伽的未来将永远改变。"
 EAW_WS_DMT:0 "[Root.GetNameDefCap]——钻石狗王国"
 EAW_WS_DMT_desc:0 "钻石山王国是一个群狗之国，其主体部分处在群山的地下，位于§Y河间§!的最北部。钻石山王国是河间地区，同时也是河间同盟的北方边境。无数年代过去，他们的山脉家乡如同不可逾越的城墙，让群狗可以不受外界打扰，积累§G财富§!。山中国王们通过使用§R大群奴隶§!获取财富，并警惕的保护着他们的财产。然而随着时间流逝，衰退和过度自信使得狗国的警戒性下滑，导致嫉妒狗国财富的目光开始寻找破绽入侵它。最终，在972年，一次灾难性的打击中，§R冥翎§!的狮鹫骑士们在§Y无骨者拖格§!的领导下攻入群山，劫掠了首都，并带着几乎所有王国的财宝飞离。自那以后，群狗就渴望复仇。\n\n现在，在拖格之子§Y罗乎·钻石盾§!的统治下，群山王国终于一宝石一宝石的开始重获旧日的光荣。群狗已经和§G河间同盟§!的小马结盟，一同对抗西面的狮鹫威胁。然而，如果要让群狗可以对抗狮鹫骑士们，还有很多工作要做。首先，反叛的奴隶必须重新恢复秩序。有一本新书在奴隶之间流传，现在奴隶们正在尖啸一个新的单词：§R“革命”§!。如何解决这些革命分子将决定国家的面貌。尽管国王只是简单的打算粉碎他们，国王的女儿，§G茉莉公主§!，暗中希望更温和的解决方案。\n\n钻石狗在工业上还有很多需要迎头赶上的地方，但依靠国内埋藏着的§G大量资源§!，钻石狗只要把王国的禀赋发挥出来即可。\n\n群山间的纪念碑将如何评价罗乎·钻石盾国王呢？国王能否重夺他父亲的财富，群山王国是否会被内部冲突所压垮，或者一个新的强权将夺取钻石山中的财富？"
 EAW_WS_ZES:0 "[Root.GetNameDefCap]——受压迫者的避难所"
 EAW_WS_ZES_desc:0 "§G卡萨自由邦§!在752年诞生——一场在名为§R德瓦什号§!的迦骀基奴隶贸易运输船上爆发的奴隶起义。如果继续向目的地航行，等待他们的只有原来的命运，斑马§G阿克伊库§!把奴隶们组织起来，扬帆向北。最后，他们在§C威腾兰王国§!南部的岛屿登陆，尽管该地区最近已陷入无政府状态。难民们定居在那些岛屿上，不仅幸存下来，而且茁壮成长，他们发展了自己的§G民主§!制度，他们选出的§Y最高执政官§!被赋予了绝对的权力，得益于农业和渔业的共同发展，还有反抗当地海盗的袭击以及来自§G鹦鹉维亚共和国§!的援助，他们得以幸存下来。\n\n难民船和鹦鹉维亚巡逻舰的偶遇为长达数个世纪的联盟奠定了基础，鹦鹉维亚意识到，他们向北运送的每一件武器、帮助逃难的每一位奴隶都会投身抵抗困扰鹦鹉维亚已久的海盗。这催生出一种奇怪的和谐，作为对他们经济和军事援助的回报，鹦鹉维亚得到了一个乐意与海盗作战的盟友。\n\n这种脆弱的平衡在872年被打破了：§R猊鹫骑士团§!发起讨伐这片海岸的十字军，以将其并入§C狮鹫尼亚帝国§!的版图。当时的最高执政官，§G西诺拉·庞§!，果断采取行动来保卫国民。带领他们去到海盗的据点§Y安之地§!，她凭借大胆的行动和高超的技巧，成功地占领了这片区域，并使其成为逃离骑士团民众的聚集地。最后，西诺拉·庞领导着一支由§C斑马，小马，狮鹫§!组成的巨大力量来反抗§R十字军§!，他们的首次交锋即§Y埃比隆之战§!。代价是高昂的、可怖的，但是一切尘埃落定后，各种族互相彼此流血牺牲，创造了一个永存的遗产，就像西诺拉·庞所宣布的：不论是奴隶的后代，还是无家可归的难民，都将受到卡萨的欢迎。从那以后，这一§G包容§!的本性便一直存在，卡萨自由邦成为了狮鹫尼亚南部的一个避难所。\n\n最近，这一理想受到了前所未有的考验。随着§R巴拉德五巨头§!在北方崛起，§Y东鹿地§!的掠夺者们面临着政治动荡和§C格里富斯自由诸邦§!似乎大厦将倾，自由邦需要比以往任何时候都站得更高，方能在现代的黑暗社会中闪耀灯塔光芒。"
 EAW_WS_NIM:0 "[Root.GetNameDefCap]——军事民主"
 EAW_WS_NIM_desc:0 "河间同盟的东边边界为漫长的沿海山脉，几乎没有适合小马居住的空间。而宁部西亚最早一批城市许多神话和传说都点出了这一个事实。从北方来到河间地的小马按照种族—陆马、天马和独角兽—分成了许多大大小小的部落，在河间地各个地区安顿了下来，唯有宁部西亚崎岖不平的山脉地区被留给了天马开拓者——这也是因为只有天马能够在难以通行的区域定居。直到后来，其他部落才开始进入宁部西亚，但这种最初的分歧在今天的宁部西亚社会留下了深刻的印记。最初，许多互不相属的城市（或说城邦）零星的遍布全国，但最后，则是由最大城邦§G宁部西§!的天马成功地征服了其他城市，完成了统一。这一伟业全要靠着他们§Y训练有素的天马军队§!，他们自青年时期便被不断的灌输纪律的重要性，再加上他们几乎完全缺乏地面部队，这支纯粹的“空军”就此成为了东狮鹫尼亚的传奇劲旅。\n\n宁部西亚社会阶级森严，许多非天马被降为§R黑劳士（Helots）阶级§!，这个群体几乎不比奴隶的处境好到哪里去——尽管宁部西亚公民声称这只是为了保护免受外界威胁而付出的代价。这些黑劳士大多数来自被征服的城市，其祖先的失败至今仍旧是他们肩上的重担。他们和不上不下的§Y边民（非公民的Perioikoi）阶级§!都是为了维持高贵的§G公民—战士阶级§!—那军事至上的生活方式所必需的。尽管在古代，他们曾被§Y祝福圣剑亲王§!（其政权就是现在的湖城）短暂地征服过，但宁部西亚的公民很快的脱离了压制，开始能控制自己的命运。他们在§G公民大会§!（Ecclesia）中透过投票，决定法律和其他的问题和政策。\n\n即使在今天，宁部西公民仍将自己视为不仅是黑劳士的保护者，而且还是所有河间小马的保护者。天马的确曾为了河间地做出了许多伟大贡献，例如§G热马关（Thermoponylae）战役§!，这是一场光荣壮烈的败仗，宁部西亚英勇的天马方阵兵在此挡住了西方狮鹫的猛攻长达数天，让河间地其他区域的军队得到了缓冲时间，能够有时间集结起来，最终将狮鹫侵略者赶了出去。然而，在宁部西亚的山脉之外，时间的巨轮并未停滞不前，腾拉斯预言者也表示，宁部西亚将进入一个§R动荡的时代§!……\n\n政治冲突几乎使这个仍在采行古代民主制度的国家完全停滞。三个派系在争夺权力，几乎没有一项政策能达到过半的共识。§Y传统主义者§!寻求维护宁部西亚社会的现状。他们并不是真的顽固的拒绝改变，但他们希望改变能够顾虑到传统，改动的幅度也不可以太大，必须要循序渐进。§Y佩加莱奥斯§!（Pegalaios），一个非常资深的战士和政治家，被传统派推举为领袖。§Y改革派§!则是从河间同盟的盟友中汲取了灵感。他们寻求使经济现代化、赋予边民阶级公民权，并与宁部西亚的邻居更加紧密地合作。比较特别的是，这个派系的领袖是个独角兽，§Y梅塔克劳斯§!（Metakeros），一个广受敬重的企业家。最后，在年轻将军§Y安德瑞亚§!（Andreia）周围组成了一个年轻的战士联盟，他们自称为§Y纯净派§!。这些士兵已经受够了宁部西亚的民主，并试图将权力集中在军队之下。但是，他们被许多观点谴责，认为他们完全鄙视外国小马和平民，特别是对非天马的平民。\n\n哪个派系能说服宁部西亚公民还有待观察。宁部西亚的天马骄傲而强大，他们事实上并不愿意让任何派系的力量过于强大——而这正是所有政治家试图要达成的目标。§R宁部西亚公民已经厌倦了政治斗争§!。但，若有谁能在政治战场上获得胜利，也许在他们的指挥下，就能够唤醒这个大陆上最可怕的小马战争机器……"
 EAW_WS_HLQ:0 "[Root.GetNameDefCap]——鹫王河上的守夜者"
 EAW_WS_HLQ_desc:0 "当§Y狮鹫尼亚帝国§!还年轻时，§Y格罗弗二世§!皇帝率领大军穿越整个大陆向东进发。和帝国之前的所有对手不同，§G河间地§!的小马们团结一致，激烈抵抗。§Y格罗弗二世§!皇帝本鹫在854年被一名宁部西亚重装步兵击倒，命运在这里发生了残酷的转折。帝国停止了前进的步伐，撤离了§G河间地§!，并将后来称作§Y狮鹫尼亚帝国边疆区§!的土地委托给了两个新国家：§R冥翎骑士团§!和§R长剑§!。\n\n§R冥翎骑士团§!曾经是一个军事边区，由漫云的阿洛西索斯修道院的狮鹫誓言兄弟们统治。虽然他们重整旗鼓，为一场新的东征做好了准备，但是§Y格罗弗三世§!皇帝对这样的征服没有兴趣。于是，阿洛西索斯修道院的修士们就努力完成东方守护者这一新的使命。他们统治众多的小马，并试图教导他们狮鹫神明的大道。有些小马接受了这些教诲，他们被称为§Y驳什尼亚小马§!（注：影射波斯尼亚人），而其他小马则时不时地反抗，虽然总是徒劳无功。\n\n为帝国多年的荣耀服务已经过去，冥翎骑士团抵御了小马的掠夺，并成功执行了一些反攻。在973年，骑士们自豪的在§Y西格弗里德·鸨野大团长§!的指挥下洗劫了§R钻石山§!，夺取了他们的库存财富。许多骑士感觉这就像东征的新时代的预兆。然而，麻烦很快就笼罩在帝国的上空，帝国越来越被贪婪和内部冲突所动摇。一场艰难的继承之后，§R978年狮鹫尼亚革命§!随之而来。§Y西格弗里德·鸨野大团长§!没有陷入反革命的混乱中，而是做出了改变命运的决定，决定拒绝重申效忠皇帝。这令冥翎成为了一个独立的国家，即使在§Y格罗弗五世§!在赫兹兰重新统一了一个较小但仍然强大的帝国之后也是如此。\n\n现在，就在这里，骑士团正站在十字路口。如何在两个世界的夹缝中生存？如何调和现代性与骑士统治的传统？又该如何对待那些给§Y长剑§!带来混乱和§R屠杀§!，并叫嚣着要向东发动全新东征的改组派？这些问题每一个都令西格弗里德苦恼。但是，像他这样的老鹫，是否还有资格回答这些问题呢。"
 EAW_WS_LNS:0 "[Root.GetNameDefCap]——漆黑的斗篷"
 EAW_WS_LNS_desc:0 "§g长剑伯国§!所处的地区千年来都是狮鹫和河间小马的天然边界，是东西方征服者的渴望之地。在露娜放逐约一千年前，长剑地区就已经有生物活动了，河间小马部落从东方迁来，定居于此，他们即是今天长剑小马的祖先。\n\n地理环境、稀疏的居民分布和历史塑造了长剑这个国家。为了抵御各个方向的侵略，保护自己的生活方式，长剑小马变得比自己河间地的同族更加好战顽固，而此地遍布的森林和沼泽也把这里的小马分隔成无数个迥异的部落。虽然他们有时会团结起来抵御共同威胁，或是联合起来发起对外劫掠，但大多数时候他们都自行其是，维持着简单的部落式生活，即便邻国都开始转向封建制度。\n\n在接下来的几个世纪，居民压力和部落酋长的雄心让长剑走向了对周边国家的劫掠之路。他们的内河船向西到达罗马坞，向东抵达江源城。狮鹫的地产是主要的目标，这也让长剑小马，甚至河间小马成了狮鹫眼中的死敌。为了反制这些劫掠，狮鹫开始在东方边疆组织骑士团。§Y冥翎§!骑士团（漫云的阿洛西索斯修道院兄弟会），和§Y蔷薇木§!骑士团（蔷薇木矛兄弟会）是其中最为著名的。早在东征开始前，这些骑士团就对今天长剑和冥剌地区的部落发动了一系列的战争，战斗异常艰苦，部落民利用森林和沼泽的优势，渐渐地拖垮了入侵者。\n\n§Y787年§!，长剑小马首次统一在一位雄心勃勃的领袖旗下，§G狩猎女神瓦雷涅§!的信徒§Y萨莫图卡斯§!，他征服了长剑诸部落，建立了瓦雷纳城，将此地视作长剑的宗教中心。“§Y长剑大公国§!”并不长命，§Y812年§!，§O格罗弗二世§!发起了对东方的首次征服，长剑就是第一个目标。长剑被付之一炬，萨莫图卡斯也死于狮鹫刃下。但他的成就却远比他长命，正是因为他，才有了长剑统一的思想。\n\n长剑成为了帝国卫戍领，被赐予给§Y暮爪家族§!，这是对家族在东征中出色贡献的奖励。作为条件，西长剑授予给了蔷薇木骑士团，正如他们在鹫王河右岸的兄弟一样。格罗弗二世的解决方案就是要求伯爵组建顾问会议，以此与骑士团分享权力。契约因此延续，伯国繁荣昌盛。虽然此地是狮鹫的殖民地，但长剑小马还是享有基本权利，只要正常纳税，就可以继续留在部落里做佃农。狮鹫的殖民和小马的存在开始形成了一种特别的文化，即“§Y东方狮鹫§!”身份认同，虽然名义上仍是狮鹫的，但却是不同的东西。\n\n两个世纪以来长剑和帝国渐行渐远，终于在§R978年的共和革命§!时正式切断了关系，不再作为帝国卫戍领，长剑的繁荣时代也随之终结。新伯爵§g帕拉斯§!采取了相反的策略，在和§R改组派§!（也称“黑斗篷”，狮鹫种族至上主义者）接触后，帕拉斯接受了他们的信条，死心塌地地追随着他们的理想。他废除了蔷薇木骑士团的顾问会议，对小马发动§R长剑种族屠杀§!，一次就给自己树起了两个死敌，把伯国送上了§R内战§!的不归路。"
 EAW_WS_SRS:0 "[Root.GetNameDefCap]——社会主义的北极星"
 EAW_WS_SRS_desc:0 "当§Y第一次狮鹫尼亚革命§!在复兴的§R帝国§!猛攻下瓦解时，§Y克梅斯凯派共和党§!的余部带着他们的社会主义者盟友们北逃。但是命运对克梅斯凯崇高的理想并不仁慈，当狮鹫尼亚共和国流亡政府发展到被内斗和军阀主义主宰时，社会主义者们谴责共和党对革命的背叛，脱离了共和国的统治。\n\n厌战但仍保持理想主义的社会主义者、共产主义者、无政府主义者和其他左翼团体，团结在§Y联合社会主义革命阵线§!的旗帜下，继续向北挺进，进入存在小马居民的§Y天际纳维亚§!。社会主义者将他们的殖民地命名为§G新天际纳维亚§!，一个在§Y天际纳维亚分水岭§!河流交汇处占据相当大面积小镇。这个名字既认可当地的文化历史遗产，又带来了进步，现代化，以及最重要的——革命这些内涵。这些品质都是革命阵线希望吸收进他们新国家的。\n\n几十年后，战争英雄，受人尊敬的革命者§Y阿斯皮尔·镰爪§!暂时夺取了天际纳维亚的统治权。随着革命阵线分裂为煽动性的§R国际派§!和孤立主义的§C社群派§!，形式上的统治权力落入了到了镰爪爪中。这样的安排非常不民主，如果我们仍然认为自己是真正的社会主义者，就必须对它加以纠正。通过推进改革，镰爪可以调停分裂的双方，驾驭他们在革命阵线的§G大议会§!上团结起来共同奋斗。\n\n社会主义共和国必须解决有关邻国的问题。在东部，§Y北方部落§!坚持进行他们持续不断的边界冲突，而他们的部落马则过着贫穷和困苦的生活。南方的§Y韦迪纳王国§!，尽管他们因谐律而自负，其专制君主制只是依靠压迫农奴而勉强维持。而§Y狮鹫尼亚共和国§!，曾经的革命盟友，更深地陷入了威权和专制。如此不公，离我们如此之近，不积极的与其进行斗争就将是§R无良知§!。\n\n在这个新时代，狮鹫尼亚的工业和技术蓬勃发展，伴随着帝国主义和反动意识形态的不祥增长。§Y天际纳维亚社会主义共和国§!的社会主义乌托邦是会逆潮屹立，还是会随着内外攻击落入深渊？"
 EAW_WS_FLO:0 "[Root.GetNameDefCap]——颓废的花园"
 EAW_WS_FLO_desc:0 "按照狮鹫尼亚常见的封建法理来讲，§G佛罗韦纳§!几个世纪以来都理当是波莫瓦拉的一部分，至于波莫瓦拉，它则是阿奎莱亚王国的一部分，阿奎莱亚又是狮鹫尼亚帝国的一部分。在§Y皇帝格罗弗一世§!入侵前，佛罗韦纳是阿奎莱亚东北方的壁垒，在全狮鹫尼亚都享有“不破堡垒”的名誉。但当格罗弗一世进攻时，他只通过一点点贿金就兵不血刃地串通了守军，将佛罗韦纳收入囊中。\n\n在此之后，佛罗韦纳的防御工事已然荒废，但定居点却愈发愈加庞大。这座在阿奎莱亚与赫兹兰间的小镇已然成为了一座富裕的，以色彩缤纷的纺织品、大型植物园与银币塞得满满的银行闻名的城市，一座§Y贸易中心§!。佛罗韦纳很快就被称为了狮鹫尼亚最美丽的城市——它的商鹫们也开始渴望起了更多的特权，于是，在871年，格罗弗三世皇帝授予了佛罗韦纳§Y帝国自由市§!的地位……尽管这让波莫瓦拉以及阿奎莱亚大为苦恼。\n\n在阿奎莱亚脱离帝国并借机兼并佛罗韦纳后，§R国王热拉·迪斯克里§!立刻宣称了其对佛罗韦纳天生的统治权并且将其直接纳入王国管理体系。但当980年的§R阿奎莱亚革命§!来临后，佛罗韦纳嗅到了机会，§Y宣布独立§!，摆脱了天鹰城发来的任何公文。在随后的混乱与战争中，佛罗韦纳就如同风暴中的港口，自立于世，远离混乱，欢迎那些背井离乡的难民。当和平恢复，国王重归王座之时，尽管他们十分担心国王企图重新给佛罗韦纳拴上锁链，但佛罗韦纳依旧繁荣于世。同时，下层工鹫的数量也开始激增——尽管他们没有城市原公民以及贵族那么多的权利，他们却开始似乎愈发激进。有一些如德·安迪戈家族这样的贵族承诺会给予下层阶层应得之物，但大多数贵族可都看不起这帮下贱的渣滓。\n\n在1004年，§Y匈克拉·德·褐瑰§!通过“抽签”成为了城市的领导者。他来自一个受敬仰的古老家族，其父亲§Y布隆奇诺“伟者”§!就曾连任过数十年的市长，并且十分看好自己的长子。只不过，对佛罗韦纳来说可能有些不幸：毕竟这位市长从未关心过自己的工作，几乎算得上是个贪吃无能的傻瓜了。不过最近，他改变了自己一向的处事作风，甚至不打算举办宴会了！他告诉了所有鹫，在新年来临之时，他会宣布§C“非常重要的消息……”§!"
 EAW_WS_KAT:0 "[Root.GetNameDefCap]——疯鹫的撒野处"
 EAW_WS_KAT_desc:0 "随着§G狮鹫尼亚帝国§!的衰落以及克梅斯凯短命§Y共和国§!的终结，§G卡特琳亲王国§!被重建，其统治家族中仅存的成员§Y黛尔莎·冯·卡特琳堡§!被赋予权力。然而，尽管她得到了最好的照顾，许多神官也为她做了很多祈祷，但在目睹了自己全家死于共和党的魔爪之下之后，她的内心破碎了，她的神志不清损害了亲王国的利益。§Y卡特琳贵族团§!，贵族们本应充当这个孩子的顾问和摄政王，却利用他们与黛尔莎的亲密关系来操纵她脆弱的心灵，为自己谋取私利。对于这样一位领导者来说，现实和理智都是遥远而不可理解的事情。§R卡特琳黑暗过去的诅咒§!再次出现，随着女亲王的失智，贵族无休无止争夺权力和剥削百姓，疾病饥饿甚至瘟疫已经变得常见，当地的狮鹫不得不四处寻求英雄的帮助。\n\n在为数不多的可以与疯狂女亲王对抗的鹫当中，有名为§G卡特琳骑士团§!的团体，还有卡特琳的前主教§G海因里希·暮羽§!。他们都不知疲倦地在这片土地上工作，尽其所能救助这片患病土地上的苦难民众。\n\n骑士们自发组织起两个骑士团。第一个是§G白银爪套§!，在大团长§G赫克托·阿登森§!的带领下，这是一个由士兵和医生组成的骑士团，他们照料病鹫，守护弱者。第二个是§Y银色黎明§!，这是一群为数不多但却十分凶猛的铁面战士。该骑士团由大团长§Y埃里克·峻爪§!领导，他是古老而高贵的峻爪家族的现任当家，这个家族曾在帝国时代之前统治过卡特琳。与此同时，§G海因里希·暮羽§!被免职了，他在农村游荡，鼓动农民，号召他们掌握自己的命运，成为卡特琳的英雄。然而，他同时也宣扬其更有争议的理想，他的宗教社会主义运动是一个奇怪的运动，但它的成员众多，影响越来越大。\n\n然而，只要女亲王还在疯癫状态，骑士和教士都无法控制局面，因此民众们祈祷卡特琳能够有所改变，尽管很少有鹫知道这一天将何时到来。"
 EAW_WS_FEZ:0 "[Root.GetNameDefCap]——机会之城"
 EAW_WS_FEZ_desc:0 "几个世纪以来，海岸城市§Y菲兹拉§!，是§Y阿奎莱亚王国§!一个重要的港口。它的野心勃勃的商鹫们享受着国王的保护，同时保留着自治权和自己的语言。但事实证明，国王在705年§Y狮鹫尼亚帝国§!大混乱中无法保护他们。菲兹拉鹫很快就宣誓效忠于§Y格罗弗一世§!，因此获得了§Y帝国自由市§!的地位。\n\n然而，菲兹拉从来没有像它邻近的自由城市那样富有或享有声望，比如§R鹫弗顿和天落城§!，在经济和军事上，都没法与他们竞争。这种激烈的竞争一直持续到今天。\n\n在978年和980年的§R革命§!中，菲兹拉和狮鹫尼亚的许多其他地区一样宣布独立。菲兹拉鹫不辜负他们作为机会主义者的名声，夺取了附近的土地，从一个小小的城邦发展成为一个小国。但他们拒绝加入§Y天落城§!，因为菲兹拉自己也成立了§Y贸易联邦§!，从未承认他们是合法的国家。这最终被证明是一个错误，因为天落城对他们发动了经济战争，把他们赶出了市场，菲兹拉的经济进入了恶性循环。\n\n现任市长，§Y格韦纳尔·戈达尔§!，因为清点选票的鹫是他的支持者，即使不是一个中立党派，但他最近还是以微弱优势赢得了选举。上任后，他就很少注意治理这个在贫困中挣扎的城市，在幕后做着见利忘义的勾当。他的疏忽给了§R犯罪团伙和暴徒§!们可乘之机！§C菲兹拉警局§!即使是作为城市的卫士，拼命维持法律和秩序。\n\n菲兹拉正在经历困难时期，公民等待转机的出现，他们可能会抓住机会，最终走向伟大。毕竟，这里可是菲兹拉。"
 EAW_WS_ANG:0 "[Root.GetNameDefCap]——莱尔男爵的领土"
 EAW_WS_ANG_desc:0 "§Y安江§!位于赫兹兰东部巨大的§R沙伊斯森林§!，一直是帝国最贫穷和最落后的地区之一，即使在黄金时代。可怕的、被诅咒的、充满怪物的森林被证明是难以克服的障碍，而森林里粗糙泥泞肮脏的土壤对农业来说毫无用处。那些勇敢的狮鹫在这片土地上定居下来，他们沿着河流建造自己的家园和农场，其中最大的一条河流就是§R安江§!。\n\n当狮鹫尼亚的其他地方变得越来越先进和城市化的时候，安江却落后了，它的发展受到了无法通行的森林的阻碍。§R封建制度§!和绝对君主制这种曾经在狮鹫尼亚广泛施行的制度在这里持续了很久。地方贵族视农奴如粪土，拥有不容置疑的权威。尽管如此，他们还是抑制住了自己的野心，继续忠于帝国。那些想得到自由的农奴躲在森林里，搞盗匪活动。从§Y耶鲁§!过来的§R无政府主义者§!沿着意识形态的路线改造了土匪，给了他们一个单一的、崇高的目标。\n\n在978年的§R革命§!期间，无政府主义者与§C国民共和党安江分支§!结盟并寻求解放他们的祖国。但§R荡鹫城莱尔男爵“恶徒”§!忠诚的军队粉碎了革命，把革命军赶进了森林，从此他们就一直呆在那里。士兵领袖§Y施托伊贝尔§!是男爵的一位老朋友，也是唯一一个没有遭到他残酷对待的鹫，但他最近意识到，对安江进行改革或许是必要的。\n\n反革命后，格罗弗五世皇帝授予那些帮助过他的贵族自治权，其中包括莱尔男爵。自那以后的几十年里，安江几乎没有什么变化：它仍然贫穷和不发达，莱尔的权威是绝对的。无政府主义者和共和党鹫继续在黑暗的森林里进行抵抗。但变化可能最终到来，比莱尔认为的要快得多……"
 EAW_WS_BRZ:0 "[Root.GetNameDefCap]——逃离暴政的难民"
 EAW_WS_BRZ_desc:0 "§Y格罗弗五世万岁！§!\n\n792年时，我们的祖先作为难民逃离§Y钻石山§!，为摆脱奴隶制走完了艰难的旅程。§Y格罗弗二世皇帝陛下§!可怜我们的祖先，把§Y狮鹫海姆§!以北的青铜山脉赠送给他们，让他们在新家居住，享受繁荣。\n\n自那时起，青铜山的猎犬们就坚决支持狮鹫尼亚皇帝，忠诚的为他们服务，作为皇家警卫和顾问勤勉的工作。\n\n山脉中充满了财富和资源，帮助§Y铜岭§!和§Y狮鹫海姆§!发展起来。不过由于猎狗太多，往往会§R资源枯竭§!，而最近灾难性的§R帝国崩溃§!导致的§R经济衰退§!带来了新一波的§R贫困化§!和经济停滞。为了复苏而做出的努力往往由于我国生机勃勃的工业§R基本没有§!被国内拥有而受到阻碍，这些工业大部分被§Y狮鹫海姆§!和其他帝国贸易中心的企业所控制。最近这些年，我们的财富是由狮鹫盟友管理才更好，还是应该需要被§Y国有化§!从而掌握在§Y青铜山居民§!爪中一事导致了激烈的争论。同时§Y拉芬斯堡§!的§Y格罗弗五世工业园§!接近完工，为青铜山的猎狗和狮鹫提供了新工作，新机会。\n\n作为§Y帝国心脏地带§!的一部分，§Y铜岭§!和§G友好政权§!相邻，在§Y帝国的保护§!下团结一致。作为一个§Y附庸国§!，我们的§Y帝国首都§!位于我们的南方，§Y施塔莓公国§!和§Y击日者氏族§!分别在我们的西方和北方，东方是§Y冥翎骑士团§!，§Y钻石山§!以及他的§Y河间同盟§!盟友的威胁显得非常遥远。这既是祝福，又是诅咒。常年以来的稳定和得到的保护导致§Y铜岭§!§R几乎没有武装§!，§R坚定的和平主义§!思潮是社会的主流，他们仍然记得在迁徙路上和更早之前§Y钻石山§!士兵爪下的痛苦家族记忆。\n\n§Y铜岭§!最重要的政治议题是帝国未来的继承。§Y格罗弗五世§!的健康状况正在§R开始恶化§!并不是秘密，如果他过早死去，将来会为他儿子，未来的§Y格罗弗六世§!的摄政权爆发冲突。至于摄政者是谁，只有时间能告诉我们，而且由于狮鹫贵族和神庙之间§R不断增长的深刻分歧§!，摄政者的选择不太可能满足所有帝国成员。无论如何，皇帝陛下之死都是青铜山狗群的§R创伤§!，并会为他的公民带来§R沉重的悲痛§!\n\n§Y伊格纳蒂乌斯·铜尾伯爵§!自1005年他父亲死后就一直统治铜岭。他受到广泛欢迎和喜爱，但还没有像他父亲一样受过978年帝国崩溃，共和国造反那样的考验。在伯爵的主要咨询委员会§Y青铜议会§!中，许多不同的派系正在创立，这些派系受工业化世界广泛流行的政党所激起。§Y温斯顿·丘希尔的保守谐律党§!和§Y鲁富斯·高吠的全国联合党§!是议会中除旧贵族以外影响力最大的两党。伯爵的儿子§Y巴纳比§!，受到谐律主义者吸引，认为铜岭的未来要依靠他们的影响。\n\n在议会厅外，§Y铜岭共产党§!是伯爵心头正在成长的尖刺。共产主义者在下层逐渐受到欢迎，他们承诺更好的工作环境，移除社会中的不平等，宣传社会改革，以及对皇帝的忠诚。但是共产主义者内部不团结，为了在松散的同盟内获得§R控制权，许多派系不断争吵§!。同时，§Y青铜十字骑士§!和§Y拉芬斯堡主教§!在于铜岭境内定居的狮鹫中间仍然受到欢迎，虽然他们看起来更忠于教会而不是皇帝。\n\n随着不确定性出现在地平线上，只有时间才能知道铜岭未来会怎样。"
 EAW_WS_PYT:0 "[Root.GetNameDefCap]——农民共和国"
 EAW_WS_PYT_desc:0 "克梅斯凯短命的§Y共和国§!并不是赫兹兰地区的第一个民主政权。在狮鹫尼亚革命前，§Y格赖芬马尔申§!就享受着和其他狮鹫尼亚上除了几个像§G西卡梅翁§!那样的例外以外，非常少见的自由和平等，甚至在狮鹫尼亚革命后仍然如此。但是，格赖芬马尔申民主和现代的民主制很不一样，它是一个非常独特的§Y农民共和国§!，这可不一定是在夸它。\n\n历史上不太出名的格赖芬海姆公爵，§R埃里伯斯·黑爪§!，一直是§Y格罗弗一世皇帝§!的心头刺。因此当本地农民在720年暴动推翻公爵时，皇帝不但没有粉碎不满者的暴动，反而向民众提议他们可以组建一个自己的独立政府。作为回报，民众必须发誓永远忠于皇帝，而皇帝也将永远保护他们。农民们接受了这个条件，因此§Y格赖芬马尔申§!诞生了。农民们担心将来会再崛起一个残暴的领主，因此精心设计了一个直接民主制度，大多数国家事务都由全民公决决定，也有一个§Y总督§!领导的顾问委员会，每三个月通过选举来更换。这个制度允许所有格赖芬马尔申公民，不论其地位和意识形态如何，都能参与政治，但它也使得共和国的任何改革都非常缓慢。几个世纪以来，这一直不是什么问题，反正皇帝确保了共和国的安全。\n\n悲伤的是，帝国没能长久。\n\n在§R978年革命§!后的骚动岁月，格赖芬马尔申狮鹫只能依靠他们自己来保护自己。§Y农民民兵§!是一支勇敢的公民民兵，确保了农民共和国继续存在。接下来，更极端的意识形态，比如§R共产主义§!和§C民族主义§!获得普遍的民意支持。好在由于格赖芬马尔申的政治结构，这对稳定性没什么影响。因为有些鹫想要改变，而改变在格赖芬马尔申太困难了。\n\n现在赫兹兰地区又一次获得了和平，大多数格赖芬马尔申鹫回到了以前的日常生活。但是有些鹫担心这不过是暴风雨前的宁静，而格赖芬马尔申对农业和非专业民兵的依赖将毁灭他们。\n\n脆弱的共和国能够在新世纪幸存吗？或者格赖芬马尔申也将终结，证明民主制度确实必然遭受毁灭？"
 EAW_WS_HAU:0 "[Root.GetNameDefCap]——迈耶的私领"
 EAW_WS_HAU_desc:0 "§Y豪克兰§!长期以来都是一个不守规矩的地方，无论是海盗还是罪犯，各种生物都可以将这儿作为避风港。没哪儿的恶棍比豪克兰群岛更多了。当小马们开始向狮鹫尼亚迁徙时，这座小岛就成为了一个“十字路口”，可以从这儿航行到大陆的任何地方。也正是从那个时候开始，这儿便被称为“§Y十字路口§!”。直到新成立的§Y狮鹫尼亚帝国§!将目光转移到了群岛上。面对帝国的强大力量，豪克兰的民兵全线溃退，豪克兰从此成为了帝国的一部分。\n\n在帝国治下，§Y豪克兰§!成为了一个入侵的跳板：格罗弗将帝国精锐从这儿运输到马奎斯。也正是从豪克兰，§Y狮鹫尼亚帝国§!征服并且建立了§Y新狮鹫尼亚§!。然而，由于海上技术的发展，跨洋的直接贸易变得更加容易。那些原先驯服了岛屿的定居者离开了，去新的边境或者返乡寻找机会。因而，§Y豪克兰§!衰败了，成为了一个再平凡不过的捕鱼省。\n\n当北风神像在971年被盗时，豪克兰的变化不大。当地鹫只是发现了前往维特的船只越来越少，以及一些鹰之港的军官开始了日复一日的吵架。但就在这时，一个狮鹫正在准备给豪克兰带来改变。\n\n§Y赫尔曼·迈耶§!，帝国空军的年轻军官，从一位被忽视的飞行员变为了§Y共和国空军§!的新领导者。这位来自航空学院的飞行员受到了同龄鹫的钦佩，并且还得到了飞行员与学员们的喜爱。但他不是个理想家，他也对克梅斯凯的民主之梦没什么认同。因此，当反革命大军靠近狮鹫海姆时，迈耶集结了他的飞行员们，并且宣布他们不会为了一群愚者之梦而牺牲自己。他们会坐上飞机离开这儿，在历史上书写属于自己的一笔。而飞行员们同意了。因此，§G迈耶的飞行王牌§!们收拾好了行装，跳上了飞机起飞，除了帮了一个共和国军官一把忙以外没有管任何来自保皇派和共和军的警告。在迈耶的领导下，他们来到了唯一一个不会有谁找她们麻烦的地方：§Y豪克兰§!。这件壮举以§R狂野之旅§!为名而“闻名”。\n\n当飞行王牌们来到豪克兰时，他们只发现了一些驻军的痕迹。这儿的大多数鹫要么放弃了职位，加入了大陆上纷争的其中一方，要么就是干脆碰碰运气去大陆闯荡。至于剩下这些留在豪克兰的鹫，他们的命运很简单，加入或滚。迈耶立刻宣布了脱离§Y狮鹫尼亚帝国§!，并且宣称自己为豪克兰的新伯爵，而国际社会对此只是不置可否。也有许多鹫认为帝国回来夺回这片岛屿，但事实却是它从来没有。\n\n在接下来的几十年中，豪克兰夺回了它曾经掠夺者与海盗家园的名声。尽管全球的船只都已经进行了现代化改造，但豪克兰依旧有着显著优势：空中支援。因此，迈耶的飞行王牌们以及海盗都变得富裕了起来。既然没有谁的海军敢向他们开战，迈耶就做了一个简单的决定：向通过领海的一切生物收取过路费。\n\n不过现在呢？豪克兰的流氓伯爵似乎已经拥有了一切，但他还会去做什么事呢？"
 EAW_WS_YAL:0 "[Root.GetNameDefCap]——科学之光"
 EAW_WS_YAL_desc:0 "格罗弗一世在8世纪第一次统一了整个狮鹫尼亚帝国，自那时起耶鲁公国就是帝国的建制封国之一，帝国通过一个公爵统治这个附庸。由于帝国规模极大，而且耶鲁和帝都狮鹫海姆距离很近，所以公国可以专注于为帝国精英提供§G大学教育§!。公国首都坐落着§G耶鲁大学§!，它在765年建立，公国的其他城市也迅速建立了自己的教学中心。\n\n在下一个世纪里，这些大学从整个大陆招收学生。随着工业时代的技术进步，它们的威望和财富都在公国内不断扩大。然而，工业时代的到来使得土地贵族不断变的贫穷，而城市和大学花繁叶茂。耶鲁自身在其工业中心绿钞城的重要性不断弱化。\n\n878年是耶鲁命运的关键一年，公爵的家庭财政到了破产的边缘，被迫将公爵头衔出售给了耶鲁大学，让这个威望素著的机构代为统治。为了不挑起狮鹫海姆的怒火，耶鲁保持了公国贵族在名义上的统治，实际由第一位大学区长，博学的建筑师和学者§G北风·维德格雷夫§!管理。这个现代耶鲁古怪而极富魅力的国父充满远见和想象力，能设计超越时代的发明，其中有些§Y直到1007年的现在尚未成为现实§!。他将首都从耶鲁迁移到§G绿钞城§!，国家的中心，完成了自9世纪初开始的权力转移。\n\n当978年§R共和革命§!席卷了帝国的赫兹兰时，耶鲁的贵族大部分逃走，各个大学利用这一点正式公开了耶鲁统治权，建立了§G耶鲁学区§!，宣布要向狮鹫海姆争取来更多自治权。虽然各个大学训导出来很多共和派，学区本身在支持共和与支持帝国两方之间骑墙，在皇帝陛下的胜利基本确定后才归顺。\n\n1007年到来时，大学的统治已经§Y停滞§!，公民们对政府感觉陌生。帝国支离破碎，但仅仅因为对皇帝的效忠和耶鲁政府公认的统治能力才保证了越来越多，越来越贫困的下层阶级受到控制。如果耶鲁学区想要在帝国影响撤离后保持权力，并延续北风·维德格雷夫的科学理想，它需要赢得§R狮鹫民众的心§!。\n\n§Y大学区长米库什安§!，学区长议会的领袖，可能很快就需要向各校内的极端派妥协。他需要通过科技进步带来福利，通过增加政府效率来关照狮鹫平民。如果他能做到这些，可能耶鲁就能继续作为整个狮鹫大陆的学术灯塔。\n\n然而另外一些鹫想要利用科学知识推广自己的意识形态。§g加米亚大学§!认为道德是纯粹科学进步的阻碍，试图破环科研时受到的道德约束，而§C布鲁玛大学§!在这点上是他们的有力盟友。布鲁玛大学受到帝国三鹫议事会的大力支持，那里的教授们认为宗教是恢复狮鹫平民和他们统治者之间纽带的唯一方式。§R曲鲁斯法尔§!大学却认为正是狮鹫贵族对无产阶级狮鹫的统治导致了耶鲁的苦难，在曲鲁斯法尔红色的厅堂里，教授们教导学生历史进步需要消灭阶级社会的不公。\n\n随着§Y皇帝健康状况恶化§!，耶鲁需要决定性的行动。无论走哪一条道路，耶鲁都可以依靠它那许多聪明的狮鹫使学区走向繁荣。"
 EAW_WS_AVI:0 "[Root.GetNameDefCap]——新生国家"
 EAW_WS_AVI_desc:0 "§Y飞鹰家族§!，作为一个独立的政权，在历史悠久的狮鹫尼亚上还仅仅是一个新概念。数百年，可能甚至几千年来，我们当前统治家族所处的维雷尼亚平原都是其他国家的领地。这片广阔的草原上从来没有诞生过什么伟大的领主或强大的帝国，起码没有任何流传至今的记载，或者说这份记载随着§Y阿奎莱亚王国§!的东征而一并消失了。\n\n然而阿奎莱亚在塔林平原上的统治既不长久又不稳定。许多其他鹫渴望这片茂盛的草地，以及其上富裕的村镇和城市，其中最引人注目的是§Y维雷尼亚公国§!的§Y鹰巢家族§!。当然虽然那些号称§Y日和月的领主§!们相当强大，他们的力量还是比不上任何一个§Y迪斯克里家族成员§!。这种政治现状一直维持到北风之神的神选冠军§Y狮鹫岩的格罗弗一世§!崛起。这个雄心勃勃的国王渴望将所有狮鹫统一在一面旗帜下，并启动了一场伟大的远征，执行征服和统治。\n\n然而，不是所有国家都打算抵抗格罗弗，有些国家自愿加入他的队伍。其中一个追随者就是§Y阿德利娜女公爵§!统治下的维雷尼亚公国。阿德利娜是格罗弗的第一批附庸之一，而格罗弗最终成为皇帝。因此，在对阿奎莱亚的战争中，打着日和月旗帜的军队在北风之神的神像下作战。维雷尼亚军队战斗的无畏而又英勇，因此格罗弗一世把一个§G慷慨的礼物§!奖励给阿德利娜——半个维雷尼亚地区，这个礼物几乎将公国的面积增加到原来的三倍。\n\n维雷尼亚之后在帝国内部一直保持着繁荣和富裕，虽然也有一些问题——比如无法跟上其他地区的§R现代化§!步伐，以及赫兹兰和阿奎莱亚狮鹫贵族之间日益增长的敌意。即使维雷尼亚为了解决这些问题，把鹰巢家族家族的成员铺开到公国各地，也只是减轻了这些问题，有时候甚至反而把问题加重了。由于派去管理土地的家族成员本土化，产生了一个庶支家族§Y雁巢家族§!。\n\n\n这个缓慢衰退的顶点就是§R狮鹫尼亚革命§!和随后的反革命。维雷尼亚不但被§R赫兹兰共和派§!所摧毁，还被§R阿奎莱亚革命派§!所淹没。由于很多贵族，甚至包括嫡支鹰巢家族和庶支雁巢家族的成员被处决，这完全摧毁了整个国家，只留下一个年老，现已无子的统治者。有两个正统性相当的潜在继承者——§Y伊维诺斯·鹰巢§!和§Y文森特·雁巢公爵§!，继承鹫在老公爵死后都不愿意让步，承认另一个鹫的统治权，并认为刀剑在这件事上比语言更有力。§R他们彼此宣战，使公国一分为二§!。\n\n最初，似乎文森特将要胜利，他在公国内获得了更多地盘的支持，然而由于§Y卡特丽娜·江尾§!的行动他没有成功。作为两个权力继承人共同的姑姨，她不愿意参加两个好侄甥的战争，宣布她自己是新建立的§Y飞鹰家族§!的§Y女族长§!。\n\n然而这种选择起到了很大的负面效果。随着江尾统治的地区脱离了雁巢家族，使得雁巢家族的军队不能获得足够的工业和军队，血亲内战的战线僵持住了，§R血腥的战争持续了超过10年§!。更不要说这种从维雷尼亚公国仓促的脱离使得新生的飞鹰家族面临无数问题，最重要的问题之一就是§R文化和语言分裂§!以及非贵族狮鹫的反抗意识不断增长。当然这还没提到飞鹰家族危险地处在赫兹兰和阿奎莱亚之间。\n\n飞鹰家族能够挣脱封建制和语言分裂的镣铐并崛起，在即将到来的风暴中存活吗？或者它将成为一个新崛起的伟大国家历史书里的一条脚注？"
 EAW_WS_STW:0 "[Root.GetNameDefCap]——贵族与葡萄酒王国"
 EAW_WS_STW_desc:0 "§Y施塔莓公国§!位于§Y狮鹫尼亚帝国§!的北部。和其他公国一样，它是在许多小公爵和男爵间通过战争和流血而最终建立起来的。然而，造就了§Y施塔莓公国§!的并不是一位伟大英雄的远见卓识，只是一个名字已经不为鹫知的军阀，带领着一支由§Y弗羽西亚§!贵族们缺少继承权的子女所组成的贵族军队。虽然他们对这一地区的征服是成功的，因为失去了继承权的子女们，往往是骑士和伟大的战士。遗憾的是，他们缺乏足够的礼仪和文化教育，这一点在他们对新征服的领地的命名中得到了体现。这件事发生在征服结束后组织的一次盛大宴会上。当然，宴会中充满了各种酒水的消耗，包括当时著名的草莓酒。根据各种消息来源，这位军阀和他的许多最优秀的战士对这种饮料印象深刻，以至于在醉酒昏迷的一瞬间，他们决定用它来命名他们的新王国。\n\n然而，尽管有这样的起源，施塔莓并不是又一个军阀国度，例如那些强盗和掠袭者建立的“劫掠王国”。也许是幸运的巧合，这个国家似乎受到了几位成功君主的庇佑。这导致了施塔莓公国从其野蛮的起源慢慢开化，§G在北狮鹫尼亚及周边散播影响力。§!\n\n虽然格罗弗一世对大陆的征服对施塔莓公国的崛起是一个不小的挫折，但它并没有导致公国的彻底毁灭或崩溃。虽然这场大败导致施塔莓失去了一些领土，外交关系也被无情地切断，但对施塔莓公国而言，这只是开启了更多的可能性。而且§G鹰爪家族§!利用一切机会，再次在狮鹫尼亚扩大势力。他们甚至还§G设法嫁入皇室§!！这是一个很少有家族能够完成的壮举。\n\n施塔莓公国设法活过§R狮鹫尼亚共和国革命§!的方式也是独一无二的，在年轻的§Y嘉比蕾拉·鹰爪§!的领导下它不仅经受住了这场风暴，还参与了向共和党控制的赫兹兰的进攻。然而，尽管没能完全击溃共和国鹫，也没能阻止他们向北挺进，但这些事至少在政治上让这个公国比以前更强大了。\n\n从那以后，公国就成为了狮鹫尼亚帝国中§G极其重要和有影响力的一方§!。从某种程度上来说，嘉比蕾拉·鹰爪女公爵成了赫兹兰贵族利益的代表。此外，她还积极参与帝国的统治，在各种事务上辅佐她体弱多病的表兄。\n\n然而，尽管女公爵在政治上越发成功，公国却一直在受苦。§R嘉比蕾拉是一名缺席的统治者，§!她把大部分时间花在首都的宫廷阴谋而不是治理她的公国。此外，残酷的狮鹫尼亚革命的遗产仍然存在。虽然公国在政治上确实是成功的，但工业和社会方面却不一样。公国的许多贵族，他们直到今天还拥有巨大的影响力，在此处拥有大片的土地，他们坚决§R反对任何现代化§!，贵族们相信为民众提供教育，并建立一个真正的现代工业社会，可能会导致§R革命重演§!！\n\n但时代又一次发生了变化，一场风暴似乎又要来了。§R反贵族的言论正在赫兹兰蔓延§!。民众聚集在神官旗下，希望能得到神的救赎，以解决帝国面临的无数问题。随着各种运动和团体试图把帝国重新塑造成他们自己的愿景，施塔莓公国和帝国的联系正在土崩瓦解。§R皇帝一天比一天虚弱§!。随着另一场灾难的到来，这个公国将会§G继续存在并再次伟大起来§!吗？或者，它最终会§R消失在历史的长河中§!？"
 EAW_WS_VED:0 "[Root.GetNameDefCap]——一切为骑士之道"
 EAW_WS_VED_desc:0 "永远独立的§Y韦迪纳王国§!是困难岁月中屹立的灯塔。韦迪纳骑士们飞行向前，优雅而又壮丽，为高贵的目的而战。这是一个骑士与荣耀之国。对于一个韦迪纳贵族来说，荣耀总是次于做正确的事情，优良事迹和温暖的民族精神在这里随处可见。尽管看上去既稳定又强大，但是，有力的北方王国强大并超乎其邻国这件事可能只是一个欺骗性的表象。\n\n韦迪纳的独立一直是§R狮鹫尼亚帝国§!的一个伤心事，从第一位韦迪纳国王被巫师§Y湖环女巫§!授予据说能让持有人无敌的§Y布罗图里乌斯神剑§!那时就是这样。很长的一段时间里，韦迪纳都保持着独立，但在漫长的帝国支配性优势时期之后，韦迪纳最终成为了狮鹫尼亚帝国的一个名义附庸。\n\n从帝国分离后，韦迪纳王国在§G风暴翼国王§!的统治下重生。他领导了韦迪纳许多年，从头重铸了国家的骑士和贵族文化。国王深受公众欢迎和喜爱，但存在一个关键的问题。风暴翼晚婚的妻子只留下一个女儿，她至今仍然没有通过风暴翼本鹫恢复的传统试炼。如果她不能通过这些试炼，她就无权继承王位。\n\n现在风暴翼必须同他亲自恢复的那些古老传统战斗。韦迪纳传统认为，任何一个韦迪纳骑士都要完成三个伟大的任务，来证明自己适格。一个任务是通过战斗和英雄行为证明自己的勇敢，一个任务是证明自己可以延续家族血脉，还有一个任务是证明自己可以统治和管理一个国家。风暴翼之女§G舍尔德斯娃尔德公主§!能够完成全部三个高贵的任务，成为正统的王位继承者吗？或者韦迪纳自豪的传统将由于自身的自负而失败？"
 EAW_WS_BAK:0 "[Root.GetNameDefCap]——重重危机"
 EAW_WS_BAK_desc:0 "在狮鹫尼亚的东北海岸，§G巴卡拉§!(Bakara)的小马世世代代航行出海，与邻居交易，收获海洋的馈赠。巴卡拉马除了对主宰波涛感到自豪外，更是以自己的故土为荣——世界上最古老的§Y共和国§!之一，屹立着的民主与正义的灯塔。这一强大的民主传统，和对正义的不懈追求，让巴卡拉马坚决反对所有君主制、奴隶制度和独裁政权。\n\n巴卡拉没有正规军，她依赖其极富盛名的强大§Y海军§!应对国防问题。海军行使着强大的政治力量，如同陆军一般，从来不羞于采取激进措施维护自身，以及共和国的利益。巴卡拉的陆军实际上是独立运转的§Y地方民兵§!，并不遵照一般的指挥链活动。\n\n虽然巴卡拉最初热心支持§C河间同盟§!，更是组织的创始国，但最近几年，许多巴卡拉马对同盟越发不满，对意识形态的担忧已经超过了低贸易壁垒带来的经济好处。在他们看来，让§R钻石山、宁部西亚§!，和§R威腾兰§!这样暴虐的政权加入同盟，是对同盟理念的背叛。要是让暴君横行在我们自己的土地上，那对抗§R狮鹫尼亚帝国§!又有什么意义呢？\n\n将至的§Y1007年大选§!极富争议，单是竞选活动就已经出现了前所未有的§R政治暴力§!。在尝试从内部改革河间同盟的马，和希望脱离同盟，打造§Y新秩序§!的马间产生了深刻的分歧。希望事态不要超出蹄控范围，因为如果局势失控，海军可能会采取§R极端措施§!保卫共和国……"
 EAW_WS_BAR:0 "[Root.GetNameDefCap]——五巨头"
 EAW_WS_BAR_desc:0 "被诅咒之地——§R巴拉德§!。即使是它的名字，也足以让全世界的生物心生恐惧，但这并不总是如此。曾经作为§C威腾兰王国§!的一部分，巴拉德是一个富饶的省份，拥有丰富的矿产和肥沃的山谷。一切都很平静，直到一个名叫§R安布罗修斯§!的富有而显赫的小马，受到脑海中微弱§O声音§!的诱惑，对黑魔法的艺术产生了兴趣。他慢慢地建立起自己的权力和影响力，直到他终于准备好了行动。\n\n有一天，巴拉德被浓雾和风暴包裹着，视线和身体都无法逾越，没有谁知道发生了什么，直到几周之后，迷雾散去。由于威腾兰的权威大大减弱，自称安布罗修斯伯爵的他自由地统治着这块被毁的土地，那些无法逃离的小马成了他的玩物和实验对象，被困在这里。§R巴拉德疯狂伯爵§!的统治由此开始。\n\n随着时间的推移，安布罗修斯邀请志同道合的生物加入他的行列，追求知识，不附加任何道德条件。于是，来自世界各地的雄心勃勃的生物来到安布罗修斯伯爵的宫廷，渴望追求自己的目标，不受任何形式的监督。最终，有四位人物脱颖而出，与安布罗修斯本马一起组成了§R五巨头§!，成为巴拉德臣民最主要的苦难之源，也是伯爵的娱乐之源。\n\n但是，有什么东西在地表深处§O窃窃私语§!，指挥一些小马听从它的命令，并把另一些小马逼得发疯。奇怪的现象和不自然的恐怖是巴拉德的日常景象，似乎这片土地有自己的思想。五巨头会揭开神秘的面纱，还是会因为不信任和背叛而四分五裂？"
 EAW_WS_OLV:0 "[Root.GetNameDefCap]——维京之地"
 EAW_WS_OLV_desc:0 "在狮鹫尼亚的东南角落，有一个外来者的国家。在这里，古老的鹿族传统依然存在，维京鹿在海洋中航行制造恐怖，狂战士的小屋散落在陆地上。这就是§Y东鹿地伯爵领（The Jarldom of Austurland）§!，这是一个权力分散的君主政体，在那里，领主（Jarl）更像是贵族的顾问而不是领袖。\n\n§Y东鹿地的起源§!与它的政府模式息息相关，都开始于鹿族的家乡，奥伦尼亚的移民浪潮。ALB143年，奥伦尼亚贵族对君主日益集权感到厌倦，同年与小马利亚签订的和平条约被证明是压垮他们的最后一根稻草。许多贵族都依赖于劫掠小马利亚以获取§R新鲜的奴隶来源§!，因此他们决定是时候寻找更新鲜的牧场了。\n\n在最初的远征队§Y胡夫·德瑞克松（Hoef Derickson）§!的带领下，贵族们开始慢慢向西移动。沿途殖民了许多小岛。与此同时，从狮鹫尼亚和斑马里加海上航线上的突袭中获得的战利品也在不断增长。鹿对河间地事务的影响逐渐增强，很快就出现了一小群§R维京§!雇佣兵开始在这一地区活动。但是只有在湖城帝国的裂痕增长时，狮鹫尼亚才见识到了§Y维京部队的完全狂怒§!。\n\n河间地和周边地区日益不稳定导致了§Y急行者哈拉德§!，一只凶猛但强大的年轻鹿，团结了狮鹫尼亚的维京鹿们。他率领军队沿埃维河逆流而上，掠夺哥萨克狮鹫的土地。哈拉尔很快发现自己在威腾兰国王§Y海西尔二世§!的命令下卷入了与湖城的冲突。\n\n这导致了一场与大湖亲王国军队§R漫长而艰难的作战§!，但也让鹿获得了§G丰厚的奖励§!。哈拉德和他的鹿获得了狮鹫尼亚东南部边缘的土地，建立了现在被称为§Y东鹿地§!的国家。威腾兰对鹿的权威很快就减弱了，而§Y东鹿地§!也成长为一个独立的国家。\n\n由哈拉德和他的维京鹿建立的社会体系反映了其创始者的祖源，并且和奥伦尼亚早期政府很像。最顶层的是§G领主§!和其他东鹿地§G贵族§!。贵族们保持着高度的自治权，但也不情愿地接受需要更高的权力来解决争端，维持外交政策的必要性。\n\n在它们下面是§Y自由鹿（freedeer）§!，他们不应向任何贵族宣誓效忠，有权代表自己出席阿尔庭。自由鹿组成了东鹿地大部分的商鹿，牧师和维京，是这个国家少数的现代化力量。\n\n在自由鹿的下面是叫作§O平民鹿（commondeer）§!的农奴，被束缚在他们所服务的贵族们的土地上。他们是东鹿地的大部分农民和蹄工业者。他们经常作为贵族之间冲突中的征召兵，许多鹿转而从事盗匪活动以逃避他们的条件。\n\n但是，与社会阶梯的最底层相比，平民享有丰富的权利。那些§R奴隶（thralls）§!是他们贵族所有者的财产，在他们下面过着悲惨的生活。大多数奴隶是在维京的掠夺中被从他们自己的祖国掠走的，他们忍受着高强度的体力劳动，维护着东鹿地贵族的大量庄园。\n\n东鹿地一直以维护鹿的传统方式而自豪，但随着狮鹫尼亚大陆陷入混乱，这些一成不变的传统正威胁着东鹿地走向坟墓。但是一个新领主的到来为东鹿地的内部变革提供了一个独特的机会。关于§Y伊格莉特领主（Jarl Yigrittes）§!过往经历有很多流言。有些说她§C起源于贵族§!，有些说她是个§R狂暴的狂战士§!。但是有一点是清楚的，未来的数年将塑造东鹿地的未来，不管结果是更好或者更糟。"
 EAW_WS_GRY:0 "格里菲亚军团 - 大草原之主"
 EAW_WS_GRY_desc:0 "几个世纪前，反抗湖城公国入侵者的起义造就了扎菲亚，这里的狮鹫一代一代按照先辈的方式生活，对他们的邻居发动闪电般的劫掠以增长自己的财富。在遥远的过去，他们有过一个王国，但平原上凶暴的§Y哥萨克§!坚持反对国王的任何中央集权措施。最终在579年，第一位扎菲亚的盖特曼（即将军）博尔若涅茨夺取了权力并终结了王国。一个世纪多过去后，扎菲亚狮鹫改名为§Y格里菲亚军团§!，这是作为对狮鹫尼亚帝国的格罗弗一世皇帝效忠誓言的一部分，从此格里菲亚转变为皇帝的忠诚边疆军区。格里菲亚军团的名字甚至在帝国崩溃后仍然保留，尽管他们已经事实上独立。\n\n在1007年，扎菲亚狮鹫来到了历史的关键点。卡拉斯·布尔巴盖特曼，过去40年来的主要稳定性力量，已经衰老，虽然他还是精力充沛。古老的半封建制正朽坏的咯吱作响，农民们逐渐对绑定在领主的土地上不满，道德分歧将国家分裂。最紧迫的是，军团的财富正在§R耗尽§!。由普里文革命者发起和帮助的§R共产主义革命§!更是令困境倍增。尽管革命者现在还无力推翻盖特曼国，他们在乡下，甚至在军队中有很多支持者。如果§Y最近将要发起的掠夺行动失败§!，那么国内不满就很可能提升，使得革命者夺取权力。\n\n就算这些都没有发生，已经年老，不太可能再活很久。狮鹫们已经开始讨论继承问题。目前两个最有潜力的继承鹫一个是§Y博拉德·鹫尼茨基§!，他的§Y军团党§!由于他的雄辩技巧和个鹫魅力而增强，另一个候选鹫是§Y埃夫根·克拉夫莱茨§!，他虽然和巴布尔盖特曼有血缘关系，却广泛因为他的任鹫唯亲和暴力倾向受到公众厌恶。\n\n只有时间能告诉我们河畔狮鹫们的命运……"
 EAW_WS_SIC:0 "[Root.GetNameDefCap]——狮鹫尼亚的古典共和国"
 EAW_WS_SIC_desc:0 "自由和繁荣的§Y西卡梅翁§!（Sicameon）坐落在温暖肥沃的马科莫半岛上，高耸的阿拉诺山脉后方。这个狮鹫创建的§Y古老共和国§!与帝国本身一样古老，以海上女神西凯西娅（Sycaecia）命名，长期以来坚定地反对§R封建制和君主制§!。这个教区联盟由熟练的手工艺术家、卑微但有生产力的农民、精明的企业家和无畏的海员组成，他们全心全意地维护自己的自由和繁荣。尽管§Y狮鹫尼亚共和国§!可能有成为大陆上的共和国的雄心壮志，但众所周知，§Y西卡梅翁联合教区§!是§Y狮鹫尼亚民主的先驱§!。\n\n该联盟成立于773年，当时年迈的§Y皇帝格罗弗一世§!派遣一支小型军队测试西卡梅翁的防御能力。这些教区团结起来，击退了侵略者，组成了一个松散的国家，以便更有效地面对来自北方的未来威胁。但是当§R格罗弗二世§!于799年出动§Y帝国军队§!，发动全力进攻时，他们几乎无能为力。联邦被解体，并成立了§R大公国§!。但是，抵抗仍然存在，而且从未停止。当格罗弗二世于854年去世时，一场§R激进的大起义§!迫使格罗弗三世赋予他们自治权、并废除了大公国。773年的§G《联邦宪章》§!重新生效——尽管做出了许多改变。这些修正扩大了紧急时的裁量权，并使西卡梅翁成为一个更加好战的国家。当邪恶的帝国最终§G崩解§!时，西卡梅翁协助了星空群岛上的§G牛头怪革命军§!，最后牛头怪们建立了新的共和国。\n\n但是，随着新的千年到来，西卡梅翁的狮鹫们敏锐地意识到了§R翼巴第和普里文§!的混乱以及它们可能带来的威胁。虽说如此，西卡梅翁的宪法使国家政府和军事力量的行动§R受到了极大的限制§!。为了继续捍卫西卡梅翁狮鹫的自由和独立性，他们必须相信：更加集体化和更有权力的政府是有帮助的，然后决定如何最好地利用这一新工具。他们会继续沿袭着§Y高垒深沟、排斥外务§!的古老传统吗？还是会走向激进，响应国内§Y用武力干涉外界并向邻居报仇的呼声吗§!？还是……§Y会找到新的道路§!？无论是出于正义目的还是出于可怕的意图，过于强大的政府机构都可能甚至撕裂最团结的国家。\n\n接着，在西卡梅翁港口的繁荣背后，还存在着另一种威胁。作为一个富裕的贸易国，会吸引§R盗贼和犯罪分子§!。西卡梅翁具有§G悠久的海军传统§!来抵御这些海盗，他们也因此坚决反对各种形式的奴隶和盗匪行为……§R诸如北方的匪徒、斑马奴隶贩子、南方的海盗§!等等。但面对绝望和混乱，即使是最有德性的生物也容易受到腐败的影响——这也是因目睹了国内的所谓§Y自由海盗§!（Freeholder Corsairs）于恐惧和紧张气氛中崛起所引发的反思。\n\n然而，尽管在国外和国家内部都存在分歧，西卡梅翁仍然有足够的机会挤身强国之列而发展茁壮。它没有不幸的邻居遭受的经济灾难、饥荒和知识分子外流的问题。在这个崭新的现代，西卡梅翁只能在为时已晚之前抓住机会，试着发挥其真正的力量，否则时代不断的演进，西卡梅翁没多少时间犹豫了。"
 EAW_WS_CYA:0 "[Root.GetNameDefCap]——愿她能名符其实"
 EAW_WS_CYA_desc:0 "§C蓝百合伯国§!统治的这块土地曾经是§R星空王国§!的一部分，也就是他们在狮鹫尼亚本土上的4个州，也很自然，居民几乎都是牛头怪。但，牛头怪对此地的统治随着§Y格罗弗一世皇帝§!的到来而结束。\n\n在747年，他率领一支强大的军队横越了爬行者山脉，入侵了东部狮鹫建立的公国，当牛头怪抗议并要求他将山脉退还给他们时，他用自己的军队轻易地粉碎了牛头怪的军队。但是他没有舰队来入侵他们的岛屿，因此签署了和平条约。可悲的牛头怪失去了所有在大陆上的领土。那片领土已然成为了§Y帝国§!的一部分。\n\n这个新成立的伯爵领交由新封的§C沼骨家族§!（Sumpfkiel dynasty）统治，而现名萨尔玛克的州被割让给§Y布罗德费尔德公国§!。狮鹫贵族被赋予了控制牛头怪民众的职责，确保§R格罗弗二世皇帝§!的附庸星空王国的忠诚，并以皇帝的名义维护该地区的秩序。在§Y格罗弗三世皇帝§!统治期间，他们还承担了另一项任务：狮鹫化。成千上万的移民从整个帝国各地涌入——主要是来自赫兹兰。牛头怪被剥夺了权利，旧的古迹被拆除，为新的建筑物腾出了空间。然而，这些愚蠢的蛮族拒绝拥抱文明，甚至开始反抗，他们发动了一场§R游击战争§!，持续到了今天。\n\n978年，情况更加恶化了，§R革命和动荡§!席卷整个帝国，蓝百合伯爵领发现自己被困在一个敌对的土地上，星空王国被推翻并成为独立的共和国，发动了复仇之战。但是，伯爵领撑住了，击退了牛头怪，阻止了蛮族入侵。然而，随着牛头怪的重新崛起，他们不断地煽动他们海湾另一头的同胞，恰巧在这时，乡村也陷入混乱、全国动荡不安。女伯爵§C低尾·沼骨§!（Taillow Sumpfkiel）迅速的作出反应，宣布实行戒严、建立了军事政府。同时间，东方的§Y布罗德费尔德王国§!也在1003年陷入了内战的泥淖中。蓝百合伯国别无选择，只能进行干预，抢先夺取§Y萨尔玛克§!，好阻止牛头怪试图夺回土地。\n\n如今，她继续统治着这个不稳定的伯国，随着星空共和国再次为战争做起准备，她的未来仍然不确定。一部分的她对自己不愉快的职责不感兴趣，但在忠实的军队支持下，她仍继续执政。但是，军队可能不像她想像的那样忠诚，密谋的传言甚嚣尘上。当心阴影中的§R二十代表团§!（Group of Twenty）……"
 EAW_WS_GRU:0 "[Root.GetNameDefCap]——自由之港"
 EAW_WS_GRU_desc:0 "许多世纪以前，狮鹫第一次出现在格里富斯阳光明媚的海湾和幽暗的森林里。他们中的许多与北方的§Y哥萨克狮鹫§!有亲缘关系，像他们一样，他们热爱自由和独立。事实上，他们居住的土地很快就变成了自由的港湾，吸引了许多来自国外的商鹫和移民。没有严格的法治，没有中央权威，没有秩序。对于一部分狮鹫来说这是犯罪的混乱，而对于其他狮鹫来说这是最纯粹的自由。\n\n§R狮鹫尼亚帝国§!最终结束了这一切。\n\n747年，§Y皇帝格罗弗一世§!与他庞大的军队越过爬行者山脉，并且征服了§Y埃维河§!以西的许多国家，但没过多久东边的国家也加入了他的统治。北方的哥萨克成为了帝国的军队，而格里富斯商业城邦很快意识到他们以前的贸易伙伴现在已经是帝国的一部分了。尽管如此，这些小城邦仍然保持彼此独立，忙于相互争斗，无法团结在一起。810年，当§R皇帝格罗弗二世§!在河间地带开始东征时，证明了这种消极态度是危险的。他粉碎了西边的西卡梅翁，又征服了西边的星空共和国，这意味着格里富斯被包围了，它的海上航线被强大的§Y帝国海军§!控制着。当格罗弗二世到来时，各城邦一个接一个地跪倒在他们的新霸主面前，因为分歧太大而无法团结抵抗。他们被迫为帝国军队提供后勤补给，因为当时帝国正在讨伐东边的小马们。后来，格罗弗二世在他们的土地上建立了§R猊鹫骑士团§!，以保卫帝国的南部边界。\n\n在格罗弗二世战死之后，§Y皇帝格罗弗三世§!在他的领土内维持了安定和平。这让格里富斯再次繁荣起来，因为他们现在可以在帝国内部自由贸易。在这段时间的西卡梅翁的§Y南方陆洲公司§!从皇帝那里得到了一份特许状，获得了南部海域的商业专有权，并在格里富斯内部变得非常有影响力。更多的移民从西卡梅翁来到这里，进一步加剧了这个国家的§R文化差异§!。\n\n在帝国978年的崩溃中，这些城邦失去了宗主，他们抓住机会重获失去已久的自由。然而，这一次，城邦将统一在一个旗帜下，形成一个统一的国家：由选举产生的§Y议会§!所领导的现代格里富斯诞生了。但帝国统治的后果依然存在。激进的§R猊鹫骑士团§!希望继续对小马蛮子们发起攻击而§R贸易公司§!不断积累更多的权力和财富。显然，如果格里富斯希望变回自由、和平和繁荣的土地，这些问题必须得到解决。"
 EAW_WS_MIT:0 "[Root.GetNameDefCap]——自由牛头怪群岛"
 EAW_WS_MIT_desc:0 "1470年前，7艘帆布破裂的船只从一块叫做克诺索斯（Knosos）的地区启航（也就是现在的§Y宁部西亚§!），领袖是一名名叫§C群星§!（Aster，希腊语：αστηρ，星星）的牛头怪。牛头怪的起源是来自于母牛王后和神所派来的奇怪生物结合后所生出的不洁生命。至少传说是这样说的。尽管他们的出身隐藏于神话和传说之中，但他们离开家园的原因却很明确：§R外国小马君主§!施加暴政，他们夺走了土地，但对于居民面临的困境毫不关心。抵达§C星空群岛§!（Asterion，希腊语：Ἀστερίων，星空）之后，舰队四散各处建立了殖民地，除了有4个位于狮鹫尼亚本土之上之外，其他的散布在周边海域各大小不一的岛屿之上。总计多达21个殖民地共同组成了一个§C联邦§!，以民主方式解决任何内部和外部争端。这种制度持续了数百年，直到一个野心勃勃的政治家自封为§R王§!为止。之后的历史告诉我们，新生的王国固然比之前的民主政体长寿，但几乎总是空有王国之名而已。王令不被遵守是司空见惯的事情，星空王国的公民甚至公然表达对自由的渴望以及反抗僭主的决心。不过，这种情况在狮鹫尼亚帝国攻击之后，不复存在。\n\n当§Y皇帝格罗弗一世§!于747年入侵东狮鹫尼亚各公国时，公国本来以为他会从山南或山北的道路打来所以放松了侧翼的防备，但他透过有名的§G爬行者山脉行军§!绕过他们的防线，猝不及防的各个公国很快就纷纷臣服。公国的抵抗被瓦解了，星空王国却向这位胜利者发出了抗议，他们主张山脉是王国的领土，皇帝不该直接据为己有并拒绝归还。当皇帝听说了牛头怪的要求之后，他的回应却很严酷：他§R歼灭§!了星空陆军并§R并吞了大陆上的星空领土§!；后来这里被称作§R蓝百合伯国§!。但是，因为他没有舰队，他无法入侵星空王国，两国便宣布停战。王权现在受到了决定性的削弱，乃至于799年§R皇帝格罗弗二世§!为了确保他针对东方小马发起的圣战的补给线，并给南方王国上一堂名叫谦卑的课，他悍然的先入侵了星空王国时，王国几乎毫无抵抗。§Y帝国海军§!封锁了群岛并送上了大量的登陆部队，而国王在甫一交战便即§R投降§!。\n\n从那时起，这块土地进入了黑暗时代，当地原住民被迫屈服于§R帝国统治§!之下。民主被禁止了，牛头怪在他们自己的土地之上被视为次等公民，他们本地的宗教也被禁止，诸如实物崇拜等等的信仰被强制替换成帝国的多神信仰。当帝国被§G革命§!冲垮之时，在§G西卡梅翁§!和§G鹦鹉维亚§!的慷慨支持之下，星空牛头怪组织了一支军队，推翻了统治他们的傀儡政府，史称§C光复战争§!。他们成功地解放了群岛，随后成立的政府是建立在法治而非君主统治基础上的代议制民主国家。但革命无法传播到本土之上，很快的，这个事实很快的成为了普遍的认知。接下来的28年，主要的大事就是组建一支海陆大军，并计划§G夺回本土各州§!。但这可不是一帆风顺，在小马利亚纪元1007年的当下，政府陷入了政治当局之中。星空共和国现在发现他们被撕裂成两块：由§R民族主义者和共产主义者组成的联盟§!通过提倡改变现状的激进政策而大受欢迎。外界认为这将会导致内战，但他们对星空共和国的关键精神缺乏认知：他们非常害怕狮鹫的扩张主义。他们互相克制，只因他们认知到一旦内战爆发，牛头怪开始自相残杀之时，外国势力会再次入侵并奴役他们。即使意见分歧，仍有2件事情是他们的共识：§C“夺回本土！”§!、§R“终结帝国主义！”§!"
 EAW_WS_MAN:0 "马哈顿保护领——小马利亚东海岸"
 EAW_WS_MAN_desc:0 "§C马哈顿§!大都会在整个世纪里被赋予了许多头衔：三区城；大苹果；帝国之城；§Y世界之都§!(Caput Mundi)。\n\n在§Y大战§!之前，马哈顿及其卫星郡§C哈斯逊§!和§C布朗克林§!占全小马利亚生产总值§G四分之一§!以上。其经济，政治，文化影响力足以与坎特洛特分庭抗礼，毫无疑问，这座不夜之城是§Y小马利亚皇冠上的明珠§!。\n\n如今，§G幻形灵的铁蹄§!横行在全马奎斯上，§R邪茧女王§!的胜利之师踏入饱经战火的小马利亚城市，这一切都象征着§R邪茧治世§!的到来。§G幻形灵霸权§!统治着整个大洲，它的§Y保护领§!从废墟之中建起，§R女护民官§!用她的鹰眼注视着她的领疆。马哈顿因战争而满目疮痍，但在§Y总督§!的指导下，毫无疑问它将收回它失去的一切，再次崛起为全§G霸权§!的§C耀眼都会§!。\n\n§Y小马利亚东海岸§!的§C小马§!有他们自己的意愿，在南到§C吠城§!，西至§C林荫镇§!，北及§C阿尔比昂§!和§C谢韦良纳§!的大片领土上，§Y幻形灵驻军§!力量不足，无法完成军管整个东海岸的任务。于是在整个保护领，§R谐律抵抗军§!企图推翻幻形灵统治者，实现马奎斯的小马们§Y自由§!与§Y解放§!的理想。\n\n§C星光熠熠§!和§C崔克茜·鲁拉之月§!，§Y暮光闪闪公主§!的老战友，两位强大的独角兽。正站在动荡时代潮流的最前沿。魅力非凡，机巧聪慧，能力超群的§R革命组合§!，她们无形的蹄印制造出的危机已经围攻了§G幻形灵政府§!，让其身陷囹圄。被渴望§R复仇§!的民众团团围困，§G紫丁香总督§!不得不动用她所有的智慧来保护她的新生政权渡过§R小马利亚灭亡§!的战后余震。"
 EAW_WS_ELF:0 "[Root.GetNameDefCap]——大起义"
 EAW_WS_ELF_desc:0 "在小马利亚，从苹果鲁萨到温蹄华，一个§Y革命的呼唤§!召唤那些仍然反抗§R幻形灵暴君§!的小马！在§C小马利亚解放阵线§!的旗帜下，形形色色的异见者与理论家们站在一起，无论是左翼还是右翼，都放弃了一度困扰他们的意识形态上的吹毛求疵和内部的勾心斗角。如今他们团结在一起，共同梦想着建立一个§G自由的小马利亚§!。\n\n从嘶大林格勒到新马尔兰，无论是属于§Y三个部族§!或者是夜骐、狮鹫、骏鹰，这些勇敢的解放阵线战士已经从世界各地汇聚到§Y小马利亚东海岸§!的平原上。他们同从黑暗中崛起的§G谐律抵抗§!一起，拿起武器来参加这§Y自由的抗争§!。对自由的渴望一直燃烧在生活在幻形灵铁蹄下的小马们的心中，现在一场燎原的烈火已经从那些火星中爆发了，它将从小马利亚的美丽土地上移除邪茧女王的玷污！\n\n站在这次起义的最前线的不是不朽的天角兽公主，也不是小马镇著名的英雄，而是§C星光熠熠§!和§C崔克茜·鲁拉之月§!——现在她们是革命的女领袖，是陷落的公主统制的继承者。这次起义并非源于她们的空想，而是源于小马们的牺牲，它们在反抗侵略者的团结斗争中流血牺牲；正是这些无名英雄的鲜血、眼泪和汗水，才像胶水一样，把这§Y新生革命§!的各个组成部分粘合在一起。\n\n在这场或许是小马利亚最终抗争的黎明，小马们在太阳和月亮的旗帜下集合——小马利亚的两个象征§Y结合§!在一起，保卫它的剑修饰着日月的侧翼，这可能是§Y小马摇篮§!的重生，或者是最后的呼喊！"
 EAW_WS_GAZ:0 "[Root.GetNameDefCap]－永存之国"
 EAW_WS_GAZ_desc:0 "逐月后二世纪的某个时候，在逆麟军阀的强大武力迫使之下，一群麒里亚的神秘主义者被驱逐出了本来居住的修道院，逃入了朱京盆地周边的山脉地区之中。麒里亚这块饱受战争、饥荒和混乱蹂躏的大地，还要等到几个世纪之后，才会在§O离罗之道§!的影响之下被团结起来。\n\n这群麒麟神秘主义者逃出了陷入战乱的麒里亚，在荒野中长途跋涉、前往环绕麒里亚北部边境的山脉、踏入险厄峰、沿着北方山脉的山脊方向前进，最后，他们到达了这块后来被称为§Y东保§!的土地上。对于这些饱受摧残、疲惫不堪的麒麟来说，在结束了漫长而艰辛的流亡之旅后，东保郁郁葱葱的山谷和青翠的平原就像天堂一样，丝毫不见昔日家园的战争和破坏景象。\n\n很快，越来越多同样受到冲突和斗争影响而流离失所的麒麟也纷纷前往此地，加入他们同胞的行列。随着这些移民数量增加，他们和东保的骆马原住民之间产生了摩擦。原先，这些骆马原住民还能够容忍他们，但渐渐地，他们越来越害怕这些麒麟入侵者对他们生活方式造成的影响。若非§C永燃圣教§!（Canon of the Eternal Kindling）的创始之母§CThiri Tranquilil Breeze§!居中协调，作为一个宁静和富足的田园之地的东保恐将不复存在。\n\n时至今日，Thiri Tranquilil Breeze究竟是骆马还是麒麟已然无从考证。关于她真实身分的讯息相当稀少，显见当时的群众曾齐心协力地将§Y创始之母§!的种族资讯从历史记录中抹去，她的名字也无从判断是她的本名还是别名，也无法判断是东保还是麒麟的命名形式。四世纪时，她创立了§C永燃圣教§!，其核心是§Y永久平衡§!的理想，以及实践和维持这种理想的方法。而东保，这个由两个种族所组成的国家，被证明是这一信条付诸实践后的典范，国家处处都可见到平衡与对称思想带来的影响。圣教在骆马和麒麟大众之中快速传播，也成了东保全民的共同信仰，将整个国家牢牢地团结在一起。\n\n在圣教的指引之下，东保成了一个安定祥和的国度。在环绕边界的山脉保护之下，即使在技术方面相对停滞不前，但在和平与繁荣的农业支撑之下，这片与世隔绝的土地仍能发展茁壮。随着居民数量不断增长以及技术的缓慢发展，社会形式日益复杂，这都让成立某种形式中央政府的呼声日益高涨。852年，作为对现代化浪潮的妥协，由一群圣教中最资深的神学家和哲学家组成的§Y暴雨密会§!（Temporal Conclave）成立了。东保的政权后来以§Y永恒天命§!（Eternal Mandate）的名称广为外界所知，而其实质首都暴雨密会则设在一支小型的河船舰队之上，带着整个追随着船队的移动团队在§YSahajart河§!的上下游不断移动——简单来说，这是一个水陆两栖的游荡之都，它的位置处于不断变化的状态，因此，作为东保的政治权力中枢，密会永远不会停滞在某处，从而破坏这片土地上的权力平衡。\n\n东保在地缘政治上的价值不大，但只要永恒使命继续在与§R进步§!和§R熵§!这两种力量的永恒拉锯战中占据上风，东保很可能能在新的千年这已迫在眉睫的动荡中，保持传统的生活形式完好无损地克服以工业化、战争和危机等表现形式显现的种种危机。"
 EAW_WS_CTL:0 "[Root.GetNameDefCap]－冲突和妥协"
 EAW_WS_CTL_desc:0 "像金笃次大陆上的许多国家一样，§C坻花领主国§!主要由奥伦尼亚入侵者和金笃奴隶所组成，这种先天的二元对立成了国内永恒的问题。§G公元434年§!，来自奥伦尼亚的§Y克诺夫和艾沃尔§!兄弟成功于次大陆登陆，他们是第一个真正在当时四分五裂的金笃诸国间建立自己领土的征服者，其目的是用神圣的§C“鹿之律法”§!支配金笃的所有山脉、丛林和平原。虽然§Y克诺夫§!§R丧生§!于§Y鹿钵尔§!内的一个峡谷中，但他的兄弟并未因此停止他的征途。最后，上千里格（League，1里格约为5km）的土地成了从奥伦尼亚远道而来的残暴指挥官们与抛弃祖国头衔的贵族们的私有领地。\n\n而坻花独立的种子正是由这些维京指挥官之一的§Y本延一世·鸠提邻§!所播下。他透过逐步侵蚀海王权力的方式缓慢而稳定地加强了自己的权力。海王的统治中心与私有领地设在§C新麋鹿岛§!之上，而鸠提邻则选择在大海对面的§C奥斯特克兰比§!建立一个平起平坐的权力中枢，很快，鸠提邻的话语权就凌驾于其合法封君的政令。\n\n§G公元981年§!，艾沃尔家族的最后一位海王§Y苏布登贝格§!率领舰队南下，准备重新征服奥斯特克兰比，向坻花证明他对金笃拥有比鸠提邻更稳固且正当的统治权。但命运却并未站在他这边。§Y本延四世·鸠提邻§!的弟弟，年轻的元帅§Y亚科布·鸠提邻§!发起了一次成功的海上攻势，迫使§Y苏布登贝格§!在危险的风暴天候中撤军。此后，就没有任何关于这位海王的消息了。王国独立性得到了保障之后，§Y本延四世和“灰衣”亚科布§!开始全力将坻花改造为工业化霸权。\n\n这支霸权建立在一个绝对主义制度的框架内，由§Y本延·达维尔坦嫩§!和他的皇家制造业与电子业公司（RMEC）内无情而高效的官僚来管理，逐步地将本延四世的远大计划变为现实。经济转型不仅相当残酷，而且受到奥伦尼亚—金笃贵族阶级的监管，这个阶级打算整合南方叛乱的原住民，并致力于压制土著鹿为反抗维京统治而发起的所谓“伟大斗争”。\n\n§Y本延四世§!§R去世§!后，他好战的维京儿子§Y阿托§!继任，但没能阻止异议的浪潮。在南方，叛军在陀利邦联的支持下公然起兵造反。虽然§Y阿托§!采用了激进政策来应对这场内战，但他却成了自己政策的受害者，于1001年时被南方的一个叛军领袖所§R杀§!。本延四世的次子，以软弱闻名的总管§Y本延五世·鸠提邻§!成了继任的统治者。他试图继续推进他父亲的工业化和现代化改革，同时对金笃原住民采取更加温和的政策。他组建了一个名为§C七鹿议事会§!的谘询机构，由他、§R三位金笃本土鹿§!和§G三位奥伦尼亚鹿§!组成，议会中包含了从愤世嫉俗的贵族转变为改革者的§Y伊瓦尔·霍弗肖尔姆§!、不知疲倦的战斗祭司§Y菩参·瞿罗陀§!以及如§Y本延·达维尔坦嫩和“灰衣”亚科布§!这样的老面孔。如今，议会已脱离本延最初的谐律理想，转变为一个§R充斥着政治冲突和宫廷阴谋§!的乱局，如果不做出重大的牺牲，领主可能无法驾驭这个局面，他的统治也可能会§R步上他哥哥的后尘§!。"
 EAW_WS_NCR:0 "[Root.GetNameDefCap]——他世巨熊"
 EAW_WS_NCR_desc:0 "战争，战争从未改变。\n\n在2270年，拾荒者们在内华达山脉下偶然发现了一个被遗忘已久的墓穴，其中正是一扇通往另一个世界的大门，一扇通往没有被毁灭地球原子火焰所波及到的世界。这扇天堂之门的消息很快就传开了，§Y新加尼福尼亚共和国§!§Y总统温迪尔·彼德森§!当即下令派遣一支远征军穿越过去。\n\n他们发现了一个新的世界：一个没有毒素与辐射的世界。社区很快就建立起来，探索者们勘探着更多的土地，但很快他们就发现，在这个新世界中，他们并不孤单。\n\n这片土地是一种名为§Y小马§!的四足智慧生物的家园，就如地球古代对某种生物的描述相同。两国起初和平，但贸易的尝试却一直停滞不前——小马们没有什么特别的需要，他们有着充足的食物、水、药品以及自然资源。的确，他们乐意为远征军免费提供补给，甚至教授他们如何耕作，但NCR所能提供的货物却几乎没法满足与小马进行大规模贸易。\n\n对资源的渴望以及缺乏贸易往来让彼德森政府越来越相信面前只有一条路可走：对这个奇怪的新世界进行全面殖民与整合。NCR的军队走得越远，他们遭遇的抵抗就越多。不久，双方就爆发了小冲突，一种怪异的僵局也就此形成。随着公元2273年，即ALB1005年的§Y《天马维加斯条约》§!的签订，NCR与§Y小马利亚§!的边界保持在了目前的位置并且得到了双方的一致承认。小马们也从此作为NCR的正式公民得到了自由、平等的待遇。最终，两国还签署了贸易协定，使得NCR也获得了急需的物资。\n\n现在，在§Y总督詹姆森上校§!的领导下，§Y新加尼福尼亚远征军§!作为NCR最宝贵的资产正蓬勃发展。是啊，安全，稳定，对于地球上苦难的NCR居民来说，这里简直就是天堂。\n\n但哪怕是这个世界也不能免于战争。世界超级大国之间的紧张态势正在升级，欲望之间的争斗再次回到了世界。NCR很快就会发现自己面对的不再是山地中的强盗或是掠夺者，而是200年来人们从未见过的工业与军事力量。只有时间才能证明一切，毕竟，战争，战争从未改变。"
 EAW_WS_FRN:0 "[Root.GetNameDefCap]——两王国之间"
 EAW_WS_FRN_desc:0 "§C弗朗齐斯特里亚§!作为一个国家的历史，由其建立者，§Y弗朗齐斯·马特翼一世§!的征服开始。他是一个§Y迪斯克里王朝§!的私生子，塔林伯爵的亲戚。他没有什么头衔可以继承，于是就决定自己创造一个。他穿过东方的山丘，在这里建设起了属于自己的国度。他将翼巴第的旧贸易城镇普尔西诺作为自己的首都，将其改名为§C弗朗齐斯特里亚§!，也就是他自己国家的名字。\n\n在那之后，马特翼家族那些骄傲自大的骑士统治者们保卫这片土地免受外部侵犯，并且将领土向东方与北方拓展，而后与§Y翼巴第王国§!逐步建立了相对友好的关系。两国统治家族之间多个世代的联姻维持了它们之间的和平。当§R狮鹫尼亚帝国§!于705年入侵时，两国并肩作战，但是还是没能阻挡强大的§Y格罗弗一世皇帝§!。弗朗齐斯三世伯爵宣誓效忠，在数个世纪内都保持了忠诚。\n\n与翼巴第的紧密联系就意味着当其§Y国王甘贝托§!被刺杀，帝国贵族受到谴责而翼巴第自身脱离帝国的时候，弗朗齐斯特里亚也做出了相同的举动。为了确保刚获得的独立得以长存，弗朗齐斯八世伯爵加入了§Y卡廷公约§!，这个选择的错误性日后会慢慢体现出来，但是在当时，它向弗朗齐斯特里亚提供了强大的保护。在§Y塔林伯国§!于980年陷于§R阿奎莱亚革命党§!之爪时，弗朗齐斯八世得以安全地声索这一头衔，驱赶了革命党并且保有了这片土地。当985年迪斯克里重新掌权，要求归还土地的时候，弗朗齐斯只是提醒他们，他在南方有强大的盟友。前者便退缩了。\n\n在那年的稍晚些时候，§R隼尔科战争§!爆发了。作为对其保护的回报，弗朗齐斯遵守约定帮助翼巴第，加入战争。对他来说结果相当糟糕：他在像祖先一样领军作战时在前线阵亡。但是他没有活着的子嗣，继承者是他的表弟乔斯·德波利诺，他成为了§C弗朗齐斯九世§!。和之前的伯爵不同，他从未准备好去当这个角色，因此也没有接受过那彰显着马特翼家族荣耀的格斗训练。事实上，他在兄弟中排行第三，没有获得什么照顾，而是饱受欺凌。因此，他和他所有的祖辈完全不同。\n\n这个被隼尔科战争的恐怖所吓倒的，犹豫且害羞的伯爵，现在必须领导一个被战火摧残、满身疮痍的国家。而西方即将爆发二次革命，塔林正在怒吼，战争老兵正在索要赔偿，贵族们在要求权力，翼巴第也陷入了危机。弗朗齐斯若想保住他的头衔——以及他的头颅，则必须通过一场火焰的试炼。"
 EAW_WS_TAL:0 "[Root.GetNameDefCap]——山峰与牧场之地"
 EAW_WS_TAL_desc:0 "古老的§G塔卢兹§!（Talouse）位于狮鹫尼亚南部，被夹在大国§Y阿奎莱亚§!王国和§Y翼巴第§!王国之间，是个有着丰富历史和自然美景的地方。塔卢兹的地理环境相当有利，既有许多适合农业的平原，还有能通往西部海湾的贸易路线，更重要的是，高耸的山脉成了塔卢兹在面对外敌入侵时得以倚仗的坚强屏障。\n\n考古学证据表明，狮鹫定居于现在塔卢兹所在地的时间约为公元前1000年。第一批居民分属几十个名字早已湮没于历史中的部落。§C阿布鲁诺戈斯§!的征服让塔卢兹于公元前620年进入了信史时代。阿布鲁诺戈斯将此地赏给了他的姪子§C马可·塔隆斯塔§!（Marco Talonostra），并责成他负责维持秩序和代替他统治当地。继之以征服的是移民潮，大量的斯帕雷托居民迁入此地，渐渐取代了原住民。塔隆斯塔建立并将统治中心定在了§Y塔隆纳特§!城（Talononte），最后这片土地也以统治者之名，被命名为了§G塔隆西亚§!（Talonsia）。\n\n阿布鲁诺戈斯死后，塔隆斯塔巩固了权力并自立为塔隆西亚的国王。由于资源和兵力有限，为了抵御阿布鲁诺戈斯死亡之后新生的各国入侵，塔隆斯塔不得不在边界兴建一连串的山地堡垒，依托着防线来保卫他的小王国。这些新生的国家之中，最强的莫过于§R卡廷§!王国了。卡廷王国于公元前566年开始对前帝国的南部领土发起了一系列的征服行动。而后，新生的§R卡廷帝国§!对塔隆西亚发动了三次入侵，但每次都无法突破塔隆西亚坚实的山地堡垒防线。\n\n虽然打了不少胜仗，但这些冲突仍旧将塔隆西亚的巨大财富消耗殆尽。于是于公元535年，塔隆西亚同意成为卡廷帝国的戍卫国。随后的和平时期是塔隆西亚的繁荣时期——即使他们的帝国宗主随后陷入停滞，不断衰弱，最终于公元前453年被§Y翼巴第民族§!给踏平。塔隆西亚迅速宣布独立，并开始受到蛮族入侵者的攻击，但塔隆西亚坚不可摧的防御工事再次让入侵者铩羽而归。随后，翼巴第民族逐渐凝聚起来，形成了一个松散的封建国家，而此时的塔隆西亚仍旧能够凭着坚固的堡垒防线维持独立，丝毫不愧于阿布鲁诺戈斯亲自赐予塔隆斯塔的称号§G“南境守护者”§!（Warden of the South）。\n\n在整个公元前2世纪，虽然军队仍然效忠于塔隆斯塔家族，但地方领主逐渐靠着坚固的堡垒巩固自己的权力，塔隆西亚的中央集权开始松动，控制力不断流失。公元前34年§C塔隆西亚国王马鲁斯§!被暗杀后敲响了塔隆西亚的丧钟，从此以后，这个只在名义上统治诸侯的王国终于不复存在。接踵而至的是一场残酷的继承战争，一个小领主夺取了首都并自称为§C塔隆纳特公爵§!。\n\n公元2世纪时，§Y阿奎莱亚王国§!建国，并导致了西部海湾贸易的急剧增长，此地区也因而大大受益。贸易也加速了塔隆西亚和翼巴第的交流，随着时间的推移，§G塔卢兹§!这个翼巴第式的名字逐渐取代了塔隆西亚这个旧名。到3世纪末，一个强大的塔卢斯文化已然成形，特点是对阿布鲁诺戈斯的崇拜和典型的翼巴第传统。但在政治上，此地一直处于分裂状态，要一直到602年，§C塔隆西亚公爵乔瓦尼一世§!在§C纳瓦罗公爵伊曼纽尔四世§!去世后被授予了纳瓦罗的爵位为止。乔瓦尼接受了，并将两块领地合并为一个新的国家：§G塔卢斯公国§!。\n\n公元706年，§O狮鹫岩的格罗弗一世§!在§O北风神像§!的庇佑之下远征翼巴第，当时与翼巴第并肩作战的塔卢斯部队目睹了他军队的可怕威力。当这位强大的征服者逼近福利诺河时，§C弗朗西斯科六世公爵§!亲自前往屈膝臣服，塔卢斯就此成为崛起中的§O狮鹫尼亚帝国§!的附庸国。在接下来的几个世纪里，和平时期再临。当在塔卢斯高地下发现了§Y大量的煤炭矿藏§!时，几家翼巴第矿业公司进入了此地，为他们的祖国获取了廉价而丰富的煤炭供应。\n\n公元972年，翼巴第脱离了帝国。§C乔瓦尼三世公爵§!尊重古老的盟约，也跟着脱离了帝国。塔卢斯随后加入新成立的§G卡廷公约§!，成了这个随后成为南狮鹫尼亚主要权力集团的一员。但此条约的一个关键条款是翼巴第矿业公司有权继续在塔卢兹经营：这就是被几乎所有塔卢兹全民所嘲笑、臭名昭著的§R煤炭条款§!。为了迎接现代化的到来，以翼巴第为榜样，塔卢兹也建立了一个§Y国家议会§!。不幸的是，就像在翼巴第一样，议会被证明是无效的，多个政府相继倒台。\n\n公元992年，乔瓦尼三世公爵在睡梦中去世，由他那莽撞性急的女儿§C吉内芙拉§!继任。吉内芙拉最出名的事迹莫过于她在§R1003大罢工§!期间的行动了。当时，成千上万的劳工在塔隆纳特的街道上游行，要求缩短工时、增加工资、并要求得到平等的对待。城市陷入停摆，国会急急忙忙地想找出能平息众怒的解决方案，但又想仍与工业家保持良好关系。此时，女公爵冲进了国会大楼内，大喊：“我向北风神发誓，如果你们这些混蛋不做些什么，我就会把你们全部都吊死在广场上！”第二天，国会就通过了一项决议，决定稍稍增加了劳工的工资、略微减少了工作时间，并给予他们一些保障。\n\n随着今年大选逐渐逼近，§C马可·帕托里§!总理和现任的自由派政府将不得不为保持他们的地位而努力奋斗。这将会是一场艰苦的斗争，但无论是哪个政党取得胜利，要确保塔卢兹在世界上的地位将会是一场更艰苦的斗争……"
 EAW_WS_CTH:0 "[Root.GetNameDefCap]－曾经骄傲过的祖尼基"
 EAW_WS_CTH_desc:0 "传说中§g迦骀基§!城（祖尼基语中的含意为“马建之城”）是在公元前1742年由§Y齐多女王§!（Queen Zido）所建立的。齐多被她的父亲放逐，率领着一群难民从祖尔（Zur）城来到此地建立了一个新的家园。而根据考证，此城可能是来自西方的祖尼基殖民者所建立的诸多殖民城市之一，跟希蓬和宰宾乌普差不多建立于同一时期。在接下来的几个世纪里，重视商业的祖尼基（Zonicia）文明在此生根、传播、发展并繁荣起来。很快，迦骀基成了北斑马里加的霸主，为古代的大帝国之一。\n\n但迦骀基可不是一枝独秀。往北越过中部海，迦骀基的扩张被§R卡廷§!给挡住了。迦骀基在赤红岛建立§Y新迦骀基§!（New Colthage）殖民地后不久，两个大国于公元前552年爆发了战争。尽管初期迦骀基在海军上具有优势，但战争的天秤并未倒向迦骀基，最后被迫割让了所有的海外殖民地。但这只是结局的起点而已。公元前490年，卡廷§R洗劫并摧毁§!了迦骀基，这个衰颓帝国的残存势力则被祖尔给吞并。\n\n公元前15年，迦骀基再次独立，虽然斑马们尝试想恢复过往的霸权，但他们相比于先祖还是相距甚远。在迦骀基因腐败与内斗而国力日衰时，一个新的灾难又降临到他们的头上：§R斑驴台§!（Quaggatai）部族的阴影笼罩在祖尼基之上。随着城市纷纷陷落，迦骀基再次失去了自由。斑驴台可汗对他们课以重税，并奴役了成千上万的斑马，这个时期对祖尼基文明来说可是个不折不扣的§L黑暗时代§!。\n\n然而，艰难困苦反而使祖尼基民族更加地顽强。公元825年，希蓬沦陷300年后，佐伊亚镇的祭司齐努泽尔·齐达德（Zinuzel Zidalid）开始发动§G起义§!反抗当地的斑驴台军阀。他公开宣示要让所有祖尼基的斑马获得自由，并统一在一面旗帜下。他的起义激发了整个北海岸的抵抗。在十年内解放了整个祖尼基，斑驴台则陷入内战的混乱之中。但由于瓦尔宰纳和驽米底亚不愿加入，祖尼基大一统的美梦终究是没有实现。退而求其次，以迦骀基为首的势力很快地便建立了§G迦骀基共和国§!。不久，§g联邦派§!和§O中央集权派§!之间却又爆发了冲突，幸好内战并未持续太久，最后中央集权派获得了胜利。\n\n公元975年，§Y扎米尔卡·扎卡§!（Zamilcar Zarca）成为了迦骀基的苏弗里特（Sufrit）。他把国家从一个共和国变成了一个寡头独裁的国家，并雇用了一个拥有强大影响力、俗称为§C科学家派§!（Scientific Clique）的学术团体来协助治理国家。他们的经济政策让迦骀基很快地便迎来了工业革命，但代价是许多的财产所有权被转卖给了外国投资者。扎米尔卡还与他们老对手的继承者§Y翼巴第§!建立了友谊和互助条约。但在新的千年开始后不久，正迈向工业化的迦骀基又面临着另一个外国威胁。\n\n迦骀基正是被臭名昭著的§C风暴大王§!入侵的最后一个国家之一。而他们的表现也没比其他国家好到哪里去：军队一败涂地、扎米尔卡死了、他的儿子们也逃进了山区，和入侵者打起了旷日废时的游击战。迦骀基大部分的财富又被洗劫一空，现代化也瞬间停滞了下来。幸好，风暴大王在几个月后便于对§C骏鹰§!的§Y艾因-特鲁特古赖特之战§!中战死。迦骀基元老们再次聚集起来，选举出了新任的苏弗里特：§Y扎拉塞勒·扎卡§!，扎米尔卡之子。\n\n迦骀基再次获得了自由，但风暴大王的入侵仍余波荡漾；内部动乱加剧，各个派系彼此互斗，争相争取苏弗里特的支持；军队重新被建立了起来，但军中充斥着完全不可靠的雇佣兵；西部和东部发生了动乱，§Y立宪派§!和§R迦骀瓦§!开始反抗苏弗里特的独裁统治；斑驴台在南方又卷土重来，并在风暴大王死亡后的混乱中趁隙夺取了§Y迦骀达§!……扎拉塞勒·扎卡能解决这些问题吗？还是迦骀基又会再次沉沦呢？"
 EAW_WS_HIP:0 "[Root.GetNameDefCap] - 山与海"
 EAW_WS_HIP_desc:0 "传说§Y天神安§!（Sky God An）的女儿和§Y海神提亚马特§!（Sea Goddess Tiamat）的儿子彼此相爱，他们的父母为他们创造了一个海天相连的乐园，并给予了他们§Y变身珍珠§!（Pearl of Transformation），让他们能在陆地、海洋和天空之间自由移动。这个乐园就是阿里斯山（Mount Aris）和海马利亚（Seaquestria）两个孪生国度，他们的后代就是最早的骏鹰和海马。几千年来这两个国家繁荣昌盛，任何生灵都可以向大祭司王（High priest-kings）提出请求使用§Y变身珍珠§!改变型态。在这段时间里，两个国家几乎都不想与外部世界有任何联系，生活简单而美好。\n\n但随着时间的推移，祭司王逐渐变得贪婪，到最后即使是看上一眼§Y变身珍珠§!都得进献大量贡品，更别说是使用了。两国逐渐与彼此疏远，骏鹰将目光投向外界，开始与北斑马里加和小马利亚互动，而海马则转向内部。贵族和商贩开始主宰社会，国家更显繁荣，但也让他们对傲慢和疏远的祭司王越发不满。终于，（根据小马利亚学者的推算）在逐月后523年，一个贵族家族挺身而出开始反抗祭司王和他们对§Y珍珠§!的垄断。\n\n这个家族就是现在的诺沃王族（Royal Line of Novo），他们团结了骏鹰和海马，建立了骏鹰菲亚王国（Kingdom of Hippogriffia），并让任何想使用§Y变身珍珠§!的生灵自由使用。他们创立了二元首都这一传统，一个在阿里斯山，另一个在海马利亚，每隔6个月，国王或女王就移动到另一个首都继续统治。受到塞拉斯蒂娅公主的启发，骏鹰菲亚王国采用了§P谐律主义的绝对君主制§!。\n\n就这样过了好几代。国王和女王都根据智慧和同情心等标准来挑选继任者，王位继承相当稳定。一切的变革都是缓步进行，通常只是由上而下的小部分更动。即使§Y工业革命§!也是在天枪国王（King Skylance）和他的女儿§Y诺沃女王§!（Queen Novo）长达30年的执政时期以相对有序的方式引入国家的。\n\n当然，骏鹰菲亚不可能永远不受到外界§R混乱§!的影响。当§C风暴大王§!的兵锋直指北斑马里加时，诺沃女王开始组建一支大军准备迎敌。但他们发现，他们并无法在风暴大王到达之前完成战备，诺沃便听从了王家顾问§Y筏木§!（Raft Wood）的建议，利用§Y变身珍珠§!将阿里斯山的全体居民疏散至海马利亚。\n\n在海中渡过的两年对骏鹰来说相当艰难，原生的海马与被迫使用海马型态的骏鹰之间裂痕也日渐加深。缺乏外部世界的讯息与被迫放弃家园的痛苦让许多骏鹰开始暗地里称诺沃女王为§R暴君§!和§Y懦夫§!、跟过去的祭司王一样滥用§Y珍珠§!等等。女王的亲生女儿§Y天星公主§!（Princess Skystar）虽说一直强烈主张要回到地面与§C风暴大王§!对抗，但直到小马利亚的§P谐律元素持有者§!的干预，诺沃才愿意让步，派出骏鹰大军去攻击在艾因-特鲁特古赖特集结的风暴大王部队。\n\n艾因-特鲁特古赖特之战改变了历史。风暴大王的军队遭到奇袭，他们的飞艇被强大的骏鹰空军所击落，旗舰也被著名的王牌飞行员§C裂鸣闪电§!（Crack Lightning）击落。§Y天星公主§!与§P元素持有者§!则与§C风暴大王§!的随从发生了战斗，最后他遭到副手背叛并被杀死了。风暴大王的征途在那一天画下了终点，而骏鹰菲亚也被永远改变了。当他们发现自己躲藏时邻国所遭到的破坏程度之后，许多骏鹰表示他们再也不会躲藏起来，而是该到国外去见识更广大的世界，并把外国的思想带回国；而海马则认为最近的事件证明了骏鹰菲亚就该避开野蛮的外界，避免国家走上§C穷兵黩武§!之路。\n\n诺沃女王发现骏鹰菲亚开始陷入动荡后，她解雇了§Y筏木§!，并将§Y变身珍珠§!分割为数百万的小碎片，这等于是放弃了君主长年拥有的权力，也表示现在骏鹰或海马都可以随意变换型态，无须再得到君主的同意。除了派她的侄女§P银溪§!（Silverstream）到小马利亚学习友谊之外，由于邻近的斑马王国§Y驽米底亚§!国王遭到§C风暴大王§!§R谋杀§!，国家也被他的军队严重破坏，为了避免王国陷入无政府状态，女王在当地设立了一个§Y难民区§!并开始推动§Y重建任务§!。\n\n现在，骏鹰菲亚正站在岔道上。他们要继续谨守§P谐律§!，还是要否定君主制而支持§3新的理念§!？他们会成为世界舞台的积极参与者，还是再次退回到孤立状态呢？"
 EAW_WS_TBK:0 "[Root.GetNameDefCap] - 空白石板"
 EAW_WS_TBK_desc:0 "繁华的港口城市§g托蹶克§!（Tobuck）历史已相当古老，但在过去几个世纪以来不断易主。最早的建城者是远古时代的§D埃驹§!（Maregypt），后来被§Y瓦尔宰纳§!（Warzenan）君主所征服，但瓦尔宰纳始终未能完全镇压或成功整合此区域。大约半个世纪前，在与§A伊玛泽斑§!（Imazeeb）部落进行了卓有成效的谈判后，§g托蹶克§!和周边的土地终于得到了解放，旋即，为了使这个仍在部落时代的社会迈入现代化，又加入了这个来自§A扎兰佳§!（Zarantia）本土的新兴部落联盟。这个本来堪称绝妙的计划随着§C风暴大王§!（Storm King）的崛起和他横跨整个§D斑马里加§!的征途而被迫中断。在几乎毫无抵抗的情况下，§g托蹶克§!被占领了，风暴大王本来想将这里做为雪人远征§G小马利亚§!的补给中心，但这个规划也因他过早的死于海上而无疾而终。\n\n现在，§g托蹶克§!是个区域和一个城市，但不能说是个国家。这里是一片充满各种文化、种族、语言的土地，从最富有到最贫穷、各种教派都占有一席之地。本来，作为§A扎兰佳§!的核心地区，只要假以时日，托蹶克的确可能产生国家认同感，但这种可能性也在§C风暴大王§!横扫§D斑马里加§!时被粉碎殆尽。重新加入部落联盟的舆论再次甚嚣尘上，但高层可没这么容易被吓倒。生在§r谢韦良纳§!、成长于§G小马利亚§!的§L豌豆射手§!（Pea Shooter），他的计划与§C风暴大王§!本来打算用来入侵他祖国的武器储备有关。他的目标之一是把这些武器都卖了，发财之后衣锦还乡。不论他成功与否，正如他们之间的交易条款，只要他离开§A扎兰佳§!都会再次尝试接管§g托蹶克§!——而且这件事情尚不为外界所知。在他身旁有个§F瓦西里·塞尔·特拉达§!（Vasile Cel Tradat），一个来自遥远§F普里文§!的狮鹫，精于狡猾的交易和维持自己权力基础的他既聪明又能干。他的目标比§L豌豆射手§!还要远大，至少他短时间或长时间来说都没有离开的意图。所以，他只要再等待一段时间，等到他的老板离开，或者直接“帮助”那些想接替他的势力就行。\n\n除了他的耐心助手外，§g托蹶克§!非正规军分别由三个军阀率领。要是被他们发现§L豌豆射手§!的计划，他的阴谋可能会让他们不太满意。§R坚果墙·驱怒§!（Walnut Drive）、§r阿列西娅·斯涅日纳娅§!（Alesia Snezhnaya）和§Y巴拉格曾§!（Baragzen）都有自己关于§g托蹶克§!的理想规划，但在实现更远大的目标之前，他们会先执着于确保自己的权力。\n\n究竟是谁能在§g托蹶克§!这块白板上留下自己的印记呢？"
 EAW_WS_ZAR:0 "[Root.GetNameDefCap] - 部落的回归"
 EAW_WS_ZAR_desc:0 "早在迦骀基（Colthage）建立以前，以游牧为生的§Y伊玛泽斑§!（Imazeeb，原型为柏柏尔人的自称Imazighen）部落就在北斑马里加一带生活了。他们并不关心各国设下的边界，随着季节的变化迁移，透过贸易、农业和放牧谋生。他们的游牧生活让他们常与邻国发生冲突，很快，他们凶残佣兵和掠夺者的名声就传遍了整个区域。\n\n他们的历史漫长而曲折，但他们的现代历史被认为始于§G961§!年。当时，在§Y阿塔冈部落的梅基乌兹扎§!（Mekiouzza of the Ataghan tribe）指挥下，一个伊玛泽斑的部落联盟从沙漠中向外发动掠夺，攻入了§G托蹶克§!（Tobuck）的领土。多年来，以埃驹裔（Maregypt）小马为主的居民饱受瓦尔宰纳（Warzena）统治的摧残，他们将伊玛泽斑视为摆脱这一枷锁的机会。但这次伊玛泽斑并未如过去一样仅以担任佣兵为满足。他们直接占领了这片土地，将托蹶克整个并入扎兰佳。这是第一个进入现代的伊玛泽斑国家。\n\n由于获取了重要的贸易城市和沿海的肥沃土地，伊玛泽斑能开始进入工业化阶段，往建立现代化国家的目标迈进；他们也计划将沙漠中的小径重建为跨斑哈拉铁路（Trans-zebharan railroad）。这还是多年以来头一次，他们有机会做出些改变。至少，他们设立了这个计划。尽管在梅基乌兹扎统治期间国家取得了重大的进步，但在§G1005年§!，这一切努力全都化为乌有。\n\n§C风暴大王§!（Storm King）的征服狂潮给这个尚在襁褓中的国家带来了沉重打击。托蹶克地区迅速沦陷，伊玛泽斑部落纷纷逃往沙漠深处暂避锋芒。在没有其他选择的情况下，梅基乌兹扎也只能跟随他们撤离，放弃了海岸地区。虽然她曾发誓要收复失土，但在伊玛泽斑仍未从雪人入侵造成的混乱中恢复时，来自小马利亚的军火商§R豌豆射手§!（Pea Shooter）利用风暴大王设立在托蹶克的武器库趁隙于当地建立了自己的势力。\n\n豌豆射手的军阀盟友实力强大、武器精良。而失去经济和工业中心和其后一连串的事件也让扎兰佳各部族开始对梅基乌兹扎抱持犹豫和怀疑的态度。梅基乌兹扎曾希望能在晚年时享受她终生奋斗的成果，但她发现自己等于是再次回到了50年前的起点。扎兰佳会被史书记载为历史上的异常事件，还是能克服时间的考验重新确立自己的地位呢？"
 EAW_WS_BAT:0 "[Root.GetNameDefCap] - 翘首以待的梦魇"
 EAW_WS_BAT_desc:0 "一千多年前，在§2梦魇之月§!叛乱之时，§Y小马利亚§!陷入了持续的冲突。然而，尽管竭尽一切努力，梦魇的追随者的第一次任务仍然迎来了失败。由于不想因领导暴乱而受审，支持梦魇之月的大家族们收敛资产，卷款而逃，以躲开正义的长腕。最终，这些自我放逐者到达了遥远的南部大陆上一片异国海岸，而这片大陆后来被称为斑马里加。在斑马里加，对秩序和纪律的渴望促使流亡者坚持向梦魇之月效忠这一原则，即使在这片异国他乡，他们对她的回归仍抱有信心，并为了未来他们需要返回故居的那一天而维持着近乎常态化的军事动员状态。\n\n从那时开始，翼蝠地的§C伟大军团§!便一直在延续古老的传统。所有血统纯正的公民都出生于军团之中。军团内有自己的军事和非军事结构。每一个军团都很独特，都反映了自己的创始者——过去在流亡中定居的古代贵族的世代历史。军事上，军团的任何血统纯正的公民都有机会晋升，尽管领导层大多由贵族血统组成。低种姓或追求战争之路却无法胜任的劳动者可能会被安排进辅助兵团，虽或许会经受其指挥官鄙视的眼神，但仍然有机会在战斗中证明自己。寻求更为公正道路者可能会在月语者处找到慰藉，那些信徒侍奉信仰，耳语仁言。在军团中，对信仰一丝不苟的奉献是每位成员——至少每位血统纯正的公民——都能自由追求的。而那些未能光荣地在翼蝠地出生者，也可以通过参加月语者的布道，尝试帮助自己的家属和亲眷摆脱羞耻的过往，投入暗月的光辉之中。\n\n目前，翼蝠地旨在帮助§0归来的梦魇之月§!在§Y小马利亚§!再度崛起，然而§C谐律元素§!成功地阻止了她最近的夺权企图。虽然暂时没有帮助的机会，但是至少对§g托蹶克§!，§Y瓦尔宰纳§!和§C扎兰佳§!这些邻国的掠夺时机已经成熟，当地居民肯定拥有充足的劳动力储备，而且训练有素的翼蝠地部队完全不必恐惧这群内战的部落与沙漠游牧居民。\n\n然而，在北方，潜伏着一个现在虽然悄无声息，但更为严重的威胁，§Y骏鹰菲亚§!。如果这片山脉完全苏醒过来，全力抵抗军团，冲突可能会蔓延到整个斑马里加北部。"
 EAW_WS_WAR:0 "[Root.GetNameDefCap]——岌岌可危的王国"
 EAW_WS_WAR_desc:0 "瓦尔宰纳（Warzena）的诞生要追溯到许久之前。一群衣衫褴褛的斑马虽因长途跋涉而疲惫不堪，但他们仍在双神§H扎力§!与§1扎尼特§!（Zal and Zanit）的指引下来到了§4曼努河§!（Menuch river）岸这个神祇承诺之地，于肥沃的河岸之上建立了一个城市，并将其命名为扎米夫加扎尔（Zamivgazal），字面意思是「诸神共汇之处」——至少祭司们是这么说的。如果以历史的观点来看，瓦尔宰纳最有可能为于近2200年前，由迁入此地的祖尼基移民所建，并逐渐扩展至整个曼努河谷。政权逐渐稳固之后，这个新生王国于政治上基本保持孤立，但却不吝于开放他们的市场。由于位处祖尼基海岸与呢骡贸易圈的必经之路，王国凭借着贸易开始繁荣昌盛并获取了巨大的财富。在这段黄金时期，他们建立了一座供奉众神的宏伟建筑，也就是后世所称的§6第一圣殿§!（First Temple）。公元1世纪早期，在§F埃驹§!（Maregypt）崩溃之后，瓦尔宰纳占领了埃驹位于§7托蹶克§!（Tobuck）的领土，并透过提供庇护换取他们的效忠。在接下来的几个世纪里，大小帝国于周边兴衰迭起，但瓦尔宰纳仍能保持自身的光荣孤立。\n\n但与世隔绝无法让瓦尔宰纳免于遭到§g斑驴台§!（Quaggatai）的攻打。斑驴台和其他祖尼基邦国联合起来，共同征服了王国，并摧毁了历史悠久的第一圣殿。虽然最后瓦尔宰纳推翻了斑驴台的统治，并于836年的马胡巴（Colthoba）条约中重新恢复了独立，但瓦尔宰纳突然意识到时代已经变了。更加坚固的新式船只问世后，船舰能于更深的水域中行驶更远的距离，过去做为国家命脉的贸易路线已不再关键，再加上建造宏伟壮丽的§8第二圣殿§!（Second Temple）的花费，经济开始下滑。经济的下滑随即引发了动乱，特别是在当地居民已对斑马统治者愈发不满的南部地区。尽管米松扎尼三世女王（Mithonzanit III）曾试图透过改革和新税收来减缓这一困境，但一切努力都只是徒劳。最后，被瓦尔宰纳高昂进口关税激怒的§O伊玛泽斑§!（Imazeeb）入侵了托蹶克并受到了热烈欢迎。在一系列无能统治者与其导致的反国王情绪的激化下，情况日益恶化。\n\n幸好，在千禧年之交，一缕希望的微光照向了瓦尔宰纳。新国王§G扎马里罕十六世§!（Zamaliahon XVI）是个年轻且热切的改革者，他推行了许多计划试图振兴国家。但这情况并未持续很久。公元1005年，§C风暴大王§!（Storm King）入侵，脆弱的防御工事在他庞大的舰队中迅速土崩瓦解，第二圣殿被洗劫一空，连建筑物也被焚烧殆尽，而扎马里罕则于王宫之战中丧生。他的弟弟巴雷克扎马勒（Barekzamal）设法逃脱，并在失去领土的情况下成为了新任国王，但显然，在风暴大王的军队仍占领王国的情况下他并无法行使什么真正的权力。幸运的是，征服者风暴大王于数月之后遭到杀害，瓦尔宰纳再次获得了自由。\n\n但这是付出§t巨大的代价§!所获得的自由。\n\n§r巴雷克扎马勒七世§!从未想过自己有天能登上王位，他很快地显露出自己经验不足的一面。雪上加霜的是，他继承的是个支离破碎的王国，经济全面崩溃、民心士气极度低落、扎米夫加扎尔已毁、圣殿又一次被夷为平地……在他已故哥哥顾问的协助下，他虽然尝试着持续推动改革，但由于对顾问们过于明显的依赖，让他看起来更显稚嫩，也让他始终无法控制住局势，直至得到了§D骏鹰§!的及时援助后，王国才能真正行动起来，逐步走向复苏。\n\n如今，国王勉力维持着不稳定的和平局面。尽管骏鹰仍持续提供援助，但也正因他们的出现反而加剧了许多孤立份子的不满情绪。§R黜君同盟§!（Coalition of Anti-Monarchy Organizations，简称CAMO）是个由许多反君主主义团体组成的松散联盟，已经开始采取行动要推翻巴雷克扎马勒从而实现自己的政治愿景，局势日渐白热化。同时，瓦尔宰纳边界也受到了来自多方的威胁。南方隔着边界与由想赚快钱的武器走私贩统治的§9托蹶克共和国§!对峙，西方一贯保持沉默的§2翼蝠地§!也于此时开始变得躁动且好斗。瓦尔宰纳的未来仍为未定之天，国王能成功拯救他的国家吗？还是这个有着2000年历史的古国会就此于战火中退出世界舞台？一切都仍有待观察。"
 EAW_WS_PLB:0 "[Root.GetNameDefCap] - 冻海之境"
 EAW_WS_PLB_desc:0 "几乎所有种族，在他们创生的时候，都有过神话传说。有些说是神明创造了他们，有些则胆敢称自己是神明诞下的子子孙孙。§g北极熊§!没有这样的神话传说，根据他们的说法，他们从时光的源头起，在世界创生之前就已经存在了。那些魔力抄写者（Magi-Scribes）记载的历史中说，在成千上万，乃至数百万年前，熊族作为跨越了物质与精神位面的生灵，在那被§r原始的严寒§!所赐福大地上游荡——如果这里能被说成是大地的话。在§R魔物时代§!（Age of Monsters）之前，他们就存在了，后来当那些巨兽横行的时候，熊族也是如此。据说，在§R魔物时代§!期间，北极熊不再像极地之外的同胞那样继续区区求存，而是被神秘的§D众神之父§!（All-Father，简称全父）擢升，拥有了思考与做梦的能力。他们声称，有了祂的祝福，他们能够打造一个熊族的伟大帝国，站在原始时代食物链的顶端。这个所谓的帝国，和“原始的严寒”，跟有历史确凿记录的气候暖期，与远古小马定居点的存在相违背，小马们也没有提及过魔力抄写者的故事。这是熊族学者拒绝拓展描述的东西，要是被问得太多，就会做出暴力威胁。\n\n然后就是在这个所谓的§r“星铁时代”§!（Age of Starsteel）期间，北极熊从传说中的魔法巨兽，如野猪§2古林博斯蒂§!（boar Gallinbursti）、冰原狼§4芬里尔§!（direwolf Fenrir），还有无名无姓的§3壮伟之鸦§!（Great Raven）等处得到了教诲，从游牧的战士部族，演变成了更加定居的社群。据说这是第一件熊族盔甲被打造出来的时代，身披装甲的熊族，在诸多军阀和伪君的领导下，打着“怪物之王”的旗号横行北方。他们在其种族的腹地（也就是现在熊族居住的地方），修建了嵌入山体，在广袤的针叶林和苔原之中的庞大堡垒。\n\n当然，常人一般会觉得这种历史的记载太过原始，小马、狮鹫或者幻形灵的学者更是会说它荒谬到了极点，这种玩意就算被一些生物信服，在当代的社会、政治、经济和军事中也不该有什么位置。然而，让北极熊为自己定格的，正是他们那迷幻的过去。所以说，很多熊即使到了今天，也认为他们是某种形式的§r远古寒霜生物§!，熊族的豪言壮语中也时常出现什么“霜冻之魂”、“寒冰之心”的东西。不仅如此，他们中还有不少熊跟那些仍然在北地游荡的野兽产生了亲切感。\n\n不管情况如何，极北之洋的岸边有很多北极熊氏族（clans），也有相当多的无邦者（clanless）。从§0罗森克郎茨氏族§!（Clan Rozenkrantz）的灵界萨满，到§t卡恩氏族§!（Clan Kane）高傲的战士，从§4哥特兰氏族§!（Clan Gotlung）的堡垒之主到§6安克氏族§!（Clan Anker）以企鹅为主的打鱼者，北极熊社群的政治就是由氏族所定义的。威塞兰蒂亚是§1法森§!氏族（Falsen）、§4布罗德科伯§!氏族（Brodkorb）和§3本基斯托克§!（Benkestok）氏族组成的§Y三氏族同盟§!，钥湖之滨则居住着沉迷水晶的§2玫瑰氏族§!（Clan Rosensverd）和贪图黄金的§5雷星氏族§!（Clan Tordenstjerne）。但是，任何对氏族的探讨，都离不开三个§g大型氏族§!：§G沃尔松格（Volsungr）氏族§!的谐律主义者、§R斯瓦特佩尔斯（Svartpels）氏族§!的学者战士，还有当前占据统治地位的§O斯叙夫林（Scyfling）氏族§!。这§g三大氏族§!拥有的资源和权威都远比小氏族要多，每一个都能成为北极熊社群的领导者。无邦之熊，愿意同任何善待他们的氏族达成良好关系，和最近步入现代化的北极熊社群的联系也愈发紧密。\n\n§O斯叙夫林氏族§!的§Y爪·威灵顿（Paw Wellington）§!，北极熊社群之熊王（Despot），过去五年间公正而严厉地统治着，扮演了将这个社群从一潭落后似水拖向工业时代的驱动力。在1000-1002年的§Y统一之战§!中，威灵顿用前装枪和狮鹫尼亚佣兵把那些传统战斧和装甲打得七窍冒烟，要么征服，要么结盟，统一了一切氏族，两个除外，也就是上面说到的§2玫瑰氏族§!和§5雷星氏族§!。这些氏族因为和§7幻形灵之地§!勾结被放逐，驱赶到幻形灵之地后便再也没见过了。\n\n按照现代标准，爪·威灵顿是个优秀的统治者，按熊族标准就不一定是了。他这家伙或许太高高在上，对境外观点太过沉溺了，很多氏族，对他那些看起来非常荒谬的团结与现代化的要求愈加疲惫。或许改变马上就会到来。虽说那些小氏族还造不成真正的威胁，§G沃尔松格氏族§!§Y公主艾拉§!和§R斯瓦特佩尔斯氏族§!§Y雷霆之主托本§!或许就是另一回事了。小马利亚的生活改变了艾拉，她正幻想着一个熊族的新纪元。托本是爪·威灵顿的盟友，但即便是他或许也没法容忍一些即将到来的变革。\n\n尽管熊族内部分歧严重，但他们在外敌上基本能达成一致。恐怖的§7幻形灵§!必须被解决，§9狮鹫尼亚边疆§!也是必须收回的熊族领地。他们也期望和§g企鹅§!达成同盟，毕竟两大族群共享着冰霜与寒风之魂。\n\n冰冻之海滨的§r极地精神§!，究竟会延续呢，还是被四方之敌摧垮呢？只有时间能告诉我们了。"
 EAW_WS_HEL:0 "[Root.GetNameDefCap] - 自由匪帮"
 EAW_WS_HEL_desc:0 "在§G阿德莱特§!欢愉的远古时代，仁慈的§8金竖琴众伯爵§!统治着这片土地，我们的传说也就此开始。它那高贵、侠义而快活的子民正生活在贝尔格伦、老鹰屯、莱塞、维尔斯泰尔与赫尔林的空地中。但是，我们绝不能说，他们会对权威毕恭毕敬，但权威就像是一阵阵愤怒的箭矢一般，让他们的欢笑变为了哀痛。阿德莱特美丽大地上的居民们，被§5格赖夫瓦尔德伯爵§!和南方崛起的§3阿奎莱亚佬§!击溃，逃亡到广阔的森林与沼泽中，发誓要继续为独立而抗争。\n\n三百二十年，足足有三百二十年啊，这么多年里，阿德莱特被贪婪、邪恶的§6阿德莱特郡长§!统治着，他们唯一效忠的对象，就是§5格赖夫瓦尔德主子§!发的金币。\n\n北风神像遗失，迪斯克里脱离帝国统治，而阿奎莱亚被革命烈火吞噬的时候，阿德莱特的子民们也唱响了民众之歌，从森林暗处涌现。在§1983年§!，一个名为§F扬·罗塞恩§!的小银行匪徒和投机取巧者，看到他对当地横征暴敛的抗议演变为全国对抗格赖夫瓦尔德统治的暴乱，他们的目标从简简单单的地方冲突演化为彻底终结阿德莱特屈居鹫下的烈焰。在这群形形色色的狮鹫中，有两位出众者——从自耕农变成绿林好汉的§t梅洛克·伍德§!，以及阿德莱特森林深处神秘的祭司§7卢卡·文·莱塞§!。尽管罗塞恩的运动被§5克鲁德伯爵§!镇压，但§G卢卡和伍德§!没有就此善罢甘休。\n\n§1987§!年，这两位成功控制了国家，宣告成立§G阿德莱特自由地区§!，在接下来的二十年里指引它走向独立。他们的政治联盟形成了某种形式的直接民主，在这个重生国家的四面八方，委员会、佣兵团、革命旅与合作社都被安排了组建新生政府的任务。\n\n匪徒们逐渐老去，各国也潮起潮落，但阿德莱特的民众依旧在此——而现在，阿德莱特即将迎来独立的20周年，民众们正等待着自己的声音得到聆听，不论好坏。尽管§5格赖夫瓦尔德侵略§!是久远的事情，但§6郡长§!依旧潜伏着，等待着重夺他和他伯爵的封地，而阿德莱特的民众可绝对说不上是团结一心。§7卢卡·文·莱塞的旧礼派§!充满火药味地宣讲§9厄耳福音§!，一批批§R革命者§!也来到阿德莱特宣扬自己的宗教——科学社会主义理论和实践……更别说§0佛罗韦纳的资本§!渗入了蓬勃发展的工业黑金——石油产业之中……"
 EAW_WS_header_text_KIR:0 "麒里亚的朱红四境，逐月后1007"
 EAW_WS_header_text_KIC:0 "麒里亚兄谊共和国[?KIC_WS_GetFormDate]"
 EAW_WS_header_text_KIS:0 "北麒里亚委员会[?KIS_WS_GetFormDate]"
 EAW_WS_KIR:0 "[Root.GetNameDef] - 寂静之地"
 EAW_WS_KIR_desc:0 "[KIR_CNHEADER]\n\n数百年来，麒麟的村庄与部落遍布整块大地，彼此互相攻伐，纷争不断。一直到大约逐月后450年，麒麟史上第一个统一的政权§G麒里亚§!（Realm of Kiria）成立了。在此之前，麒麟的政治状况可以概括为无数凭借领袖的脾性，分分合合的大小联盟，彼此间争战不休。而麒麟隐藏的强大且危险的诅咒让这情况更加雪上加——噢，不，该说是火上加油才对。麒麟只要被愤怒给控制，就会成为§R逆麟§!（nirik），一种全身燃着奇异怒火的野兽。进入这种状态后，逆麟们会无法分辨敌我、也失去了理智和判断力。在一次怒火就可能§R将整个村庄烧成灰烬§!的状态下，要统一这个物种为一个国家似乎是不可能的。\n\n尽管征服、诡计和合作都失败了，§C“离罗之道”§!（The Way of Fire）却随着时间被证明是成功的。§C“道”§!的本质是一套宗教信仰，教导其追随者练习控制情绪并克制自己成为§R逆麟§!，让麒麟有了能彼此和平相处的机会。§C道§!的追随者都相信，传说中的女神§Y时雍§!（Concord）赋予了麒麟传承创世之火最后光辉的责任。屈服于§R逆麟状态§!的麒麟就是对时雍赐福的反对和破坏。麒麟只有停止战斗并共同努力，才值得她的特别眷顾。麒麟毕竟不是乐于斗争的种族，对于家园遭到破坏、长期战乱的厌倦、以及被天性给吞噬强迫战斗的不满让他们纷纷愿意追随。§C“离罗之道”§!提供了他们追寻美好生活的一个机会。多年来，大多数的麒麟生活在§O“朱红祭司”§!（Vermilion Priests）阶级的统治之下建立了种族史上第一个和平的社会，并使麒麟能够共同努力改善生活。\n\n随着时间的流逝，作为统治阶级的祭司阶级则慢慢地演变成了§O朱红王朝§!（Vermilion Dynasty），并由一位英明神勇的至高女族长所领导。王朝和道提供的稳定性使麒麟民族的势力和影响力不断扩大，渐渐的支配了大半个东南斑马里加。但即使是有着悠久历史的王朝仍不足以单独应付时代的冲击。九世纪的麒里亚是一个混乱的变革年代，蒸汽和机械发条的发明带来了社会经济和政治上的巨变。农业发展带来的居民数量激增也让§C颂赞§!、§O馨郁§!和§G苍翠§!等城市发展壮大，资本主义正在取代封建体制。麒麟资产阶级——§Y商业家§!、§Y地主§!和§Y知识分子§!组成的团体日益增长的存在感和影响力§Y严重削弱§!了王朝和离罗之道对麒里亚的控制力，§Y工业革命§!已经来到了家门口。\n\n随着§Y社会阶级分立§!不断加剧，社会和经济上的冲突也逐渐升温。当各方都试图扩大对麒里亚的经济和农业的控制力时，麒麟商业家和地主的利益与作为劳动力的农民和居住在城市的劳动者的利益互相抵触。下层阶级的怒火一发不可收拾。不久之后，暴力和破坏性的§R农民起义§!席卷了全国，成千上万不满的农民因愤怒而成了逆麟，怒火席卷了全国各地的农村地区，各个城市接连—如字面意义的—陷入火海。无奈之下，§Y至高女族长皎魅§!（Noctilucent Charm）制定了一系列严厉的政治措施和法令，这些措施和法令被总称为§R“沉默”§!（The Silence）。女族长下令，对其他麒麟行使任何权力都是叛国——当然也因为这事实上破坏了她的神权专制统治。她还宣布所有形式的货币以及私有财产权会被认为是亵渎神灵。除家庭外，一切形式的组织和关系也都该被禁止_当然离罗之道的§C僧侣统治§!也是如此，不过它已经变成了最为狂热保守分子的大本营，当然也就是最值得信赖的。大部分居住在城市的麒麟被勒令返回农村从事自给农业，城市居民数量因而大幅减少。\n\n那些无视§R“沉默”§!的麒麟都被驱逐。当时，由于§O朱红王朝§!的确建树颇多，遵循王朝的概念也根深蒂固，以至于几乎所有的麒麟都愿意坚定地忠于他们的女族长。毕竟，回到那个纷乱的年代，麒里亚本就在§R内战§!的阴影中苦苦挣扎，女族长的存在仿佛暴风雨中平静且坚实的堡垒。残存的麒麟资产阶级逃亡到了天涯海角乃至国外来躲避皇室的影响力——然而如今，这已不复存在，不再有个帝国可以让什么至高女族长行使权力了。事实上，§G麒里亚§!随后被一把推回了黑暗时代中，逐渐被世界所遗忘。\n\n皎魅死于971年，她的独生女§C雨晴§!公主（Princess Rain Shine）就在这个国家处于最低谷的时期成了新任的女族长。雨晴决心不辜负母亲的遗产，致力于维护沉默法令，并将大部分的时间都用来潜心钻研离罗之道的经典。\n\n§R“沉默”§!持续了大约一个世纪后，一个§Y小马利亚外交使团§!冒险进入了这个与世隔绝的国家，希望能得到雨晴的接见。在联合了一些异见者之后，她们最后成功了协助雨晴意识到了母亲的过失，并跨出了开放国家的第一步。麒里亚年轻的女族长要做的，就是得修复§R“沉默”§!对国家造成的破坏，并试着适应这个崭新的世界，不然她王朝的影响便会§Y永远消散§!。"
 EAW_WS_KIS:0 "[Root.GetNameDef]－导正错误"
 EAW_WS_KIS_desc:0 "（欢迎您游玩北方线，内容包含卞涓的主线与其它隐藏线路。目前，卞涓主线完成度99%，因为部分问题，译者始终无法找到卞涓的最后几个事件，实在抱歉。如果您在游玩过程中发现了任何尚未翻译的事件，请截图发给帮主。祝您游玩北方线愉快！)\n\n破晓时分，钟声在宏伟的港口城市§Y馨郁§!各地响起，钟声回荡在这个麒麟城市内、回荡在周边船舰上、也回荡在麒麟洋闪闪发光的水面之上。在街上的所有麒麟却并未如往常做着上工前的准备，而是不断环顾四周寻找聚集起来的群众。当队伍进入他们视线后便纷纷加入其中，让队伍越来越显得庞大，散发出的威势也越来越难以忽视。很快，他们到达了目的地：寿客88广场，麒麟爱国国民会的全国总部。在无数排漆成红色的喇叭后方，一整排穿着整齐服装的执法者环绕着舞台四周防止意外事故出现。舞台很大、很壮观，但仍看得出匆匆组装起来的痕迹。在群众的目光注视下，一位西装笔挺的的麒麟大步踏上了讲台。\n\n§Y卞涓主席§!望着眼前在钟声响后聚集起来准备聆听演讲的群众，也许光在广场上就有四五千之谱——这都还没算上在周边建筑物窗户后方的听众呢！他伸蹄入怀压了压他今早才匆忙完成的演讲稿——这个动作的用意是要提醒自己上面的内容。当群众逐渐安静下来，向他投以期待的目光后，他开始凭记忆背诵他的演讲稿。\n\n“馨郁的麒麟们，”他迎向群众的目光，开口说道：“不必我提醒各位，在历史上的今天，发生了一件对我们挚爱的城市来说相当严重的大事。一个世纪前开始的§R沉默§!让馨郁受到何等严重的痛苦我也不需要再次强调了。朱京粗暴落后的政策几乎将我们这个繁荣商业城市的生命线给彻底切断。而当沉默结束，§G大跃进§!开始之后，我目睹了许多流亡者从世界各地纷纷返国，我当时就坚信局势肯定会与过往截然不同。变化的确发生了，但没有任何麒麟可以确信是往好的还是往坏的方向变化。”\n\n他皱着眉头看向群众，他的情绪也逐渐感染了聚集在周边的麒麟们。他接着说：“馨郁的麒麟们，大跃进也是个重大挫败，本来立意良善的改革被§C沉重的教条枷锁§!、§R亵渎神明的激进措施§!和领袖的§O纯粹无能§!给破坏了。虽然馨郁理解通往和平与繁荣的必经之道，但我们的意见却被无知和迷信给压制，我们发出的声音没有办法传达出去。现在，朱京勉强搭起的纸牌屋眼看就要崩塌，我们还要向这个极端失败的政权奉上无尽的忠诚心吗？”\n\n“我可不愿如此！”卞涓用力跺了跺他的蹄子。“在朱京的领导下，馨郁可谓是吃尽了苦头。我们该主动挣脱那个§Y幼嫩城市§!强加在我们身上的枷锁，让她无法再次支配我们！我们拥有迈向成功的一切筹码，我们不愿再向那些不懂用法的无能分享这些珍宝。馨郁啊！独立吧！北方的麒麟们！全§G苍藩§!的麒麟们！现在正是我们获得渴望已久的独立身份的大好时机！”\n\n“让我们就此和朱京彻底决裂，让我们取代那些无能的领袖，把麒里亚建设成一个§G崭新且繁荣的现代社会§!吧。”"
 EAW_WS_KIC:0 "[Root.GetNameDef]－扇风点火"
 EAW_WS_KIC_desc:0 "（欢迎您游玩西方线，内容包含腾乌的主线与其它隐藏线路。腾乌主线的大量事件描述有些过于“黑暗讽刺”，请您在游玩之前做好心理准备。祝您游玩愉快！)\n\n在火红夕阳的映照之下，蜜流江水仿佛被染成了§R深红色§!。\n\n在四境西侧边境前哨的§Y寿客§!中，一场双方都死伤惨重的激战刚刚结束，存活一方的麒麟蹄子上几乎都沾满了同胞的鲜血。从早上开始，数以百计甚至数以千计打着“§O旭晋之道§!”旗号的麒麟武装贫民就开始进攻寿客，打算把朱京的忠诚派驻军驱逐出城，但驻军相当强硬，拒绝了这批“暴民”的最后通牒。来自朱京的麒麟士兵们开始使用步枪反击那些拿着干草叉、镰刀、十字镐和其他任何他们能用蹄子举起的工具攻打过来的农民们。虽说有无数农民在冲进驻军军营的过程中丧生，但驻军也不过寥寥40名，在4000名农民的冲击下，守军在弹药耗尽后尽数被屠。旭晋怒火熊熊燃烧，将反抗者烧成了灰烬。\n\n§Y腾乌§!站在蜜流江畔，看着无数的祭司、神学家和富豪被从家中拖出来扔到江水中。她的确认识其中不少麒麟，她在过去会与他们辩论神学、请求他们赈济贫民，但他们要不无动于衷，要不就是过于傲慢，让她失望透顶。现在，换她看着他们在被带到江边时苦苦哀求饶自己一命，她也如他们过去一样，不为所动。当处刑结束后，她召集了她的追随者和信徒们，开始发表演说。\n\n“我们现在已经没有回头路了。”腾乌警告听众，她的眼睛扫视着眼前各种被鲜血染红的农具。“我们已经开始了对麒里亚的伟大解放战争，要把麒里亚从那些信仰§C离罗之道§!、却又奢靡成性的享乐主义者那解放出来。是他们的失败把国家带到毁灭的边缘，而我们却不得不忍受这些代价。然而，在我们受苦的时候，他们高高在上地把我们的苦难解释为§O时雍的意志§!！难道时雍不是个仁慈的女神吗？是她将§Y原初炽焰§!的最后火种托付给我们，难道她会不爱她的孩子们吗？如果她这么爱我们，为什么还要让我们受苦？”\n\n“各位，很简单，她的确不愿看到我们受苦。”腾乌继续说，蜜流江深红色水面上的光芒使她浑身闪耀着红色的光辉。“但我们都被欺骗了！我忠诚的麒麟同胞，我们全都被腐败的统治阶级给欺骗了！他们欺骗我们，好从我们的痛苦中谋利！即使是现在，他们还不断地拉拢境外势力进入这个国家，只为了更有效率地制造出能压迫我们的机器。他们把我们敬爱的§G至高女族长§!软禁在朱京墙内，时雍所造就的奇迹全被曲解成让他们能继续贪婪下去的胡言乱语！”\n\n群众发出了骂声与怒吼，腾乌则用恰到好处的冷笑来继续激起他们的怒火。“但，我们全都是旭晋的追随者，只有我们才能扭转现况！我们将成为麒里亚真正的救星！出发吧，解救还残存良知与正义的麒里亚。从那些要摧毁我们的家园和宗教的家伙那将剩下的部分夺过来。向朱京进军吧！从那些想利用至高女族长作为傀儡来达到自己目的的腐败统治阶级那将她解救出来！”\n\n“也只有我们才有力量去改变这早该改变的现况，奋斗吧！§Y在麒里亚再次纯净之前§!，即使流尽最后一滴血，我们也绝不退缩！”"
 EAW_WS_KXN:0 "[Root.GetNameDef]－狂怒之力"
 EAW_WS_KXN_desc:0 "在“§R沉默§!”之前，现在被称为澜麒（Lan Kir）的地区曾是§Y淄麒里亚郡§!（Zaikiria Commandery）的一部分，隶属于§Y麒里亚的朱红王朝§!。澜麒位于朱红王朝的边境，这也意味着麒麟和斑马经常在此地爆发军事冲突。这里跟一般的边境地区很不一样，§Y尽管缺乏经济或政治价值§!，但此区却成了重要且享有盛誉的军事基地。由于此地大小冲突不断，驻扎在澜麒边界的§G旗兵§!（Banners）被认为是全麒里亚最精锐的旗兵。甾麒里亚郡旗兵时常在郡内各县区轮换，以确保尽可能多的士兵能从战斗中吸收宝贵的战斗经验。\n\n“§R沉默§!”开始时，甾麒里亚郡成了拒绝因§R故步自封§!导致缓步灭亡的麒麟们的避难所。当朱红王朝失去统治能力时，众多的分离主义者公然发起叛乱，甾麒里亚郡旗兵却因对沉默的意见分歧而爆发内乱。军队未能恢复秩序，整个地区§R陷入了动荡之中§!。最后，在麒里亚崩溃之后，甾麒里亚郡旗兵被孤立在他们的驻所，与朱红王朝中央失去了联系，在叛乱的狂潮之下节节败退。旗兵收拢残部，撤退到了§Y甾麒里亚边疆森林§!（The forests of the Zaikirian frontier）之中，这群曾经享誉全国的旗兵决心在此地重整之后向甾麒里亚发起反攻。然而，全国陷入沉默的麒里亚并没有派出任何援助。事实上，中央透过龙火蜡烛（dragonfire candle）发来的最后命令却是§R谴责§!甾麒里亚郡旗兵的无能，谴责他们未能维持郡内的秩序，中央命令他们返回麒里亚并屈服于“§R沉默§!”之下。\n\n这个命令让曾为保护麒里亚边境奋战多年的士兵们感到极度沮丧。朱红政府对士兵的刻薄寡恩在军队中激起了极大的痛苦和愤怒——在怒火的狂潮之中，旗兵残部迅速地瓦解成逃兵和土匪，甚至§R转化为逆麟§!。危机在前§Y绽花§!总督、帝国钦差大臣§C夏暴§!（Summer Storm）发出宣告之后画下了句点。他表示，被中央定义为叛逆的甾麒里亚郡旗兵将不再遵守§R来自朱红中央的命令§!。§G二十旗§!（Twenty Banners）的成就绝不能被这样轻易抹去，相反的，他发誓要让他们的力量和怒火获得应有的奖励。如果麒里亚不愿意帮助他们恢复秩序，§Y那他们就自己来§!！这个宣告提升了军队的士气，秩序和纪律逐渐恢复，以夏暴为第一任大将军（General of State）的澜麒国就此奠定了基础。\n\n二十年来，澜麒和麒麟原住民事实上处在二十旗的§Y军事占领§!之下，但最后，在饥荒、耗损、和§Y莲京§!与§Y高麟§!§R政权日益稳固§!的事实之下，光复甾麒里亚郡的梦想变得越加遥不可及。夏暴死于对泽布鲁农庄的一次掠夺之中，澜麒面临了另一场领导危机。最后由夏暴的女儿§C长暮§!（Long Dusk）召集了残余的旗兵，继承她的父亲，成为澜麒§G第二任大将军§!。她面临的局势十分严峻，这个流亡政权正缓慢地步向屈辱灭亡的命运。在她的领导下，澜麒经历了从军事占领区到接近§Y近代民族国家§!—但主体仍是建立在§C旗兵体制§!下的军政府—的改革。旗兵内部逐渐出现了原始的§Y军事民主§!体制，重要的事项必须经由表决决定，而旗兵的投票权重则由§Y军衔§!的§Y高低§!来决定。原本属于军事独裁政府的职权也逐渐地§Y转移给了官僚机构§!，澜麒的原住民也被编组为辅助兵和§Y士兵§!——后者正式被§G视为旗兵§!，也拥有投票权。旗兵身份的开放让§Y居民组成§!缓慢但稳定地发生了转变，原本的旗兵后代和澜麒的原住民逐渐融合，他们形成了一个重度军事化的国家，迥异于麒麟史上的任何其他国家。\n\n沉默和澜麒成立后过去了一百年，随着谣言提到麒里亚似乎已§Y结束了沉默§!，这个国家的根基动摇了。过去数十年来，由于居民数量激增，澜麒也面临了居民结构变化的问题。由于密林之中耕地§R稀缺§!，也缺乏技术、工业或贸易来缓解日益严重的粮食短缺问题，这个国家被迫靠着§Y掠夺邻国§!来喂饱数量仍持续增加的新生旗兵。旗兵中有越来越多的军官开始表达对§Y前麒麟宗主§!的同情，一部份希望与祖国统一，还有一部分呼吁至高女族长雨晴（Rain Shin）尽快行动，重新征服甾麒里亚。长暮年事已高、身体虚弱，无论谁接任大将军，都将决定澜麒在这个新的千年该何去何从。"
