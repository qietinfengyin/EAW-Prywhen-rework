GRW_BRF_postwar_1: "内战的创伤"
GRW_BRF_postwar_1_desc: "普里文内战尘埃落定，但是它的阴霾仍旧笼罩着这片动荡的土地，这里是南狮鹫尼亚大陆最难以辨认炊烟和硝烟的地方。\n在这片土地上诞生的赢家，其实也没赢得输家多少东西。"
GRW_BRF_postwar_2: "阴霾散去"
GRW_BRF_postwar_2_desc: "祖国母亲汩汩流血的伤口已经被伟大的鹫民彻底愈合。战争的阴霾慢慢散退，挺起脊梁的普里文鹫民可以把精力匀到更伟大的建设中去了。"
GRW_BRF_postwar_3: "地平线尽头"
GRW_BRF_postwar_3_desc: "距离最终胜利只有一步，同志们！向着地平线的尽头，向着反动派的巢穴，为了解放我们受苦受难的无产阶级鹫兄弟姐妹，共和国的骑士们，冲锋！"
GRW_recover_from_civil_war: "舔舐伤口"
GRW_recover_from_civil_war_desc: ""
GRW_adopt_potatos: "引入马铃薯"
GRW_adopt_potatos_desc: "马铃薯——又称土豆。适应性强、产量高、营养丰富、易于种植和管理而且还储存方便。它既可以作为军粮供应（高热量且耐储存、营养相对均衡、方便加工和食用）而且还能在必要时作为填充物或加固材料和伪装材料。\n总而言之，这玩意简直就是我们革命部队的好伙伴好朋友。"

GRW_prywhen_interim_national_plan: "共同纲领"
GRW_prywhen_interim_national_plan_desc: "共同纲领，是《普里文共和国鹫民政治协商会议共同纲领》的缩写。共同纲领确定了普里文共和国的国体和政体，即鹫民民主专政和国民代表大会制度，规定了公民的基本权利和义务，以及国家的基本政策和制度。历经三次起稿和命名，肯定了鹫民革命的共同纲领将在第一部正式宪法出台前忠实地发挥临时宪法作用，为普里文带来稳定，民主和安康。"
GRW_constitution_for_workers_and_peasants: "工农宪法"
GRW_constitution_for_workers_and_peasants_desc: "《普里文共和国宪法》是普里文共和国第一部真正具有社会主义性质的宪法。在这部宪法中，一切权利属于鹫民被写在正文第二条中，标志着普里文鹫民在经过艰辛的革命后终于夺取了鹫民民主的伟大胜利。我们一定能够通过和平的道路消灭剥削和贫困，建成繁荣幸福的社会主义社会！"
