GRW_support_GRU_idea_desc: "格里富斯革命的那一天终于到来了！我们国内的年轻战士们正摩拳擦掌，跃跃欲试，准备帮助格里富斯的同志——我们又怎么会阻拦他们！去吧，小伙子们！"
