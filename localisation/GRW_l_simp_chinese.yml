#国家修正
GRW_GLA: "普里文民主联军"
GRW_GLA_desc: "普里文民主联军于1003年白花起义中正式建军。在四年解放战争中，这支队伍已经充分证明了自己的战斗力。不过，若想正面迎战一支真正意义上的现代军队，恐怕还有很长的路要走……"
GRW_GLA_2: "普里文解放军"
GRW_GLA_2_desc: "得益于火炮和更加先进的支援装备的列装，普里文解放军的实力进一步增强。战士们不再只能用轻步兵武器打游击——他们现在有了进行大规模作战的底气。"
GRW_GLA_3_desc: "普里文解放军的优良军纪进一步发扬光大——三大纪律，八项注意，不拿群众一针一线。进一步的思想建设和先进武器列装共同作用下，解放军的战斗力更上一层楼。"
GRW_GLA_4: "狮鹫解放军"
GRW_GLA_4_desc: "近日的联合作战体系优化使得狮鹫解放军的指挥系统更加合理而完善。在红兴同志思想的指导下，鹫民军队守护鹫民的底气更足了。"
GRW_GLA_5_desc: "现在的狮鹫解放军是装备先进，思想建设完备，军纪严明的祖国铁锤。尽管我们还有技术上的不足，但解放军较内战时期已经进步了太多太多。"
GRW_GLA_6_desc: "狮鹫解放军的现代化工作正有条不紊地进行，相信全面现代化后，狮鹫解放军将如虎添翼，所向披靡。"
GRW_GLA_7_desc: "狮鹫解放军现在是一支赤色的常胜之军。先进战法，现代化装备，钢铁般的意志，这些无不昭示着解放军的强大。我们是，祖国的铁锤！"
