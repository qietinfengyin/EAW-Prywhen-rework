GRW_Northern_Griffonia_administrative_committee: "北狮鹫尼亚行政委员会"
GRW_Northern_Griffonia_administrative_committee_desc: "北狮鹫尼亚的革命战争成功后，组织当地的重建恢复就成了党中央的当务之急。鹫大常委会遴选出了我们信任的同志主持北狮鹫尼亚的日常工作，通过这个新生的组织——北狮鹫尼亚行政委员会。"
GRW_chairman_sparrowsbane: "燕祸主席"
GRW_chairman_sparrowsbane_desc: "默·燕祸，北狮鹫尼亚的一颗红星，坚定的先锋队理论支持者。在慎重考量后，党中央决定指派燕祸来维持北狮鹫尼亚的秩序并着爪进行重建工作，指导北狮鹫尼亚鹫民走上社会主义的康庄大道。毫无疑问，只要假以时日，他的政绩将给予踟蹰不前的疑虑者们以最好的还击。"
GRW_Northern_Griffonia_internationalist_policies: "对抗叛贼"
GRW_Northern_Griffonia_internationalist_policies_desc: "尽管明面上的敌鹫已经偃旗息鼓，潜伏于茫茫荒野中的小股反动力量仍然如附骨之蛆困扰着重生的北狮鹫尼亚。经由中央领导同志的同意，燕祸主席将调兵遣将，迎头痛击胆敢为祸一方，对抗鹫民政权的土匪恶徒，叛乱分子。"
GRW_chairman_astler: "艾斯特勒主席"
GRW_chairman_astler_desc: "中央的领导同志们相信，温和的前国民共和党左翼代表鹫物艾斯德勒是为北狮鹫尼亚带来民主与繁荣的不二鹫选。我们相信，在这位热忱而忠诚的主席引领下，北狮鹫尼亚将焕发新的生机——如艾斯德勒曾执掌的漫云城一般。"
GRW_Northern_Griffonia_communalist_policies: "与国民共和党和解"
GRW_Northern_Griffonia_communalist_policies_desc: "国民共和党在漫云地区执政二十余年，其政治能量不容小觑。与此同时，委员会和党中央也注意到，艾斯德勒主席是该党左翼进步一派的坚定领导者，让他出爪进行同国民共和党和解的工作，定然事半功倍。届时，我们会获得一个摆脱无能恶名的忠实合作友党，以及更加难能可贵的——北狮鹫尼亚鹫民的民心。"
GRW_Northern_Griffonia_revise_the_principles: "重塑三民主义"
GRW_Northern_Griffonia_revise_the_principles_desc: "由978年共和革命之父克梅斯凯提出的三民主义，即“民主，民权，民生”原则，一直以来对狮鹫尼亚各地共和派有巨大影响。而在社会主义的北狮鹫尼亚，三民主义理应更进一步，扬弃发展——比如，民主应为全体鹫民所共享，民生应保证工鹫权力和耕者有其田，民权也被扩展被鹫民在社会主义国家中享有的充分权利。经过我们的重塑，新的三民主义将成为具有北狮鹫尼亚特色的社会主义施政纲领。"
GRW_Northern_Griffonia_new_identity: "全新的身份认同"
GRW_Northern_Griffonia_new_identity_desc: "长期以来，北狮鹫尼亚鹫与其余地区的狮鹫就因语言不通，生活条件不同等客观因素而为鹫轻视。委员会经过分析一致认为我们有能力根除这种身份歧视，并传达给我们北狮鹫尼亚的鹫民们这样的信息：我们同祖国任何地区——富有或贫穷，炎热或寒冷——的鹫一样，是沐浴在社会主义阳光下的平等公民。在树立全新身份认同的同时，委员会也将在天际小马聚居区，豪克兰等地因地制宜，便宜行事，组建适宜当地情况的自治政权。"
GRW_Northern_Griffonia_direct_local_autonomy: "指导地方自治"
GRW_Northern_Griffonia_direct_local_autonomy_desc: "长久以来，北狮鹫尼亚鹫民形成了寒地独有的文化，适应了极北的荒原戈壁，群峰冻洋。委员会和党中央认为，中央直接辖制北狮鹫尼亚地区是操之过急的选择——与其直接管辖，不如循循善诱，加以指导，让北狮鹫尼亚鹫民组建各地的自治共和国，亲爪铸就他们更美好的明天。"
GRW_Northern_Griffonia_collectivization: "北部农场集体化"
GRW_Northern_Griffonia_collectivization_desc: "除某些地区外，北狮鹫尼亚具备大规模集约化农业的条件，极北的自然灾害也为我们提供了绝佳的集体化契机。在中央的全力支持下，我们雄心勃勃的集体化计划将消除困扰极北的饥荒问题，实现一个又一个的增产目标——当然，是用农业机械和科学技术指导，而非纯粹的热情取得。"
GRW_Northern_Griffonia_improve_infrastructure_development: "完善基础设施建设"
GRW_Northern_Griffonia_improve_infrastructure_development_desc: "北狮鹫尼亚的基础设施奇差无比已经是所有有识之士的共识。固然，寒冷气候，低下生产力，缺乏国际合作等客观条件限制了北狮鹫尼亚的发展，但这些并不是能困囿社会主义共和国的理由。为有牺牲多壮志，敢教日月换新天，我们将抱定决心，不怕困难，为鹫民铺设更好的道路，提供更舒适的住宅，消融寒冷刺骨的冰雪——无论是群峰间还是鹫心里的。"
GRW_Northern_Griffonia_expand_industrial_unions: "扩大集体化工业"
GRW_Northern_Griffonia_expand_industrial_unions_desc: "在天际纳维亚，甚至前共和国地区，一些经费较为充裕，合作化较高的集体工业已经得到了初步发展。如嘶大林之言，社会主义应当胜过最好的资本主义，我们将提高工业的集体化和国有化程度，宏观统筹安排生产，提高工鹫权力，进一步推动北狮鹫尼亚集体化工业的发展。"
GRW_Western_Griffonia_administrative_committee: "西狮鹫尼亚行政委员会"
GRW_Western_Griffonia_administrative_committee_desc: "解放阿奎莱亚及其边境的激动鹫心的战斗结束了，旋即，新的问题出现在了我们眼前——稳定并恢复这片沃土。经由党中央决定，西狮鹫尼亚行政委员会被组建，以恢复当地秩序，指导重建工作。"
GRW_chairman_cru: "克吕主席"
GRW_chairman_cru_desc: "格朗·克吕，阿奎莱亚的“大块头”，西狮鹫尼亚四方敬服的左翼领袖。党中央罕见的一致决定指派这位寡言可靠的小马作为西狮鹫尼亚行政委员会主席主持当地工作。群众相信，克吕主席有能力改造一个旧世界，并建设一个新世界。"
GRW_Western_Griffonia_consolidate_trade_unions_status: "巩固工会地位"
GRW_Western_Griffonia_consolidate_trade_unions_status_desc: "阿奎莱亚的工会斗争有着光辉的历史。从普里代公社运动到维齐玛玻璃工鹫罢工，工会一直不屈不挠地为社会主义作斗争。而今，一场彻底的革命使工会蜕炼为更强大，更具革命性的组织，工会的地位也将更为稳固。"
GRW_Western_Griffonia_accept_progressives: "接纳进步主义者"
GRW_Western_Griffonia_accept_progressives_desc: "西狮鹫尼亚从来不缺少心向光明的进步主义者。只要稍加引导，这些有识之士就将成为我们在各条战线上忠诚的合作者与伙伴。便宜行事，接纳并改造当地进步主义者——我们会贯彻落实党中央下达的这条政策。"
GRW_Western_Griffonia_anti_reactionary_action: "肃反行动协调办公室"
GRW_Western_Griffonia_anti_reactionary_action_desc: "不得不承认，西狮鹫尼亚仍然存在贵族余孽和顽冥不化的反动派。党中央和委员会认为，协调肃反行动并建设统一的肃反行动办公室将大大有利于肃清余敌的工作。"
GRW_Western_Griffonia_mass_assembly: "建立大众议会"
GRW_Western_Griffonia_mass_assembly_desc: "在反动选举政策下的分级选举和限制投票权并非是民主，而是统治者们的骗局——而那些反动到极点的帝王们，有时连这种骗局都不屑于编织。新的西狮鹫尼亚行政委员会会砸碎这可笑的现实：在党中央的领导下建设真正的大众议会——所有适龄公民都有投票权的，经由普罗大众选举产生的议会。为社会主义民主三呼万岁！"
GRW_Western_Griffonia_rural_electrification: "乡村电气化"
GRW_Western_Griffonia_rural_electrification_desc: "西狮鹫尼亚滨海的巨型城市群的电气化程度令鹫啧啧称奇，但乡村的情况则糟糕的多。委员会决心改变这种发展不平衡不充分的局面，在广大的乡村铺设基础设施并向电气化迈进。"
GRW_Western_Griffonia_construct_railway_network: "铺设铁路网"
GRW_Western_Griffonia_construct_railway_network_desc: "在西狮鹫尼亚基建良好的土地建设铁路网，连接主要工业城市群无疑是有利无弊的。经过党中央的批准，一大批铁路建设计划正在落地，西狮鹫尼亚交通不便，联系不紧密的情况将成为历史。"
GRW_Western_Griffonia_industrial_rebuild_project: "工业重建项目"
GRW_Western_Griffonia_industrial_rebuild_project_desc: "西狮鹫尼亚有巨大的工业实力，但不少设施在漫天的炮火中被损坏了。委员会将会拨出专款复兴工业并建设大型工厂，恢复西狮鹫尼亚的繁荣盛况。我们将要完成马贝尔做不到的事情！"
GRW_Western_Griffonia_central_academy_integration: "与中央科学院接轨"
GRW_Western_Griffonia_central_academy_integration_desc: "西狮鹫尼亚的学术界目前仍然与中央有一定距离。加强中央与西狮鹫尼亚的科研联系将对双方大有裨益，新鲜的科技血液将流入中央，而更多的机会将从中央科学院被提供给西狮鹫尼亚的鹫才们。"
