GRW_GRF_autonomous_region_desc: "新狮鹫尼亚自治共和国在体制上最接近嘶大林格勒模式，经济由国家计划但是生产过程中则放大劳工的权力，工会则充当辅助作用在社会福利上发挥作用。作为在小马大陆的狮鹫殖民地，自治共和国平等对待各种族，保持自身特性的同时回归社会主义的狮鹫大家庭，成为两个大陆革命者的桥梁。"
