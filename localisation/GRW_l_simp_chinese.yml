###- 医保决议 -###
GRW_health_care_reform: "医保改革"
GRW_health_care_reform_1: "建立医保制度框架"
GRW_health_care_reform_1_desc: "国民代表大会常委会已经授权制定《共和国医疗保险法》，该法将明确医保体系的法律地位和运行机制。常委会还通过了设立共和国医保局的决议，共和国医保局会负责医保政策的制定、实施和监督。"
GRW_health_care_reform_2: "设立医保专项基金"
GRW_health_care_reform_2_desc: "经过多地考察，医保局决定在共和国境内多个乡村与城市地区开展医保试点工作，如在试点地区建设或改造医疗基础设施，使得与保险法的实施标准相适应。此外通过中央财政拨款与地方财政配套支持下，相关地区的医保专项基金将会被设立起来。"
GRW_health_care_reform_3: "扩大医保覆盖范围"
GRW_health_care_reform_3_desc: "随着试点地区的医保工作取得圆满成功，医保局决定将医保试点政策推广至全国，逐步覆盖全体公民。此外医保局正在制定国家基本药物目录，计划对目录内药品实行价格补贴，已降低药品价格。"
GRW_health_care_reform_4: "完善医疗服务网络"
GRW_health_care_reform_4_desc: "随着医保体系覆盖全共和国，绝大部分地区的医疗成本已经大大降低。但在偏远地区医疗资源仍然不足，医保局与卫生局决定建立医疗外派系统，通过建设分级治疗体系，推动优质医疗资源下沉。从而保障全共和国医疗网络的畅通。"

