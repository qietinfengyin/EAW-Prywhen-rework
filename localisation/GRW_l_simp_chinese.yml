###- 第一阶段政治国策 -###
GRW_reconstruct_the_country: "普里文重建国策树"
GRW_first_prywhen_political_consultative_conference: "普里文第一届政治协商会议"
GRW_first_prywhen_political_consultative_conference_desc: "内战尘埃落定，国家百废待兴。普里文共产党将邀请各社会党派齐聚基韦辛召开普里文第一届政治协商会议，以共同表决而出一个受广大狮鹫认可的共同纲领，取代原先的拉里奥斯临时政府。这次表决出来的纲领将以“兼容并包，求同存异，向社会主义前进”为主题，着重于建立一个民众集中制的联合民主政府，但我们并不追求一步就实现全盘的共产主义化……\n\n因为，我们的事业还有很长的路子要走，而这一步，这还只是开始。"
GRW_CPGC: "组建中央鹫民政府委员会"
GRW_CPGC_desc: "根据共同纲领，新建立的中央鹫民政府委员会及其各类高级政府机关均设立在法定首都基韦辛，为保证新建立的国家机器能够顺利运行，目前一切准备工作都已删繁就简。但有一点是肯定的，前反动政府成员一律清除出新政府，想回来继续任职的一律要接受严格的政治审查。\n\n但国内状况的紧迫程度已经是连一个月都等不了了，因此早在协商会议时，迫于现实状况，统一战线各党派将在这一过渡时期具有完全的鹫事任免权。"
GRW_cultural_education_committee: "文化教育委员会"
GRW_cultural_education_committee_desc: "旧教育制度失败一个重要原因就是教育部门管理的混乱与失序，新建立的文化教育委员会将统筹负责全国教育：学制的确立、各级各类学校的管理以及教材的编写等都将由这个委员会负责。"
GRW_reorganize_the_royal_laboratory: "改组皇家实验室"
GRW_reorganize_the_royal_laboratory_desc: "这所皇家实验室是在“大米繁荣”前和期间所兴建的，除一楼被王室当作文物博物馆，基本全室是当时普里文甚至整个埃维地区研究者的天堂，有很多得到皇家奖学金与赴外留学的学生对这也是回忆满满。\n\n而到了内战后整楼在共军的重点地区保护政策下在战火中保存完好，现在就该由我党重新开启并重振它的使命了。"
GRW_commencement_of_literacy_campaigns: "推广扫盲运动"
GRW_commencement_of_literacy_campaigns_desc: "钢铁·嘶大林说过：“在一个文盲遍地的国家是无法建成社会主义的”，不幸的是，我国大部分狮鹫仍处于文盲状态。扫盲运动将从教会写文盲写十个数字和自己的名字开始，并带领他们最终摆脱愚昧。"
GRW_six_three_educational_system: "确立六三学制"
GRW_six_three_educational_system_desc: "尽管旧王国的教育改革被普遍认为是极其失败的，但其中的一些内容确有可取之处，尤其是仿照小马利亚而建立的六三学制。更重要的是，我们的教育体系将面向所有狮鹫，无论贫富。"
GRW_national_kivessin_university: "国立基韦辛大学"
GRW_national_kivessin_university_desc: "对我们而言，旧普里文残缺且畸形的高等教育是建立完整教育体系的一个重要障碍。而国立基韦辛大学的建立将成为我们克服这个障碍的第一步，这所高校将源源不断地为我们提供各领域的研究型鹫才。"
GRW_dealing_with_churches: "教会的命运"
GRW_dealing_with_churches_desc: "马科思指出宗教是被压迫生灵的叹息，是无情世界的感情，“宗教是鹫民的鸦片”。从历史发展来看，教会作为宗教组织形式，在不同社会阶段有着不同表现。但随着解放战争的结束，我们已经处于社会主义阶段，教会必然要适应社会的变革。"
GRW_justice_for_the_people: "属于鹫民的正义"
GRW_justice_for_the_people_desc: "在旧王国中中，正义被统治阶级扭曲利用，成为维护其利益的工具。真正属于鹫民的正义，只有在消灭私有制、建立社会主义和共产主义社会后才可能实现。那么现在，清算那些封建残余就是我们建立社会主义的第一步。"
GRW_women_emancipation: "推进妇女解放"
GRW_women_emancipation_desc: "落后与反动且不平等的种种男女社会关系现在必须被打破。我们代表广大曾经被压迫的狮鹫们，通过中央鹫民政府委员会以国家的名义宣布普里文妇女解放的开始浪潮，在前反动政权时期，妇女们社会地位底下，而现在这一遗留下来的社会遗毒不仅在家庭层面滋生着反革命，还在让我们的狮鹫劳动力更加捉襟见肘。\n\n而如今是时候打破这些桎梏了，虽然短时间可能面临诸多困难，但狮鹫们的自由发展都应该以每只狮鹫的自由发展为前提！"
GRW_send_armed_forces_to_suppress: "全国剿匪特别行动"
GRW_send_armed_forces_to_suppress_desc: "国内的匪患由来已久，不仅是反动政权时期的互相利用、纵容和无力整治，还是内战时的无政府状态导致的野蛮发展。总之现在的形势已经可以说是火烧眉毛了，甚至我们一些老根据地老红区也饱受土匪劫掠，隔壁的钻石匪帮也在不断侵略我们的边境。\n\n而现在这些情况必须得到重视了，我们将从各部队里派遣专门的剿匪小分队，匪患严重的则设立军事管理委员会，同时我们也将寻求群众们和社会各界的帮助，唯有展开全民对这些土匪的斗争，我们才能够最终取胜！"
GRW_united_front: "权力归于统一战线"
GRW_united_front_desc: "目前各部门政府工作全面转入正轨，新生的鹫民民主政权真正的在这片经历了血腥内战的土地上站起来了，他的存在证明了普里文共产党不仅善于打碎一个旧世界，更善于建立一个新世界。知道现在狮鹫们都在流行说什么吗？“新 社 会”！因为现在没有反动政权时期的种种压迫与不平等了。\n\n土改委员会、国际局、国家重建委员会、外交部和各类政府部门以及军委构成了上层建筑，而社会主义工业和民族企业的蓬勃发展以及农村地区全范围的土改和农业合作化以及社会主义贸易方针共同构成了坚实的社会主义经济基础。因此无论是经济基础还是上层建筑，我们都实现了坚强的统一战线领导。\n\n统一战线万岁！"
GRW_national_health_commission: "设立卫生部"
GRW_national_health_commission_desc: "根据党中央和中央鹫民政府的建议与指导，我们计划将接下来的工作重心放在消除贫困与医疗保障上。我们将设立与中央鹫民政府合作设立卫生部，他们负责成员编制，我们负责医疗物质的建设，而且由于我们其中有不少同志参加过革命战争一线，因此我们同时也可以将我们解放军的医疗设备研发同时上马且几乎不需要太多投入。"
GRW_grassroots_democracy: "基层民众自治"
GRW_grassroots_democracy_desc: "我们的共同纲领确定了民主集中制，而现经过漫长的研讨阶段，政府的工作同志们终于制定了一项着力于实现基层民众自治的方案。现在已经通过了党中央的批准，方案首先会在实现了社会主义初级合作社的地区开展，其次便是一般性质的合作社，最后便是配合乡镇工作队落实。而基韦辛和西迪亚两座大城市则由党中央直接落实基层民众自治制度。\n\n基层实现选举官僚制度，官员工资仅比工鹫工资水平稍高，且必须接受民主监督并经过地方党组织公开会议来罢免。"
GRW_state_bureau_of_political_defense: "授权国家政治保卫局"
GRW_state_bureau_of_political_defense_desc: "国家政治保卫局是中央鹫民政府委员会下辖的一个情报机构其雏形可以追溯到革命战争时期的保卫处制度。在全国剿匪行动的开展和反革命分子开始转入地下活动后，共和国的内务形势发生了根本变化，因此我们迫切需要以国家名义向我们的情报机构进行授权，对这些家伙们实行专政。\n\n稍后我们便会着爪组织扩大会议，商议具体实施方法以及成员配置，目前已经拟定有着丰富地下工作经验的克里斯蒂安同志担任委员部主席。"
GRW_national_reconstruction_commission: "国家重建委员会"
GRW_national_reconstruction_commission_desc: "普里文，我们的祖国母亲。经过多年的灾荒战乱，我们终于可以开始着爪缝合她那溃烂的伤口。这个重建的过程将由一个名为国家重建委员会的机构领导，久经考验的工会主席西迪约韦亚努同志带领党内工业部门的同志和有觉悟的劳工，誓要早日完成党赋予的艰巨任务。无疑，他们走在一条艰难的道路之上，但这些松散的“劳工派”为了一个共同的目标走到一起之后，党内政治形势也在悄然发生变化。"
GRW_establish_people_bank: "建立鹫民银行"
GRW_establish_people_bank_desc: "几个印钞机就能开银行的时代已经一去不复返了。随着鹫民政权的巩固、社会经济的恢复，我们必须要建立一个能方方面面服务于我国经济建设，也能在基本功能上与国际接轨的中央银行——中央鹫民银行。"
GRW_develop_heavy_industry: "发展重工业"
GRW_develop_heavy_industry_desc: "随着国内运转逐步稳定，我们的财政预算已经足矣支撑我们进一步发展国内的社会主义工业。面对着这一经济形势的变化，工业重建委员会进行了一系列表决会议，利维乌同志将被任命为重工业计划的执行委员，负责国内重工业的扩张计划。同时我们也要扩大重建委员会的行政能力，我们将从总干部管理部协调，征召一些原先工鹫武装的同志来助力我国的重工业发展计划。"
GRW_land_reform: "打土豪，分田地！"
GRW_land_reform_desc: "中央鹫民政府委员会拟定决议，普里文共产党中央委员会下达指示：打土豪，分田地！\n\n全国各地开展浩浩荡荡的土改运动，而对于那些地主老财，肯在新世界活着的宽大处理，不肯的，由地方组织公审大会。同时让杜米特鲁·星尾同志带领一些经济学方面的专家组织一家帮助农村经济向社会主义经济过度的农业银行，通过无息提供生产资料以帮助各农村互助社发展。最后由菲利普同志扩大土改委员会，使其规模能够辐射到全国范围！"
GRW_improve_social_security_system: "建立社会保障体系"
GRW_improve_social_security_system_desc: "为了让社会更公平、更稳定，让普通民众活得更有尊严，我们必须建立起社会保障体系。在我们力所能及的情况下保障基本生存权，减少贫富差距，这样才能让民众对社会主义更有好感与信心。"
GRW_the_birthplace_of_revolution_in_southern_Griffonia: "南狮鹫尼亚革命的始源地"
GRW_the_birthplace_of_revolution_in_southern_Griffonia_desc: "经过长期努力，我们的同志已经将普里文推上社会主义国家发展的正轨。经济，教育，军事，民生等方面正在呈现勃勃生机万物竞发的景象。现在，是时候将目光放眼于普里文以外的地方了，我们将对外输出革命，将星星之火传播到整个世界！"
GRW_send_international_students: "派遣赴嘶留学生"
GRW_send_international_students_desc: "革命胜利后，我们终于可以向嘶大林格勒派遣留学生。一方面，这将为我们提供各行各业所需的技术鹫才；另一方面，这也将成为社会主义国家团结一致的重要标志。"
GRW_ministry_of_foreign_affairs: "组建外交部"
GRW_ministry_of_foreign_affairs_desc: "共同纲领制定的之初，我们就已经敲定了我国外交的部门组成与具体方针。我们的外交体系将独立于政府委员会运行，直接对政治协商会议负责，外交部的选址为前反动政权的一座豪华宫殿，外交方针为“两路走”分别代表统一战线的国际派势力与民主党派势力，拟计划乔治和卡林同志担任常务委员。\n\n同志，我国的外交阵线工作需要关注两个方面，在通过国际局尽可能获得以嘶大林格勒为首的社会主义阵营支持外，还需要通过民主党派的外交部参与埃维的外交博弈，避免周围的反革命势力过早的向我们祖国展开联合绞杀！"
GRW_visit_the_Stalliongrad: "拜访嘶大林格勒"
GRW_visit_the_Stalliongrad_desc: "嘶大林格勒，革命的起源地，可能是全球范围内对我们最友好的革命政权。国际局的同志们已经做好了正式嘶大林格勒访问的准备，这将为我们未来的一系列经济，政治，乃至军事上的合作打好基础。"
GRW_Prywhen_Stalliongrad_trade_agreement: "普嘶贸易协定"
GRW_Prywhen_Stalliongrad_trade_agreement_desc: "国际局的同志们向来都是我国社会主义外交的急先锋，而现在又有一重大利好的消息传到基韦辛——来自嘶大林格勒的同志同意了我们的贸易协定草案，并将派遣专员同志在我国的港口城市西迪亚设立专门的代理处。\n\n现在同志们十分欣喜，卡林同志甚至还吃起了蛋糕，虽然现在是艰苦时期，但不得不承认的是，他们确实值得这番享受。"
GRW_international_brigades: "组建国际纵队"
GRW_international_brigades_desc: "随着国际局的同志们对工作的日渐熟悉，并已经能够完全把持住当局情况，目前卡林同志已经带领班子们开始筹划组建国际纵队的事宜。这也可能需要来自国内各方面的支持，但是国际局的同志们向来都具有强烈的革命热情！"
GRW_visit_Skynavia: "极北之地的同志"
GRW_visit_Skynavia_desc: "天际纳维亚，作为狮鹫尼亚北方唯一的红色政权。978大革命发生后，他们就在极北之地建立根据地并进行长期斗争，因此在军事方面天际纳维亚有着先进的作战经验。国际局已经计划派一批军官团前往新天际纳维亚进行军事交流，这将对我们未来在寒冷地区作战提供帮助。"
GRW_establish_the_EMA: "成立经互会"
GRW_establish_the_EMA_desc: "为在促进社会主义国家之间的经济合作与发展，我们计划成立一个经济互助委员会。该委员会将会通过分工实现社会主义国家之间全面的经济合作，最终提高成员国的劳动生产率和鹫民福利。其主要活动方式包括协调国民经济计划、国际生产专业化和协作、共同投资建设联合项目、对外贸易和科学技术合作。"
GRW_dispatch_envoy_to_Asterion: "遣使星空"
GRW_dispatch_envoy_to_Asterion_desc: "星空，废奴之都，牛头怪们先是从宁部西亚天马奴隶主蹄中逃脱，又推翻了格罗弗们安排的“国王”，为自己赢得了真正的自由。国际局已经把星空加入了未来可能的友好国家名单，派遣外交使节或许能促进我们的合作？"
GRW_visit_the_Riverland: "破冰河间"
GRW_visit_the_Riverland_desc: "河间同盟，作为现存狮鹫尼亚最大的谐律组织。虽然他们并不喜欢共产主义，但我们有一个共同的敌鹫——狮鹫帝国。面对一个共同的威胁，我们相信，做朋友总要比做敌鹫容易。短羽同志已经联系上了河间同盟内部的红色力量，相信在短羽的努力下，我们一定能和河间同盟在现阶段保持一个良好的关系。"
GRW_talk_with_MCW: "与鹦鹉维亚的联系"
GRW_talk_with_MCW_desc: "随着国内战事的平息，是时候恢复与国际社会的联系了。在斑马里加北部的岛屿群上，哈比鸟建立了名为“鹦鹉维亚”的国家。他们与骏鹰瓜分了北斑马里加的海上势力范围，在分隔两片大陆的海域中拥有可观的影响力。更关键的是他们在内战期间曾给予我们宝贵的援助，并与革命政府建立了联系。因此我们得以顺理成章地与他们合作。这不仅有助于彰显我们爱好和平的态度，更能赢得国际社会的认可。"
GRW_eler_sea_agreement: "爱勒海条约"
GRW_eler_sea_agreement_desc: "随着我国和鹦鹉维亚的关系，我们几乎与其签署一份全方面的经济合作条约，相信随着双方友好往来的的增多，我们的经济也得以共同迎来繁荣。当然，话虽漂亮，实际谈判中却仍然是“硬实力”的天下，如果不想要让他们在我国获得过多特权，甚至挤压国内市场的话，我们必须掌握足够多的谈判筹码......"
GRW_limited_interference_theory: "普里文有限干涉论"
GRW_limited_interference_theory_desc: "作为社会主义政权，履行对国际社会主义运动的义务是我们的责任。然而，认为我们应当不顾一切地援助外国革命者的，仅限于最激进的观点。在绝大多数务实的同志看来，于革命胜利后的初级阶段便全力介入国际事务，无疑将危及自身安全，是不可取的。面对理论与现实的这一矛盾，中央相关部门已确立并执行“有限干涉”的方针。我们将正视当前面临的困难，同时也确保在必要时刻向外国同志提供有力支援。"
GRW_access_to_smug_elia: "接触白冠亲王"
GRW_access_to_smug_elia_desc: "鉴于邻国卢什王国的元首——白冠亲王有着同情广大底层劳动鹫民的倾向，我们决定派出外交使团前往卢什与白冠亲王展开正式接触。相信在看到普里文广大鹫民已经翻身做主鹫的形势下，他一定会做出改变的。"
GRW_ignite_the_revolution: "点燃革命火种"
GRW_ignite_the_revolution_desc: "为了打破陆上邻国的封锁，是时候对外输出革命了。由外交部牵头，一批训练有素的同志将会扮作商鹫、学者等身份秘密潜入邻国。他们会在民间团结那些渴望改变、饱受压迫的群体。同时，他们会与当地反抗力量建立联系，并提供一定物资援助与战术指导。相信在我们同志的努力下，各个国家的鹫民将会逐步汇聚力量，等待革命时刻的到来。"
GRW_Evi_revolution: "完成埃维革命"
GRW_Evi_revolution_desc: "同志们，经过长时间的努力，现在，埃维地区的革命条件已然成熟。联系外交部的同志，让我们发动埃维地区的全面起义，打破普里文周围反动国家的封锁！"

###- 第二阶段政治国策 -###
GRW_unified_Evi: "普里文统一埃维国策树"
GRW_Evi_people_congress: "第一届国民代表大会"
GRW_Evi_people_congress_desc: "随着各地的苏维埃自治共和国的成立以及战争的阴霾开始消散，目前召开大会的物质条件已经成熟。于是，在普里文共产党的号召下，第一届国民代表大会将在基韦辛召开，会议将进行很多议程，所需的时间恐怕得要上一个月。\n\n希望同志们能够热切讨论意见，因为这将是我们的共和国迈向共产主义的第一步！"
GRW_promote_prywhen_model: "推广普里文模式"
GRW_promote_prywhen_model_desc: "社会实践证明，尽管头几个月生产可能会停滞，但普里文的农业社会主义合作化后产生的农业产量指数级增长无疑证明了这是一条向社会主义高级阶段过渡的康庄大道，而在代表大会上，这一模式成功也挫败了一切有关于这方面的错误言论。\n现在我们将通过中央政府委员会，以国家的名义向全国宣布——推广普里文模式！"
GRW_enlarged_military_commission: "军委扩大会议"
GRW_enlarged_military_commission_desc: "不同于之前的各种扩大会议，这次的军委扩大会议非同小可，因为它涉及到军委制度的根本内容，同时我们的扩大规模也比之前的大得多，几乎各部委各自治共和国代表与共产党高级委员全部都将列席会议。同时保卫局的同志也将提前部署防御，确保此次会议圆满成功。"
GRW_red_sun: "红日东升"
GRW_red_sun_desc: "现在狮鹫们已经普遍自发认为：红兴同志作为党的坚强领导核心，带领普里文共产党一路披荆斩棘，打破了这片大陆上的旧社会，解放了各地百姓并建立了新社会，让这个世界变呀嘛变了样~\n\n红兴主席万岁！革命万岁！万万岁！"
GRW_NPCSC: "授权国大常委会"
GRW_NPCSC_desc: "由于国民代表大会代表数量众多且非专职，不便于经常开会，故每年一般只召开一次会议，会期也不能过长。为了使最高国家权力机关充分发挥作用，保证国家机器正常有效运转，代表大会通过决议授权国大常委会在国民代表大会闭会期间，行使立法权，制定单行法规和修改法律，作为常设机关在平时承担工作。"
GRW_expand_UFWD: "扩大统战部"
GRW_expand_UFWD_desc: "随着共和国的领土不断扩张，我们处理新领土上各个派系融合问题以及国际交流事务也在增多，原来的统战部的的规模已经不足以支撑日常活动了，扩大统战部势在必行。"
GRW_rozenkampism_1: "国际派：任命国际派官员"
GRW_rozenkampism_1_desc: "一批兼具卓越的国际视野与外交智慧的同志已经被任命为统战部的对外事务局的先锋，他们将前往各个国家宣传我们的政策，与各个国家的政府首脑磋商，以改善共和国在国际社会上的形象。并且他们会与各国进步力量建立起稳固且深厚的联系，以备应对未来共和国在对外革命输出道路上的各种挑战。"
GRW_rozenkampism_2: "国际派：支援他国革命"
GRW_rozenkampism_2_desc: "在国际上，众多反动势力统治下的民族与群体渴望摆脱受压迫的枷锁，他们对我们的革命理念满怀期待，却因缺乏有效的沟通与引导，难以形成强大的革命合力。一批国际派的同志已经被秘密派往各国，他们在了解不同国家和地区的历史、文化与社会现状后，会制定符合当地实际情况的斗争策略帮助受压迫的民众。同时，他们也会积极收集当地的各类情报，并为以后共和国输出革命提供准确的信息。"
GRW_rozenkampism_3: "国际派：加强与嘶大林格勒的联系"
GRW_rozenkampism_3_desc: "作为一个新兴的社会主义国家，共和国在工业、科技和军事方面对比世界先进水平仍有差距。为了巩固革命成果并推动国际社会主义运动的发展，我们必须与外部社会主义力量建立紧密联系。嘶大林格勒，作为小马利亚大陆上最先进的社会主义国家，拥有强大的工业基础和先进的科研能力。因此，国际派的同志已经前往彼得蹄，希望能在那里与嘶大林格勒在工业科技方面展开更深层次的合作。"
GRW_rozenkampism_4: "国际派：加强与天际纳维亚的联系"
GRW_rozenkampism_4_desc: "天际纳维亚作为狮鹫尼亚地区最早的社会主义政权，虽然革命历史悠久，但受限于极地恶劣的自然条件和资源匮乏，其经济和工业实力同样较为薄弱。为应对当前复杂的国际局势，共和国决定与天际纳维亚加强联系，通过合作互补，推动两国社会主义事业的发展。"
GRW_syndicalism_1: "劳工派：任命劳工派官员"
GRW_syndicalism_1_desc: "由于缺乏组织管理，目前，新扩张的共和国领土的工业与工鹫组织发展异常混乱。共和国正在计划紧急任命一批劳工派官员前往当地，建设社会主义工会组织和工鹫自治制度来推动社会主义建设。"
GRW_syndicalism_2: "劳工派：加强工业建设"
GRW_syndicalism_2_desc: "为了加速国家的工业化进程，提升经济实力，劳工派提出了一系列加强工业建设的政策与规划，推动普里文向现代化工业强国迈进。"
GRW_syndicalism_3: "劳工派：增加工业资金"
GRW_syndicalism_3_desc: "充足的资金投入是工业化的关键。劳工派官员与工鹫代表目前提出了一些增加工业资金的政策，预计这些政策实施后，我们能更好的为工业发展提供财政支持和资源调配，从而使工业建设有坚实的资金保障。"
GRW_democratic_socialism_1: "民主党派：任命民主党派官员"
GRW_democratic_socialism_1_desc: "为了推动社会主义建设，强调社会公平和民主参与，平衡各方利益并推动社会主义民主化进程，一批民主党派官员将会进入政府部门。"
GRW_democratic_socialism_2: "民主党派：增加科研资金"
GRW_democratic_socialism_2_desc: "由于国防需要，我们在民生方面的科研投入一向捉襟见肘，现在，各个民主党派通过政协提出一项提案：由民主党派在海外经营的党产利润中提供一批资金，用于共和国民生方面的科研投入"
GRW_democratic_socialism_3: "民主党派：多样化文艺发展"
GRW_democratic_socialism_3_desc: "作为一个新兴的社会主义国家，共和国的文化艺术领域仍然相对单一，缺乏多样性和创新性。因为民主党派拥有广泛的社会基础和中立的政治立场，所以我们可以让民主党派发展多样化文艺来丰富鹫民的精神生活，提升共和国的文化软实力，从而为社会主义建设提供强大的文化与精神支持。"
GRW_stabilize_coalition: "稳定国家"
GRW_stabilize_coalition_desc: "不得不承认的是，尽管召开代表大会前我们已经做足了准备，但仍旧有些地方由于时间紧任务重导致落实不到位，我们在这些地方与群众脱节了，这是件坏事。\n\n因此我们下一步的政治工作就是加强与各地的苏维埃自治共和国的联系，并巩固这些社会主义政权在当地的领导，这一切不能是自上而下的官僚主义，而是要在派遣工作队前往各自治共和国建立扎实的群众基础，宣传共产主义，并发展各地的无产阶级壮大起来。"
GRW_promote_mandarin: "标准化语言"
GRW_promote_mandarin_desc: "统一埃维河谷之后，一个棘爪的问题摆在了我们的面前：语言不通。地方干部常常抱怨语言不通导致的误会甚至是冲突整的他们焦头烂额，也许是时候选择一种语言作为我们共和国的官方通行语言了。我们将鼓励鹫民积极学习和使用这种普通话。"
GRW_local_cultural_preservation: "地方文化保护"
GRW_local_cultural_preservation_desc: "历史文化遗产是不可再生、不可替代的宝贵资源。战后，各个区域的地方文化与文明古迹都遭受一定的破坏，我们要迅速组建专业考察团队，深入各个角落，普查独特的地方文化并进行保护。"
GRW_maintain_national_unity: "民族区域自治"
GRW_maintain_national_unity_desc: "面对疆域广袤的国土以及众多民族情况下，为实现各民族共同繁荣，更好的建设社会主义。只有实行民族区域自治制度，才有利于各民族的发展和社会主义的繁荣、昌盛。"
GRW_subsidize_higher_education: "补贴高等教育"
GRW_subsidize_higher_education_desc: "尽管在内战结束后我们的高等教育发展及其迅速，然而与世界教育强国相比，我们的高等教育建设仍相当落后。我们将投入更多的资金和土地以补贴高等教育，让共和国的高校成为千千万万鹫才的摇篮。总有一天，基韦辛国立大学将成为比肩甚至超越那些耶鲁的大学。"
GRW_reversing_brain_drain: "扭转鹫才流失"
GRW_reversing_brain_drain_desc: "埃维有一句俗语：“金巢银巢不如自己的鸟巢”。恋土怀乡是许多埃维鹫的特质。然而，连年的战乱逼的不少鹫才流亡海外。我们急需采取措施扭转这一现象。需要指出的是，流亡的知识分子之中相当一部分对我们的事业有着好感甚至十分认同。我们将以充分的信赖换取他们对共和国建设的支持，而一个宽松的学术环境将鼓励每一只鹫在他们所擅长的领域为社会主义事业出谋划策。"
GRW_miracle_weapon: "奇迹武器"
GRW_miracle_weapon_desc: "水晶，不仅是魔力的重要来源，在炼金、锻造等领域也被大量采用。但如今，我们或许要刷新对它的认知。最新研究指出：在某种特殊法阵的驱动下，水晶会瞬间释放出大量灵能。这些灵能甚至可以激发铀、钚等重核元素进行自持裂变，进而释放出更多能量。如果该装置投入军用，我们将得到一种威力超过以往所有炸弹的奇迹武器，这将从根本扭转战局。中央军委已经批准了我们的计划，新武器被名为——水晶裂爆弹。为了革命的胜利和共产主义的美好未来，我们必须加速裂爆弹的研制与生产，并尽快将其实战化。"
GRW_investigation_department: "中央调查部"
GRW_investigation_department_desc: "常委会会议通过了一项决议——成立中央调查部。原先的革命政治保卫局扩编成这一部门，以提升共和国在内务与情报工作上同反革命分子的斗争实力。"
GRW_first_fiveyear_plan: "第一个五年计划"
GRW_first_fiveyear_plan_desc: "科学来讲，“五年计划”以五年为一经济全周期是一个在理论上成立、尝试上合理、时间上充足的经济规划理论。这一理论在嘶大林格勒已经证明了其成功，而现在那里的同志将这些成功的经验传授给了我们，同时我们自己也找了他们要来了具体的失败经验。\n\n总之，我们的经济工作将会日趋计划化，并在这几天宣布这个宏伟的计划——第一个五年计划，即一五计划！"
GRW_trade_union_law: "共和国工会法"
GRW_trade_union_law_desc: "工会是保证工鹫权利的重要组织，但在王国时期常常被反动派们打压，在新生的共和国里，工会不再会被打压，我们将制定法律，保障工会在国家政治、经济和社会生活的合法地位。"
GRW_national_housing_plan: "国家住房计划"
GRW_national_housing_plan_desc: "社会主义经济制度解放了大量的社会生产力，我们的共和国发电量一直都是计划赶不上迅猛增长的变化。这也使得我们能够以国家的名义拓宽我们的社会主义福利，同时也是为了实现我们的社会主义理想，因此——“国家住房计划”应运而生！\n\n我们将建设大量的国供住宅，并提供免费的国家住房使用权给所有的生灵。"
GRW_free_medical_care: "国家医疗补贴"
GRW_free_medical_care_desc: "在过去封建帝国统治时期，无数家庭因高额的医疗费用而陷入绝境。我们绝不能让这样的悲剧继续上演。我们将会推行国家医疗补贴计划，通过政府的财政支持和资源调配，覆盖全国的医疗保障网络将逐步构建起来。这样，每一只民鹫都能享受到廉价又不失质量的医疗服务"
GRW_workers_paradise: "劳工天堂"
GRW_workers_paradise_desc: "社会主义建设的如火如荼的同时，我们不能忘记工鹫们的贡献，我们要提高工鹫的生活品质，把普里文建设成劳工天堂。"
GRW_invest_stateowned_company: "投资国企"
GRW_invest_stateowned_company_desc: "随着政府的资金越来越充裕，得到了更多项目预算的国家计划委员会拟定了一项对我国国有企业的全面投资计划，利维乌同志稍后就将召开预算分配会议，讨论具体投资事宜。"
GRW_three_major_transformations: "社会主义改造"
GRW_three_major_transformations_desc: "现在我们的经济形势又发生变化了，我们的社会主义经济已经占据了国民经济的主导地位，同时在我们对民族企业实行国家资本主义政策后，赎买的条件也已经成熟。红兴同志认为现在已经是时候发动一场轰轰烈烈的社会主义改造运动了，我们将逐步实行农业社会主义合作化和最最重要的一件东西——计划经济！"
GRW_new_socialist_countryside: "社会主义新农村"
GRW_new_socialist_countryside_desc: "在我们努力发展城市工业时，也不要忘记建设乡村。水利部已经计划在农村大规模开展水利工程建设，以提升粮食产量。工业部正在为每个村庄引入电力设施，为未来建设乡镇工厂做准备。农业部正在开办各类农业技术培训班，让每只狮鹫都掌握先进种植与养殖技巧。同时，我们也要注重乡村文化建设，各地政府开始修建乡村图书馆与文化广场。我们相信，这些助力乡村建设的举措能更好的为社会主义的长远发展筑牢根基。"
GRW_rural_credit: "支持农村信贷"
GRW_rural_credit_desc: "我们将扩大农业银行的业务范围，使其可以向广大农民们提供低息乃至无息的农村信贷业务，支援农业生产与农村基础设施建设。\n\n我们的同志也将信贷社网拓展至全国范围，使其能够全面落实我们的政策。"
GRW_seize_means_of_production: "国家控制生产资料"
GRW_seize_means_of_production_desc: "全面来讲，是无产阶级整体利益的代表（普里文共产党）以国家的名义掌控着全部的社会生产资料，而无产阶级则是这一链条的根本。\n\n而现在经济建设与无产阶级的日趋壮大让我们可以正式宣布，我们的社会主义改造进入了一个新阶段——即国家控制生产资料！"
GRW_eightcharacter_constitution: "农业八字宪法"
GRW_eightcharacter_constitution_desc: "农业作为国家的根基，关乎着全体鹫民的福祉。经过长期实践，农业部计划草拟了一份农业八字宪法作为我们发展农业的方针，主要内容有：1.土”字为先，大力开展土壤改良行动2.“肥”力跟上，加大对肥料生产的投入，确保土地养分充足，。3.水”利保障，全面规划水利设施建设。4.“种”子优化，设立专门的种子培育机构。5.“密”度科学，制定合理的种植密度标准。6.“保”护有力，加强病虫害防治体系建设。7.“管”理精细，建立完善的农业生产管理制度。8.“工”具革新，大力发展农业机械化，研发适合本地的农具和机械设备。我们相信，“农业八字宪法”的实施，我们的农业水平将会迈向新高度。"
GRW_infrastructure_development: "重视基础设施建设"
GRW_infrastructure_development_desc: "农村工作部与国家计划委员会共同商议了一个旨在将底基建地区修建基础设施的计划，这将代表我国开始逐步重视起消灭内部的城乡差别矛盾，相信在不久的将来，我们能够彻底消灭这一矛盾。"
GRW_rural_electrification: "乡村电气化"
GRW_rural_electrification_desc: "电气化是我国走向社会主义高级阶段不可或缺的条件，而农村电气化则是这一条件的要素，农村工作部将把逐年增长的预算投入到实现村村通电这一目标上。\n\n我们的技术工鹫队伍庞大而有力，同志们也踌躇满志，相信这可以让我们向“各尽所能，按需分配”这一伟大目标更进一步！"
GRW_farmer_paradise: "农民乐园"
GRW_farmer_paradise_desc: "由于我们极大增长了农村地区的物质基础，现在即使是这些地方也得益于农业生产的机械化、电气化和自动化，农民阶级正在逐步向农业工鹫阶级转变的同时，也解放了大量的社会劳动力，使其能够从事其他方面的工作。他们让农村地区的生活条件越来越好，甚至在普里文苏维埃共和国境内，大多农村的生活质量已经同城市齐平，不论是教育、医疗、住房还是交通，都已毫不逊色。"
GRW_perfect_workerpeasant_alliance: "完美的工农联盟"
GRW_perfect_workerpeasant_alliance_desc: "我们实现了乃至嘶大林格勒都要不禁羡慕的成就，我们经过长久的经济发展与公有制分配制度，几乎消除了工农差别，国内的居民幸福度了甚至赶上了资本主义的小马利亚。\n\n同志，现在是非常值得欣喜的一刻，晚上其他同志们打算聚在一起在广场搞一场盛大的派对，记得别迟到哦。"
GRW_independent_autonomous_foreign_policy: "放眼外界"
GRW_independent_autonomous_foreign_policy_desc: "埃维统一的同时也代表着我们的外交形势出现了重大变化，我们的外交视野不再局限于埃维区域，而是开始逐步放眼全世界……\n\n同样由于我们内部派系的特殊性，我们可以同时进行社会主义外交与新民主主义外交。"
GRW_deepening_ties_with_Stalliongrad: "深化与嘶大林格勒的联系"
GRW_deepening_ties_with_Stalliongrad_desc: "霆羽同志率领国际局的同志们开始加大与我们的社会主义兄弟国家之间的联系，尤其是与老牌社会主义国家嘶大林格勒的联系。"
GRW_CYA_problem: "蓝百合问题"
GRW_CYA_problem_desc: "蓝白合之地将会是我们国际局同志们接下来的行动目标，我们将搜罗当地的反革命具体势力强弱，同样的，我们也将联系南方的蓝百合同志，并尝试与他们一起联合起来！"
GRW_free_the_bulls: "处理牛头怪"
GRW_free_the_bulls_desc: "就与我们隔海相望的星空共和国而言，我国在这方面的外交工作上出现了不同的意见，一方面是外交部以抗议越权行为为由计划了一个能够实现对其和平演变的方案，而国际局方面则仍旧是咄咄逼鹫的革命态度对待着星空之地，双方就这事现在仍旧吵得不可开交。\n\n目前中央委员会与常务会议将就此事召开扩大会议，我们将仔细斟酌这两套方案，一个月后我们将敲定具体实施的方案。"
GRW_free_the_Vartai: "染红门界"
GRW_free_the_Vartai_desc: "向外扩张革命的时刻到来了，国际局的同志们已经计划好了向门界地区发动革命的绝密文件，管他什么外交部的机会主义者们，现在只要中央委员会通过了，红兴主席就可以随时向那些腐朽的反动政权予以致命一击！"
GRW_southern_griffonia_strategy: "南狮鹫尼亚战略"
GRW_southern_griffonia_strategy_desc: "南狮鹫尼亚的革命形势远比之前的复杂得多得多，再加上我国的外交工作在这方面存在意见不合的情况，国际局与外交部提出的方案相互非常尖锐对立，这也导致了我们不能够第一时间对政策做出决断，而是都要开一场漫长的拉锯战才肯做罢。\n\n但不论如何，解放南狮鹫尼亚仍旧势在必行！"
GRW_fulfilling_the_revolutionary_mission: "完成革命使命"
GRW_fulfilling_the_revolutionary_mission_desc: "我们都应当越战越顽强\n\n和敌军决死在疆场!\n\n解放军的战士们\n\n把刺刀擦亮\n\n要紧紧握住爪中枪！\n\n我们都应当\n\n越战越顽强\n\n和敌军决死在疆场！\n\n解放军战士迈开步向前进！\n\n响应号召我们去斗争！"
GRW_renegotiate_eler_sea_agreement: "修订爱勒海条约"
GRW_renegotiate_eler_sea_agreement_desc: "随着经济的进一步恢复，套在我们脖子上的绞索松开了一点，我们终于可以喘口气，回头看看我们付出的代价了。我们与哈比鸟之间的《爱勒海条约》，坦白来讲，既不对等，也不划算，更不道德。是时候提出要求，让他们考虑再谈一谈了。"
GRW_eastern_diplomacy: "东方外交"
GRW_eastern_diplomacy_desc: ""
GRW_southern_neighbor: "南方的逃奴自由邦"
GRW_southern_neighbor_desc: ""
GRW_develop_eastern_frontier: "开发东部边疆"
GRW_develop_eastern_frontier_desc: "众所周知，埃维河永远是埃维河谷地区的大动脉。格里芬姆、基韦辛、西迪亚甚至凯辅，多少大城市坐落于埃维河的流域之中。但东方的情况就不那么一样了。从胡撒卡到鹰巢堡，格里弗斯山脉与夜之森让外来者望而却步，传统上只有最封闭的村落和逃犯才会在这里居住。现在，是时候唤醒沉睡的高山与密林，让它们献出无尽的宝藏！"
GRW_organize_High_Mane_conference: "组织高鬃城会议"
GRW_organize_High_Mane_conference_desc: "我国现在与东方的河间邻居的关系令鹫尴尬。同为这片大陆上的两个重要国家，我们之间却呈现一种老死不相往来的诡异状态。这种现状必须被改变，哪怕做一点改变的尝试。我们将提议举办一次双边高级会议。为表姿态，甚至连会议地点都可以由对方决定。"
GRW_import_ponaidhean_textiles: "进口驹纳延纺织品"
GRW_import_ponaidhean_textiles_desc: "驹纳延的纺织品尚可以“物美价廉”来形容。虽然我们国内有相当的纺织品生产，从星空或者其他国家也有此类商品输入，但如果能以此扩大与河间的联系也是再好不过了。我们将给予进口驹纳延的纺织品一定的政策倾斜。"
GRW_master_Wittenland_magic: "学习威腾兰魔法"
GRW_master_Wittenland_magic_desc: "很早之前——比大湖城和江源城的形成还早，甚至比普里文有文字记载的历史还早——威腾兰的森林就孕育了法师治理的威腾兰至高王国。一千多年来，威腾堡的大图书馆里积攒了大量魔法研究的著作，而当地贵族甚至懒于去整理一下。趁着双方合作的东风，我们将挑选一批富有才华的学生学习那里艰深的知识。"
GRW_hire_Bakaran_sailors: "聘请巴卡拉海员"
GRW_hire_Bakaran_sailors_desc: "巴卡拉算是闭塞的东狮鹫尼亚地区向外看世界的窗口。其居民从事航海的历史悠久，那里最好的海员不比彼得蹄或马哈顿的逊色，但声索的工资要比这两处低不少。作为一个对外贸易蓬勃发展的国家，我们无疑需要他们的专业技术与智慧。"
GRW_master_diamond_dog_mining_tech: "钻石狗的采矿技术"
GRW_master_diamond_dog_mining_tech_desc: "论矿冶，钻石狗堪称天下第一。只需看他们的表亲在帝国内取得的巨大成功，便可知钻石山的潜能巨大，只是相对被河间的封闭限制罢了。趁此双方关系蜜月期间，我们应当尝试聘请钻石狗技师，利用他们的知识与技能，让更多的矿藏为我们所知。"
GRW_tariff_negotiation: "进行关税谈判"
GRW_tariff_negotiation_desc: "无论是哪一派经济学者，对关税持何种看法，最终都会同意：如果剥离关税的保护作用，那么关税就是百害而无一利的。对于我国与河间的经济合作现状来看，两国并不拥有太多所谓“需要保护的幼稚产业”，而且我们的经济学家认为进一步开放市场有助于产业健康发展。是时候协商降低双边关税了。"
GRW_joint_drill: "联合军演行动"
GRW_joint_drill_desc: "我们当然不能满足于关起门来红军打蓝军的老把戏，事实证明，11世纪的战争日新月异；军事发展如逆水行舟，不进则退。与河间交流军事经验因此至关重要；此外，军方还认为此举有益于双方军队增进相互了解与战略互信。"
GRW_simplify_visa_application: "简化签证程序"
GRW_simplify_visa_application_desc: "签证制度始于小马利亚对于幻形灵与谢伟良纳两处的入境人员的审查。随着更多国家因国家安全等原因纷纷效仿，此等制度在近十几年里逐渐成为了国际惯例，很大程度上限制了公民的旅行自由。如果我们与河间之间有足够的相互信任，我们应该尽量减少这一制度带来的麻烦。"
GRW_rdc_investments: "河间开发公司的投资"
GRW_rdc_investments_desc: "河间开发公司，作为河间同盟其负责公共工程的核心部门，拥有丰富的施工经验和技术储备。为了加速我们的基建建设进程，我们决定与河间开发公司展开合作，吸引其投资和技术支持，共同推动我国的基础设施建设和经济发展。"
GRW_hire_RIV_engineers: "河间工业合作"
GRW_hire_RIV_engineers_desc: "虽然两国工业都在蓬勃发展，但工业产品在世界市场上的竞争力还不及老牌发达国家。为了进一步提升双方的工业实力，我们应当展开全方面、多领域的工业合作，从交流技术经验到互派技术团队，以实现双方更高水平的工业化。"
GRW_recognize_rivbit: "承认河元"
GRW_recognize_rivbit_desc: "两国的贸易结算很大程度上仍然使用小马利亚比特和天落北风币。长期来看，这两者都有不小的风险，更因为汇兑操作增加了贸易成本。我们将推动两国贸易实现直接的本币结算：我们将承认河元，而对方将对等施行。这将进一步促进投资和贸易往来，形成良性循环。"
GRW_RIV_scientific_exchange_program: "成立东方科学院"
GRW_RIV_scientific_exchange_program_desc: "在科技创新竞争尤其激烈的11世纪，后发国家需要联合起来才能找到自己的位置。我们将与河间联合成立东方科学院，这一新的国际科学组织将成为埃维—河间跳动着的科研心脏，为科学发展与社会进步带来不竭动力。"
GRW_atomic_energy_cooperation_committee: "原子能合作委员会"
GRW_atomic_energy_cooperation_committee_desc: "在早些年发表的论文中，小马利亚的首席核物理学家兼善良元素小蝶指出，原子内部埋藏着几乎无尽的能量。有情报称各大国都在加紧开发原子武器。为了避免受到如此不对称的恐怖威胁，我们应当合作开展原子能研究。"
GRW_establish_RIV_central_intelligence_strategy: "成立河间中央情报与战略规划处"
GRW_establish_RIV_central_intelligence_strategy_desc: "河间的资产阶级不是擅长以谐律情报局为打蹄，镇压与监禁无产阶级革命者么？让他们放马过来！我们将针锋相对地成立河间中央情报与战略规划处，让隐蔽战线最先打响解放河间无产阶级的战争！"
GRW_implement_trade_blockade: "实施贸易封锁"
GRW_implement_trade_blockade_desc: "河间的无产阶级在呻吟，在受罪，而那里的资本家仍然能收到[GRW.GetAdjective]送来的钞票；这是不可接受的。我们将对河间采取严格的贸易封锁。没有商务部的批准，一粒大米也不允许运过边境！"
GRW_contact_RIV_comrades: "支持河间的同志"
GRW_contact_RIV_comrades_desc: "虽然屡遭打击，但是河间的民主进步势力依旧强大。巴卡拉的统一共产党，钻石山的劳工统一战线，江源共产主义者联盟甚至宁部西亚的黑劳士都是我们的朋友。现在是时候更进一步，承认他们都是我们的同志了。我们将全力支持。"
GRW_arise_starving_and_freezing_slaves: "起来，饥寒交迫的奴隶"
GRW_arise_starving_and_freezing_slaves_desc: "世世代代受苦受难，男女老少受饥寒。\n如今黑暗快要消散，只等把血债讨还！"
GRW_arise_all_races_suffering_creatures: "起来，各种族受苦的生灵"
GRW_arise_all_races_suffering_creatures_desc: "仇恨的风在头上咆哮怒吼，黑暗势力向我们下毒手。\n快团结紧和敌人决一死战，也不必问有什么在前头！"
GRW_no_more_traditions_chains_shall_bind_us: "再无传统锁链束缚我们"
GRW_no_more_traditions_chains_shall_bind_us_desc: "我们要砸碎那最后的锁链，砸碎那万恶的旧世界！\n创造属于我们的新世界，让整个世界属于我们！\n这是崭新的斗争！这是真正的斗争！\n前进！前进！前进！前进！"
GRW_smash_old_world_to_smithereens: "把这旧世界打个落花流水"
GRW_smash_old_world_to_smithereens_desc: "而现在民众将在战斗中崛起，\n用响亮的声音呼喊着：“向前进吧！”\n团结的民众将永远不会被击败，\n团结的民众将永远不会被击败！"
GRW_thunderous_condemnation_for_justice: "因公义雷鸣般的谴责"
GRW_thunderous_condemnation_for_justice_desc: "他们霸占了无数的钱财，他们不劳而获，\n如果没有我们的头脑和肌肉，轮子无法转动，\n我们可以打碎他们傲慢的权力，获得我们的自由，只要我们坚信\n团结就是力量。"
GRW_finer_world_being_born: "更美好的世界正在诞生"
GRW_finer_world_being_born_desc: "我们的红旗多么壮美，劳工的血染红而成；\n无产阶级高尚的旗帜，是被压迫者们的先锋！\n要为普天下民众，带来和平与幸福。"
GRW_not_say_we_have_nothing_we_will_rule_all: "不要说我们一无所有，我们要做天下的主宰！"
GRW_not_say_we_have_nothing_we_will_rule_all_desc: "猛攻，猛攻，捶碎这帝国主义万恶丛！\n奋勇，奋勇，解放我殖民世界之劳工，\n何论鹫、马、鹿，无复奴隶种！\n从今后，福音遍天下，文明只待共产大同。\n看！光华万丈涌。"
GRW_form_production_construction_corps: "组建生产建设兵团"
GRW_form_production_construction_corps_desc: "我国的东疆还为得到充分的开发，这些未经守备的高山密林是危险的，永远也不能低估躲藏在这里的破坏分子的势力。为了支撑我们下一步对东方的军事行动，我们必须组织部队对这里施行军事化的开发与管理。"
GRW_develop_war_plans: "制定系列战争计划"
GRW_develop_war_plans_desc: "我们与河间终有一战。不是无产阶级粉碎河间封建主—资本家的残暴统治，就是反动势力扼杀劳工与农民的反抗行动，这将是你死我活的斗争。从威腾兰开始，我们将制定详尽的战争计划，为即将到来的全面斗争高潮做好准备。"

###- 第三阶段政治国策 -###
GRW_people_congress: "第二届国民代表大会"
GRW_people_congress_desc: "我们可以自豪了，我们的共和国让伟大的马科思主义在这片古老的大陆上生机勃勃，现在我们的国境几乎遍布整片大陆，同样，我们的常务会议已经不能代表我们全无产阶级的利益了。为此我们必须举行一次规模更大的国民代表大会，越大越好，包揽我们的一切无产阶级兄各地姐妹！"
GRW_march_on_aquileia: "进军阿奎莱亚"
GRW_march_on_aquileia_desc: "阿奎莱亚是狮鹫尼亚大陆最古老的文明之一，自从这片土地被来自帝国的魔爪控制以来，她的子民们便从未停止反抗。纵使第一次革命惨遭背叛，共和的旗帜被贪婪的贵族焚毁，阿奎莱亚的狮鹫们依然坚持为自由奋战到底。\n是时候了！为所有倒在恐怖统治之下的英烈复仇，让雄壮的《马赛曲》再度响彻这片英雄的土地上！\nLiberté！Égalité！Fraternité！"
GRW_free_the_Northern_Griffonia: "解放北方冻原"
GRW_free_the_Northern_Griffonia_desc: "狮鹫尼亚共和国曾是大革命的灯塔，一度推翻赫兹兰贵族的腐败统治，“民主，民权，民生”更成为了每一位革命者的口号。但如今，狮鹫尼亚共和国已经背离革命的初心，沦为了一个腐败专制的国家。它已从北境的灯塔化作了反动壁垒，不再能够代表狮鹫尼亚的进步力量。\n因此，让我们将革命的理想重新带回共和国！"
GRW_comrades_of_the_North_Zebrican: "北斑马里加的同志"
GRW_comrades_of_the_North_Zebrican_desc: "斑马里加，这块大陆是我国最缺乏关注的地方，但随着狮鹫和马奎斯大陆的相继解放，我们便将接下来的目标锁定在这片反革命依旧作威作福的地方。\n\n但好在这里我们也有一些意志坚定的革命同志们在做着斗争，波萨达——北斑马里加共产主义革命的领袖，同时也是一个科工社会主义者，虽然在一些观点上我们有些分歧，但那也终究只是革命力量之间的内部矛盾。\n\n所以不论如何，我们国际局的同志都将南下与他们建立更加紧密的关系。"
GRW_set_foot_in_New_World: "踏足新世界之地"
GRW_set_foot_in_New_World_desc: "尽管我们曾付出巨大努力，但是新狮鹫尼亚共和势力还是在内战中败下阵来，最终暗淡离场。反动派将民主理想肆意践踏，自认为这是革命的终结。\n但是我们绝不会让他们高枕无忧。在肃清狮鹫尼亚大陆的反动势力后，我们终于腾出爪来，可以拔除这个小反动壁垒了。我们将再次跨过大洋，为昔日的自由斗士们复仇，让红旗再度飘扬在马奎斯北境！"
GRW_alliance_with_Stalliongrad: "与嘶大林格勒的同盟"
GRW_alliance_with_Stalliongrad_desc: "是时候让我们发革命友谊跨过洋去，同世界上第一个社会主义政权建立军事同盟，我们开始旗帜鲜明并真正让全球的革命力量联合起来。"
GRW_eliminate_revisionists: "消灭修正主义者"
GRW_eliminate_revisionists_desc: "革命之后，民众没有自由与富裕，到处都是压迫与剥削。试看今日之嘶大林格勒：昔日的社会主义灯塔已经暗淡无光，它继重拾了昔日腐朽沙皇的衣钵，共产主义的理想被抛掷脑后。它已经成为了”社会帝国主义“国家，鲜艳的红旗已然褪色，理想被特权所替代，而这一切都被包装在所谓社会主义的外壳之下。他们已经不能再被称之为社会主义者了，他们已经堕落到革命的反面——修正主义。让我们从叛徒蹄中拯救这革命的故乡，重燃十二月革命的火焰！"
GRW_complete_December_revolution: "完成12月革命"
GRW_complete_December_revolution_desc: "995年12月25日，一声炮响划破了姬里津的夜空，10世纪末最具影响力的政治运动——凛冬革命，轰轰烈烈地爆发了！正因为有他们的这场向光明的首次进军，才让我们看到了新希望。可惜的是，由于某些原因，革命并未继续下去。但是，历史给了我们第二次机会。今非昔比，我们拥有了更加强大的力量，这次绝不能再错失良机。让我们继承钢铁·嘶大林的遗志，并携爪谢韦良纳的同志们，将革命的星火燃遍整个小马利亚。英特纳雄耐尔，就一定要实现！"
GRW_free_Equus: "红旗插遍马奎斯"
GRW_free_Equus_desc: "同志们是时候了，现在我们战无不胜的共产主义革命浪潮距离完全解放世界其中一块大陆的革命使命已经近在咫尺了，只要我们再向前进，我们定能解放全马奎斯。\n\n让我们把红旗插遍马奎斯！"
GRW_world_communism: "建立世界社会主义联盟"
GRW_world_communism_desc: "至此，一个崭新的世界彻底团结在社会主义的红旗下，昔日血与泪的土地被无产阶级改造成梦想中的地上天国。马科思主义的光芒照耀着它，伟大的无产阶级劳动群众们，正在用自己的实际行动，一点一点地实现那最崇高的理想。一万年太久，只争朝夕。全世界无产阶级联合起来！让我们向着共产主义新世界，前进！"
GRW_revisiting_riverlands_diplomacy: "重新审视东方政策"
GRW_revisiting_riverlands_diplomacy_desc: "共和国对于东方地区的外交政策史，其实就是一部共和国外交事业的内斗史，多年以来我们一直都在外交部与国际局之间徘徊，也因此我们的外交形势具有两种完全不同思路的特点……\n\n但现在面对这一更本性的问题，我们不能再做出棱模两可的决定了，不论是外交部还是国际局，他们的路线可以说是完全相反的。\n\n但面对这一问题，金翼主席也定夺不了，于是他便决定召开一次外交工作会议。"
GRW_cooperation_with_RIV: "与河间合作"
GRW_cooperation_with_RIV_desc: "随着综合国力的增强，共和国与周边国家的联系日益紧密。特别是在河间地区，共和国与河间的贸易总量已经成为双方对外贸易的重要一环，共和国与河间的科研合作也在有条不紊的进行中。为了更好的推进双方合作，外交部的同志已经前往河间，计划与河间政府签署更多的合作协议。"
GRW_deepen_bilateral_cooperation: "深化双边合作"
GRW_deepen_bilateral_cooperation_desc: "我们——埃维与河间地——都是狮鹫尼亚这块大陆上的后发部分。我们埃维与河间地，同是狮鹫尼亚帝国秩序下的受害者。我们比任何生灵都更清楚那种不平等、榨取式的关系所带来的痛苦。正因如此，我们之间绝不能重蹈覆辙。我们两国不仅可能实现永久和平，而且必须实现！"
GRW_helping_to_unify_RIV: "帮助河间统一"
GRW_helping_to_unify_RIV_desc: "目前，河间同盟内的左翼势力还是很强大的，我们可以通过与大江共产党等河间红色党派合作来制造河间同盟内部混乱的局面。如果合作顺利，他们将作为我们对河间地区进行解放战争的内应和战后的重建方。以便降低之后我们解放与重建河间地区的难度。"
GRW_secure_southern_border: "保卫南部边境"
GRW_secure_southern_border_desc: "我们共和国南部的那些小政权三天两头便越过边境袭击我们，给我们造成了经济损失和边境动荡，而在面对南部边境这一问题上，外交部和国际局出乎意料地意见统一——解放所有南部地区，保卫南部边境。"
GRW_free_RIV: "解放河间"
GRW_free_RIV_desc: "我们将摧毁所有东方反动政权，不留一点机会，同志们，向着极限革命前进！"
GRW_riverland_soviet_union: "建立河间社会主义联盟"
GRW_riverland_soviet_union_desc: "联系大江共产主义者联盟，让他们主导河间社会主义联盟的建立，我们能给钱给物给军队，但一定要在短时间内建立起一个社会主义政权，同时他们也将作为主权自治苏维埃共和国加入我们的联盟。"
GRW_bringing_socialism_to_the_Northern_Ponies: "给北方小马带去社会主义"
GRW_bringing_socialism_to_the_Northern_Ponies_desc: "随着我们如秋风扫落叶般改换了河间地的社会，我们也将开始执行我们的下一步革命计划，我们将把伟大的共产主义革命传向遥远的北方，将美好前程带进每一处部落群！"

###- 军事国策 -###
GRW_longway_from_Whiteflower: "自白花建军的漫漫长路"
GRW_longway_from_Whiteflower_desc: "1003年，为了反抗旧王国疯狂的屠杀政策，共产党领导下的多支队伍在白花举义，光荣的普里文民主联军由此诞生。在四年的国内革命之中，我们经过四次反“围剿”，取得了三次决定性战役胜利，最终夺取了全国政权。这之后，我们顽强的鹫民政坚持着马科思主义的基本观点与方法，打败了周围对我们觊觎已久的反动势力，并建立起了一个广达整个埃维的社会主义共和国！[Root.GetName]万岁！革命万岁！"
GRW_commission_for_national_defence_industry: "国防工业委员会"
GRW_commission_for_national_defence_industry_desc: "由于缺乏整体规划，到现在为止，共和国的国防工业一直是畸形状态。我们在空军，海军的科研方面要远远落后于陆军，有一些军事工业设施甚至还在前线运作。这种情况不能再持续下去了，为整合共和国有限的资源，协调各方力量，推动国防工业各方面均衡发展，我们计划成立一个国防工业委员会来负责这一事务。"
GRW_military_representatives_in_factories: "推广“军代表”制度"
GRW_military_representatives_in_factories_desc: "“军代表”制度，最早是我们共和国军事工业建设的时候在一些新建成的军工厂的一个特殊岗位，是尖矛同志为确保解放军与后方工业保持紧密联系所设立的。当时由于这一性质存在非法性质，所以这一切都是非正式存在的，但是在刚刚完成的埃维革命中，这种制度已经证明它在协调军事生产方面的实用性，于是我们军委会开了个扩大到中央鹫民政府的会议——推广“军代表”制度。"
GRW_newborn_Red_Navy: "新生的红海军"
GRW_newborn_Red_Navy_desc: "我们将开始正式成立一支规模宏大红海军舰队，目前新的海军指挥部和军事学院海军分校将在港口之城西迪亚设立。虽然现在我们还只是一支绿水海军，但是只要我们能够持续投入这项事业，我们也终会取得最终的胜利！"
GRW_inviting_foreign_consultants: "邀请外国顾问"
GRW_inviting_foreign_consultants_desc: "新成立的军事学院海军分校目前缺乏有经验的海军教师，而我们共和国内部的海军专家又屈指可数。因此在就邀请外国顾问这一政治问题上并不会有太多阻碍，使得我们可以邀请来自任何国家的海军将领或者是理论家来到埃联授课，他们的讲授将为我们培养出新一代海军官兵与赶超先进水平的海军理论。"
GRW_union_shipbuilding_programme: "共和国造船计划"
GRW_union_shipbuilding_programme_desc: "中央军委召开了一次高级会议，会上一致认可了共和国海军建设的紧迫性和在短时间内建成一支颇具规模的红海军舰队群的必要性，国家计划委员会的同志也将在后来着爪为我们提供专项工业资源。\n\n但是不可否认的是，整个计划所需的资源适十分巨大，而共和国同时又欠缺大型的船厂联合体以及先进的舰船蓝图，所以这也注定是一条难走的漫漫长路。"
GRW_marines: "建立海军陆战队"
GRW_marines_desc: "总干部管理部将承接我军海军建设事业中关于建立海军陆战队的议程，他们将军队中那些出生自沿海地区的官兵与军事学院中的学院抽调出来，专门组建一支用于进行技术验证的实验性海军陆战队。相信在不久的将来，这种实践性的科学研究将为我们在短时间内建成一支真正具有战斗力的海军陆战队提供坚实保障。"
GRW_radar_use: "雷达试验"
GRW_radar_use_desc: "得益于我军早年间对于无线电技术的大规模应用以及长期以来重视军事电子工程发展的成果，我们现在以及积累了丰厚的雷达技术储备。而现在我们需要做的则很简单了，设立专项研究项目，并将我们先进的雷达技术应用在红海军舰队上！"
GRW_underwater_bomb: "水雷应用"
GRW_underwater_bomb_desc: "水雷——这一项用于低成本对抗反革命海上势力的武器，我也一定不能无视它的作用。海军分校将在总干部管理部和嘶大林同志的指导下设立水雷科，有了专门的研究学员，我们就将具备水雷作战的鹫才基础。"
GRW_sea_gendarmerie: "海上宪兵"
GRW_sea_gendarmerie_desc: "屏卫舰在战时担任舰队的支援型舰船，在和平时期也可以作为武装海警船使用，可谓是一舰两用。而泽诺同志更是强调道“在我们尚未建成大规模红海军的早期时代，屏卫舰更是承担了共和国海岸防卫的重担，也因此，我们不能无视他的作用。”"
GRW_wolf_pack_theory: "狼群理论"
GRW_wolf_pack_theory_desc: "狼群理论——关于潜艇的大规模应用的学说，它的存在挑战了奉行大舰巨炮的传统学说。而对于我们，共和国现在的体量足以让我们在任何海军建设路线上进行实践，因此我们也将组织专家研究这一课题，并为红海军未来的潜艇作战提供监视的理论基础。"
GRW_fleet_wall: "舰队屏障"
GRW_fleet_wall_desc: "我们的海军学家卢西安向我们指出了一条建议，轻巡洋舰是现代海军作战中作为先锋接敌并且具备独立作战能力的存在。他充分考虑了共和国目前的海军建设现状，提出以轻巡洋舰为主的小舰队作战理论，目前他正在海军分校授课，为学员们传播这一理念。"
GRW_project_891: "891工程"
GRW_project_891_desc: "航空母舰，作为一种近年来出现的新兴舰种，在各国海军中开始逐渐装备。虽然战列舰现在仍然是海军的主力，但我们有预感，在不久的将来航母必将取代战列舰。它的超视距打击能力和极高的火力投送量会给海军带来无与伦比的优势。所以我们绝不能落后，中央军委已经批准了西迪亚船坞建造三艘中型航母的提议，项目代号：891工程。"
GRW_pirate_suppression: "清剿海盗"
GRW_pirate_suppression_desc: "褐水战略的成功以及战后缴获的舰船让我们海军的实力再上一等，也让我们具备了对那些猖獗的海岛展开正面斗争的能力，一旦沿海的非凡被清除，那么不仅海上贸易能够更加顺畅，嘶大林格勒方面的援助也就不需要投入更多的鹫力物力去守卫运输船了。"
GRW_military_eclectic_way: "兼收并蓄,博采众长"
GRW_military_eclectic_way_desc: "我们的军队实力越来越强大，涉及的军种也越来越丰富，而现如今，我们的军事理论却没有赶上我们的军队发展。中央军委将在接下来召开数次会议，同时我们也将根据红兴主席的意见，我们的会议将以“兼收并蓄，博采众长”为指导思想。"
GRW_learn_from_Stalliongrad: "嘶大林格勒的经验"
GRW_learn_from_Stalliongrad_desc: "组织全军上下开展学习嘶大林格勒经验的研讨会和一系列活动，学习我们的一直以高机械化和集成化的社会主义同志军队的各种优缺点，它们的无私奉献，将成为我军走向现代化的前列，我们要拥抱现代战争！"
GRW_our_armoured_division: "第一支装甲师"
GRW_our_armoured_division_desc: "在我们可靠的嘶大林格勒同志的热切帮助下，我们的第一支装甲师所需的一切物质基础已经由嘶大林格勒方面准备完毕，而我们派遣过去的专项学员也即将学成归来，他们将会是我们鹫民军队的第一只机械化装甲力量！"
GRW_mechanisation_of_cavalry: "机械化的哥萨克"
GRW_mechanisation_of_cavalry_desc: "国家计划委员会与中央军委展开了一项深入合作，项目代号为“机械化哥萨克”：我们将军事工业未来的重心向机械化建设偏移，同时将更多的官兵派往嘶大林格勒学习先进的机械化作战技术，当我们这一切完成之时，便将会是反革命们哀号遍地之时！"
GRW_new_model_artillery: "新模范炮兵"
GRW_new_model_artillery_desc: "我们炮兵自古以来是战争之王，而我们的狮鹫无产阶级的铁锤，将会是砸在反动狮鹫旧世界身上的沉重一击！\n\n这是我们建立政权之初的梦想，而现在则变成了现实，但我们绝不会止步于此，我们的炮兵部队将展开部队生产与训练专业化项目。\n\n同志们，向着超一流水准的社会主义炮兵前进！"
GRW_strengthen_multimilitary_cooperation: "加强多兵种合作"
GRW_strengthen_multimilitary_cooperation_desc: "我军在开展大规模生产运动并拉近与群众的练习的同时，也要与兄弟部队们以各类未来要面对的反革命武装为蓝图，展开大规模联合军演，加强多兵种合作。\n\n实现中央军委与红兴主席的热切期望。"
GRW_academy_of_military_sciences: "军事科学院"
GRW_academy_of_military_sciences_desc: "中央军委经会议决定，任命军事理论家泽维尔为军委常务委员，并抽调革命军事学院部分专家与学员组成一个专门的军事科学院，目前有关这些的工作均属共和国机密事项。\n\n我们将对军事科学院提供专项政策支持，以确保它们能够为我们鹫民解放军做出杰出贡献。"
GRW_modernise_the_engineering_battalions: "独立工兵团"
GRW_modernise_the_engineering_battalions_desc: "总后方勤务部现报告了我军目前客观的后勤能力冗余，而这也意味着我们创立独立工兵团的历史时机已经成熟。\n\n在漫长的革命斗争中，工兵作战已经被证实是战争中取胜的关键，现在我们将大力发展这一兵种，并为独立工兵团提供更多的工事装备与专业工程设备。"
GRW_extreme_terrain_training: "极端地形训练"
GRW_extreme_terrain_training_desc: "我们将拓宽417号研究所的科研范围，并在各部队组织抽调专门的实验性部队，在共和国境内的各处极端地形地区进行地形适应性实验，同时我们将联系群众寻求民间意见。\n\n相信在不久的将来，山川将只会是我们对抗反革命有利事物！"
GRW_asymmetrical_warfare: "非常规战争"
GRW_asymmetrical_warfare_desc: "目前各国军界和社会主义革命同志都普遍认为，城市作战属于一种非常规战争，确实，城市地形复杂多变且具有空间作战的概念，是各类战场环境中最为复杂的一档。\n\n但我们作为一只从革命斗争中走出来的军队，城市游击战是我党早期就已经使用透彻的技能，而现在，我们将把这一技能发扬光大，让这些地方成为我革命解放军决胜的战场！"
GRW_establishment_of_raiding_team: "建立破袭小队"
GRW_establishment_of_raiding_team_desc: "破袭小队是我军特种作战开始走向常规化的重要一步，我们将组织每支部队都组建一支专门的突击队和突击营，迂回到敌军后方进行破袭行动，以便让我们能够更有利地挫败反革命的猖狂进攻！"
GRW_inheritance_of_Whiteflower_base: "解放战争传承"
GRW_inheritance_of_Whiteflower_base_desc: "自1005年白花起义以来，我解放军一直以实现世界社会主义革命而为之奋斗着，在当时，我们就已经养成了一些优良的作风与风气。\n\n而现在我们作为一只能够遍布全世界的革命武装，这些优良的作风与风气的传承就显得尤为重要。\n\n我们的解放军官兵务必学习当年革命作风，参与民间生产，实现军民生活必需品自给自足，按照红兴主席的寄语就是“万万不可养成一支脱产军队，与群众、与革命脱了联系！”"
GRW_revolutionary_war: "动员革命群众"
GRW_revolutionary_war_desc: "革命不是请客吃饭，起码不能是这么简单的理解，即使是请客吃饭，我们最后也要联合起来冲出这栋透露着腐朽气息的资本主义世界！\n\n我们的革命战争也是如此，共和国的每一位生灵都是我们革命的根本动力，我们必须认识到一点，我们所有狮鹫的解放，都要以每一只狮鹫的的解放为前提！"
GRW_improving_military_training: "一流训练"
GRW_improving_military_training_desc: "一流的标准是什么？是长年累月的磨练，还是坚定不移的战斗意志？\n\n都不是，而是实现解放军战士以士兵职能为主的全面发展，我们的一流训练既是我们军事操练的标准，更是我们解放军官兵作为一位共产主义战士的重要指标！"
GRW_smallunit_tactics: "小编制战术"
GRW_smallunit_tactics_desc: "我们要在战略上藐视敌军，在战术上重视敌军。对连级一下部队实施小编制战术，有利于在未来的大兵团作战中实现基层官兵灵活指挥部署激发基层士兵的作战积极性！"
GRW_large_scale_collective: "大兵团联合作战"
GRW_large_scale_collective_desc: "鉴于我们世界革命和目前鹫民军队的战力水平进行综合分析，我们认为大兵团联合作战，这种复杂的军事作战概念，为我军的指导建设方针是正确的选择。\n\n它是指将多个不同军兵种的大规模作战力量（兵团），包括陆军、海军、空军、后勤部队以及特种部队等，按照统一的作战意图、计划和指挥，有机地结合在一起，在广阔的战场空间（陆、海、空）进行协同作战的作战样式。例如在一场跨海登陆作战中，陆军的两栖作战部队乘坐登陆舰艇在海军舰艇火力掩护下，同时在空中力量的支援下，突破反革命的海岸防御，这一过程涉及多个军兵种的联合行动。以上，则就是典型的大兵团联合作战！"
GRW_invincible_army: "所向披靡之军"
GRW_invincible_army_desc: "我们的革命历程波澜壮阔，我们的鹫民军队强大有力，我们的无产阶级作为一个武装起来的阶级，已经成为了狮鹫尼亚大陆革命的中流砥柱……\n\n我们是共产主义的 所 向 披 靡 之 军！"
GRW_clear_the_sky: "净化天空"
GRW_clear_the_sky_desc: "革命军事学院带来了一个利好消息，炮兵学院防空科“净化天空”研究团队在通过结合战争时期狮鹫空中作战和嘶大林格勒方面的军事经验并加以社会实践与研究后，在防空作战方面取得了令鹫欣喜的结果，而这也将极大推动我国的防空事业蓬勃发展！"
GRW_Republican_Air_Force: "建立鹫民空军"
GRW_Republican_Air_Force_desc: "国防工业委员会、中央军委、和共和国常务会议共同下达了红色文件。开始正式组建埃维联合社会主义共和国革命鹫民空军部队，并且为独立军种存在，目前总干部管理部已经在通过派遣狮鹫前去社会主义同志国家那里学习相关经验来落实前置条件。\n\n相信在不久的将来，我们将很快具备建立空军的物质基础并建设一支制霸反革命蓝天的红色空军！"
GRW_reverse_engineering: "战机逆向工程"
GRW_reverse_engineering_desc: "我们的军事学院将着爪开始研究各国的战机设计并进行逆向工程，并从找出各方的优缺点，从而为共和国的空军事业提供坚实的理论与科技可靠性，而目前最为显而易见的成果就是——我们可以结合各方的先进生产技术，从而降低战机的生产物质需求！"
GRW_standardized_pilot_training: "标准化飞行员训练"
GRW_standardized_pilot_training_desc: "在我们将空军基地的物质条件进行规范化后，接下来便是轮到总干部管理部展开标准化飞行员训练的时候了，委员部将以“细心负责、卫国防空和钢铁雄翼”为训练指导思想，以让我们的飞行员队伍能够快速达到世界领先水平！"
GRW_modern_air_base: "现代化空军基地"
GRW_modern_air_base_desc: "总后方勤务部制定了一项专门用于现代化空军基地的计划，此项计划旨在通过提高空军基地的技术水平的设备水平，并指定规范化的相关标准，来确保现在乃至以后的空军基地都能实现现代化。"
GRW_Ninth_Column: "成立第九纵队"
GRW_Ninth_Column_desc: "第九纵队是一支技术验证性部队，用来为共和国接下来所要成立的空降部队这一计划铺平道路，在此也要感谢他们的英勇付出，让我们的空降部队事业实现了很大的跃进。"
GRW_air_superiority: "空中优势"
GRW_air_superiority_desc: "我们的鹫民空军成立之初是为了什么？这个问题切不可忘却了。\n\n我们成立鹫民空军，就是为了能在空中对反革命分子们实施专！政！为此我们将加大对空军建设的投入，加快科研成果转化与飞行员队伍建设，一定要尽早实现这一伟大目的。"
GRW_battlefield_support: "注重战场支援"
GRW_battlefield_support_desc: "近距支援机是我们将空中优势转化为对地攻击的有利方式，同时也是我们大兵团作战和多兵种合作理论中不可或缺的一环，我们将接下来的空军战机研究重点转向近距支机新型号的研发上，以确保我军的战斗力可以跟上一层楼。"
GRW_submarine_hunter: "潜艇猎杀者"
GRW_submarine_hunter_desc: "我们的研究所将把海军轰炸机研究项目上马，专门研究在海战环境下空中单位对水面舰船——尤其是潜艇的作战理论以及其应用方式。"
GRW_air_ground_integration: "空地一体化"
GRW_air_ground_integration_desc: "空地一体化理论是我解放军军事理论发展的必然结果，它的物质基础是我们强大的陆军体系和新进诞生的共和国空军以及社会主义阶级的喷薄发展和对反革命专政的必要性，并最后由我们的军事学院学员率先突出这一概念。时至今日，这一全新的学说开始逐步成型为一个完整的军事打击理论，而这将是我们共和国和整个社会主义阵营的骄傲！"
GRW_emancipation_from_the_sky: "从天而降的解放"
GRW_emancipation_from_the_sky_desc: "在有了轻型载弹战机对地攻击的研究经验后，我们对战术轰炸机的门道基本已经摸清一二，我们将在嘶大林格勒设计的基础上进行一系列技术突破，可以实现在进行高效轰炸的同时，避免伤及平民目标。"

###- 核心圈子国策 -###
GRW_spark_can_start_prairie_fire: "星星之火，可以燎原"
GRW_spark_can_start_prairie_fire_desc: ""
GRW_Southern_Griffonia_administrative_committee: "南狮鹫尼亚行政委员会"
GRW_Southern_Griffonia_administrative_committee_desc: "普里文在地理上同南狮鹫尼亚山水相连，自古以来关系密切。而今，当地狮鹫的社会主义革命已经在我们的帮助下取得了完全胜利，成立南狮鹫尼亚行政委员会也就成了当务之急——当然，这会交给我们所信赖的同志们去完成。"
GRW_chairman_proletarino: "普罗莱塔里诺主席"
GRW_chairman_proletarino_desc: "翼巴第共产党的领导者，驰名狮鹫尼亚的理论家普罗莱塔里诺毫无疑问是南狮鹫尼亚行政委员会主席的合适人选。党中央同志们权衡利弊，多方考量，最终将南狮鹫尼亚托付给了普罗莱塔里诺——翼巴第的赤色战士。我们希望他能在南方的明珠之城大施拳脚，为鹫民们带来社会主义的崭新气象。"
GRW_WNG_unite_the_FAL: "翼隼归一"
GRW_WNG_unite_the_FAL_desc: "翼巴第——隼尔科这两个南狮鹫尼亚主要国家的战与和深刻的影响了南狮鹫尼亚的近现代历史。在党中央的授意下，委员会正执行普罗莱塔里诺提出的翼隼合一计划，并颇具野心地规划着南狮鹫尼亚的未来。"
GRW_SIC_abolish_autonomous_parishes: "废除自治教区"
GRW_SIC_abolish_autonomous_parishes_desc: "焦糖曾经说过，宗教是马民的鸦片。西卡梅翁联邦教区于特定历史情况诞生，也应顺应现实情况而改组，行政委员会已做出决定撤销自治教区，使南狮鹫尼亚逐渐走上世俗化的道路。"
GRW_Southern_Griffonia_central_direct_control: "来自中央的直接控制"
GRW_Southern_Griffonia_central_direct_control_desc: "南方长期的自治与分裂倾向会影响我们的社会主义改造工作，委员会将加强中央集权，在塔卢兹等地设立直属州县——一个统合的南狮鹫尼亚必然比分散的更容易走上社会主义道路。"
GRW_chairman_gacci: "加奇主席"
GRW_chairman_gacci_desc: "经过党中央的讨论和妥协，原属翼巴第左翼温和派的加奇被指命为南狮鹫尼亚行政委员会的主席。我们相信一个温和而非雷厉风行的代理鹫更能顺应民心，为鹫民谋福祉。"
GRW_WNG_releas_the_FAL: "翼隼分治"
GRW_WNG_releas_the_FAL_desc: "翼巴第和隼尔科长期分而治之已经是无可争辩的历史事实。党中央无意强行合并这两个地区——我们将分别建立翼巴第社会主义自治共和国与隼尔科社会主义自治共和国，让两地的鹫民独立而紧密合作地决定自己的未来。"
GRW_SIC_sycaecia_vanguard: "西凯西娅的忠诚先锋"
GRW_SIC_sycaecia_vanguard_desc: "委员会认为，自治教区的存在和进一步发展有利于南狮鹫尼亚的团结与进步。在可以预见的将来，马科思主义者们会和心向社会主义的西凯西娅崇拜者们携爪并肩前行。"
GRW_Southern_Griffonia_local_socialist_cooperation: "与当地社会主义者合作"
GRW_Southern_Griffonia_local_socialist_cooperation_desc: "我们必须承认南狮鹫尼亚各地左翼支持者的独特性与多样性。与强行改造他们比较而言。和他们合作的可行性大的多，阻力也小的多。南狮鹫尼亚行政委员会正准备在各地与当地社会主义者加强合作，以争取他们的广泛支持。"
GRW_Southern_Griffonia_mineral_geological_exploration_bureau: "矿产地质勘探局"
GRW_Southern_Griffonia_mineral_geological_exploration_bureau_desc: "南狮鹫尼亚盛产橡胶，钢铁，铝等珍贵矿产。新的社会主义政府将完成前鹫的未竟之业——成立统一的南狮鹫尼亚矿产地质勘探局，并整合和国有化采矿产业。为伟大事业开采更多矿石！"
GRW_Southern_Griffonia_land_collectivization: "土地集体化"
GRW_Southern_Griffonia_land_collectivization_desc: "土地，是农民安身立命之本。社会主义不同于其他意识形态的鲜明特点之一，便是它无与伦比的鹫民性。我们将改组并没收大庄园，将土地交由集体农庄和公社——由于南狮鹫尼亚良好的农业基础和水热情况，这显然会取得立竿见影的成效。"
GRW_Southern_Griffonia_subsidize_small_farmers: "补贴小农"
GRW_Southern_Griffonia_subsidize_small_farmers_desc: "要说谁出力最多，收获最少？那当然是勤勤恳恳的小农和佃农们了。然而，在一个崭新赤红的南狮鹫尼亚，这种情况不会重演。中央的批示和拨款已经到达卡廷城，委员会的同志们会把这笔钱用于农机购置，生产社会化补助等实处，让社会主义农业缓慢而稳步地前行。"
GRW_Southern_Griffonia_infrastructure_nationalization: "基建国有化"
GRW_Southern_Griffonia_infrastructure_nationalization_desc: "眼下，我们的各项政策卓有成效，是时候更进一步，将铁道与能源，通信网络与水利设施逐渐收归国有了。"
GRW_Southern_Griffonia_control_means_production: "控制生产资料"
GRW_Southern_Griffonia_control_means_production_desc: "什么是社会主义的核心？毫无疑问是生产资料公有化。在社会主义南狮鹫尼亚，大企业，大工厂将被赎买或没收，以达到生产资料公有化的目的——在党中央的指示下，委员会将逐步控制南方的生产资料。"
GRW_Southern_Griffonia_break_up_large_enterprises: "拆分大企业"
GRW_Southern_Griffonia_break_up_large_enterprises_desc: "过分激进的经济政策会引起激荡和鹫民的不适应。既然大托拉斯和卡特尔会损伤工鹫的利益，那不如将其拆分削弱，然后逐渐控制——党中央已经同意了委员会的提案，我们将更稳妥的走向社会主义。"
GRW_Southern_Griffonia_engineer_exchange_program: "工程师交流计划"
GRW_Southern_Griffonia_engineer_exchange_program_desc: "南狮鹫尼亚长久以来是鹫才辈出之地。组织工程师交流计划可以更有效的整合利用鹫才资源，推进南方的长足发展。"
