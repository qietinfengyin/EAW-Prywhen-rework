###- 子意识形态 -###
new_democracy: "新民主主义"
new_democracy_desc: "新民主主义从第一次狮鹫大陆革命浪潮失败之处出发，反思了以克梅斯凯为首的民族共和党领导的共和主义革命的缺陷，由于资产阶级的软弱性与局限性，旧共和主义革命无力动员底层广大无产阶级实现革命大联盟并最终走向革命的反面。同时针对普里文工业落后半封建半资本主义的社会现实，新民主主义提出不直接进行社会主义革命，而是在一个时期内以无产阶级为领导核心建立包括农民，资产阶级，知识分子在内的广泛革命联盟以完成资产阶级革命任务，逐步扩大公有化要素实现工业化，为未来的社会主义革命阶段奠定基础。"
maoism: "红兴思想"
maoism_desc: "红兴思想是由菲利普·红兴与他的战友们历经多年艰苦奋斗，在普里文革命中创造并总结出来的马科思主义新成果。在吸收马恩嘶理论先进内容的前提下，提出了农村革命的相关内容，解决了马科思主义在落后地区能不能建立社会主义政权的问题，打破了社会主义只能在发展充分的资本主义国家实现的观点。思想的核心为“实事求是，群众路线，独立自主”，强调理论与实践相结合，认为理论只有在实际斗争中才能得到验证和发展。同时必须在实践中深入群众。并立足自身实际制定发展策略，在平等基础上实现开放共赢，保障长远稳定发展。"

