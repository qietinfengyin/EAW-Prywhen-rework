GRW_integrate_defence_industry_1: "统筹国防工业"
GRW_integrate_defence_industry_1_desc: "我们目前正处在统筹国防工业的第一步——统计，做准备工作，扶植某些濒临破产的企业并改组其生产线等。"
GRW_integrate_defence_industry_2_desc: "我们目前正处在统筹国防工业的第二步，部分国有化某些企业并开始实行计划控制，调配生产。"
GRW_integrate_defence_industry_3_desc: "我们目前正处在统筹国防工业的第三步，彻底把控所有生产军事物资相关的企业的控制权，让他们真正变成鹫民工厂。"
GRW_integrate_defence_industry_4_desc: "我们目前正处在统筹国防工业的第四步，统筹生产，指定详细的指标，以有力地支持共和国的军事需求。"
GRW_integrate_defence_industry_5_desc: "经统筹的国有国防工业企业已经是共和国坚实的后盾，要做的只剩进一步集中化军工和实行生产企业民主化，让工鹫之伟力助推革命前行。"
GRW_integrate_defence_industry_6_desc: "完全有序的生产，高度统筹的军事工业，高度的经济民主化，凝结成了产线上先进的武器装备。神勇无敌的解放军会因此如虎添翼。"
GRW_military_representatives_in_factories_idea: "“军代表”制度"
GRW_military_representatives_in_factories_idea_desc: "一种军工厂生产秩序中加强军队与军工厂联系的成文制度，由总后方后勤部把前线部队的选举出来的军方代表对接至国内各处军工厂，实现高效联系的方式。"
GRW_GLA_Navy_1: "鹫民海军"
GRW_GLA_Navy_1_desc: "尽管目前力量有限，但通过持续的资源投入和鹫才培养，我们的海军必将逐步发展壮大。"
GRW_GLA_Navy_2_desc: "这些来自世界各地的海军将领和理论家为军事学院海军学校带来了先进的海军理论和实战经验，他们将为共和国培养出了一批高素质的海军官兵，相信在内外合力下，我们能更快推动了海军建设的发展进程。"
GRW_GLA_Navy_3_desc: "现在，随着雷达技术在海军舰队上的应用，我们舰队的侦察、导航和作战能力都大大提升了，这标志着红海军已经拿到了远洋作战的敲门砖。"
GRW_GLA_Navy_4_desc: "在引入狼群理论后，红海军已经全面实现了远海作战理论的完善。这也标志着红海军在海军战术创新上迈出了重要一步，这将进一步提升红海军的远洋作战能力。"
GRW_GLA_Navy_5_desc: "随着我们建设海军目标一个一个的实现，现在的红海军不仅具备了海岸线的防御能力，还具备了远洋作战，登陆岛屿的进攻能力。反动派在海上耀武扬威的时代已经一去不复返了！"
GRW_building_navy: "建立共和国海军"
GRW_building_navy_desc: "尽管前路艰难，但通过集中资源和政策支持，我们有决心打造一支属于鹫民的红海军舰队群。"
GRW_shipbuilding_programme: "共和国造船计划"
GRW_shipbuilding_programme_desc: "建立起我们的海军后，我们有必要立刻上马一揽子造船计划——至少，我们要守住共和国的海岸线和内陆水道。"
GRW_pirate_suppression_idea: "清剿海盗"
GRW_pirate_suppression_idea_desc: "南部沿海的海盗和黑空地区的土匪一直被并列称为共和国的“两大害”。渔民和商鹫们苦不堪言，凶残的海盗袭击他们见到的每一艘船，共和国的海军有必要摧毁这群虫豸。"
GRW_expanded_merchant_fleet: "扩大的商船队"
GRW_expanded_merchant_fleet_desc: "更大的商船队，意味着更多物资和鹫员——小马员？——从嘶大林格勒，天际纳维亚，甚至是河间地运往普里文，这显然有利于我们的革命事业。"
GRW_modern_warfare_1: "拥抱现代战争"
GRW_modern_warfare_1_desc: "普里文解放军原本的游击战法虽然适合于内战，但无法应对战况更复杂的进一步革命战争。我们将引入先进武器与思路，拥抱现代化战争。"
GRW_modern_warfare_2_desc: "我们引入了一些狮鹫尼亚社会主义国家的火炮，并着爪培训正规军战法——相信我们会在埃维解放战争大放异彩。"
GRW_modern_warfare_3_desc: "军队中历经战火磨练的战斗英雄们同优秀将领一起，将天际纳维亚战法，普里文游击战法，嘶大林格勒冬季装甲战争经验等创新改良，形成了有普里文特色的现代化作战体系。"
GRW_modern_warfare_4_desc: "共和国订购的嘶大林格勒的坦克和飞机已经到达了基韦辛，我们终于可以真正意义上的学习步炮坦配合的现代战争。"
GRW_modern_warfare_5_desc: "武器，理论，这些都不再是桎梏普里文鹫民解放军的枷锁。通过持之以恒的现代化作战体系学习和引入先进武器，普里文共和国拥有了一支真正意义上能够胜任现代化战争的钢铁军队。"
GRW_academy_of_military_sciences_idea: "军事科学院"
GRW_academy_of_military_sciences_idea_desc: "“科学为剑，理论为盾。”——埃维联合社会主义共和国中央军委。科学院将专注于军事理论创新与技术研发，为鹫民解放军提供强大的智力支持。尽管目前科学院的工作属于共和国机密，但我们相信，它的成果将为国防事业带来革命性的进步，以确保共和国在未来的挑战中立于不败之地。"
GRW_mobilise_the_people: "动员鹫民"
GRW_mobilise_the_people_desc: "“全体鹫民，团结起来！革命的火焰，燃遍大地！”"
GRW_whiteflower_spirit_1: "白花精神"
GRW_whiteflower_spirit_1_desc: "白花，解放军武装反抗反动派第一枪打响之地，我们从这里学习到了枪杆子里出政权的道理。继承和发扬白花精神，是普里文共和国应该做的事情。"
GRW_whiteflower_spirit_2_desc: "普里文鹫民共和国的军队永远不会忘记白花的那一枪——震惊普里文的开天辟地的一枪。红兴主席与起义军将士们首创的白花精神将被永远铭记。"
GRW_whiteflower_spirit_3_desc: "军队中进一步的思想教育加强了对白花精神的传承与发扬，武装到精神的鹫民解放军会永世不忘白花一役，不忘包围鹫民共和国！"
GRW_whiteflower_spirit_4_desc: "鹫民解放军进一步发扬光大了自白花以来的伟大建军精神——这是一支听党指挥，能打胜仗的鹫民子弟兵！"
GRW_whiteflower_spirit_5_desc: "白花精神，即伟大的建军精神，烙印在鹫民解放军的基因里，并永远警醒着我们——艰难困苦，玉汝于成。"
GRW_GLA_Air_1: "鹫民空军"
GRW_GLA_Air_1_desc: "我们生来，为征服辽阔天空~\n我们故事，由后代来传颂~\n生灵智慧给我钢铁装甲~\n喷火马达是我强劲倚靠~\n那就更高，更高，要更高吧！"
GRW_GLA_Air_2_desc: "我们生来，为征服辽阔天空~\n我们故事，由后代来传颂~\n生灵智慧给我钢铁装甲~\n喷火马达是我强劲倚靠~\n那就更高，更高，要更高吧！"
