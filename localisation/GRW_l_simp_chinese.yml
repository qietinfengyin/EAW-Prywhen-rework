GRW_trade_idea: "与普里文的贸易协定"
GRW_trade_idea_desc: "我国近日准许了与普里文进行贸易，以购买普里文共和国的粮食。不知道与共产主义国家贸易会不会有害于我们。"
GRW_influence1: "国际局的影响"
GRW_influence1_desc: "红色普里文在我国有些许影响力——随他去吧，普里文不过是向我们兜售些水稻，果蔬，能出什么事呢？"
GRW_influence2_desc: "红色普里文在我国的影响力越来越大，一些工鹫和大学学生开始阅读红兴的文章，罢工游行越来越多——我们要审视与普里文的关系。"
GRW_influence3_desc: "红色普里文在我国的影响力过高！如果再不采取措施，我国甚至面临被颠覆的危险！水稻和蔬果要摧毁我们的政权了！"

GRW_stability_idea: "共和国的稳定"
GRW_stability_idea_desc: "\n\n我们所拥有的非核心/非宣称地区越多，对共和国稳定的惩罚也就越大！\n\n该数值将每周更新一次。"
GRW_vartai_support_posniaks_idea: "得到承认的驳什尼亚小马"
GRW_vartai_support_posniaks_idea_desc: ""
GRW_vartai_ensure_two_races_equal_rights_idea: "小马权利法案"
GRW_vartai_ensure_two_races_equal_rights_idea_desc: ""
GRW_Northern_Griffonia_revise_the_principles_idea: "新生的三民主义"
GRW_Northern_Griffonia_revise_the_principles_idea_desc: ""
GRW_rozenkampism_2_idea: "支援他国革命"
GRW_rozenkampism_2_idea_desc: "我们将援助狮鹫尼亚其它的社会主义国家，支援当地反对暴政的狮鹫——当然，以保证普里文鹫的生存为最基础，也是最高的前提。"
GRW_rozenkampism_3_idea: "引进先进生产线"
GRW_rozenkampism_3_idea_desc: "引进原来自于狮鹫海姆，吠城这些工业化，电气化大城市的先进生产线有利于我国工业的发展——它的意义不亚于一场生产线上的革命。"
GRW_rozenkampism_4_idea: "与天际纳维亚的军事交流"
GRW_rozenkampism_4_idea_desc: "革命精神永不灭，军事合作创辉煌！与天际纳维亚并肩，捍卫社会主义的明天！"
GRW_syndicalism_3_idea: "分配工业资金"
GRW_syndicalism_3_idea_desc: "对待来之不易的工业资金，要像对待我们的同志一样，“惩前毖后，治病救鹫。”这笔钱，在资本家爪中，是血淋淋的剥削成果，在我们爪中，则可以造福鹫民。一定要把这笔钱花在刀刃上！"
GRW_democratic_socialism_2_idea: "投资科研"
GRW_democratic_socialism_2_idea_desc: "“科技为民，创新为国。”——埃维联合社会主义共和国政治协商委员会"
GRW_democratic_socialism_3_idea: "百花齐放"
GRW_democratic_socialism_3_idea_desc: "通过民主党派的积极参与，不同风格、流派的文艺作品如雨后春笋般涌现，鹫民们的精神生活也因此得到了极大的丰富。这不仅展现了社会主义文化的活力，也为共和国的文化软实力增光添彩。"
GRW_promote_mandarin_idea: "推广普通话"
GRW_promote_mandarin_idea_desc: "语言推广的过程并非一帆风顺。一些地区的鹫民对普通话的推行感到不满，他们认为这是对地方文化的侵蚀。但从长远来看，语言统一将极大地增强国家的凝聚力和行政效率。通过合理的政策调整和资源投入，我们有信心化解地方鹫民的不满情绪，最终实现语言的全面统一。"
GRW_speak_Griffish: "官方标准语"
GRW_speak_Griffish_desc: "经过不懈努力，普通话已经成为全共和国范围内的通用语言。各地语言不通而阻碍社会主义建设问题已经一去不复返了！"
GRW_local_cultural_preservation_idea: "保护各地文化"
GRW_local_cultural_preservation_idea_desc: "保护各地文化是埃维联合社会主义共和国在文化建设中的一项重要举措。它不仅挽救了濒临消失的文化遗产，还增强了各地鹫民的文化认同感和归属感。通过文化保护政策，我们能够更好地维护共和国的文化多样性，从而为我国的长远发展奠定坚实的文化基础。"
GRW_maintain_national_unity_idea: "宽松的民族政策"
GRW_maintain_national_unity_idea_desc: "民族区域自治不仅尊重了各民族的文化传统和生活方式，还激发了地方鹫民的积极性和创造力。这不仅维护了共和国的稳定和团结，还为社会主义建设注入了新的活力。"
GRW_higher_education: "学院现代化"
GRW_higher_education_desc: "普里文从前的落后学术面貌不复存在于新的鹫民共和国。新的活泼严肃的高等学院制度会忠实地发挥它的作用，为共和国的学术带来生机活力。"
GRW_investigation_department_idea: "中央调查部"
GRW_investigation_department_idea_desc: "全称：埃维联合社会主义共和国革命中央调查部。下辖有情报、内务防御、特务行动指挥一局和特务行动指挥二局、特工训练与密码破译部门和密码设备研究部门。是我国地下工作的主体，那里的同志们在国家看不见的战线上一直与反革命势力做着顽强的斗争。"
GRW_command_ecomony: "指令经济"
GRW_command_ecomony_desc: "指令经济，从属于计划经济，强调中央统一调派的重要地位，政府通过指定详细的计划控制生产。在这种经济体制下，我们便不再需要市场经济——和它身上的痼疾——来干预我们的生产了。"
GRW_planned_economy: "计划经济"
GRW_planned_economy_desc: "计划经济是一种经济体制，在这种体制下，国家按照预先制定的计划来配置资源。它是社会主义经济制度的一个重要特征。国家通过各级计划部门，对国民经济的生产、分配、交换和消费等各个环节进行全面的规划和安排。例如，国家会根据社会的需求和资源状况，确定生产多少钢铁、粮食、纺织品等各类产品，以及如何在不同地区和部门之间分配这些产品。\n但红兴同志也强调道：实现社会主义经济并非一纸制度即可，这是一种形而上的观点，重点不在于经济制度，而在于谁掌握着经济，而这一主体则必须是无产阶级。"
GRW_trade_union_law_idea: "共和国工会法"
GRW_trade_union_law_idea_desc: "随着《共和国工会法》的全面实施，我们的工鹫阶级将更加团结，劳动热情将空前高涨。共和国的工业生产将迎来新的高峰，社会主义制度的优越性将得到充分体现。在未来的日子里，我们将继续坚定不移地走社会主义道路，为实现全体鹫民的共同富裕而努力奋斗！"
GRW_national_housing_plan_idea: "国供住宅"
GRW_national_housing_plan_idea_desc: "国供住宅是社会主义国家为了保障公民的基本居住权利，运用国家资源和力量提供的住房供应体系。它是社会主义制度优越性的体现，是社会主义保障体系的重要组成部分。这种大规模建设的住房不以盈利为目的，而是以满足群众的居住这一基本需求，尤其是以实现社会主义高级阶段为目的。"
GRW_free_medical_care_idea_1: "国家医疗补贴"
GRW_free_medical_care_idea_desc: "“健康是每一个公民的基本权利，而不是少数鹫的特权。”——埃维联合社会主义共和国卫生部"
GRW_workers_paradise_idea: "劳工天堂"
GRW_workers_paradise_idea_desc: "“劳动创造财富，工鹫铸就未来。”——埃维联合社会主义共和国劳动部"
GRW_eightcharacter_constitution_idea: "八字宪法"
GRW_eightcharacter_constitution_idea_desc: "八字宪法是我国历史上最全面的、最广泛的、最深远的一次农业技术大普及，八字宪法的推行将会大幅提升了我们农业的科技水平，同时它也引领了一场群众激情燃烧的农业生产力的革命运动——《八字宪法永放光芒！》"
GRW_rural_electrification_idea: "乡村电气化"
GRW_rural_electrification_idea_desc: "农村工作部将把逐年增长的预算投入到实现“村村通电”这一目标上。我们的技术工鹫队伍庞大而有力，同志们也踌躇满志，相信这可以让我们向“各尽所能，按需分配”这一伟大目标更进一步！"
GRW_farmer_paradise_idea: "农民乐园"
GRW_farmer_paradise_idea_desc: "我们的劳动生产力相比以前高出成百上千倍，使其我们的农村地区迎来了春天，现在这些地方的生活水平已经丝毫不逊色于城市，到处都是田园牧歌！"
GRW_perfect_workerpeasant_alliance_idea: "完美的工农联盟"
GRW_perfect_workerpeasant_alliance_idea_desc: "三大差别在联盟境内开始快速减小，我们在祝酒相庆的同时，也在一起互相鼓励——向着世界社会主义共和国前进，向着共产主义高级阶段前进，向着各尽所能、按需分配前进！"
