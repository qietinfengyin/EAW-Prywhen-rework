GRW_reverse_engineering_idea: "战机逆向工程"
GRW_reverse_engineering_idea_desc: "这是共和国军事学院的杰出贡献之一，得益于我们的战机逆向工程，我们可以结合各方的先进生产技术，从而降低战机的生产物质需求。"
