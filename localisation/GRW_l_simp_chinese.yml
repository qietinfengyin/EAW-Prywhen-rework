###- 仅将领 -###
GRW_Valentin_Rosescu: "瓦伦丁·罗塞斯库"
GRW_Valentin_Rosescu_desc: "§Y生于：§!973年12月23日，布罗德费尔德王国萨尔玛克边疆伯爵领，临海市\n\n§Y背景：§!瓦伦丁·罗塞斯库是萨尔玛克出身的狮鹫。和当地多数狮鹫一样，他的祖上是被某一代布罗德费尔德大公强令迁来的军事贵族。大公们把桀骜的贵族导向这个危险的边陲，指望他们要么做公国的屠刀，要么在对抗中卷刃；公国只需投入几个虚名，真正的处理则由牛头怪代劳。两百年来，萨尔玛克替公国消灭了诸多野心家，而大公们连抚恤金都极少支付。对于这一算计，谙此道者富贵蔽及子孙，昧其理者却往往粉身碎骨。\n\n作为这个种族高压地区出生的破落少数裔，瓦伦丁·罗塞斯库的成长环境可想而知。家族徽章蒙尘，悬挂在漏风的厅堂上。幼年瓦伦丁早早学会了忍受当地狮鹫贵族和牛头怪的嘲讽，或是在牛头怪打蹄轻蔑的注视下，沉默地接受比成年狮鹫更少的配额。生存，在这里是每一日都需要用爪子和喙去争夺、并在失败时学会忍受屈辱的课题。然而他的外祖父坚持供养他读书。就像萨尔玛克许多青年那样，他在普里文腹地的大城市——于他而言是基韦辛——完成了中学教育。社民工党的的兴起让他成为萨尔玛克狮鹫中，第一批系统接触到现代左翼理论的青年之一；这点燃了这个穷小子的内心，让他想要改变自己的家乡。回到萨尔玛克，瓦伦丁·罗塞斯库打出了“社会主义”和“种族和解”两面大旗，引来了百余名对仇恨现状失望的青年，之后边疆伯爵的政府就出爪了。罗塞斯库出狱后流亡到普里文内地，以“萨尔玛克民主革命同盟”的名义依附于社民工党（以及后来的普共）下活动，主要争取在普里文内地的萨尔玛克居民转向革命。\n\n1003年白花起义时，瓦伦丁·罗塞斯库和他的革命同盟同志们本也策划了一场起义，准备创立一个革命的萨尔玛克政权，呼应普里文内地的革命。但是蓝百合伯国盯上了这片土地，罗塞斯库又一次被赶到了普里文内地，在普里文民主联军的序列里战斗。在内地的田间地头里，罗塞斯库更加期望着早日打回老家去。届时在他的领导下，萨尔玛克一定会是一个种族友爱，高度自治的萨尔玛克。"
GRW_HXFS: "赫星法斯"
GRW_HXFS_desc: "§Y生于：§!988年4月7日；小马利亚，马哈顿\n\n§Y背景：§!赫星法斯出生于马哈顿的一个家境殷实的无产家庭。在这座摩登大都会里，如果你不是某匹上流社会的小马，那么这一切的灯红酒绿与琳琅满目都与你无关。但他的家境尽管属于比较滋润的那一档，他也因此有了个很大的视野，并在一次机缘巧合下在街边地毯上买到了宣传马科斯主义的书籍。\n时间步入第一个千年，随着自己逐年长大，他也在越来越朝向这一思想靠拢，冬季革命的震撼甚至让他曾多次想要向北而去。但由于年龄和生活环境的束缚最终让他未能如愿。\n1003年，普里文爆发白花起义，这使得赫星法斯再一次看到了触蹄可得机遇。他趁在新马尔兰留学之际，想方设法的通过朋友帮助的方式越过诸多国家，辗转多地来到了普里文并且在白花见到了普里文革命的领导者红兴。\n他后来以几乎狂热的革命热情而得到重视，至此，他便成为了普里文解放军中的一名新锐指挥员。"
GRW_Custer: "卡斯特"
GRW_Custer_desc: "§Y生于：§!972年9月1日；布罗德费尔德公国，比卡尔\n\n§Y背景：§!卡斯特出生于一个佃农家庭，由于贫困的家境，很早便种地干活，在他16岁时，由于父亲大病，家里再也交不起地租，母亲和兄弟们也被地主给逼死，他只能跟着一些同样走投无路的鹫上山做土匪。\n在他做土匪的时候，由于生性老实善良，即便做了土匪也不愿意干丧尽天良的事，由于身体高大，在他所在的小土匪团体头领死后，他抓住机会成了新的头领，经常在埃维河谷的各个地区抢劫乡绅与地主，其中一部分留给自己，大部分分给了当地的鹫民。\n在1003年，红兴与卡斯特的队伍撞了个正着，双方剑拔弩张，但是红兴凭借着自己的魅力与出色的口才令卡斯特放下了戒心，在长期的交流之后，双方成为了挚友，双方歃血为盟，在红兴的影响下，卡斯特也加入了普里文共产党，而那只土匪队伍也在经过红兴的整训之后，成为了一支革命军队，而卡斯特也担任起来了指挥员的责任，参与了整个普里文的解放战争。"
GRW_rory_laurel: "绒绒月桂"
GRW_rory_laurel_desc: "§Y生于：§!985年；大江共和国，维曼纳维提萨\n\n§Y背景：§!由于绒绒月桂家庭非常富裕，从小她就被带往小马利亚生活，在天才独角兽学院完成她的学院生涯后。1000年精通魔法与军事理论并且深受马克思主义影响下的绒绒月桂回到江源城生活。当她知晓普里文的共产主义革命者正在反抗国王的反动统治的状况后，身怀国际主义的绒绒月桂立即携带家中大量的钱财连夜前往白花支援革命，并一直战斗到了今日。"

