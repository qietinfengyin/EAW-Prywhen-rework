GRW_international_brigades_idea: "国际纵队"
GRW_international_brigades_idea_desc: "全称：国际纵队书记处，隶属外交部国际局，将负责外国同志接收、国际军事援助与研究和国际主义宣传。在未来，这方面的同志将联系起国内外的社会主义运动，并为世界社会主义共和国的终极目标而斗争。"
