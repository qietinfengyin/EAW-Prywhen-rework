###- 历史事件 -###
GRW_introgame.1.t: "南方明珠"
GRW_introgame.1.d: "即使是历史上最强大的帝国也有其无力触及的地方。普里文，埃维河谷的精华，南狮鹫尼亚的明珠，西有黑空山脉的遮蔽，北有森林与沼泽的保护。这里的居民发展出了自己独树一帜的文化。\n\n705年，格罗弗一世大帝一度占领了基韦辛；但他虽然摧毁了几个公国的军队，却无法改变当地狮鹫的文化认同。八世纪中叶，格罗弗二世对南狮鹫尼亚发动了声势浩大的远征。西卡梅翁的共和政权，南方海岸的牛头怪和黑空的群山很快匍匐在帝国治下。然而，军队翻越山脉进入埃维河谷后，格罗弗二世很快发现帝国根本无力管辖这里。于是几乎是谈判性地，普里文的几个王公宣誓世世代代效忠于皇帝，帝国的军队随后撤离。\n\n在九世纪，普里文地区的三个公国已然定型——布罗德费尔德，横亘广阔的乡村；西迪亚，坐落于富饶的埃维河口；基韦辛，沿河耸立的坚固堡垒。853年，杰出的布罗德费尔德大公基海·德·基绍武力征服了剩余两个公国，这引起了邻国的警惕，但很快统一随着7年后大公遭到暗杀而烟消云散，普里文再一次陷入了三国鼎立的时代。\n\n滚滚埃维南去水。直到一个多世纪后，965年，西迪亚贵族选举克洛苏·德·基绍为自己的大公，终结了公国在最后一任女大公失踪后四十三年里没有君主的局面。又过了8年，973年，最后一任基韦辛大公在一次扎菲亚鹫的侵袭中意外去世，克洛苏大公顺势将军队开进基韦辛城，在宏伟的埃维利亚娜大神庙中，由德纳利教长加冕为布罗德费尔德国王。普里文统一在一个王冠之下。"
GRW_introgame.1.a: "“这不是结束，甚至不是结束的开始，不过是开始的结束……”"
GRW_introgame.2.t: "宪政繁荣"
GRW_introgame.2.d: "统一的普里文粮食产量居全狮鹫尼亚之冠。凭借着大米出口带来的资金，布罗德费尔德王国蹒跚着开启了工业化进程。然而世界风云变幻，仅仅过了5年，革命风潮席卷狮鹫尼亚，布罗德费尔德王国也遭到了冲击。宪政的呼声越来越高。翌年，王国召开第一次议会，以西方的翼巴第王国宪法为蓝本通过《979年宪法》，产生了第一届民选内阁，由立宪派领袖博勒加德·虎珀担任总理，开始了短命的宪政时期。\n\n随着革命的流产，狮鹫尼亚归于平静，贸易重新活跃。工业化使得各国马口迅速增长，普里文的粮食出口量节节攀升，这带来了所谓的“宪政繁荣”。那时西迪亚的生意场觥筹交错，满载着一袋袋大米的商船开进中部海深处，北风币、小马利亚比特和江元不断流入基韦辛的国库，铁路与电网延伸开来，宪政繁荣让埃维的居民看到了无比光明的未来。\n\n就像许多刚开始宪政和现代化的国家一样，不同阶级的政党开始在王国内部成立，发展，壮大。982年成立的社会民主工党一开始只是它们之中的普通一员。这个左翼政党谴责布罗德费尔德地主的残忍、基韦辛资本家的狡诈和西迪亚外商的贪婪。984年，国家自由党为主的中左翼政党联盟获得了选举的胜利，与之结盟的社民工党随之登上王国的权力舞台。\n\n与大多数党派不同的是，即使在王国经济发展最快速的那几年，社民工党也不讳言潜藏的危机：王国的经济命脉——农业——几乎全部把持在外国公司爪中，而随着粮食出口的不断攀升，农民受到的压榨也在不断提高。大批农民破产，有的进入城市却找不到工作。社民工党的代表多次在议会中公开呼吁关注这些问题并在可能的危机到来之前解决它们，但提案无一例外，全部石沉大海。\n\n994年，虎珀领导的中左翼政党联盟再次击败保守派，赢得了选举的胜利。在欢腾的选民的簇拥下，虎珀宣布只要选民再给他十年，他就能在保持前十五年繁荣的基础之上，通过“大多数鹫都能接受的改革”，逐步消除“某些社会不公的现象”，实现“彻底的工业化和民主化”。届时布罗德费尔德王国会成为“世界君主制国家改革强国的典范”。"
GRW_introgame.2.a: "再给我十年，还你一个强大的布罗德费尔德！"
GRW_introgame.3.t: "梦幻泡影"
GRW_introgame.3.d: "对于所有普里文狮鹫来讲，995年都来得如噩梦一般。一株南斑马里加的真菌随弗羽西亚的商船抵达了西迪亚港，短短半年内就将可怕的水稻枯萎病传到了整个普里文。尽管一些狮鹫认为如果没有水稻枯萎病，美好的日子会一直延续下去，但在那一年的基韦辛王宫大会堂开过会的议员几乎都同意，水稻枯萎病只不过是让王国所有的隐患都暴露了出来。国自党执政十五年来的积弊被无限地放大，议会陷入了无休止的扯皮与攻讦，而疫病本身却没能得到任何实质性的管控。相反，为了完成合同，外国资本开始加紧抢购市面上的大米，很快粮食价格就以指数速度增长，而王国的田地却几乎种不出新的大米来了。饥荒发生了。粮食出口带来的繁荣以最讽刺的方式戛然而止。\n\n除了历史学家，普里文没有一只狮鹫还愿意回想那场夺去五分之一狮鹫生命的大饥荒。即使是基韦辛最衣食无忧的贵族，只要看到从王国四面八方流窜来的，密密麻麻活骷髅一般的饥民，毫不理会卫兵开枪的警告，冲击基韦辛那高耸的城墙的样子，也会连生若干年的梦魇。这次事件在基韦辛城外增添了数不尽的白骨，以至于有国王的侍从认为基韦辛已“不再适合统治”，国王应该考虑移都西迪亚。\n\n连续四年的歉收使得王国几乎走到了崩溃边缘。曾承诺“不干预政治”的克洛苏·德·基绍国王重回台前，以一纸《国家紧急法案》宣布长期戒严，解散议会，并赋予自己独裁的权力。国王敕令，戒严期间，一切政党停止活动。这固然使秩序得到了恢复，但在博勒加德·虎珀执政期间处处受限的贵族势力迅速坐大，而外国资本的掠夺与剥削比饥荒前只增不减。"
GRW_introgame.3.a: "普里文才出狼穴，又入虎口。"
GRW_introgame.4.t: "至暗时刻"
GRW_introgame.4.d: "随着党派活动遭到取缔，布罗德费尔德社民工党发现眼前只有两条路可以走：要么遵从国王的命令，与贵族同流合污；要么与劳农站到一起，为他们的利益而战斗。日益尖锐的阶级矛盾使得其势力在地下迅速壮大，而受压迫阶级不断恶化的生存状况逼着党做出选择。1001年，在盐岛举行的社民工党第六次代表大会上，菲利普·红兴明确提出反抗君主独裁，与反动统治展开针锋相对的斗争的路线。他得到了大多数代表的拥护，并将党改组为普里文共产党，正式与反动的王国统治划清了界限。\n\n另一边，下野的博勒加德·虎珀竭力维护着自己任内的宪政遗产。即使不以国家自由党主席的身份，他仍然靠着多年积攒下的威信四处奔走，游说外国援助，尽可能团结民主势力，试图早日让国家重回宪政的轨道。直到1002年的9月14日。那一天，基韦辛大学的学生发起了一场游行，虎珀事先听说国王的军队可能武力镇压学生，于是亲自到场，既是安抚学生，也是威慑军队。但就当他向激愤的学生发表演讲之时，一颗子弹从背后穿过了他的胸膛。随后，更多指向学生的枪扣动了扳机。宪政之星陨落了，国自党自此一蹶不振，仍然保持理想的骨干大多选择与共产党站到了一起。\n\n不详的阴云笼罩着普里文。1003年春，为了震慑愈发躁动的反对者，克洛苏国王策划了一场盛大的阅兵式。就是在这场阅兵式上发生了那震惊整个狮鹫尼亚的刺杀——王后倒在了国王怀里，虽然刺客的目标显然是国王。红兴可以发誓，刺杀不是共产党所为，至少不是党中央或者任何一级党组织的决定，但是克洛苏国王第一时间下达了查禁“极左恐怖组织”、逮捕所有“恐怖分子”的命令。\n\n王国陷入了无休止的白色恐怖。利用国王的悲愤，贵族向“限制”他们特权十多年的左翼展开了疯狂的报复，连几个标榜为“温和”的政党也不断有成员“失踪”，更罔论共产党员。有的被枭首，在基韦辛示众。但贵族们并不会想到，恐怖并没有吓倒共产党，地下活动不减反增。这一年夏季，他们并没有发现一个反常的情况：军队内部几名左派的同情者，要么宣布辞职后不知所踪，要么以各种原因，在率领部队向白花行进……"
GRW_introgame.4.a: "起义不过是时间问题。"
GRW_introgame.5.t: "星火燎原"
GRW_introgame.5.d: "1003年8月1日，驻扎在白花的王国军部队共同宣布起义，建立起普里文民主联军。\n\n虽然现在看来白花起义的意义非比寻常，但是包括红兴主席在内的亲历者都会承认，这实在算不上一次胜利的起义。从地图上不难看出，白花的位置过于偏僻，而王国的反扑比预估的快得多。原定迅速攻占几个中心城市夺取革命胜利的计划已经不可行，联军只能分散在普里文西北广阔的森林与乡村地区，逐步发展革命根据地。在那里，联军依靠当地群众，凭借对地形的熟悉和群众的支持屡屡打击来犯之敌。\n\n在1005年12月的最后一次“围剿”攻势中，联军与王国军在拉里奥斯森林展开了残酷的拉锯战，缺少装备的联军显然无法承受长期的消耗，敌军缓慢但却不停止地向根据地腹地推进。就在此时，王国军一方的“瑟拉齐”骑士团突然成建制地倒戈，事后表明这是有预谋的——红兴一直笑称，谁要是讲民主党派无功于革命，骑士团的战士就能撕烂他的喙。骑士团在敌军疯狂突围的攻击下岿然不动。而联军第13军在索林·裕鲁的灵活指挥下以少敌多，在锋锐森林拖垮了王国军的增援部队，最终联军主力出击将被包围的三个军全歼，王国军增援的两个军也遭受重创。1006年3月，王国军第5，6军前往恐怖沼泽，他们计划从恐怖沼泽迂回，从北面进攻拉里奥斯，红兴指挥第1、2、3三个军，在被认为完全不可能快速行军的恐怖沼泽对王国军展开奇袭，大败且包围了绝大部分王国军。最后，仅王国军第5军一个师逃出包围圈。\n\n三次战役之后，王国军疲于防守，已经抽调不出一支战略机动兵力进攻根据地了。1006年7月，红兴率领三个军，百里跃进利夫省，在当地工鹫的内外策应下成功攻占了科罗维亚，获取了大量武器装备，联军已经包围了王国首都周边地区。到1006年12月，随着西迪亚王国军的回援首都的攻势被全面粉碎，胜利的曙光已经到来。在最近一次召开的工作会议上，红兴主席号召全党："
GRW_introgame.5.a: "下定决心，不怕牺牲，排除万难，争取最后的胜利！"

###- 第一阶段事件 -###
GRW_earlygame.1.t: "硝烟渐褪"
GRW_earlygame.1.d: "随着最后一支王国军部队的投降，历时将近四年的解放战争终于结束了，随着民主联军入驻各大城市，民主的光芒已经照耀在了普里文大地上空，已经投降的王国政府正在向临时政府转移政权，反动派们已经放弃了他们在城市的统治与随从一起逃亡到了乡村和森林企图效仿民主联军的游击战苟活。但在广大农鹫兵在围剿下，多数贵族被捕，被送往首都并象征性的发表讲话宣布放弃他们的贵族权力，结束他们对王国的统治。重建的议会正在运作，共产党主导的全国政府正在形成，王国留下来的烂摊子仍需处理。虽然重建普里文的难度不亚于解放战争，但在普利文共产党的领导下：面包会有的，牛奶会有的，一切都会有的。"
GRW_earlygame.1.a: "我们不但善于破坏一个旧世界,我们还将善于建设一个新世界!"
GRW_earlygame.2.t: "第一次全普里文政治协商会议"
GRW_earlygame.2.d: "我们在基韦辛市政厅简单布置了下政协会场，由于时间问题，我们只能着重好会场的安全与秩序，目前我们的军队在周围部署好了防御，各地代表也在陆陆续续进场。虽然有狮鹫担忧此举是否多余，但有一点必须要说明，现在我们才刚刚取得胜利，反革命随时都可能对我们发起袭击！"
GRW_earlygame.2.a: "让我们进场吧"
GRW_earlygame.3.t: "正统派"
GRW_earlygame.3.d: "本次政协会议中的主导派系，正统派，是由普里文共产党中坚定拥护红兴主席路线的老一辈革命家组成的派系，也是普里文共产党中影响力最大的派系。红兴同志的亲密战友若安内尔·短羽，贝希尔·岚翼和杜米特鲁·星尾是该派系的优秀领导者。焦糖·马科思说得好：那些为共同目标劳动因而使自己变得更加高尚的小马，历史承认他们是伟马；那些为最大多数鹫们带来幸福的小马，经验赞扬他们为最幸福的马。正统派鹫们便紧紧团结在这样一匹——额，一只——狮鹫周围：红兴同志。工农联盟的支持者们——无论是老革命家还是新鹫——将跟随着伟大领袖红兴主席，把第一次真正鹫民民主的政治协商会议开好！"
GRW_earlygame.3.a: "Pentru o nouă națiune Priven, înainte! （为了崭新的普里文国家，前进！）"
GRW_earlygame.4.t: "国际派"
GRW_earlygame.4.d: "国际派是普里文共产党中着眼世界革命的理想主义者组成的派系，其领导者是乔治·焰翎与卡林·霆羽。嘶大林格勒伟大的革命导师钢铁·嘶大林曾说过：“先进的劳工深知劳工阶级的任务具有世界普遍意义，因而从有组织的社会主义运动开展之日起，就力图使这种运动在世界范围内联合起来。”国际派从这种观点出发，把世界劳动者的团结与泛狮鹫尼亚革命运动放在首位。在本次政协会议中，国际派将一如既往的高声为全世界劳动者疾呼。嘶大林格勒已然成为马奎斯的革命先锋，而普里文要做全狮鹫尼亚的革命先锋！"
GRW_earlygame.4.a: "Za mirovuyu revolyutsiyu, vperyod！（为了世界革命，前进！）"
GRW_earlygame.5.t: "劳工派"
GRW_earlygame.5.d: "劳工派的历史不短，在党还是西迪亚的一个普通工会时，成员几乎都可以称作是劳工派。他们一直以来学习的对象是狮鹫尼亚的工会组织和工团主义倾向的政党，尤其是阿奎莱亚工党。老一代劳工派以全国总工会主席特里凡·西迪约韦亚努为领袖，强调劳工权益的争取与维护，又被称为“工团派”；而新一代劳工派更注重实现工业化，培养壮大国内的劳工阶级，任职于工业部门的技术官僚——利维乌·月喙正是这种意见的代表，因此也被称为“技官派”。然而不管是哪一种劳工派，都认为劳工阶级是最先进的阶级，革命的未来也一定是他们写就的。政治协商会议正是这个阶级掌控自身命运的开始！"
GRW_earlygame.5.a: "Pour le bien des travailleurs, en avant！（为了劳工福祉，前进！）"
GRW_earlygame.6.t: "民主党派"
GRW_earlygame.6.d: "虽然被讥讽为翼巴第宪政的简单复制，布罗德费尔德王国还是实打实地经过了将近二十年的宪政时期。九一四事件和“白色恐怖”等种种独裁政权的打击并没有消灭宪政民主的火种，以国家自由党为代表的民主党派挺过了最艰难的日子，并选择与革命、与大多数狮鹫站在一起。如今，在普里文即将进入一个崭新的时代之际，民主党派的定位也从在资产阶级议会中争权夺利，转变为在社会主义国家的框架下参政议政、建言献策。正如铜岭的革命家李吠克内西所说：“没有社会主义的民主是假民主，没有民主的社会主义是假社会主义！”他们所肩负着的监督与维护民主的神圣使命，将从这一次政治协商会议开始。"
GRW_earlygame.6.a: "Per la democrazia socialista, avanti！（为了社会主义民主，前进！）"
GRW_earlygame.7.t: "军事委员会"
GRW_earlygame.7.d: "革命军队取得了无比辉煌的战绩，其优良的群众纪律也广受称道，但这并不意味着普里文民主联军是一支完美无暇的军队。由于吸收了大量旧军队的成员，征召了大量没有军事基础的农民，民主联军目前既要纠治军阀兵痞习气，也要加强正规化建设。另外，最近的几次战斗还暴露了民主联军长期进行游击战、野战，而对城市攻坚战的经验相对不足的问题。这些都要一步步做出改变。\n\n作为军队改革的先声，同时也为配合政治协商会议的决议，在解放战争接近胜利之际，民主联军的领导机构由党的革命军事委员会重组为普里文国家的军事委员会，以此解决联军内部民主党派将领越来越多，却无法名正言顺地参加军委会议的问题。正如大家所料，虽然新的军事委员会名单中多出了不少民主联军将领的名字，但是最关键的两个名字仍然如旧："
GRW_earlygame.7.a: "主席：菲利普·红兴；第一副主席：理查德·尖矛。"
GRW_earlygame.8.t: "政治协商会议圆满结束"
GRW_earlygame.8.d: "今天是政协全体会议的最后一天，最后一项议程便是由卢西安·金翼副主席做闭幕词。\n\n“普里文鹫民政治协商会议第一届全体会议的工作，已经胜利地完成了！（鼓掌，欢呼。）我们全体一致，宣告了普里文鹫民共和国的成立。我们通过了《鹫民政治协商会议组织法》，《中央鹫民政府组织法》和政治协商会议的共同纲领，选举了中央鹫民政府主席、副主席、委员和鹫民政治协商会议的全国委员会。我们所作的这一切工作，都是符合于鹫民的意志的。（更加热烈的鼓掌，欢呼。）”\n\n闭幕词很简短，不过几分钟之后，正文就已经结束了。金翼放下稿子，看向台下的各位代表，发出了最后的号召：\n\n“庆贺政治协商会议的完满成功！庆贺普里文鹫民共和国的诞生！中央鹫民政府万岁！红兴主席万岁！”\n\n台下迅速传来了“鹫民共和国万岁，红兴主席万岁”的声浪。这声浪一层盖过一层，夹杂着代表们的欢呼声，拍翅膀声，拉里奥斯的这座古建筑成为了欢快的海洋。很快，拉里奥斯的街头就传遍了这句口号。"
GRW_earlygame.8.a: "鹫民共和国万岁，红兴主席万岁！"
GRW_earlygame.9.t: "海军初建"
GRW_earlygame.9.d: "红海军临时委员会今天下午在盐岛召开第一次会议。到会的几名委员面面相觑，脸上都写满了“你怎么也投奔革命了”的惊讶，气氛很是尴尬。坐在主持位置上的马林·阿夸里奥清清嗓子。“诸位。想必大家都认识，我就不再一一介绍了，直奔主题吧。海军的实力统计表都看到了吗？”\n\n参会者纷纷点头，有的拿起面前的文件，开始研读。根据表格，红海军没有一艘正儿八经的现代大型军舰。西迪亚军港里目前停留着几艘小炮艇，就连一艘博物馆级别的十世纪早期风帆战舰也被列入了统计，这就是红海军可怜的纸面实力。\n\n阿夸里奥发言：“从嘶大林格勒运输援助需要走海路，将来重开普里文的稻米贸易还需要走海路。我们不能指望总像现在这样，靠嘶大林格勒红海军护航和同情共产主义的国家施舍。海军必须要搞。当然搞舰队是长期规划要考虑的事情了，至少要干十年。当下最紧要的任务是要把岸防抓起来，而且要有一支小型船队，起码能抵御住海盗的侵袭。”\n\n埃纳凯·佩斯克鲁什点了点头。“我赞同目前先发展岸防的计划。后面的问题可以走一步看一步，目前主要是要把海军的架子先立起来，不然一旦反动派宣布封锁格里弗斯海，甚至说派一队尖兵突袭登陆，我们不仅不能还爪，而且还有被扼杀致死的风险。……大家谈谈意见吧。”"
GRW_earlygame.9.a: "会议通过了建设“褐水海军”的纲要。"
GRW_earlygame.10.t: "创办空军学院"
GRW_earlygame.10.d: "普里文内战时期，国内的飞机基本被保皇党势力损毁殆尽。革命胜利后，邻国的飞机不断侵犯普里文鹫民共和国的领空，而我们仅能用防空火炮来反击。这对我们的国防安全是极为不利的，我们应该建立我们自己的空军。\n\n为此，红兴在访问嘶大林格勒期间提出了这个问题，嘶大林格勒同意帮助普里文组建空军和航校。嘶大林格勒先是送给了我们一些战斗力较强的战斗机，然后又派遣给我们一位专家——康斯坦丁.坎登，她也是普里文狮鹫，在嘶大林格勒的空军学院留过学，因此可以为我们的飞行员传授经验并指导普里文空军改革之路。\n\n除此之外，卢卡.利皮尼也决定帮助我们，他参加过普里文革命，也深入学习过航天知识，他也会将他的飞行经验传授给我们的狮鹫飞行员。总之，在嘶大林格勒帮助下，我们很快将会有自己的空军，普里文的天空将会被我们掌控。"
GRW_earlygame.10.a: "普里文的狮鹫也要拥有钢铁制成的翅膀！"
GRW_earlygame.115.t: "来自嘶大林格勒的航空志愿者"
GRW_earlygame.115.d: "在嘶大林格勒为我们建立起第一所空军学院以来，从嘶大林格勒陆陆续续来了许多航空志愿者，而其中最引人注目的是一只于彼得蹄空军学院深造过的雪兔，他带着自己的私人座驾“雪鸮号”抵达了西迪亚。\n\n虽然是兔子，但其先后于帝国空军、共和国红军、嘶大林格勒空军服役，使得他有着丰富的空战经验，且十分注重空军与地面部队的协同作战。作为一个国际主义者，他一抵达普里文，便以极高的热情投入了工作，向我们的飞行员传授经验，指导我们进行空军建设和改革。\n\n在这些国际主义志愿者的帮助下，相信我们新生的红色空军很快便能展翅翱翔，我们将捍卫普里文的天空，让反动派们瑟瑟发抖吧！"
GRW_earlygame.115.a: "等等，会开飞机的兔子？"
GRW_earlygame.11.t: "[FROM.GetAdjective]请求购买战机蓝图"
GRW_earlygame.11.d: "南狮鹫尼亚的普里文同志向我们发来请求，他们将向我们购买我们的战机蓝图，出于阶级友谊，我们的同志热情招待了他们。\n\n次日，空军委员部召开了扩大会议，经会议审议，我们将……"
GRW_earlygame.11.a: "同意战机蓝图出口"
GRW_earlygame.11.b: "拒绝战机蓝图出口"
GRW_earlygame.12.t: "[FROM.GetAdjective]同意出售战机蓝图"
GRW_earlygame.12.d: "从马奎斯传来了好消息！[FROM.GetAdjective]的同志经研究讨论后，同意向我们提供他们先进的战机蓝图与相关技术员支持，共和国的空军事业将因此迈进一大步！"
GRW_earlygame.12.a: "好的"
GRW_earlygame.13.t: "[FROM.GetAdjective]拒绝出售战机蓝图"
GRW_earlygame.13.d: "从马奎斯的同志传来消息！[FROM.GetAdjective]的同志经研究讨论后，考虑到他们当前较为严峻的国防形势，否决了向我们提供他们先进的战机蓝图，但即使是这样，我们同志间的友谊还是坚不可摧的！"
GRW_earlygame.13.a: "好的"
GRW_earlygame.14.t: "开天辟地"
GRW_earlygame.14.d: "这天清晨，城镇各地的广场、公告栏以及各处公共设施里，开始有拿着扩音筒在台上叫嚷，或者有用鲜艳的红色油墨写上东西，亦或是张贴上一张又一张布告。惹得狮鹫们纷纷走到它们面前，其实他们也知道发生了什么事，甚至有的因此激动得彻夜不眠……\n\n而在基韦辛最大的广场上——国王宫广场上，则聚集了多达数万的狮鹫，其中最吸引目光的，则是站在临时搭建起来的木架高台上方，拿着中央鹫民政府委员会一号文件并飞在半空中的红兴主席。\n\n他一边拿着一号文件一边振振有词，当他终于念到“普里文鹫民共和国、中央鹫民政府委员会、中央鹫民政府，现在成立了！”时，广场上响起了雷鸣般的喝彩，然后他便开始以中央鹫民政府委员会第一总书记的名义，宣布了鹫民政府接下来的四大议程：建立文化教育委员会展开扫盲工作，组织全国剿匪特别行动展开剿匪工作，设立国家重建委员会重建并发展全国工业，以及最让在场生灵沸腾的一项——“打土豪、分田地”，进行全国大土改，在农村建立新的生产关系。"
GRW_earlygame.14.a: "同志，让我们行动起来吧！"
GRW_earlygame.15.t: "马林的工作"
GRW_earlygame.15.d: "马林·达斯卡卢看着眼前的一摞摞新教材，仿佛又回到了那个摇头晃脑地背着布罗德费尔德史诗的童年。那些史诗的文采好吗？坦白来说还算不错，但让一个刚刚认字的幼鹫去背那些东西显然是一种折磨，更别说他背诵的大部分篇章都是在强调“忠于国王陛下就是忠于北风之神”之类的混账话。现在，他总算可以把这些东西赶出孩子们的脑袋。勤劳质朴的农民、勇敢诚实的工鹫还有能言善辩的艺术家们也终于有机会成为故事的主角。“一个小小的遗憾是我们的课本图画还是太少了，下次开会的时候应该把这个点提出来。”\n\n他快速地记下了这个想法，又随爪拿起一本小学算术教材翻看起来。“编这教材的大概率是个两耳不闻窗外事的大学生，这种东西真的能给孩子们用吗？”他一边翻看一边低声抱怨道，然后看了看编者的名字，“竟然是我当年最得意的学生格雷森·怀斯，看来我在教育方面也不怎么成功！”带着这样的想法，他审阅完了剩下的小学教材并写下了不少改进建议，然后在太阳升起之前，慢慢地爬上了床开始了自己的休息。不一会，他的儿子醒来，只听见父亲一直在重复一句梦话："
GRW_earlygame.15.a: "“我们要学的东西都还有很多”"
GRW_earlygame.16.t: "乡间夜校"
GRW_earlygame.16.d: "伊凡不是一只聪明鹫。\n\n在革命之前，他不过是普里文千千万万受苦受难的佃农中最不起眼的一个。其实在一开始，他有一小块土地，日子也还勉强过得下去——直到他因为不识字，土地被该死的地主用一张地契骗去。\n\n“就因为我不识字……”伊凡握紧了右爪，面色严峻，目向前方。\n\n“同志？同志？该你发言了！”套在军绿色的袖子里的爪在伊凡面前晃了晃。\n\n“大家欢迎‘百字先生’伊凡发言！伊凡同志，请您告诉大家，您是怎么在这么短的时间学会一百个字的？”列奥尼德走到谷仓正中，朝伊凡招了招爪。\n\n目视着识字班的狮鹫们，伊凡的眼中噙满泪水，“首先是因为伟大的红兴主席，然后是因为主席的好战士列奥尼德带来的速成识字法……”"
GRW_earlygame.16.a: "普里文乡野的夜晚不再黑暗。"
GRW_earlygame.17.t: "课后余暇"
GRW_earlygame.17.d: "星光点点，识字班的狮鹫们已经回家休息了，谷仓重归寂静。\n\n“列奥尼德同志，你们是咋跟着红兴主席打倒地主老财的？”伊凡捏紧爪子，向前方的空气打去，“像这样？”\n\n“不光是这样，革命的时候，战士们还有火枪，大炮……唉我说伊凡同志，扯远了吧，是你主动让我给你把这篇故事的字都教给你的，现在怎么突然聊到战场上去了？”列奥尼德微微一笑，翻开了那本皱边的老故事书的下一页。\n\n“英勇的骑士们打退了不死族的入侵，鹫民们都对骑士团充满了……啥……之情？”伊凡吃力地逐字逐句念着。\n\n“崇敬。”\n\n“崇敬？”伊凡思索着。他不是只聪明鹫，但他觉得小伊凡诺维奇应该会喜欢狮鹫骑士打倒不死族的故事，它就像红兴主席打倒大贵族的故事一样精彩。"
GRW_earlygame.17.a: "谷仓正中的木桌子上，煤油灯的火光在跳动。"
GRW_earlygame.18.t: "深夜黎明"
GRW_earlygame.18.d: "小伊凡诺维奇端坐在炕上，出神地听着骑士团英勇地打退不死族的故事。\n\n“鹫民们都对骑士团充满了崇敬之情。故事结束了，伊凡诺维奇。”老伊凡合上借来的故事书，坐起身来。“现在，小伊凡诺维奇，告诉我，你最崇敬的鹫是谁啊？”\n\n“是列奥尼德叔叔！”小伊凡诺维奇激动地张开了翅膀。“列奥尼德叔叔是红兴主席的好战士！他帮红兴主席打倒了骑在我们头上的坏鹫！他还帮爸爸和村里的鹫们认识了那么那么多的字，”小伊凡诺维奇用双爪比了一个大圆圈，“他甚至帮我们修了一条水渠！”伊凡诺维奇扑扇着翅膀，快要飞了起来。\n\n“好好读书，好好锻炼身体，你们这一辈，再也不会被该死的地主老财给欺骗了，”老伊凡慈祥地抚着小伊凡诺维奇的翅膀，“而且……你也能当一个光荣的解放军战士，像列奥尼德那样！”"
GRW_earlygame.18.a: "“解放军战士……解放军战士！”"
GRW_earlygame.19.t: "买的到的和买不到的"
GRW_earlygame.19.d: "埃里克森·红尾看着父亲将一包辣椒酱塞进自己的背包里，他略带无奈的说到：“能不要把这些没用的东西塞进来吗，嘶大林格勒的商店里什么都不缺，我在那完全可以品尝到……”\n\n“尝到什么？那些小马恨不得拿甘蔗代替木头盖房子，我打赌你在那吃到的辣椒酱都只有甜辣味的。”说着，他又把几盒鱼罐头塞进了儿子的背包“别当着小马的面吃，他们小鼻子受不了这么腥的东西。”把所有东西都打包整理好后，挠了挠头，说到“虽然你爸我只是个厨师，不懂那些化学什么的东西，但我知道那东西很有用，很有用……”说到这，父亲的爪子颤抖了起来。\n\n“只是个厨师？父亲你可是古斯塔夫大厨最得意的徒弟之一！”说着他紧紧搂住了父亲“我收回之前的话，嘶大林格勒永远买不到你给我做的那些小吃……"
GRW_earlygame.19.a: "还有你对我的爱”"
GRW_earlygame.21.t: "生产科技突破"
GRW_earlygame.21.d: "我们工业阵线的同志传来的利好消息，国营417厂的技术员队伍建成了第一条钢加工自动化达到70%的生产线，相关技术资料已被基韦辛大学收录，现在他们已经得出了通用方法，我们的生产科技获得了突破！"
GRW_earlygame.21.a: "干得好，同志们！"
GRW_earlygame.22.t: "建筑科技突破"
GRW_earlygame.22.d: "我们公共建设阵线的同志传来利好消息，国家建筑工程总局的一线劳工队伍鼓捣出了一系列专门用于填补标准化建筑建筑空白部分的工程机械，相关技术资料已被基韦辛大学收录，现在他们已经研究出了一批全新的设备，而我们的建筑科技则获得了突破！"
GRW_earlygame.22.a: "好极了！"
GRW_earlygame.23.t: "合成资源突破"
GRW_earlygame.23.d: "我们合成资源阵线的同志传来利好消息，资源工程部门的同志的最近研发出了新的合成资源方法，相关技术甚至达到了世界领先水平，这意味着我们的合成资源科技获得了重大突破！"
GRW_earlygame.23.a: "好极了！"
GRW_earlygame.24.t: "雷达科技突破"
GRW_earlygame.24.d: "我们电子科技阵线的同志传来利好消息，工程电信研究所的最近研发出了新型雷达，相关技术甚至达到了世界领先水平，这意味着我们的雷达科技获得了重大突破！"
GRW_earlygame.24.a: "好极了！"
GRW_earlygame.25.t: "计算机科技突破"
GRW_earlygame.25.d: "我们电子科技阵线的同志传来利好消息，工程电信研究所的最近研发出了新型电子管计算机与全新的计算机技术指标，相关技术甚至达到了世界领先水平，这意味着我们的计算机科技则获得了重大突破！"
GRW_earlygame.25.a: "好极了！"
GRW_earlygame.26.t: "久等的审判"
GRW_earlygame.26.d: "“下面宣读法庭纪律。”书记员爪中持着大喇叭，向台下的群众喊道，“不得吵闹、喧哗、鼓掌、随意走动。如果对法庭审判活动有意见，不得当庭提出，可在闭庭后书面提出。”然后她吸了一口气，声音提高了几分贝，“严禁向被告投掷杂物！包括但不限于瓜果皮、臭鸡蛋、废纸、酒瓶……违者将处罚金，情节严重者处以拘役！”她喘了一口气，放下喇叭，对着台子另一边说：“下面传被告入席。”\n\n在四名解放军战士——一左一右架着，边上还有两名看护——的控制下，克洛苏·德·基绍被押上了被告席。他的双眼眼角都极不体面地糊着一大坨眼屎，眼球红得厉害；双足踉踉跄跄，他几乎是被战士们抬上来的。鉴于前国王岁数已经不小了，法庭为他准备了一个小板凳，而他瘫坐在那个凳子上，像是再也站不起来了一样。\n\n“下面请审判长，审判员和鹫民陪审员入庭。全体起立。”书记员喊道。克洛苏也被战士们架了起来。他精神衰竭得厉害，自此之后又什么也听不到了，脑海里只有一个多月以来漫长的一系列公审大会的画面。血衣、头颅、白骨、伤痕……\n\n“……根据群众的强烈要求和无可辩驳的事实证据，本庭判处被告克洛苏·德·基绍……”审判长宣读道，“死刑。立即执行。”\n\n在台下群众的欢呼与咒骂声中，克洛苏·德·基绍又被押解走出了台子。他在一步一步走向生命的最终毁灭，而在这时他突然想起他的妻子，他的王后。他可以去见她了，不过她会接纳这样的他么？在地狱或者炼狱中，她会不会因为他双爪上淋漓的血而拒绝见他？他那布满血丝的双眼失去了焦点。他累了，他应该早点与这个不可理喻的新世界告别的……"
GRW_earlygame.26.a: "也许，这真的是一个新的开始。"
GRW_earlygame.27.t: "贵族的命运"
GRW_earlygame.27.d: "我们对贵族的成分简要分析了一下，并召开了一个相当规模的群众大会。对贵族的处理方针，红兴主席有点拿不定主意，他决定把定夺的权利交给鹫民。显然地，这群贵族中有十恶不赦的罪犯，也有一小部分与民为善，接纳进步谐律思想的鹫。台下，鹫民讨论的声浪嘈杂。最终，狮鹫们的话语趋于相通，他们有力地告诉我们："
GRW_earlygame.27.a: "大会裁决以枪决处理，欢呼声中夹杂着枪声。"
GRW_earlygame.27.b: "相当一部分贵族鹫是温和且可以改造的。给他们一个机会试试看。"
GRW_earlygame.28.t: "前政府官员的命运"
GRW_earlygame.28.d: "我们通过对前政府官员进行阶级分析，成功从中将保皇派官员揪了出来。他们都明确反对过鹫民的新民主主义革命，大多都是内战时期布罗德费尔德王国的忠犬，甚至有些还背负着血债与肮脏龌龊之事。而关于保皇派官员的命运，菲利普同志召集其他同志开了个保密会议。\n\n会议的结果是……"
GRW_earlygame.28.a: "彻头彻尾的公敌——杀，坚定的前反动政权分子——劳动再教育，普通保皇派分子——清出政府"
GRW_earlygame.28.b: "掐掉头部分子，其余官复原职，我们太需要经验鹫才了"
GRW_earlygame.29.t: "前王国将领的命运"
GRW_earlygame.29.d: "革命胜利以后，如何处置前反动政残余势力便成为了我们需要讨论的东西。现在前王国将领普利维赞、科罗阿纳尔金特、莫特里塔、索伊梅斯库等均被我们控制着。\n\n关于保皇派将领的命运，我们的决定是……"
GRW_earlygame.29.a: "以反革命罪、战争罪枪毙他们"
GRW_earlygame.29.b: "给他们一个改造的机会"
GRW_earlygame.30.t: "阿尔贝罗贝洛村的毁灭（上）"
GRW_earlygame.30.d: "静谧的夜晚，本该被轻柔的鼾声与梦呓填满的村庄，却骤然被尖锐的呼喊声撕裂：“土匪来了，土匪来了！”这凄厉的嘶喊，裹挟着翅膀急速扇动的嘈杂声，还有突兀响起的几声枪响，如同冰冷的利爪，猛地抓破了夜的安宁。黑暗里，恐惧如同墨汁，迅速在每一个角落蔓延开来。\n\n“你可千万要躲好，别被那帮白匪给发现了，如果我们被害了，你就去隔壁村找同志们，或者去找解放军。”一只身形消瘦的母鹫，心急如焚地把一只还瑟瑟发抖的小鹫藏进了家中那口陈旧的米缸里。她轻柔又匆忙地合上米缸盖子，只留了一丝缝隙透气，随后用杂物在周边做了一番掩饰，这才转身，眼神中满是决绝与担忧，投身到未知的危险之中。\n\n半个钟头仿若一场漫长煎熬的噩梦，等全村的狮鹫都被土匪驱赶到一起时，村口那棵老榕树在冷冽夜风的吹拂下，发出阴森的沙沙声响，好似也在为这紧张的氛围低吟。\n\n“乡亲们，”土匪头子扯着嗓子开口了，他一身皱巴巴的军装，满脸横肉在月光下泛着油腻的光，“我们是布洛菲尔德王国军的第五十二旅，虽说国王被俘了，可咱这王国的骨气还在！咱们仍要抗争到底，那些个乱党，迟早会被咱们剿灭干净。如今要剿灭乱党，军需物资可不能少，乡亲们，有钱的出钱，有粮的出粮吧！这也是你们为王国尽忠的好机会。”他的声音在寂静夜里传得很远，却没激起一丝认同，只有满满的抵触与恨意。\n\n就在这时，一声细微却充满力量的“去你妈的”，好似一枚针尖悄然落地，却精准无误地刺破了土匪头子那嚣张又脆弱的心防。“谁？找死，是吧？妈的，出来！”土匪头子瞬间暴跳如雷，泛红的双眼在鹫群里恶狠狠地扫视着。\n\n很快，说出那句话的鹫就被其他土匪鹫给揪了出来。他被几双粗壮的爪子狠狠摁在地上，膝盖被迫重重磕在满是沙石的地上，又被一路强拖着，来到土匪头子面前跪下。土匪头子凑上前去，眼神阴鸷，一把扯起他的衣领查看衣服，这一瞧，竟发现了藏在里头的军服，不禁冷笑起来："
GRW_earlygame.30.a: "“呵，原来还是个共军崽子……”"
GRW_earlygame.31.t: "匪王的末路"
GRW_earlygame.31.d: "你可曾听说过内战时的锋锐森林是什么情况？在这片炊烟稀少的森林平原上，这里的狮鹫并不听命于国王或是共产党的使唤，而是臣服于数个大大小小匪帮军阀，在他们自己的王国里，他们点头决定着狮鹫们的生杀大权，爪子决定着这里的秩序……萧德斯回过神来，然后脑中所想之事便化为青烟消散。\n\n“父老乡亲们！”站在台上的狮鹫解放军朝着下面的狮鹫们大喊。“现在，经过蒂姆索拉鹫民公审大会的三轮审判，大匪首萧德斯罪大恶极，罪行罄竹难书，爪段毒辣凶狠。”她歇斯底里着，在烈日的照耀下现场十分燥热难耐，但是没有任何一支狮鹫离开。大家群情激愤，现场甚至还有断翼断爪的狮鹫在高举着自己的残肢怒吼着。\n\n“而且，他甚至还和境外的土匪政权助纣为虐，多次联合他们袭击了我们的工作队和群众的生命财产。直到被我们活捉前，他还在以死亡威胁着乡亲们为他的九岁女儿庆祝生日。”\n\n“女儿……”\n\n没有狮鹫在意他在碎碎念着什么，直到他开始让自己的关节开始咔咔响起……然后又被两旁的士兵嗯压了回去。\n\n“我现在就想知道最后一件事，你们这帮平头百姓把我的宝贝关哪去了！”沙哑的喉咙只能喷出少许口水，他看着面前那娘们的眼睛。\n\n“你还算是个好父亲，你的女儿虽然没有血债，但是其娇小姐的气质还是让我们决定把她送去专门的教育学校去接受社会再教育。”\n\n但很显然那个曾经的土匪头子还想再说些什么，但正当他再次开口时，便被套上了黑套子并绑在了处刑台的行刑柱上……\n\n“三、两、幺！”"
GRW_earlygame.31.a: "今天的枪声格外悦耳"
GRW_earlygame.32.t: "农民之伟力"
GRW_earlygame.32.d: "伊凡不是一只聪明鹫，但是他的力气特别特别大。\n\n普里文共产党在缜密的分析了剿匪形式后，采取了义勇民兵为辅助，解放军为主力，大胆放爪，依靠鹫民的剿匪方针。刚刚分到土地的老农民，伊凡，兴冲冲地加入了剿匪民军。\n\n首次执行任务的地点是一处匪患严重的聚居点。伊凡奉命执行侦查任务。悄悄靠近村旁的田野，一个喝得烂醉的土匪正烧田取乐。半熟的庄稼显得无助而可怜。\n\n“这是咱农民的命！”，伊凡噙着泪花，“解放军来之前，我要是有这么一块好田……我的家鹫也就不用为了保住小伊凡诺维奇饿死了……”\n\n伊凡握紧爪中的大刀：只有这玩意啊，能帮咱农民把这天理正过来！不能用枪，别便宜了这畜牲！\n\n伊凡学着处刑土匪头子的解放军战士，抡满大刀，豁地怒砍下去。土匪的头落地了，溅出一地脏血。"
GRW_earlygame.32.a: "明年，这块地的收成会很好。"
GRW_earlygame.33.t: "黑石匪帮的覆灭"
GRW_earlygame.33.d: "黑石在拼命的奔跑，只为了摆脱那愈来愈近的刺耳歌声。\n\n“这世间充斥的差异，只带来了是非。”\n\n她靠在一颗树边大口喘着粗气，回头看了看背后，一个给自己屁股上贴了个等号的狮鹫背着枪在左顾右盼。当他转过头来的时候，黑石赶忙躲到树后，她已经被连续追杀半个月了，她知道无论是谐律党还是平等派都不会放过自己，所以她只能尽力逃窜，虽然她也知道自己不过是在做困兽之斗。\n\n“当倘若步调能一致，这世界多完美。”\n\n黑石拿出爪枪，瞄准那个该死的平等邪教徒，扣动扳机，但没有任何声响，看起来子弹打光了，她又找了找身上，也没有发现任何子弹。“他妈的。”黑石绝望的叫骂到。骄横的她此时狼狈不堪，再也抬不起叛逆的头颅。\n\n“在我镇，在我镇，摒弃复杂化，”\n\n一切都完了，她的疯狂到处结束了。她无力的瘫倒在树上，思绪又回到了978年革命的时候，那时候的她率领逃兵和土匪，和凯兰·蓝冠伯爵对抗，那个腐朽的老东西自认胜券在握，不把她放在眼里。但就连她自己都感觉不可思议，她这帮虾兵蟹将居然真的势如破竹，一举推翻了伯爵的统治，把那帮贵族杀的片甲不留，君主制被推翻了，或者.....没有？\n\n“精简若能学到家，生活美如画。”\n\n她站在盗匪食物链的顶端，成为了新一代的伯爵，一切抵抗都被无情抹杀，无论你是贵族、平民或者其他什么东西，交不上税的都得面临黑洞洞的枪口，她带来的不是自由而是更牢固的锁链。共和主义的梦想被抛掷脑后，她开始以“黑石”自称，自己的真名也同理想一同逝去了，一切变了很多，却又什么都没有变。\n\n“弃暗投明迎彩霞，桃源享年华。”\n\n就跟蓝冠伯爵一样，她也不明白自己为什么就会被一群邪教徒推翻，一群满口胡言乱语的乌合之众居然真的一次又一次的击败自己的得力干将们，“为什么？”不甘心的她尽力站起身来，向着那个追杀他的狮鹫猛扑过去，想要把这群星光熠熠的崽子杀干净，想要尽力抓住那失去的一切。“嘭！”一声枪响，她倒在地上，血流一地，这个无法无天的盗匪女王在弥留之际看到的是蓝冠伯爵还有平等邪教徒们的微笑。"
GRW_earlygame.33.a: "“平等团结你我他，接纳等号吧。”"
GRW_earlygame.34.t: "教会的命运"
GRW_earlygame.34.d: "对于教会在反动政权中所起的支柱性作用没有鹫抱有疑问，每一次祈祷中国王的名字都在牧师的口中得到提及，克洛苏的一切行动都被牧师称颂为“神圣的斗争”，国王是农村与信仰的保卫者——简直胡说八道。北方帝国的反动学说在普里文教会根深蒂固，他们极端敌视共和主义与共产主义，坚信所谓君权神授，上层教会更是腐败透顶已经成为了知识分子中的笑柄。在狮鹫知识分子中不断有鹫提出这样的疑问——工业时代到来后三神已经很久没有展示过自己的力量，如果他们在地上的代行者变成了这样他们却毫无干涉，那么我们为什么还要崇敬三神，为什么还要供奉教会？在共产党中这样的思想尤其受到欢迎，如果没有意外，普里文接下来将取缔教会，将宗教限制在个鹫领域，国家的意识形态只建立在世俗化的共产主义上，或许几代鹫后，宗教就将从社会生活中消失。\n\n但一个新的宗派的到来为我们提供了一个额外选择，一个从北方来的叫做古斯塔夫.利喙的传教士穿越了帝国统治区找到了我们，他描述了一场发生在卡特琳的宗教革命，一名叫海因里希.暮羽的神父推翻了腐朽的教会陈规，在卡特琳的乡村中建立了一种旨在真正解放鹫民，保卫劳苦大众的新宗教。在他口中，暮羽控制下的农村简直像是我们的根据地，暮羽的队伍就像是一支真正的共产主义游击队。这位传教士赞赏我们不同于其他共产党忽视乡村农民的行为，希望能够与我们合作，利用暮羽的教义改造普里文教会，用辩论而非子弹的方式帮助我们处理好教会问题，这样宗教也能够成为革命的盟友，减少顽固农民对政权的敌视。这同样是互惠互利的举动，当有朝一日我们解放所有狮鹫时，他的宗派也就能够取代反动的北风神教会，带来一场精神革命。"
GRW_earlygame.34.a: "诸神的时代结束了，未来属于鹫民"
GRW_earlygame.34.b: "一个革命宗教不失为一种解决办法"
GRW_earlygame.35.t: "埃维穷油？"
GRW_earlygame.35.d: "同志，这是一个重大利好消息！\n\n在嘶大林格勒的石油专家的分析研究指导下，我们的石油勘探队成功在恐怖沼泽地区发现了储量惊鹫的石油储藏，估算有上百万吨，相关技术队伍已经紧急开赴恐怖沼泽。准备将该此地建设成社会主义经济发展的重要引擎！"
GRW_earlygame.35.a: "最后，此地将改名“普拉霍瓦”，以纪念这一历史性时刻"
GRW_earlygame.36.t: "从血泊中爬出"
GRW_earlygame.36.d: "刚刚复员的解放军战士，列奥尼德，背着他最好的老伙计——一把略有磨损但可靠的步枪——缓慢而坚定地在海岸线边踽踽独行。\n\n血，反动派的血，革命战士的血，鹫民的血，染红了他生于斯长于斯的大海。\n\n列奥尼德有些退缩，他想到了从战场上救下他的小阿斯帕西娅——他的可爱的阿斯帕西娅不能，也决不允许他再有一丝闪失。\n\n列奥尼德深情地沿着海岸线望去，有几只满载粮食的木船正在刚修复的港口停泊。\n\n列奥尼德想到了战争中那些忠厚，可爱——当然也无比可怜的农民。"
GRW_earlygame.36.a: "到祖国最需要的地方去！"
GRW_earlygame.37.t: "从硝烟中站立"
GRW_earlygame.37.d: "“额，同志……我还不渴。”\n\n列奥尼德对着那只给他递来一碗泥水的鹫尴尬地笑。\n\n“解放军同志，”这只未老先衰的狮鹫诉苦，“白狗子和土匪把我们的土地作践了，把我们引水用的渠毁了。把我们的村子打烂了……您先忍忍，过会挑水的鹫就回来了，您是文化鹫，您肯定知道怎么救我们……”\n\n列奥尼德小声抽噎。他抢过瓷碗，一把饮尽泥水，背起枪离开鹫群。\n\n“同志，您去哪里？”老鹫向着列奥尼德的背影伸出爪子。"
GRW_earlygame.37.a: "“县城。我要去买雷管。”"
GRW_earlygame.38.t: "从废墟中崛起"
GRW_earlygame.38.d: "“没错，事情总是那么喜鹫。这里的乡村和城市都已经基本重建完成了，我的阿斯帕西娅，我们已经从废墟中站了起来。不用担心我这里的情况，鹫民很热情，很勤劳，而且很有智慧。扫盲工作正在推进，村子的重建和供水……”\n\n“同志，来，这是我的儿子，伊凡诺维奇。他今天一直缠着我，说是要见见你……”\n\n列奥尼德放下羽毛笔，起座离席。\n\n“小同志，想听什么故事啊……”\n\n“我想听那首歌，就是那一首！您经常唱的那一首！”小伊凡诺维奇挺起了胸膛，猛撑开双翼，一飞冲天。\n\n“我猜猜，”列奥尼德用爪子摩挲着喙，"
GRW_earlygame.38.a: "“扫清废墟，重建家园，面向未来展雄翅……”"
GRW_earlygame.39.t: "全国土地测绘完毕"
GRW_earlygame.39.d: "我们已经将最后一处地区的土地测绘数据入库了，现在我们的土改委员会已经掌握了各地可耕土地的数据，相关的工作队也都返回委员部开始着爪进行下一步工作，现在相关的工作文件已经递送到主席同志的办公桌上，只等文件正式签署……"
GRW_earlygame.39.a: "让我们开始吧"
GRW_earlygame.40.t: "与鹦鹉维亚的联系"
GRW_earlygame.40.d: "赤道的阳光像熔化的金子，倾泻在[GetGRWCPGAdvisorName2]汗涔涔的额头上，摘掉配饰的民主联军军装的硬领早已被汗水洇深了一圈。他身旁的[MCW.GetLeader]，正微笑着向两侧如潮水般涌动的人群扇翅致意。在[MCW.GetCapitalVictoryPointName]火车站那个简短却隆重的欢迎仪式后，此刻，他们乘坐的敞篷车正缓缓碾过宽阔的林荫大道。彩色的纸屑和花瓣雨点般落下，震耳欲聋的欢呼声浪几乎要掀翻车顶——[MCW.GetName]方面精心安排的这场公开游行，意图再明显不过：用最直观的方式，将两个共和国领袖“肩并肩”的形象，连同那份“坚不可摧”的团结友谊，深深烙进每一个围观者的心里。\n\n[GetGRWCPGAdvisorName2]抹了把快流进眼睛的汗水，身体微微倾向[MCW.GetLeader]，声音在鼎沸的人声中努力拔高，带着一种不易察觉的沙哑：“阁下！”他克制住表情的变形，试着严肃地说，“我们最艰难的那段日子……[MCW.GetName]给予的援助，是真正的雪中送炭。而你们在中部海持续不懈地打击海盗，守护着贸易生命线的咽喉。这份情谊，”他顿了顿，声音沉了下去，带着不容置疑的重量，“[Root.GetAdjective]的民众，将会永世不忘。”\n\n[MCW.GetLeader]脸上的笑容更深了些。他一边继续向热情的民众点头致意，一边侧过头回应，声音洪亮：“能为我们的[Root.GetAdjective]朋友尽一份力，是[MCW.GetName]的莫大荣幸！您看，正是这些我们共同坚守的信念——独立，自由和共和主义……” 一阵更猛烈的欢呼声浪袭来，他不得不暂时停下，向民众扇翅示意。\n\n又一波热浪。[GetGRWCPGAdvisorName2]猛地攥紧前排椅背，一阵眩晕袭来，视野边缘发黑。赤道的酷热榨干了他的力气，耳鸣嗡嗡作响。他强咽下喉头的灼烧感，强迫涣散的目光聚焦在[MCW.GetLeader]脸上。“正是……这份情谊……与共同的信念……让我们无比珍视眼下双方互相尊重独立与自由的约定！我们……” 他终究要坚持不住了，黑暗吞没了他……"
GRW_earlygame.40.a: "“医生！天哪，我该安排他们提醒您戴帽子来的！”"
GRW_earlygame.77.t: "交易的艺术"
GRW_earlygame.77.d.agriculture_non_recovery: "虽然内战的硝烟已经散去，[Root.GetName]仍然面临严峻的经济挑战。国内农业生产尚未从饥荒连年战乱的打击中完全恢复，粮食供应虽已摆脱危机状态，但距离自给自足和支撑大规模工业化建设所需仍有显著差距。农业基础的薄弱，直接制约了国家经济的整体复苏与发展速度。\n\n在这种条件下，为了加速国家重建与技术升级，共和国政府不得不寻求外部援助，特别是急需的专业工程师队伍和关键领域的投资资本。我们没有太多选择，而临近的[MCW.GetName]表示愿意提供这些宝贵的资源。\n\n然而，获得[MCW.GetAdjective]的支持并非无偿。作为交换条件，我国被迫在特定经济领域向[MCW.GetAdjective]企业开放特殊权限。根据其要求，这主要包括税收减免、市场准入和投资保护等方面。这些让步是获取[MCW.GetAdjective]工程师团队和启动资金所必须付出的沉重代价。它们不可避免地会对国内刚刚起步或仍在复苏中的本土企业造成显著冲击。本国企业在资本、技术和管理经验上难以与享受特权的[MCW.GetAdjective]企业直接竞争，其市场份额、发展空间和盈利能力都将受到挤压。\n\n上述政策在国内招致了广泛的批评与强烈的不满。尤其是在民族工商业界和学界，已经不乏反对声音称协议将摧毁[Root.GetAdjective]幼稚的民族工业，彻底葬送我们独立自主工业化的可能。部分党内同志也批评此举违背了革命的“经济自主”原则，质疑向外国资本让渡过多利益的长远危害，担忧会滋生新的买办阶层甚至剥削关系。部分民众则担心给予[MCW.GetAdjective]居民“超国民待遇”会有损公平。\n\n政府深知这些让步的争议性与潜在风险。然而为了能够尽快地恢复经济，开展工业化建设，我们似乎别无选择。"
GRW_earlygame.77.d.agriculture_recovery: "得益于内战结束后的有效恢复工作，[Root.GetName]的农业生产取得了显著进展。虽然完全恢复尚需时日，但国内粮食供应已趋于稳定，甚至开始产生部分盈余作物。与此同时，对国内资源的初步勘探也确认了具有商业价值的石油储量。\n\n这种相对改善的国内条件为我们与[MCW.GetName]的谈判提供了新的基础。鹫民政府积极寻求利用我们的农产品盈余和宝贵的石油资源，与[MCW.GetName]进行互惠互利的交换。我们的目标是获取其先进的工业知识、技术设备以及关键的工程师援助，以加速国家的工业化进程。\n\n经过谈判，双方达成了一个平衡性较好的协议：我方将向极度依赖粮食进口的[MCW.GetName]稳定出口部分盈余谷物和经济作物，换取其工业设备和技术许可。另外，针对[MCW.GetName]国内极度贫油的现实，我方同意开放部分油田的开发权或签订长期供油合同，以此直接换取其先进的工业技术转让和成建制的工程师团队援助。协议确认双方经贸往来的平等互惠原则，包含了相对平等的市场准入和投资保护条款。这一协议的核心是利用我国相对充裕的农业产出和新发现的战略资源，作为杠杆换取[MCW.GetAdjective]的工业技术。相较于被迫出让经济主权，这更像是一种基于比较优势的资源与技术交换。\n\n尽管如此，协议在国内仍引发了一些讨论和谨慎的关注，主要批评声音集中在协议可能削弱国家资源控制力，形成技术依赖，冲击本土行业以及因监督不足损害国家利益和自主发展。\n\n无论如何，政府认为，在当前的恢复阶段，充分利用爪中的农产品和石油资源，主动换取急需的工业技术与知识，是加速国家重建、迈向工业自主的一条务实且前景可期的道路。这为我们奠定坚实的工业基础提供了难得的机会。"
GRW_earlygame.77.a: "这是必要之恶"
GRW_earlygame.77.b: "这将是一个良好的开端"
GRW_earlygame.77.c: "问问他们对“黑色黄金”是否感兴趣"
GRW_earlygame.78.t: "科学文化交流计划"
GRW_earlygame.78.d: "在与[MCW.GetName]达成经济与技术合作的主体条约后，对方进一步提出了一项补充性倡议：希望将目前两国间零散、自发的民间科学、文化与教育交流，提升至官方层面，建立系统性的合作框架。[MCW.GetAdjective]方面倡议建立一个双边科学文化基金，接着逐步开展互设文化中心、组织科研项目交流等等深度合作。\n\n这个提议无疑是争议性的。在学者与艺术界长期抱怨我国缺乏这方面的官方协调机构的同时，党内主管意识形态的部门也不断发出警告，提醒我们注意伪装成所谓“科学文化交流”的意识形态渗透。双方的忧虑都是真实的。我们当然不能把民众拘束在名为国界的囚笼中，但另一方面，与号称“自由”的资本主义国家打交道太多，自然也会对国内的风气造成潜移默化的影响。即使对方无心于此，消费主义、拜金主义等风气也常常由所谓的“开放”而盛行。\n\n对于外交方面而言，如果能接受这样的提议，无疑能进一步提升我们与[MCW.GetName]的关系。与[MCW.GetAdjective]科学家的合作意味着我国的科学技术水平也能得到提升。更重要的是，我们的下一代理所应当地需要拥有基本的国际视野，而[MCW.GetName]是一个很好的交流窗口。我们当然要注意意识形态安全，但是，其边界究竟在哪里？我们应该同意这一提议吗？"
GRW_earlygame.78.a: "大胆地试！大胆地闯！"
GRW_earlygame.78.b: "我们承担不起被颠覆的风险。"
GRW_earlygame.79.t: "协议签署"
GRW_earlygame.79.d: "今天早些时候，[ROOT.GetName]与[MCW.GetName]之间的双边合作协议在西迪亚港签署。这意味着两国谈判终于迎来了结果。\n\n两个共和国拥有共同价值观，先前也有一定合作基础，但这并不意味着谈判过程缺乏外交算计。实际上，双方的交锋十分激烈，都在最大限度地争取自身利益。最终敲定的协议，本质上是双方，尤其是[MCW.GetName]一方，基于当前各方面条件（特别是经济条件）考量的结果。[WNG.GetName]的报纸毫不留情地指出，如果双方真的有如宣传所说的那样的兄弟情谊，谈判本身就不会如此针锋相对。\n\n不管怎样，现在达成的协议会令双方各取所需：[MCW.GetName]扩大了其在埃维河谷的影响力，并能获得一批珍贵的资源；[ROOT.GetName]得到了工业化的启动资金与技术。由于国力悬殊，达成的交易自然也不对等，[ROOT.GetName]国内最激进的反对声音将其称为“与魔鬼的交易”。但是，毕竟，骰子已经掷下。鹫民共和国如今需要考虑的，是怎样将争取到的资金、技术与智慧头脑，最有效率地投入到工业化事业中去。"
GRW_earlygame.79.a: "赶走了一群吸血鬼，又来了另外一群……"
GRW_earlygame.79.b: "为我们的哈比鸟朋友干杯！"
GRW_earlygame.41.t: "鹦鹉维亚断交"
GRW_earlygame.41.d: "“……鉴于以上原因，共和国政府认为，继续与[ROOT.GetName]的正式外交关系已经没有必要，甚至是有害的。因此，也是根据我国民众的利益和愿望，我方决定，即日起停止与[ROOT.GetName]的外交关系。”\n\n[GetGRWCPGAdvisorName2]没有马上接话，房间里是沉默，这沉默甚至让[MCW.GetAdjective]的使节觉得有些发毛。不知过了多久，[GetGRWCPGAdvisorName2]才缓缓开口，像是在斟酌词句：“我们……[ROOT.GetName]中央鹫民政府，对于贵方选择以终止外交关系的方式处理分歧……深表遗憾。”\n\n使节松了口气。“那么，按照惯例，我方将依规撤出在贵国境内的所有共和国民事雇员，同时也为贵国的使馆及派出机构的员工提供15天的离境窗口。”\n\n[GetGRWCPGAdvisorName2]点点头，像是表示理解：“贵国的做法还是相当体贴的。基于对等原则，我们也会给予15天的期限。”\n\n那[MCW.GetAdjective]使节眼神复杂，像是在斟酌是否要开口，最终还是说出了下面的句子：“总理阁下。就我自己看来，世界很大，中部海很小，[MCW.GetCapitalVictoryPointName]与[ROOT.GetCapitalVictoryPointName]之间的往来不可能完全隔绝。我希望等到事态好转之后，我们还会有再见面的那一天。再见。”他没有看[GetGRWCPGAdvisorName2]，踱步走出了房间。"
GRW_earlygame.41.a: "道不同，不相为谋。"
GRW_earlygame.42.t: "拜访嘶大林格勒"
GRW_earlygame.42.d: "在嘶大林格勒的首都机场，一架专用客机降落在跑道上，机舱们缓缓打开，里面钻出来一个面楼微笑地狮鹫，他热情地向周围的小马们打招呼，他就是普里文鹫民共和国的主席——菲利普.红兴。\n\n与此同时，一名年轻的小马正满脸笑容的迎接他：“欢迎来到嘶大林格勒，我亲爱的朋友，恭喜你们取得了胜利，你们真了不起。”\n\n红兴咯咯一笑：“这也感谢你们嘶大林格勒对普里文革命的支持，你们教会了我们不少经验。”\n\n那名小马笑了笑，继续说道：“你们一路上辛苦了，来，我带着你们去苏维埃宫。”\n\n“那就有劳瓦西里同志了。”\n\n随着一名嘶大林格勒军官的号令，车队驶向苏维埃宫。不一会儿，车队抵达了目的地，红兴和瓦西里一同进入了苏维埃宫。\n\n在宫内，红兴率先开口：“瓦西里同志，祝您生日快乐！”\n\n瓦西里.韦京感到非常惊讶，见过很多的外国领导者，头一次见到有记住瓦西里生日的，这让他的眼眶开始充满泪水：“谢谢，红兴同志，就你这句话，你们想要谈什么，我都会考虑的。”\n\n红兴想了想，肯定地说道。"
GRW_earlygame.42.a: "那就谈谈工业合作的事情，同志。"
GRW_earlygame.43.t: "极北之地的同志"
GRW_earlygame.43.d: "“雪落在北境的土地上，寒冷在封锁着北境呀……”索林·裕鲁吟诵道，“……北境的苦痛与灾难，像这雪夜一样广阔而又漫长呀！”\n\n天际纳维亚方面的军官显然对这首诗有印象，虽然裕鲁的赫兹兰语说得不甚流利，普里文口音也很重，但他显然明白对方在说什么。“《铁流》里的那首牢骚诗么？”他结霜的脸上浮起一抹微笑，“想不到你们也知道。”\n\n索林·裕鲁停步，尔后开口道：“我这是第一次来北方，我以前只在读《铁流》的时候想象过什么是雪，我以为那是湿棉花一样的玩意儿。等到真的来这里，才发现跟我想象的不一样。”他伸出了爪子，从地上铲起一小块雪，“我发现雪其实干得很，只要不融化，就是一种冰冰凉凉的，锯末一样的东西。”\n\n“我的家乡在弗羽西亚，”军官接着话茬说，“那里也下雪，但是不如这边遍地积雪。刚来天际纳维亚的时候，我们的队伍出现过很多非战斗减员。有的眼睛瞎了，有的肢体坏死，有的被风雪卷走……但我们当时都是小伙子，没有谁觉得这能把我们吓倒。转眼就是二十多年，我们多少也学会怎么在这天寒地冻的地方活下来……以及，战斗。”\n\n“这正是是红兴主席委派我们来学习的东西。”索林·裕鲁郑重地说。\n“我们毫无保留。”那军官笑着回应。"
GRW_earlygame.43.a: "因为我们的目标是共同的。"
GRW_earlygame.44.t: "与里夫的联络"
GRW_earlygame.44.d: "让我们把目光转向我们的邻国，“黑石匪帮”，一个完全由亡命之徒占山为王而成的国家。当我们还在与布罗德费尔德王国的反动派激战的时候，他们就常常趁鹫之危，跨过边境在解放区大肆劫掠。而鹫民共和国成立后，他们更是直接与周边各国的反动政府勾结组成反共条约，企图瓦解革命，我们现在已经腾出爪来了，必须做出措施来予以反击。\n\n黑石匪帮是反共条约里面最薄弱的一环，其国内极度不稳定，由于残酷的统治爪段和灾难的经济，国内的农民饱受压迫，他们越来越多投身于抵抗运动。而发展最大的一支便是由一名叫“里夫·布莱丁”的狮鹫领导的“平等主义”游击队。\n\n平等主义起源于星光熠熠的理念，声称只有在政治、经济上实现完全的“平等”，才能建成真正的乌托邦，而里夫甚至比一般的平等主义者们还要狂热的多，他认为必须让所有鹫拥有同样的想法，所有地区拥有同样多的狮鹫，让每个狮鹫都去军队服役用以保卫“平等”，才能实现真正的“平等主义”。这番狂热恐怕连星光熠熠都难以接受。\n\n的确，我们并不认同这种将所有差异都抹去的疯狂理念，但是为了推翻黑石女王的反动统治，后退一步也未尝不可。我们已经秘密和里夫所控制的游击队建立了联系。我们的特勤鹫员化装成来投奔的土匪越过边境，秘密地为里夫的游击队提供武器弹药，同时要求解放的黑石地区必须加入我们领导的社会主义联盟，而回报就是待到社会主义联盟建立之后在这里建立平等主义实验区，让里夫实现他的理想，这无疑是一个让双方都满意的交易。尽管党内许多鹫还是对我们和一群“疯子”合作而颇有微词，但至少我们终于开始着爪于培养黑石地区的革命了。"
GRW_earlygame.44.a: "星光熠熠的理想能在黑石成为现实吗？"
GRW_earlygame.45.t: "群山中的自由斗士"
GRW_earlygame.45.d: "我们的支持，目前黑空地区的抵抗运动愈加壮大，越来越越多不愿忍受奴役的狮鹫投身于平等主义的游击队，随着街头越来越多与反动派的正面冲突的发生，反动的土匪们采用更加残酷的爪段来镇压起义，但是哪里有压迫，哪里就有反抗，这只会助长革命的力量。\n\n但同时我们需要认识到，仅凭借平等主义者们自己的力量来对抗土匪仍然是很艰难的，不仅是因为土匪们的凶残，更是因为里夫本鹫的冒进主义政策，游击队常常采取冒险的行动来攻击敌鹫守卫牢固的据点，游击队内部的唯意志主义和个鹫崇拜现象更是近乎泛滥，星光熠熠的子孙们正在进行一种造神运动。尽管我们多次批评里夫的错误，而且多次指派鹫员传授游击战的经验，但是帮助始终是有限的，平等主义的信徒们不允许任何对领袖的批评，而里夫的独断专横更是让传授经验的工作难上加难，对此我们无能为力。我们不得不把目光转向其他抵抗土匪的势力，除了平等主义者们，匪帮还有另一个心腹大患，那就是由被黑石亲爪杀掉的凯兰·蓝冠伯爵的继任者——希里尔·蓝冠，作为正统的贵族继承鹫，谐律主义者们在她的旗帜下组织起了山谐党，在支持君主制的前提下向往小马利亚式的“仁政”。尽管我们也不愿意与君主主义者谈判，但是为了团结一切可以团结的势力，我们的特勤鹫员已经和山谐党取得了联系，通过沟通我们和山谐党达成了合作协议。山谐党和平等主义者们不会再攻击对方所控制的据点，而是团结一致共同打击土匪，这样一来两大抵抗组织团结一心，共同反对黑石的暴政。\n\n但是话说的漂亮，在这美丽的辞藻下隐藏着君主主义者和平等主义者的权力斗争，双方都明白联合不过是暂时的，但这样强凑的联盟也能支撑一段时间，至少支撑到黑石政权的崩溃……"
GRW_earlygame.45.a: "先斩断锁链，然后再决定跟谁走！"
GRW_earlygame.46.t: "平等主义的结束"
GRW_earlygame.46.d: "里夫瘫坐在椅子上，他的翅膀耷拉着，被子弹命中而失明的那只眼睛也因为桌上的黑白字体隐隐作痛。\n“由于公社社员一致决定，黑空公社将罢免里夫同志职务，并放弃平等主义实践，平等主义公社将由共产党进行接管并进行政策调整……”下面是留给他签字的空白。\n\n不满一年，平等派公社便出现了一系列问题，狮鹫们虽然没有可爱标记来标定自己擅长的东西，但并不意味着他们毫无个性能够任凭里夫塑造，为了完成平等主义的目标，里夫花费了大量时间进行教育和宣传，结果挤占了农业劳动时间，收获不及预期，公社的粮食越来越依靠外部的支持，这意味着里夫要让渡更多权力给共产党鹫。当里夫试图提高劳动时间以维持生产，那些对平等主义不耐烦的狮鹫们用直截了当的方法表达了他们的不满——他们张开翅膀从公社飞了出去，只要他们抵达普里文共产党控制的地区，平等主义就如同一阵轻烟烟消云散了。\n\n所有的公社都因为鹫民流失而无以为继，而里夫又能做些什么？难道剪掉所有鹫的羽毛？里夫还真打算这么做，他刚刚和几个亲信商量该如何推进这件事，然后就来了两个普里文的共产党员，他们礼貌的提醒里夫，共产党愿意让他实验平等主义公社的前提是平等主义公社不能够伤害任何社员的身体安全，也不能阻拦社员自由退出。\n\n“而您现在就是在用武力逼迫他们留下。”\n\n“这不公平，你们有大城市，谁都当然会想去城市生活！”里夫抱怨到：“如果能把平等主义公社扩展到城市，这些问题都能被轻松解决，你们应该相信我……”\n\n“里夫同志，我们共产党是先在农村取得了鹫民的支持，然后才攻克的城市。”共产党鹫的语气变得强硬起来：“如果你的公社连争取农民都做不到，拿什么去应对城市的问题？靠唱歌和拿出星光熠熠的照片吗？”\n\n总之当他们走后，里夫坐在椅子上不停的咒骂他能够咒骂的所有鹫，从消极的农民，无法理解他雄心壮志的社员，不近鹫情的普里文共产党，甚至还有宣布放弃平等主义的星光熠熠，但无论他如何咒骂，平等主义公社实践宣告失败的结果都无法改变，他所能做的就是在解散公社的文件上签字，然后等待共产党给他安排一个无足轻重的其他职位。"
GRW_earlygame.46.a: "我就知道那群黑空鹫搞的“平等主义实验”像星光熠熠搞的一样荒唐。"
GRW_earlygame.47.t: "来自[FROM.GetAdjective]的外交使者"
GRW_earlygame.47.d: "[FROM.GetAdjective]的同志向我们送来正式代表他们的外交使者，他们提议和我们和平统一，我们外交战线上的同志已经接待了他们。\n\n现在只需要主席同志同意，我们就将派遣工作队前去[FROM.GetAdjective]进行和统工作。"
GRW_earlygame.47.a: "同意"
GRW_earlygame.48.t: "[FROM.GetNameDefCap]同意了"
GRW_earlygame.48.d: "好消息！[FROM.GetNameDefCap]政府已接受我方和平统一的倡议，我们已经开始了整合[FROM.GetNameDefCap]的政府、经济和军队的工作，我们的社会主义祖国更加壮大了!"
GRW_earlygame.48.a: "团结在马科思和嘶大林的旗帜之下！"
GRW_earlygame.49.t: "如何处理[FROM.FROM.GetAdjective]？"
GRW_earlygame.49.d: "随着埃维地区的统一，我们的国际地位也大大提高，再也没有狮鹫会小瞧我们了！当然统一埃维并不是我们的终点，我们一定要将赤旗插遍狮鹫尼亚。现在让我们把目光聚焦于[FROM.FROM.GetAdjective]上，该国虽然也是资本主义国家，但是相对于其他反动派们对我们的敌视，他们对我们的态度相对温和，所以试图与该国合作，并通过逐渐增强左翼的影响力的方式让社会主义制度和平建立或许未尝不可？但是国际派对此嗤之以鼻，他们觉得“和平演变”的想法是幼稚且不现实的，他们只想要让所向披靡的红军跨过边界武装支援该国的革命，所以我们应该怎么办？"
GRW_earlygame.49.a: "或许和平演变的方式未尝不可？"
GRW_earlygame.49.b: "对待敌鹫没有第二种选择，必须付诸武力。"
GRW_earlygame.50.t: "[FROM.GetAdjective]提议签定贸易协议"
GRW_earlygame.50.d: "[FROM.GetAdjective]派遣外交使团前来与我们磋商贸易协议，并希望可以扩大条约实现两国之间的互不侵犯，外交阵线的同志整理了会议纪要并向上作了报告，批复是……"
GRW_earlygame.50.a: "同意"
GRW_earlygame.50.b: "拒绝"
GRW_earlygame.51.t: "[FROM.GetAdjective]同意签定贸易协定"
GRW_earlygame.51.d: "好消息来了！[FROM.GetAdjective]同意签定与我们的贸易协定，这意味着不仅我们在一定程度上可以打破帝国主义国家对我们的封锁。而且我们更重要的是我们可以在[FROM.GetAdjective]撒下一点革命种子，待到时机成熟，我们或许就可以让资产阶级政府以相对和平的方式滚下台了……."
GRW_earlygame.51.a: "好的"
GRW_earlygame.52.t: "[FROM.GetAdjective]拒绝签定贸易协定"
GRW_earlygame.52.d: "坏消息，[FROM.GetAdjective]拒绝签定与我们的贸易协定，他们怀疑我们正在他们国内进行“颠覆活动”，我们打破封锁和和平演变的计划双双落空了。国际派在此前一直叫骂政府轻信资产阶级政府是没有好下场的，而现在他们洋洋得意的表示“和平演变”不过春秋大梦罢了。"
GRW_earlygame.52.a: "好吧……"
GRW_earlygame.53.t: "[FROM.FROM.GetAdjective]政变成功"
GRW_earlygame.53.d: "在我们精密的策划之下，[FROM.FROM.GetAdjective]的同志们巧妙的组织了一场不流血的政变，大多数前政府成员都被逮捕，少数则在表明态度之后继续留任。我方立刻外交部立刻宣布对政变的支持，并开始准备与新政府的建交工作，虽然还是有些国际上的闲言碎语宣称这是普里文对[FROM.FROM.GetAdjective]的一次颠覆行动，但谁在乎呢？"
GRW_earlygame.53.a: "干得漂亮！"
GRW_earlygame.54.t: "来自普里文的代表团"
GRW_earlygame.54.d: "我们刚刚接待了一队不同寻常的代表团——他们来自北方新生的[GRW.GetName]。我们与普里文的关系一直很微妙，普里文内战期间我国民间的纯红党与部分左翼组织曾援助过他们急需的物资装备，而政府对这一行为亦持默许态度，但我国对狮鹫——尤其是社会主义狮鹫的警惕从未消失过，而且两国在萨尔玛克与爬行者山脉两地还有宣称冲突。如今[GRW.GetName]的代表团为了[GETGRWEarlygame54TT]打破外贸困境而来，试图与我国达成军事或经济上的协议，我们用得着和这群狮鹫谈吗？"
GRW_earlygame.54.a: "说不定这群狮鹫会和蓝百合那群畜生不一样"
GRW_earlygame_54_tt: "共同抵御来自[CYA.GetName]的威胁与"
GRW_earlygame.55.t: "接触白冠亲王"
GRW_earlygame.55.d: "卢什是我们的北方邻国，虽然它是一个仍然施行农奴制的封建王国，但是现任的白冠亲王却是一个颇为进步的领袖。与前任相比他似乎非常同情底层农奴的艰苦生活，而且有意废除农奴制，最重要的是他并不介意与我国交涉，在鹫民共和国成立之后，他也是紧随嘶大林格勒其后，成为第二个承认我国的国家。\n\n我们很快便派遣外交部的同志们与其进行交涉，在卢什的首都卢米面见白冠亲王，谈判进行的很顺利，我方提出在两国之间签订互不侵犯条约并与卢什展开经济交流，同时表示以后两国间的经济合作可以逐渐深入，而且两国之前将签订互不侵犯条约，这无疑让同样为实现现代化感到苦恼的白冠亲王颇为感兴趣，但是凡事都是有条件的，我方在谈判中表示目前卢什仍然实行农奴制，这恐怕会对经济发展产生很大的阻力，同时详尽了讲述了我国目前的经济稳步发展的形势以及布罗德费尔德王国时期经济毁灭的惨剧，最终我方提出自己的条件，卢什亲王国要正式开始废除农奴制的改革，否则普里文与该国之前的合作将仅仅是有限的。\n\n白冠亲王听后深思熟虑了一会，最终点了点头，答应将在不久的将来正式废除农奴制，同时乐意与普里文展开经济上合作交流。我方代表也满意的与白冠亲王握爪，看起来两方都很满意这个结果。"
GRW_earlygame.55.a: "好的"
GRW_earlygame.99.t: "[LUS.GetCommunistParty]的命运"
GRW_earlygame.99.d: "今天早些时候，新埃维社等多家[GRW.GetName]官方媒体通过多种渠道共同播发了一份署名“特约评论员”的社论。该“特约评论员”首先回顾了[GRW.GetName]与[LUS.GetName]的“文化连结”，赞赏了两国民众的“传统友谊”。接着笔锋一转，声称“[GRW.GetRulingParty]赞赏[LUS.GetLeader]对国内进步政治力量的包容胸襟”，也称赞“[LUS.GetCommunistParty]一直以来不屈不挠的斗争”。最后，文章以对[LUS.GetName]未来的期许与对两国关系前景的展望结束。\n\n结合[LUS.GetName]目前传出的种种消息来看，这种隐晦的言辞只可能有一种解读：在[GRW.GetCommunistParty]的努力下，[LUS.GetCommunistParty]已经与政府达成了某种妥协。[LUS.GetLeader]将接纳左翼势力进入政府；作为交换，[LUS.GetCommunistParty]不再采取反政府立场。显然，他们接下来将要做的第一项重大变革就是关于[LUS.GetAdjective]臭名昭著的农奴制。几百年来，这种陈腐制度束缚着[LUS.GetAdjective]的农民，在当下已经被认为远远落后于这个时代。\n\n[LUS.GetLeader]对待国内左翼势力的态度一直耐鹫寻味，其最终与[LUS.GetCommunistParty]达成妥协并不在观察家的意料之外。而对于[GRW.GetRulingParty]而言，能够促使邻国的左翼盟友参与政权，本身就是其影响力提升的一种体现。"
GRW_earlygame.99.a: "善莫大焉。"
GRW_earlygame.56.t: "卢什和平解放！"
GRW_earlygame.56.d: "埃维解放战争迎来了胜利的曙光。除基韦辛外，凯辅、暗喙城与里亚波图也已遍插红旗，整个地区的目光此刻都聚焦于埃维河上游的卢什亲王国。\n\n在卢米，当地贵族仍心存幻想。尽管“进步亲王”的势力尚存，他本鹫却受各方掣肘，几乎无力做出有效决策。卢什最狂热的反动贵族纠集起一支由农奴拼凑的军队，试图在塞萨比特阻击解放军。然而他们的抵抗不堪一击——历经战火锤炼的解放军不费吹灰之力便将其击溃，兵锋直指卢米城下。\n\n面对大军压境，卢什贵族终于认清现实：若再不放弃抵抗，恐怕连自身性命都难保全。于是，在对方政府的主动提议下，解放军和平进驻卢米城。埃维河谷至此实现全境解放。"
GRW_earlygame.56.a: "埃维革命合上了最后一块拼图。"
GRW_earlygame.57.t: "破冰河间"
GRW_earlygame.57.d: "江源城，狮鹫尼亚大陆中为数不多的繁荣城市。这里远离西部地区的战火，美丽的金河贯穿整个城市。在这里，你可以尽情享用来自德马尼亚和湖城的葡萄酒。平日里，这座都城的氛围非常平静，但是今天，江源城门外挤满了小马，金河上挤满了船只，自由大桥上也挤满了江源城的居民，她们在等待一名来自普里文的贵客。\n\n载着贵客的那支车队来了，江源城的居民们持着鲜花热烈欢迎他的到来，车里的狮鹫看到这一幕，露出了满意地微笑，他打开车窗，挥动爪子向居民们致谢。车队很快抵达了江源宫，那名狮鹫一下车就见到了大江共和国的领导者——江漩。\n\n狮鹫先主动和江漩握蹄：“您好，江漩总理。很荣幸见到您和您的马民，看得出来，您把国家治理成了一片世外桃源。您的国家简直是狮鹫尼亚的典范。”\n\n江璇微微一笑：“好了，尊敬的短羽总理，你就别捧我了。说实话，河间的稳定有你们的一份功劳，如果没有你们这些十六万狮鹫的帮助，我们也无法与西边的邪恶帝国相抗衡。总的来说，我不喜欢共产主义者，但是你们的行动改变了我对其的刻板印象，你们好样的。”\n\n短羽轻笑道：“江漩总理你过奖了，我们可无意这么做，也没有做出过什么对抗方面的贡献。”\n\n江璇哈哈大笑：“总之，我有兴趣和你们谈些有趣的事情，来我的江源宫坐一坐如何？\n\n短羽点点头，回答是丝毫不带犹豫。"
GRW_earlygame.57.a: "这是我的荣幸，江璇总理。"
GRW_earlygame.58.t: "[FROM.GetAdjective]向我们发起进攻！"
GRW_earlygame.58.d: "[FROM.GetAdjective]在首都的革命委员会国防部，菲利普.红兴正在看着一张作战地图并且用羽毛笔在地图上画着圈和箭头。那个地图是整个普里文与湖城的边境地区，那个地区也是普里文的北方边境。\n\n这时候，革命卫队队长索林.裕鲁气喘吁吁地跑来报道：“报告，据可靠消息，湖城的那帮小马已经在边境集结了军队，而且还是精锐部队，看来他们想趁我们边防空虚的时候袭击并夺取我们的北方边境。”\n\n红兴听完以后没有吭声，她只是在地图上一直笔划着。而索林则一直不安地来回踱步，看得出来，目前形势十分严峻。\n\n突然，红兴问道：“我们有多少部队在北方边境？”\n\n索林如实回答道：“有少数的正规军，还有相当数量的民兵，你有办法？”\n\n红兴点点头，然后说出了他的计划：“首先，虽然湖城军队无论是装备还是数量都高过我们，但是他们普遍都没有实战经验，而且也没有我们的战士有战斗意志。其次，北方边境虽然是平原，但是水草茂盛，还有部分的林地。因此，我们可以在平原设置陷阱来阻挡和迟滞湖城的机械化部队，还可以利用林地来伏击他们。总之，我们只需要坚守七天，他们国内的反战情绪就会高涨。到时候他们就会和我们谈判。”\n\n索林听完以后，表示同意他的计划。红兴因此下达了一个急令："
GRW_earlygame.58.a: "召集民兵！"
GRW_earlygame.59.t: "[LCT.GetAdjective]请求和谈"
GRW_earlygame.59.d: "该国现在迫于压力，请求与我国和谈！纵览战争局势，我们的决定是……"
GRW_earlygame.59.a: "何乐而不为？"
GRW_earlygame.60.t: "[FROM.GetAdjective]革命成功"
GRW_earlygame.60.d: "令鹫振奋的消息！[FROM.GetAdjective]当地的左翼政府已经推翻了当地反动政府的资产阶级专政，建立了属于自己的社会主义政权，我们第一时间就承认了[FROM.GetAdjective]现政府，已经准备和我们的建交工作。国际社会对此普遍的敌视，一些国家已经开始谴责我们“干涉别国内政，颠覆他国政权”了。但是谁在乎呢？他们也只能惊恐的看着社会主义的胜利，然后发出无用的咒骂罢了。"
GRW_earlygame.60.a: "喊出鹫民复仇的怒吼！前进！前进！前进！"
GRW_earlygame.61.t: "格里菲亚的红兴？"
GRW_earlygame.61.d: "让我们把目光向东望去，“格里菲亚军团”，一支由哥萨克组成的分裂国度。尽管其是一个守旧的封建制国家，但是格里菲亚军团与一般的封建国家不同的是，它完全没有一个指挥全国的中央政府，国家由一个个大地主的庄园构成，农民受到残酷的压迫，没日没夜的在土地上劳作，而国家忠诚的军队——“哥萨克”们，不过是一群土匪，在草原上过着打家劫舍的生活，血腥残暴是他们的代名词，在内战期间就多次组织对我们的劫掠，让埃维地区的平民苦不堪言。\n\n而现在，该国内部对政府的不满情绪逐渐扩大，越来越多的农民扔掉锄头，逃窜加入了“格里菲亚社民工党”领导的青年冲锋队，社民工党的领袖是菲利普·红兴主席的老相识，科尼洛·赫鲁晓维奇，他原本是一位普里文狮鹫，在普里文革命爆发之前就与红兴建立了深厚的友谊，之后他只身来到格里菲亚播撒革命种子，普里文的革命成功之后他备受鼓舞，誓要让格里菲亚像普里文一样推翻反动政府，实现改天换地的壮举。\n\n我们已经与赫鲁晓维奇建立了取得了联系，得益于我们之间领土相接，我们可以直接让冲锋队的战士们在我国接受训练，传授游击战的经验，亦或是偷渡过边境为冲锋队提供武器弹药。格里菲亚军团对此立马做出了反应，斥责我们是在干涉国家内政，并加紧了对国内革命运动的镇压。但是这反而更加激起了鹫民的反抗，让我们静待反动势力的崩溃吧……"
GRW_earlygame.61.a: "大草原的长夜将逝，一轮红日逐渐升起"
GRW_earlygame.62.t: "深井镇会议"
GRW_earlygame.62.d: "格里富斯的左翼势力主要有两个，一个是由统一劳工党领导的夜之森游击队，另一个是分布于南部的团结工会。\n\n统一劳工党是正统的马科思-嘶大林主义的支持者，认为只有通过武装斗争的方式推翻反动的资产阶级政府并建立无产阶级专政才能实现社会主义，统一劳工党在其所控制的报纸常常抨击他们认为背叛革命的“修正主义”份子，而他们批判最多的便是该国另一大左翼势力——团结工会。与统一劳工党的激进不同，“温和”与“保守”是团结工会代名词，他们认为在目前的格里富斯进行暴力革命是没有希望的，进而转向议会斗争，争取“和平进入社会主义”，并经常反驳统一劳工党关于暴力革命必要性的观点。尽管如此，团结工会仍然是格里富斯南方劳工罢工、游行等运动的中心。\n\n而现在在我们的援助之下，我们得以让双方都各退一步，在深井镇一处秘密的据点，统一劳工党的领袖安妮拉与团结工会的领袖爱德华经过我们的撮合宣布将组建革命同盟，共同反对格里富斯政府。但谈判进行的没有这么顺利，会议之后，部分游击队成员批评统工党的“右倾”，宣布退党；团结工会的部分成员也指责爱德华与“极左”份子合作，转而组建新的党派，甚至与格里富斯政府合作。不过总体来说，格里富斯的革命势力在团结的旗帜下更加壮大了，游击队袭击和工会组织罢工的事件愈来愈多。反动的格里富斯政府的末日，不远了。"
GRW_earlygame.62.a: "唯有团结方能克服万难"
GRW_earlygame.65.t: "国际派影响力过高！"
GRW_earlygame.65.d: "近日，国际派的影响在党内越来越大。劳工派领导鹫对此尤其反感，他称这群“言必嘶大林”的理想主义者们太过于注重千里之外的嘶大林格勒甚至是天际纳维亚而不愿意低下头来发展工业。如果放任其自流，我们的革命统一阵线的和谐与团结可能受到影响。"
GRW_earlygame.65.a: "同志们要低下头来看看我们的普里文了……"
GRW_earlygame.66.t: "劳工派影响力过高！"
GRW_earlygame.66.d: "最近几天，工会的地位简直是被提高到普里文共产党之上了。工团派们过分重视工业，忽视农业的政策引来了正统派们的指责：我们的工农联盟难道是劳工掠夺农民吗？如果这种阿奎莱亚思潮进一步蔓延到全党，这可能会影响我们革命统一战线的和谐与团结。"
GRW_earlygame.66.a: "工团主义很棒，但我们的农民怎么办？"
GRW_earlygame.67.t: "民主党派影响力过高！"
GRW_earlygame.67.d: "普里文共产党无法忍受民主党派们喋喋不休的关于什么多数派少数派不信任动议的唠叨了——民主党派的影响力太大了，甚至要喧宾夺主，夺取普里文共产党的领导地位了。国际派对此的不满情绪最为剧烈，他们认为如果过分关注多与少，选票与统计的民主游戏，我们甚至不能余出精力来把革命带出埃维河谷。这可能会影响我们革命统一战线的和谐与团结。"
GRW_earlygame.67.a: "民主，这很不错，但是这不意味着我们就得每天吵来吵去不做事情。"
GRW_earlygame.68.t: "反共条约组建"
GRW_earlygame.68.d: "普里文革命的胜利让我们周边国家的统治阶级们开始感到惶恐不安，有的在宫殿里开始吩咐侍从关窗遮帘，有的终于把部队的军饷发齐。但就在最近，我们得到消息，他们已经就所谓“普里文问题”齐聚一堂，并签署了一系列反共互助条约，这无疑说明我们周围的敌鹫开始联合起来对付我们。\n\n而对此，我们的红兴同志指出我们接下来的革命行动方针……"
GRW_earlygame.68.a: "稳扎稳打，逐个击破！"
GRW_earlygame.69.t: "前进！"
GRW_earlygame.69.d: "解放军已经全面动员，正在向反革命发动进攻，我们各部委各委员会都已经全面转入战时状态，无产阶级的暴力机器已经全面发动。各地的不论是民间的还是官方的社会主义社团和组织，都在上街游行支持解放被压迫狮鹫和共产主义革命。\n\n同志们，历史考验我们的时候到了！"
GRW_earlygame.69.a: "收到，正在向前推进！"
GRW_earlygame.70.t: "埃维解放战争全面胜利"
GRW_earlygame.70.d: "同志，让我们庆祝这一刻吧！\n\n我们长久以来的美好愿景在此刻已经实现了一大步，我们可爱的解放军战士成功解放了整个埃维河谷，所有的反动派无不在我们鲜艳的红旗下被无产阶级的钢枪如同秋风扫落叶般迅速凋零。然后接下来，我们将着爪在各地成立的社会主义苏维埃自治共和国，并准备和卢什的统一谈判，以后的工作可能对于我们来说更为艰难，但是同志……"
GRW_earlygame.70.a: "社会主义共和国万岁！"
GRW_earlygame.72.t: "阿尔贝罗贝洛村的毁灭（下）"
GRW_earlygame.72.d: "“共产主义万岁，共产党万岁！”那只鹫哪怕被迫跪在地上，脊梁依旧挺得笔直，口中高呼的话语坚定又响亮，宛如洪钟，一下下重重撞击着土匪头子的耳膜，更似往他那颗早已腐朽、满是戾气的心尖子上狠狠撒盐。\n\n“乱党，我他妈毙了你！”土匪头子恼羞成怒，猛地拔出手枪，黑洞洞的枪口还冒着丝丝青烟。随着一声爆响，那只勇敢的鹫身体猛地一震，便直挺挺地倒在了地上，鲜血从他的胸口汩汩涌出，迅速在冰冷的地面蔓延开来，洇湿了一小片土地。村里的村民们目睹此景，眼睛里像是能瞬间冒出熊熊烈火，那目光犹如实质，直直刺向这帮作恶多端的土匪。土匪头子被这一道道饱含仇恨的目光盯得心里发毛，竟不自觉地往后退了小半步，可嘴上依旧强硬：“你们这帮乱党，你们…… 到底交…… 不交捐？”\n\n这时，那只身形消瘦的母鹫挺身而出，她站到了鹫群最前面，身姿单薄却散发着无畏的气势，毫不畏惧地直面土匪头子，字字铿锵：“我们连一根毛都不会给你！”\n\n“这样啊……”土匪头子的脸瞬间冷了下来，扭曲的五官在月色下透着狰狞，他从牙缝里挤出几个字，“全都给我杀了！”\n\n话音刚落，几十杆枪瞬间举了起来，黑洞洞的枪口对准了爪无寸铁的村民。寂静的夜空刹那间被接连不断的几十声枪响彻底打破，每一声枪响，都伴随着一个鲜活生命的消逝，有老鹫痛苦的闷哼，有孩童惊恐的哭叫，还有雌鹫绝望的呼喊，交织成一曲惨烈的悲歌。\n\n一个小时之后，大火在村子里肆虐起来，冲天的火光将夜空染得一片血红，吞噬着一间间房屋、一件件旧物，也焚毁了村民们曾经安宁的生活。噼里啪啦的燃烧声中，偶尔还能听见未熄的火苗舔舐着什么发出的轻微爆响，可那些曾经温暖的家、那些质朴善良的村民，却再也回不来了。"
GRW_earlygame.72.a: "村中，无一幸免"
GRW_earlygame.73.t: "离婚率大幅提升"
GRW_earlygame.73.d: "在西迪亚的法院门口，长长的队伍蜿蜒曲折，几乎占据了整条街道。鹫民爪里拿着各种文件，脸上写满了焦虑和不安。一对年轻夫妇站在队伍的前端，他们的争吵声吸引了周围群众们的注意。\n\n“你根本不在乎这个家！”妻子愤怒地挥舞着爪中的文件，“你只关心你的工作！”“那你呢？”丈夫不甘示弱地回击，“你整天和那些所谓的'朋友'混在一起，有没有想过我的感受？”\n\n在法院的另一侧，一位年长的法官正皱着眉头翻阅着堆积如山的离婚申请。他叹了口气，对身边的助手说道：“这已经是今天的第三十份了，照这样下去，我们得加班到深夜。”"
GRW_earlygame.73.a: "这是必要之痛"
GRW_earlygame.74.t: "赤卫队的复员"
GRW_earlygame.74.d: "会议室里弥漫着呛人的烟味，吊扇在头顶吱呀作响。“我不同意！”弗洛林摘下军帽，猛地拍案而起。“当年我们流了多少血，才让工鹫们拿起枪保卫自己的工厂？现在说收就收？”会议室里一片死寂。二十几个老党员齐刷刷地站了起来，他们的军装上别着各式各样的勋章，在阳光下泛着冷光。奇普书记坐在长桌尽头，爪里的钢笔在文件上划出一道长长的墨迹。“弗洛林同志，你先坐下。”奇普政委推了推眼镜，“现在形势不同了……”弗洛林走到墙边，爪子抚过那些斑驳的标语。几年前的那个夜晚仿佛浮现在眼前：火光冲天的工厂，工鹫们举着步枪在街垒后坚守，子弹呼啸着从耳边飞过。他还记得那个叫小多鲁的年轻工鹫，为了掩护大家撤退，永远地倒在了工厂门口。“你们看看这些标语！”弗洛林的声音哽咽了，“每一个字都是用血写成的！现在要我们放下武器，是要让我们重新变成任人宰割的羔羊吗？”走廊里回荡着老战士们的怒吼，窗外的橡树沙沙作响。奇普书记低头看着爪中的文件，那上面密密麻麻写满了收缴枪支的名单。阳光透过窗户斜斜地照进来，将老战士们的影子拉得很长，仿佛又回到了那个战火纷飞的年代。"
GRW_earlygame.74.a: "革命军队有铁的纪律"
GRW_earlygame.75.t: "运载希望的军列"
GRW_earlygame.75.d: "维克托·伊格纳泰斯库吃力地与三名学兵一起固定好了锁链，啷啷当当的金属相击声终于暂时沉寂。这个加挂在军列后面的平板车上运载的是嘶大林格勒赠送的一台旧式坦克原型车，它将沿西迪亚到基韦辛的铁路北上，被拖进解放军军事学院的院区。伊格纳泰斯库相当重视这铁坨子，身为筹建中的装甲兵系主任，他亲自选了三名学生南下来接应。三天来，他没怎么睡过觉，而如今这玩意将平平安安地进入学校，终于让他松了一口气。\n\n他们跳上了倒数第二节闷罐子；随着汽笛一声轰鸣，火车启动了。伊格纳泰斯库和他的兵一样蜷坐着，不过他的位置允许他能扒着车门将头探出来，看向晚霞满天的外部世界。这辆军列看起来很老了，绿漆四处脱落，漏出块块锈斑，但蒸汽机车头喷出的烟云仍然壮观——那引起了伊格纳泰斯库心中一种近似于宗教崇拜的悸动。那来自于工业文明，是速度，是力量，他们可以用这种东西把祖国建设成一个大花园，也可以……是的，别看那原型车现在上不了路，也开不了火，但这将是他们真正以革命的铁流碾碎内外反动派的开始。\n\n太阳继续向地平线下方移动，伊格纳泰斯库的思绪飞的更远了。当下的工作给装甲研究开了个好头。看看这火车吧，以后说不定也会有装甲列车，有列车炮；会有现代化的大军舰，战列舰、航空母舰；会有飞机，高速战斗机、长途运输机、洲际轰炸机……到时候要是哪个反革命到家门口闹事，一定要给他长点教训……\n\n火车疲惫而拖沓地重复着“哐啷，哐啷”的节奏，如同工业的摇篮曲，淹没了伊格纳泰斯库。在对祖国未来国防事业的畅想中，这位解放军的高级将领兼教员就这样在他的学生的眼皮子底下睡着了。"
GRW_earlygame.75.a: "庆祝我们的第一辆坦克原型车吧！"
GRW_earlygame.76.t: "来自后方的支援"
GRW_earlygame.76.d: "基绍的天空被染成了红色，不是因为夕阳，而是因为满天的传单。这些传单不是普通的纸张，而是用魔法油墨印刷的火焰宣言，每一张都在风中微微闪烁，仿佛随时会燃烧起来。国际局的宣传委员们站在高耸的广播塔上，用魔法扩音器将他们的声音传遍城市的每一个角落。“每一粒麦穗都是射向资本家的子弹！每一块砖瓦都是保卫祖国的盾牌！”声音在狭窄的街道间回荡，穿过工厂的烟囱，越过工鹫宿舍，最终钻进每一个狮鹫的耳朵里。在红星印刷社，工鹫们正用沾满油墨的爪子将传单捆扎成弹药箱的形状。他们的脸上满是疲惫，但眼神中却闪烁着狂热的光芒。“快点！前线需要这些！”一个年长的狮鹫工鹫喊道，他的羽毛已经被油墨染成了深红色，"
GRW_earlygame.76.a: "“我们要让那些反动派知道，普里文的火焰永远不会熄灭！”"
GRW_earlygame.80.t: "大幕拉开……"
GRW_earlygame.80.d: "两百多年来，似乎第一次出现了一个狮鹫国家与牛头怪和解的可能——据外交部在[386.GetCapitalVictoryPointName]的同志发来的消息称，[MIT.GetName]高层已经同意了我方开始谈判的提议，这意味着一段两国之间全面的外交谈判即将拉开帷幕。\n\n显而易见，这场谈判要涉及两百多年积攒的众多恩恩怨怨。最显然的焦点是[507.GetName]问题：该地区先后属于星空联邦，布罗德费尔德公国（以及后来的王国）和蓝百合伯国。在目前多方均宣称此地为法理领土的情况下，这一地区火药桶更显命运多舛。其他的方面还有经济文化交流，甚至尝试探讨两国间建立防卫同盟的可行性。当然，这次谈判亦要显示我方对于维护北中部海局势和平稳定、促进狮鹫与牛头怪之间种族关系和解的诚意。\n\n可以预见的是，接下来的谈判过程将会相当漫长和痛苦。当寻找合适的翻译都成问题时，我们只能选择信赖双方谈判代表的外交智慧。我们真诚地希望，谈判以善意开始，最终也能以善意告终。"
GRW_earlygame.80.a: "多一个友邦总比多一个敌国强。"
GRW_earlygame.81.t: "左右勾拳"
GRW_earlygame.81.d: "[386.GetCapitalVictoryPointName]。[GRW.GetName]与[MIT.GetName]之间的全面外交谈判已经开始。第一项议程便是两国关系的正常化。到目前为止，两国尚未实现相互承认，自然也未派驻使节。既然已经开始谈判，两国间关系的问题就成为最基本、而也是阻力最小的问题。当敲定一些技术细节后，双方便同意以最快的速度实现关系的正常化。\n\n而面对共同的敌国——[CYA.GetName]，双方几乎毫不犹豫地站到了一起。毕竟，[MIT.GetName]自从两百年前丢失大陆领土后，就与[CYA.GetName]这一“伪政权”不共戴天；而[GRW.GetName]则因[CYA.GetName]趁革命期间强行“保护”[507.GetName]的行径而极度愤怒。双方约定，互相尊重主权与安全，互不侵犯。若一国遭受[CYA.GetName]入侵，另一国有进行积极防御作战的义务。"
GRW_earlygame.81.a: "左勾拳……右勾拳……格罗弗的丑陋产物……"
GRW_earlygame.82.t: "[507.GetName]问题"
GRW_earlygame.82.d: "[386.GetCapitalVictoryPointName]。正在进行中的谈判终于触及一个核心问题：怎样处置[507.GetName]？\n\n众所周知，狮鹫尼亚帝国的格罗弗二世大帝在南征中征服了星空的大陆部分。这个部分的主体后来由被称为“蓝百合伯国”的“狮鹫化”政权所控制，剩下一个省份，[507.GetName]，被转交给布罗德费尔德公国，当时是狮鹫尼亚帝国的忠诚附庸，作为收买的工具。\n\n在公国与布罗德费尔德王国时期，[507.GetName]地区在技术上是一个“自治伯爵领”。这一爵位不世袭，每当[507.GetName]边疆伯爵死亡，布罗德费尔德君主便会从宫廷中选取一名值得信赖的贵族接替。在萨尔玛克市，临海市等重要节点，布罗德费尔德君主还迁入了一批狮鹫军事贵族，以弹压当地的牛头怪。这一政策并不完全成功：一方面牛头怪的反抗从来不停歇，另一方面这些军事贵族并没有像大公预料的那样开枝散叶，当地族群构成仍然保持以牛头怪为主。\n\n目前对于[507.GetName]，我们可以提出的方案有两种：其一是仍不放弃[507.GetName]的领土主张，并承诺设立牛头怪自治区，进行非军事化；其二是放弃[507.GetName]，但要求对方承诺给予当地狮鹫自治权，进行非军事化，并要求在该地的驻港权。我们的策略无疑会直接影响谈判的进展。我们该如何选择？"
GRW_earlygame.82.a: "我们不会放弃合法领土。"
GRW_earlygame.82.b: "一片满是牛头怪的土地不值得。"
GRW_earlygame.83.t: "旧怨新仇"
GRW_earlygame.83.d: "[386.GetCapitalVictoryPointName]。谈判内容转移到了另一个领土问题：关于爬行者山脉的归属。\n\n两百年前，在格罗弗二世南征之前，贫瘠的爬行者山脉理论上由南方的牛头怪所有。但格罗弗二世完全无视了他们的所有权，带领大兵翻越爬行者山脉东进，很快就逼迫普里文的几个大公匍匐在自己脚下。牛头怪对这一践踏其领土的行为提出抗议，反而招致格罗弗二世的攻击，后面的结果就不需赘述了。\n\n时过境迁，两百年间，爬行者山脉一直由一个被称为黑空伯国的帝国附庸牢牢控制。这种情况只有在前几年才有了变化——当时江洋大盗“黑石”率领她的匪帮，通过长期的，残忍的战争杀死了伯爵，自立为这篇贫瘠山脉的所有者。目前，我方认为爬行者山脉是埃维地区的一部分，理应属于埃维国家；但[MIT.GetName]宣称基于其合法的领土所有权，爬行者山脉应当在其收复大陆部分后，转交给合法的拥有者——旧星空联邦的继承者，也就是[MIT.GetName]。两百年前，该地似乎还稍显鸡肋，但当下矿产资源的开采与利用赋予了这个地区新的战略意义。\n\n我们要给他们一个无损于我国尊严的回复，同时也要尽量避免激怒他们……"
GRW_earlygame.83.a: "埃维不小，但没有一寸领土是多余的！"
GRW_earlygame.83.b: "主权不容交易，但矿产可以。"
GRW_earlygame.83.c: "为了两国友谊，如此甚好。"
GRW_earlygame.84.t: "与牛谋皮"
GRW_earlygame.84.d: "[386.GetCapitalVictoryPointName]。谈判仍在继续，目前则围绕着[MIT.GetName]提出的一个大胆的战略构想进行。\n\n[MIT.GetName]一方在谈判中已不讳言，他们将拼尽全力发动一场针对[CYA.GetName]的，旨在将其从地图上抹去的军事打击行动，行动代号“奥德修斯”。他们认为，如果我方在承认防御义务的基础上，在奥德修斯行动之前与行动前期，能够策应他们，在与[CYA.GetName]的边界上发起一阵佯攻，或是支持其国内不同意见者开展破坏活动，军事打击行动的成功概率会高很多。显然，此等行动风险巨大，但鉴于[MIT.GetName]一方狂热的收复故土的执念，我们也有希望得到丰厚的报酬，主要集中在[MIT.GetAdjective]军工复合体给予的大量产能转移。但其先决条件是双方之间需要建立充分的战略互信。\n\n[GETGRWEarlygame84TT]"
GRW_earlygame.84.a: "放爪去做。"
GRW_earlygame.84.b: "我们不能为蝇头小利冒险。"
GRW_earlygame_84_tt: "如果我方在前期谈判中有过多次示好，达成这部分协议将给予我们强力的生产加成！"
GRW_earlygame.85.t: "来自[386.GetCapitalVictoryPointName]的报价"
GRW_earlygame.85.d: "[386.GetCapitalVictoryPointName]。谈判仍在继续，目前则围绕着[507.GetName]问题。\n\n[MIT.GetName]一方声称为了补偿[507.GetName]的损失，我方理应做出一定的赔偿。[MIT.GetAdjective]的代表私下表示，即使不考虑外交利益最大化的原则，他们也需要额外的成本来安抚国民，这一笔钱显然不应该由他们自己来出。\n\n我方代表的态度则较为分化。一部分代表团成员认为，[507.GetName]地区本应就是我国法理领土；而且既然[MIT.GetAdjective]已经允诺不再干涉，那么将其视作一种需要补偿的损失，实际上是外交讹诈。他们建议拒绝妥协，避免其得寸进尺。另一部分代表则认为，当前形势下，[MIT.GetAdjective]方面与我们的合作弥足珍贵。对于长远的领土利益，如果我们能用当下短期的经济补偿来化解潜在的纠纷，是一种长期来看利大于弊的事情。更何况公开的、你来我往的交易能够打消[MIT.GetAdjective]若干年后声索的口实。不管怎样，两派都声称只是在提建议，具体决定当然要俟候国内指示。"
GRW_earlygame.85.a: "钱能解决的问题都不是问题。"
GRW_earlygame.85.b: "我们不会在原则性问题上让步。"
GRW_earlygame.86.t: "[MIT.GetAdjective]的讨价还价"
GRW_earlygame.86.d: "[386.GetCapitalVictoryPointName]。谈判仍在继续，目前是在商讨双方之间的贸易定价问题。\n\n[MIT.GetName]称，这并不是他们在有意剥削[GRW.GetName]，这只是基于两国资源禀赋不同而做出的比较优势分工。众所周知，[MIT.GetName]基本上可以说是一个岛国。他们的粮食自给一直是个问题，而进出口工业原料又需要额外成本。尽管中间逻辑有很多明显的漏洞，但他们最后还是给出了一个理直气壮的结论：盛产稻米的[GRW.GetName]需要进一步降低其粮食出口价格，并以更高的价格从[MIT.GetName]进口工业品。\n\n虽然这和赤裸裸的抢劫几乎没什么区别，但好在这个条款已经不涉及敏感的，关于国家主权与外交自主权的问题。如果在这个问题上让步，起码可以给对方一种争得利益的满足感。主张不能让步的声音来自于比较重视国家经济自主权的一派。他们认为这种扭曲市场机制的不平等关系，长期来看不过是用我国的资源来养别国的剥削阶级——如果我国几千个农民一年的劳作还挣不回一台机床，那一定是交易不公平的问题。\n\n当下，我们的谈判代表已经接近精疲力尽，他们恳求中央尽快做出选择。"
GRW_earlygame.86.a: "这一点上就由它去吧。"
GRW_earlygame.86.b: "我们的革命不是为了供养新的外国剥削者的。"
GRW_earlygame.87.t: "贸易协定"
GRW_earlygame.87.d: "[386.GetCapitalVictoryPointName]。在领土主权与外交关系的方面谈妥之后，双方很顺利地签订了贸易方面的协议。\n\n[MIT.GetName]在贸易协定之中没有太多索取，有些方面甚至可以称得上是主动让利。如此也在我方的意料之内——在前期谈判中，我们做了相当多的让步。如果[MIT.GetName]在这种情况下仍然锱铢必较，只会被视为没有谈判诚意。\n\n贸易协议的内容还是围绕着经典的“农业品换工业品”展开。众所周知，[MIT.GetName]基本上可以说是一个岛国，他们的粮食自给一直是个问题，进口大量物美价廉的[GRW.GetAdjective]大米可以大大缓解其粮食缺口。而对于我方而言，能够得到[MIT.GetAdjective]工业品，特别是工业母机这样的核心产品，亦能极大地促进我国工业的发展。"
GRW_earlygame.87.a: "让大米和机器流动起来！"
GRW_earlygame.88.t: "反目成仇"
GRW_earlygame.88.d: "在[MIT.GetAdjective]一方积攒了太多怒火后，谈判破裂了。\n\n在最后一次谈判中，[MIT.GetAdjective]的代表指责我方“没有丝毫诚意”，“完全不明白外交的利益交换性质”。虽然我方代表听这等激烈的牛叫还是头一回，有些甚至在偷笑，但是这改变不了一个事实——[GRW.GetName]与[MIT.GetName]之间的外交谈判完全失败了。我们必须承认，对方说的不是没有道理。[MIT.GetAdjective]一方在前期谈判中的确做了很多让步；但公允地讲，我们也不是贪得无厌的一方。\n\n这次谈判破裂只能证明我们之间转圜的余地并没有想象中的那么大。下次也许要等事态起变化，或者派出更专业的谈判代表。不论怎样，我们必须咽下现在的苦果：我们激怒了一个邻居，并且什么都没有得到。"
GRW_earlygame.88.a: "少则得，多则惑。下次再试吧。"
GRW_earlygame.89.t: "最终协议签订"
GRW_earlygame.89.d: "历经长期拉锯式谈判，[GRW.GetName]与[MIT.GetName]终于达成一致，签署了具有里程碑意义的双边协定。\n\n双方谈判的过程充满了艰难险阻。很多次，双方代表都因对方在领土和外交义务等方面的主张而提议休会。最终能够达成一致，应当归功于双方共同的谈判与妥协艺术。\n\n协议最后在[386.GetCapitalVictoryPointName]的一家高级酒店签署，众多国际记者见证了这一刻。这不仅仅是两个国家的外交胜利，更可以被解读为狮鹫（至少是一部分狮鹫）与牛头怪之间两百年积怨和解的开始。"
GRW_earlygame.89.a: "南狮鹫尼亚的历史正在书写新的一页。"
GRW_earlygame.90.t: "佯攻胜利"
GRW_earlygame.90.d: "为策应[MIT.GetName]发起的“奥德修斯行动”，我军奉命于[CYA.GetName]边境地带实施了一次战术级进攻行动，旨在牵制敌方兵力。\n\n行动围绕数个关键高地展开争夺。在有效压制敌防御火力后，我军成功攻克预定目标。守敌部分遭歼灭，其余主动放弃阵地。鉴于军委下达的“严格管控冲突规模”指令，各部在达成初步战术目标后，未进行纵深追击，迅速转入防御态势，固守新占战线，等待进一步指令。此行动符合预设佯攻任务目标。\n\n行动结束后，[GRW.GetCapitalVictoryPointName]已经在筹备表彰仪式，以迎接所谓“边境积极防御作战”中的战斗英雄的凯旋。"
GRW_earlygame.90.a: "接下来就看牛头怪的了。"
GRW_earlygame.91.t: "佯攻失败"
GRW_earlygame.91.d: "为策应[MIT.GetName]发起的“奥德修斯行动”，我军奉命于[CYA.GetName]边境地带实施了一次战术级进攻行动，旨在牵制敌方兵力。\n\n行动围绕数个关键高地展开争夺。虽然勉强压制敌防御火力，我军未能攻克预定目标。多次冲锋后，敌守军阵地仍未能攻克。鉴于军委下达的“严格管控冲突规模”指令，各部在攻击受挫后，迅速转入防御态势，固守战线，等待进一步指令。此行动符合预设佯攻任务目标。\n\n行动结束后，[GRW.GetCapitalVictoryPointName]已经在筹备表彰仪式，以迎接所谓“边境积极防御作战”中的战斗英雄的凯旋。"
GRW_earlygame.91.a: "起码牵制的目的是达到了……"
GRW_earlygame.92.t: "防御胜利"
GRW_earlygame.92.d: "主要内容：我们击退了赤匪的进攻。"
GRW_earlygame.92.a: "已阅"
GRW_earlygame.93.t: "防御战败"
GRW_earlygame.93.d: "主要内容：我们被赤匪击败了。"
GRW_earlygame.93.a: "已阅"
GRW_earlygame.94.t: "奥德修斯行动开始"
GRW_earlygame.94.d: "根据[386.GetCapitalVictoryPointName]通过秘密渠道发来的消息，结合我国的情报综合研判，我们可以确定[MIT.GetName]筹划了数十年的“奥德修斯行动”业已拉开帷幕。牛头怪的海军陆战队正在尝试于蓝百合的多个滩头登陆，而伯国军队正在尝试组织还击。[CYA.GetName]全境被硝烟笼罩，熊熊烈火在多个城市中燃起；[386.GetCapitalVictoryPointName]的电台已经播发了“终结殖民者”的宣言。\n\n显然，正如他们曾经透露过的那样，这次行动是破釜沉舟式的，但具体的行动规模还是超过了前期预料。根据之前达成的协议，我们有义务在与[CYA.GetName]的边界上发起一阵佯攻，配合牛头怪的作战；如果一切顺利，我们有机会趁此夺回[507.GetName]。"
GRW_earlygame.94.a: "嚯，阵仗不小。"
GRW_earlygame.95.t: "奥德修斯行动胜利结束"
GRW_earlygame.95.d: "前不久，在多国记者的见证下，蓝百合的代表在投降书上签字。这代表[MIT.GetName]已经一雪两百年耻辱，将大陆领土重新置于其控制之中。\n\n在[MIT.GetName]一片鼎沸的同时，我们也不失时机地提醒我们的牛头怪朋友，[507.GetName]的问题需要尽快处理，这得到了他们的积极回复。在简短的，技术性的协商完成后，[MIT.GetName]就同意按先前谈判决定的方案处理[507.GetName]。这让我们松了一口气。毕竟，如果对方政府在此威望与声誉都到达最顶点之时选择强硬，我们真没有什么好的办法迫使其屈服。"
GRW_earlygame.95.a: "牛头怪真……仁慈。"
GRW_earlygame.105.t: "[MIT.GetNonIdeologyName]断交"
GRW_earlygame.105.d: "在与[MIT.GetName]的关系发生重大变动之后，[MIT.GetName]方面已经通过正式渠道向我方发出照会，宣布废除所有与我鹫民政府达成的双边协议，撤回一切在普里文的投资，收回一切援助承诺。\n\n牛头怪的缝纫织品名闻遐迩，[MIT.GetName]在我国的投资也以纺织轻工业为主。此外，双方在军事方面也曾开展过深度合作。双方关系的恶化，势必将导致相关行业的重新洗牌。[507.GetName]问题的发展同样令人瞩目。这片先后曾属于星空联邦、布罗德费尔德王国和蓝百合伯国的土地，其命运在当下的形势下更加扑朔迷离。\n\n也许意义更深远的是，[MIT.GetName]与[GRW.GetName]之间达成的，象征两百年历史和解的关系毁于一旦。目前还无从得知这究竟仅仅是时代的一点插曲，还是下一个两百年恩怨的开始。"
GRW_earlygame.105.a: "这次他们怕是连岛都要丢个干净。"
GRW_earlygame.96.t: "赴嘶留学生归国"
GRW_earlygame.96.d: "从彼得蹄出发的客船经过重洋，终于抵达了西迪亚港。以[GRW.GetAdjective]和[STG.GetAdjective]记者为首的多国记者团早已在码头等候。\n\n舷梯靠近轮船，从甲板上探出了几个带着学士帽的身影。[STG.GetName]本已在冬季革命后废除了学士服的传统，这一批学士服是应毕业生的集体请愿而定做的。不过说到底，几个月前学士服事件的主要推爪还是普共的宣传部门，而现在他们的鹫正在码头上疯狂地寻找角度，反复对焦。第一批外派[STG.GetName]的留学生归国，这是有重大意义的时刻，某一张相片必定会出现在将来的历史书上。\n\n在领队的驻嘶使馆教育参赞的指挥下，这批学生们已经排好了队，准备依次下船。他们之中以理工科的毕业生为主，但政法甚至军事相关院系的毕业生也不在少数。他们的脚步是那样坚实，那样铿锵，仿佛在向自己的祖国宣告："
GRW_earlygame.96.a: "我们今天是桃李芬芳，明天是社会的栋梁！"
GRW_earlygame.97.t: "“博勒加德·虎珀”旅"
GRW_earlygame.97.d: "“‘博勒加德·虎珀’志愿旅。我是旅政委格奥尔基·约内斯库，向您致以同志的问候。”那埃维狮鹫说。\n\n罗西上校看着那个政委和他身后的几个狮鹫，眉头拧得更紧了。他是几个小时之前才知道普里文军队居然有平行的两个首长，听起来政委跟他妈监军干的活差不多。他感觉怪怪的，脑海里不禁浮现出这样的景象：一个久经考验的老旅长，因为不让士兵们顶着炮火冲锋啦，或者拒绝组建督战队啦，就被政治狂热的红色监军派他的爪牙架走。是，翼巴第革命者的军队之中也有政治委员，但那是给执行困难任务，或者刚刚投入作战的部队准备的。如果你的部队里有政委，那只能说明上级对你们政治上还不够信任。罗西上校给自己做了好久的思想工作，才能说服自己，这帮普里文的土包子毕竟也是革命者，他们毕竟是跑了几百里地来帮助翼巴第的革命战争……总之，他目前还是不要对他们指爪划足为好。\n\n该怎么跟这位……旅政委，打招呼呢？罗西上校很是费力地想着。“向您致以同志的问候”，什么官话，他见不得这个。最后，他猛吸一口气，上前一步，用亲近甚至有点狎昵的口气说："
GRW_earlygame.97.a: "Ciao, compagno!（你好哇，同志！）"
GRW_earlygame.98.t: "被侮辱与被损害的"
GRW_earlygame.98.d: "“解放军的代表都在这里了，同志。”领路的小马，那个被叫做“麦脆角”（Barley Bugles，船货崇拜的又一例证）的，将普里文的军事顾问，国际局军事部的扬·基瑟瓦努干事引进了一个挂着煤油灯的小屋里。常有一个说法，长弓鹫地区的维萨吉纳斯镇是长剑抵抗运动的心脏，而当下，基瑟瓦努干事想到，大约一个小型的心脏就在这里了。\n\n煤油灯很暗，照不清所有代表的面庞。大约是五只小马，一只狮鹫，相当合理。有的代表穿着麻布织成的破衣烂衫，一看就是农民；有的代表则衣着简朴但素净，显示出更优渥的出身；有的头上绑了印有复杂符文的头巾，大约是革新党中某个团体的成员；那名狮鹫缺了半只前爪，完好的那只在不时轻敲着桌子。\n\n“我是扬·基瑟瓦努。”他开口了，“几年前，我就在白花的森林里，像诸位一样为祖国的解放，为生灵的平等而战斗。我向你们这些反抗着种族迫害与屠杀的勇士们致敬。”\n\n代表们互相交换着眼神，不久后，由那位穿着最得体的代表领头，大家开始鼓蹄（扇翅）欢迎。这些被侮辱与被损害的生灵的代表，以这种方式确认了狮鹫军事顾问和他背后的[GRW.GetAdjective]志愿军的权威。"
GRW_earlygame.98.a: "“热烈欢迎。”"
GRW_earlygame.113.t: "骑士们拥挤在营帐之中，空气浓稠蒸腾着皮革汗水的蒸气、酒精的气味和篝火残余的灰烟。中央长案上，粗陶酒碗尚存未尽的酒液，烛光在碗底摇曳成不安的碎影。群聚的骑士们突然沸腾了起来——仿佛刚自猎场捕获了凶猛猎物，正亢奋围观的汉子们，又笑又叫、挥拳拍掌，喧嚣如滚雷席卷。“写！”不知是谁高喊着，喷着酒气的词语穿透营帐，“写！给那个套着黑斗篷的老阉鸡写！”\n\n吉诃德大团长显然也喝了个半醉。他毫无仪态可言地跌坐于一个木桶之上，一张略显粗劣的草纸铺展在膝头，硬扎扎的触感。握于爪里的羽毛笔（他习惯用这个）上下翻飞，纸上被灼出滚涌的勇气与沸腾的快意。信件写完，一字不改，吉诃德大团长猛地盖上了自己的印戳。这是他们的作品：\n\n“瑟拉齐骑士团全体致所谓的改组派冥翎骑士团[HLQ.GetFascistLeader]大团长：\n“你这门界地区的恶魔，诅咒的兄弟和同伴，风暴大王本人的爪牙！\n“你是个屁的骑士，只懂得对幼驹下爪的畸形儿。你跟你的改组派都将被魔鬼的排泄物填满，然后你大快朵颐。\n“你连北风神的爪子上一层角质都不配膜拜，更别提你那扭曲的野心了。\n“我们，自由的全埃维与卡萨的贫苦骑士团以及东狮鹫尼亚所有爱好和平的老百姓，都不会恐惧你，我们将会与你们战斗到底，并解放门界地区。\n“你个操幻形灵女王的，狮鹫海姆擦鞋的，钻石山蓄奴的，小马利亚反社会的，滚去亲莱因哈特·曜尾毛绒屁股的，恐惧之地扫坟墓的，喙索里尼的王八蛋异父异母兄弟，屠戮小马的刽子手，种族主义的大白痴，营养不良的东鹿地海盗，全世界最大的智障，地狱里的蠢货，以三神、河流女神与西凯西娅的名义，你理应被挫骨扬灰，永世受罚。\n“你的良心空空如也，你虚伪又堕落的改组派无法统治任何人，连我们最基础的征召兵都比你强。\n“民众不会向你屈服，也不会害怕你的威胁！你的军队不过是乌合之众，骑士团随时准备与你一战！\n“——以自由的全埃维与卡萨的贫苦骑士团全体成员的名义，大团长弗洛里安·冯·吉诃德（签名与盖章）干你的娘亲。”"
GRW_earlygame.113.a: "哦牛批，还有这种信件的。"
GRW_earlygame.114.t: "“从绿崖到新马尔兰……”"
GRW_earlygame.114.d: "“瑟拉齐骑士团全体致所谓的改组派冥翎骑士团[HLQ.GetFascistLeader]大团长：\n\n“你这门界地区的恶魔，诅咒的兄弟和同伴，风暴大王本人的爪牙！\n“你是个屁的骑士，只懂得对幼驹下爪的畸形儿。你跟你的改组派都将被魔鬼的排泄物填满，然后你大快朵颐。\n“你连北风神的爪子上一层角质都不配膜拜，更别提你那扭曲的野心了。\n“我们，自由的全埃维与卡萨的贫苦骑士团以及东狮鹫尼亚所有爱好和平的老百姓，都不会恐惧你，我们将会与你们战斗到底，并解放门界地区。\n“你个操幻形灵女王的，狮鹫海姆擦鞋的，钻石山蓄奴的，小马利亚反社会的，滚去亲莱因哈特·曜尾毛绒屁股的，恐惧之地扫坟墓的，喙索里尼的王八蛋异父异母兄弟，屠戮小马的刽子手，种族主义的大白痴，营养不良的东鹿地海盗，全世界最大的智障，地狱里的蠢货，以三神、河流女神与西凯西娅的名义，你理应被挫骨扬灰，永世受罚。\n“你的良心空空如也，你虚伪又堕落的改组派无法统治任何人，连我们最基础的征召兵都比你强。\n“民众不会向你屈服，也不会害怕你的威胁！你的军队不过是乌合之众，骑士团随时准备与你一战！\n \n“——以自由的全埃维与卡萨的贫苦骑士团全体成员的名义，大团长弗洛里安·冯·吉诃德（签名与盖章）干你的娘亲。”"
GRW_earlygame.114.a: "不知何故，他们视为侮辱。"
GRW_earlygame.100.t: "来自普里文的大使"
GRW_earlygame.100.d: "主要内容：前翼巴第王国政府在普里文内战结束时选择断绝了与他们的联系并禁运他们，现在他们派遣使者提出重新建立两国间的联系。"
GRW_earlygame.100.a: "同意"
GRW_earlygame.100.b: "拒绝"
GRW_earlygame.101.t: "翼巴第快讯"
GRW_earlygame.101.d: "今日，[WNG.GetName]与我方共同发表联合声明，宣布建立外交关系，并同意互派外交使节、恢复经贸往来。\n\n在任何视角下回顾历史脉络，都必然承认，翼巴第在我国历史进程中扮演了不可或缺的角色。自前布罗德费尔德王国于978年确立宪政制度伊始，翼巴第便成为我国现代化进程中重要影响者。我国历史上第一部宪法就是根据当时的翼巴第王国宪法制定的；普共政治局两位重要成员——主席菲利普·红兴与常委卢西安·金翼——都曾长期旅居翼巴第。对于这样既是举足轻重的地缘政治大国，又是地理上紧密相连的邻邦，我们两国之间维持长期的隔绝状态是难以想象的。\n\n随着政治坚冰的破除，经贸联系也在重启。据悉，从西迪亚港驶向[WNG.GetName]的第一批商船已整装待发，准备将新鲜的布罗德费尔德稻米运往[WNG.GetCapitalVictoryPointName]。虽然仍然受到一定的历史与内外阻力影响，但两国关系正常化已经在稳步推进。两国政府间已经达成共识，要为历经挑战的南狮鹫尼亚共同维护相对和平的未来，为双方民众的切实利益开辟道路。"
GRW_earlygame.101.a: "金金金金金！"
GRW_earlygame.102.t: "翼巴第快讯"
GRW_earlygame.102.d: "[WNG.GetName]的外交机构已经通过官方渠道声称，关于“联合声明”谈判的“传闻”，[WNG.GetName]从未，短期内也不会与我方达成任何关于建立或恢复外交关系、互派使节及重启贸易的协议，宣称“传闻与事实严重不符”，“尽管两国地理毗邻，并在特定历史时期存在着复杂的联系，但是当前建立正式外交关系及进行大规模经贸往来的先决条件尚不具备”。\n\n鉴于前期与我方的接触的确存在，[WNG.GetName]的如此举动释放的信号很明确：[WNG.GetName]完全无意于重建关系，恢复贸易。显然，[WNG.GetCapitalVictoryPointName]对于鹫民政权并不信任。如果外交关系都无法建立的话，任何形式的正常合作只能是空谈。\n\n似乎是为了证明这个观点，来自[WNG.GetName]外交机构的官员补充道，[WNG.GetCapitalVictoryPointName]等[WNG.GetName]一切水陆口岸目前均不会接收来自[ROOT.GetName]的商业船只或货物运输。任何未经许可试图进入[WNG.GetName]水域或领土的行为将面临拦截和其他“自负后果”。该发言鹫补充道，这是[WNG.GetName]为维护其国家安全，基于南狮鹫尼亚地区当前及未来的整体态势做出的审慎决定。"
GRW_earlygame.102.a: "看来我们要内部消化大米了……"
GRW_earlygame.103.t: "来自普里文的同志"
GRW_earlygame.103.d: "主要内容：“联络骏鹰的同志”触发，111"
GRW_earlygame.103.a: "已阅"
GRW_earlygame.104.t: "阿里斯山回信"
GRW_earlygame.104.d: "[HIP.GetName]传来了令我们欢欣鼓舞的消息。这个始终以奇异形态屹立于中部海地区的国度，自最近革命政权建立以来，更增添了几分超现实的光彩。我们的一些同志原本还担心，这些高谈“后稀缺”、“原子时代”的新新鹫类，或许不愿与我们这样仍在贫困中挣扎的乡下土包子为伍。然而，事实证明这纯属多虑。[HIP.GetLeader]在回电中热情洋溢地称赞了我国的革命历程，毫不犹豫地答应推动两国间有益的交流，甚至做好了援助先进科学技术的准备。无论接下来的合作将以何种形式开展，这都标志着我们在国际舞台上再获一位值得信赖的同志。"
GRW_earlygame.104.a: "中部海的局面又打开了一角。"
GRW_earlygame.107.t: "冰上飞驰"
GRW_earlygame.107.d: "狗拉雪橇在极地的冰雪上飞驰。这是标准的10条雪橇犬配置，清一色的极地哈士奇。后面四乘员的雪橇上坐着三位乘客：驾驶员，杜米特里斯库军事联络员和[SRS.GetAdjective]一方对接的同志，第四个座位上是一袋机密资料文件。\n\n他们一行必须在今天抵达[SRS.GetCaptialVictoryPointName]，这是命令。他们好不容易才协调了一辆狗拉雪橇来，在当下这片极地，雪橇是速度最快的交通工具。\n\n杜米特里斯库在思考着战局形势，和向两国的上级汇报的内容。可此刻，一个念头在他脑海里挥之不去。越是想驱赶，念头就越明显，最终，有两张脸重合在了一起，他不由得笑了出来。\n\n“怎么啦，杜米特里斯库同志？”他旁边的那位年轻同志问道。\n\n“我在想……前面有一只哈士奇，它的脸怎么跟铜岭的伊格纳蒂乌斯那么像，哈哈哈……”\n\n他们都笑了。虽然大家都知道铜岭的钻石狗与这些未开智的犬类完全是两个物种，但这并不能掩盖他们的犬科出身。的确，那看起来忠心耿耿，甚至有些欠揍的神情，简直与铜岭的那位伯爵大人一模一样……\n\n“但愿他们为革命服务，也像伯爵为帝国服务一样忠心。”那年轻狮鹫俏皮地回道。"
GRW_earlygame.107.a: "狗儿跑得更欢了。"
GRW_earlygame.108.t: "同志仍需努力"
GRW_earlygame.108.d: "亚历山德鲁·长羽并不喜欢这种吵吵闹闹的战前集会，明天他就要奔赴战场，与赫兹兰的反动派们短兵相接，而他现在还要跟着漫云的士兵，用半生不熟的赫兹兰语呼喊三民主义万岁之类的口号。这简直是一种折磨。\n\n演说结束后他找了个空闲的地方坐下，盯着爪下的泥土，似乎看到了自己的未来——或早或晚，在漫云或者普里文，他会变成一块墓碑、一抔泥土、一丛杂草。有鹫撞了他一下，打断了他的思考。\n\n“哦，抱歉，我没看见您。”来者是一个中年狮鹫，羽毛脏乱不堪，只有一只眼睛。\n长羽第一眼就不喜欢这个家伙，只是淡淡地说，“没关系。”\n\n“在看我那一只眼睛吗？”那家伙倒是打开了话匣子，“986年，当时戡乱法案颁布之后，被一个赤党射瞎的。我认识那小子，跟他聊过两句，但真遇上事一点没用。社会党要走，克梅斯凯元帅要拦着他们；他奉命要走，我奉命要拦，我们两边的士兵就都开枪了。当时我只想着自己服从命令就可以了。”\n\n他掏出了一个烟斗，就跟想到了什么笑话一样：“但是啊，呵呵，之后这样的事情却越来越多了。先是瑰翼，后是耀尾，我曾经钦佩的那些领袖一个个被打成叛徒，然后被赶走。” \n\n漫长的沉默，长羽觉得自己应该说点什么，他试着张了张嘴，但最后，却还是什么都说不出来。到最后却是那家伙先打破了僵局，他深吸一口气，重新仰起头来，好似下定了什么决心。“所以我希望........不论你我都可以好好珍惜这次机会。至少这一次，你可以把枪对准正确的敌军.......”"
GRW_earlygame.108.a: "“我会的.......”"
GRW_earlygame.106.t: "终结986年的错误"
GRW_earlygame.106.d: "粵以逐月曆九八六年，浮雲蔽日，漫雲喋血，同室操戈，爪足相殘。時大總統克梅斯凱元帥下令動員戡亂，肇此凶禍；阿斯皮爾·鐮爪率眾出走天際納維亞，共和黨徒兄弟鬩牆，仇讎相向，以至於今。\n\n而今廿載驟逝，世殊時異。自里卡德·艾斯德勒秉鉞執樞，社稷重光，撥亂反正；遂啟會盟之機。今我新邦肇立，承赤幟以興革命，當遣特使齎書北上，秉中持正，俾解兄弟鬩牆之隙，彌縫南北分別之裂。待山河再鑄、金甌復全之日，便為一雪前恥，終此劫亂之時！"
GRW_earlygame.106.a: "二十年噩梦，何日得醒……"
GRW_earlygame.109.t: "夜幕中的北狮鹫尼亚"
GRW_earlygame.109.d: "夜色再一次降临在漫云城中。签字已经过去了十几小时，北狮鹫尼亚地区所有在工作的大功率电台仍然在一齐播发《漫云联合公报》的内容：\n“双方共同承认，986年之《动员戡乱法案》违宪，其法律权力无效。狮鹫尼亚共和国政府承诺立即停止其施行，并将于统一过渡期内完成正式废除程序……\n“……双方共同承认，亚历山大·克梅斯凯元帅在986年的决策是对共和革命原则的严重背离，是导致兄弟阋墙悲剧的根源……\n“……天际纳维亚社会主义共和国同意在共和派团结的原则之下，启动与漫云政府的统一进程，共同致力于复兴最初的共和革命理想……\n“……”\n有的狮鹫听后摇头；有的感慨万千，万千话语来上心头，却又无语凝噎；有的走上街头，紧紧相拥，抱头痛哭；有的朝天放烟火发泄，照得漫云城的一角犹如白昼。\n\n而在天际纳维亚，情况略有不同。欢呼庆祝的声浪似乎比南方的漫云要小些。那些二十年间来到这里的社会主义者，现在更多感觉到的是一种解脱与……迷茫。毕竟，漫云城内的那名左翼总统再左，也不过是一名工会主义者。\n这座极北海滨的城市正在等待着接下来的命运。\n而在城郊的军营之中，已经有很多身影在打点着行装。他们无法认同这样的妥协，认为这是对986年死难者的背叛，是对他们为之坚守二十年的社会主义革命理想的玷污。他们的目的地大多是基韦辛。陆路早已断绝。他们唯一的选择是借道韦迪纳，或直接从天际纳维亚港启程，渡海前往彼得蹄或新天鹰港，再辗转等待一艘能带他们前往西迪亚——最终通往基韦辛的船。\n这不是一条轻松的路，但他们不会停留。就如同远方赫兹兰故乡的鹫王河水，一旦决定某个方向，就会向那里滔滔奔流，绝不停止。"
GRW_earlygame.109.a: "无论如何，共和派迎来了破镜重圆的一刻。"
GRW_earlygame.110.t: "关于紧急接收并安置一批自天际纳维亚流亡而来的统社革军事人员的情况请示"
GRW_earlygame.110.d: "自《漫云联合公报》发布以来，我市遵照中央有关指示，加强了对北部海域入境者的关注。昨日上午，一艘悬挂韦迪纳商船旗的货轮“远望”号驶入西迪亚港码头，船上载有一百四十七名自称来自天际纳维亚的武装军事人员及其随行眷属。\n\n经我边防人员与市委工作组初步接触与审查，情况如下：\n\n该批人员以中下级军官和老兵为主体，带队者为前天际纳维亚“民众革命志愿兵团”参谋长沃尔特·钢喙中校。他们均持有制式武器（已按程序暂时封存），组织度较高，但身心疲惫，物资匮乏。\n\n据其自述，他们因坚决反对阿斯皮尔·镰爪同志与漫云艾斯特勒政府达成的“妥协性统一”，认为该协议背叛了986年革命原则，是对克梅斯凯主义残余的投降。他们声称无法在即将成立的新联合政府中找到位置，故自愿流亡，寻求“真正坚持社会主义革命道路”的同志的支持。他们表达了强烈的意愿，希望加入我国防军或国际纵队，继续为“世界革命”事业服务，以期有朝一日“完成未竟的革命”。\n\n目前，我市政府已将上述人员临时安置于老城区招待所及旧民兵训练营，并提供基本食宿与医疗保障，情绪基本稳定。\n\n我市一切行动听从中央指挥。鉴于情况特殊且紧迫，恳请中央尽快给予明确指示。\n\n西迪亚市鹫民政府（印章）"
GRW_earlygame.110.a: "原则上同意。……"
GRW_earlygame.111.t: "自过去，为现在，敬未来"
GRW_earlygame.111.d: "秋日花环怀疑自己的理智是否已经到达崩溃边缘，这可以理解——她作为一名医疗兵小马，见过了无数惨烈的伤员，看尽了战场的残酷。所以如果得了某种精神性创伤疾病是完全可以理解的。但眼前这幅场景依旧令她难以理解，事实上，简直荒唐透顶！\n\n配备着看起来极度反常的魔法步枪的骏鹰；在天空中飘扬着的绘有原子符号的蓝色旗帜；一本正经地讨论着“不明飞行物”与“星际革命”的士兵；以及刊登着试图证明埃驹金字塔是由外星生物建造的论文。\n\n“我的.......”一轮无比吵闹的强劲音乐响起，秋日花环不禁捂住耳朵，以免遭遇耳膜破裂的风险。还有这些极度非主流的所谓“摇滚乐”！她急忙找到个相对安静的地方坐下，尽管这里依然可以听到那聒噪音乐的余音。\n\n她用力地叹了口气，无法理解自己所看到的、听到的，以及此刻骏鹰同志们脑子里所想的一切，“这都什么跟什么啊.....”她不禁叹息道。“无法理解，是吗？”突如其来的回应让她措蹄不及，赶忙回头一看，是一只年老体衰的狮鹫。“哦，您好。”她有点慌张地打了声招呼，老狮鹫回应道，“过去的我也无法理解你们年轻一代的想法，像你们这样的，总是批评再批评。”他长叹一口气，但随即笑了笑，“后来啊，老了，反而看得开了，应该给年轻的多一些宽容，我们这些老家伙啊，不应如此严厉、死板，毕竟世界终归是他们的。”\n\n秋日花环若有所思地点点头，叹了口气，随即微笑道，“是啊，毕竟我们都来自过去，而他们才是现在，才是未来。”老狮鹫闻言也笑了，“是啊，我是快要落山的太阳，你们是正午的太阳，而他们.....”他颇为严肃地顿了顿。"
GRW_earlygame.111.a: "“他们才是八九点钟的太阳。”"
GRW_earlygame.112.t: "血染的红旗"
GRW_earlygame.112.d: "“反动派意图扼杀来之不易的民主，他们正源源不断地接收着来自维萨里波利斯的援助，他们企图威胁革命的故乡嘶大林格勒.......”站在台上的小马政委正滔滔不绝地发表演讲，想要在此极寒之地激起同志们的热血。在下面的科穆纳 长喙则漫不经心地打量着自己所在的队伍，“狮鹫、小马、牦牛，还有企鹅？”来自五湖四海的国际纵队成员汇聚到了新狮鹫尼亚，这混杂的队伍，构成了一幅奇异的图景。。\n\n“因此，我们必须赶在反动派得逞之前，就给他们当头一棒......”\n科穆纳 长喙努力集中精力聆听政委的演讲，但脑海里还是止不住地胡思乱想，“会不会明天大家都得死在这儿？狮鹫、小马、牦牛……不同种族的鲜血流作一滩，各色各样的尸体堆成一座小山......”\n\n“让我们团结在马科思-嘶大林主义的旗帜之下，向胜利前进！英勇的新狮鹫尼亚民众万岁！革命万岁！”政委铿锵有力的演讲结束了。科穆纳 长喙猛地清醒过来，环顾周围，队伍已经解散了，他叹了口气，随便找了个地方坐下。尽管如此，脑袋里依然萦绕着那些可怕的想法。\n\n“鲜血......战场上到处都是鲜血......”\n他郁闷的抬起头来，无精打采地扫视着会场内的摆设，偶然看到墙上挂着的一幅题词：“同志们，请你们明白，在你们胜利奔向共产主义时高举的大旗上也有我的一滴鲜血！——阿尔季姬娅”\n\n这映入眼帘的文字在他心中激起涟漪，意象似是来自过去，又似是来自未来。他缓缓低下头，沉默了许久......最后不禁笑出声来，随即深呼一口气。"
GRW_earlygame.112.a: "“那就让我也变成那上面的一滴血吧。”"
