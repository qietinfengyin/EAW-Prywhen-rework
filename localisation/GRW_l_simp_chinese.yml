GRW_griffon_autonomous_government_desc: ""
GRW_BAN_equalism_autonomous_region: "黑空平等主义实验区"
GRW_BAN_equalism_autonomous_region_desc: "与里夫达成协议后，黑空地区将作为平等主义在狮鹫种族身上的第一个实验田。如果里夫的理论正确，那么更同质化的狮鹫将会实现小马未能实现的平等主义理想实现真正完全平等的社会，未来平等主义也将作为社会主义的有益组成部分进行推广。"
GRW_minotaur_autonomous_region: "蓝百合牛头怪自治区"
GRW_minotaur_autonomous_region_desc: ""
GRW_WNG_autonomous_region: "翼巴第社会主义自治共和国"
GRW_WNG_autonomous_region_desc: "翼巴第社会党作为反法西斯的重要力量参与政府，并随后成为了自治共和国的支柱力量，他们推行福利政策保障鹫民生活。翼巴第共产党则作为搞激进的政治力量鼓励自治共和国朝着更高的方向革命。自治共和国最终实现了烧炭党与红翼军未竟的理想。"
GRW_FAL_autonomous_region: "隼尔科社会主义自治共和国"
GRW_FAL_autonomous_region_desc: ""
GRW_SIC_autonomous_region: "西卡梅翁社会主义自治教区"
GRW_SIC_autonomous_region_desc: "西卡梅翁自治共和国根植于独特的宗教传统，红色教宗重新激活西凯梅翁女神关于反抗压迫与平等的精神。城市的工联主义者尝试实现独特的经济民主模式，由不同工会实现工鹫对经济的直接控制完成生产与政治的结合，国家经济模拟电脑系统则帮助不同的工会达成和谐的生产秩序，建立独特的社会主义控制论"
GRW_TAL_autonomous_region: "塔卢兹社会主义自治共和国"
GRW_TAL_autonomous_region_desc: "塔卢兹劳工阵线自1003年开始便领导着塔卢兹地区的劳工运动，他们由城市工鹫和矿山矿工组成。在吸收劳工阵线并改组其组织后，共产党协调了城市与矿山之间的分歧，在满足城市工鹫需求的同时保证了矿工的声音不会被忽视。现在两股力量能够心平气和的坐下来一起为塔卢兹能够成为共和国重要的生产基地而工作。"
GRW_FRN_autonomous_region: "皮乌蒙特社会主义自治共和国"
GRW_FRN_autonomous_region_desc: "皮乌蒙特作为南狮鹫尼亚重要的农业生产中心，其左翼组织是具有一定极端农业主义倾向的社农党。社农党与共产党合并后，其领导鹫经过了自我批评，当地组织已经克服了极端的反工业化态度，皮乌蒙特得以在保留城市的基础上广泛建立集体所有制的农村公社，成为了真正的农业天堂。"
GRW_ARA_autonomous_region: "阿兰蒂戈社会主义自治共和国"
GRW_ARA_autonomous_region_desc: ""
GRW_eastern_pony_autonomous_region: "门界东方小马自治区"
GRW_eastern_pony_autonomous_region_desc: "门界作为小马与狮鹫混居的地带，统治者借此挑拨种族仇恨以维持他们的统治，在两大种族间筑起高墙。在社会主义自治共和国的领导下，长剑小马游击队的领导鹫繁星皎皎与狮鹫占多数的冥域共产党达成了同盟，他们将尽全力弥补封建统治者造成的伤痕，推进种族和解，使狮鹫与小马能够在社会主义友谊下平等和谐发展。"
