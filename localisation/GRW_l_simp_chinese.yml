###- 国家领导人 -###
GRW_comradegeneral_filip_redglad_desc: "§Y生于：§!959年11月23日；布罗德费尔德公国，特维特城郊\n\n§Y背景：§!菲利普·红兴是一位怎样的狮鹫？对于这个问题，不同的普里文狮鹫有不同的回答。“普里文革命的舵手，天才的政治家、军事家、革命家！”卢西安·金翼说。“王国几十年才能出一个这样的鹫物，可惜着了马科思的道。”恩里科·基瓦尔多里说。“穷凶极恶的赤匪！暴徒！！杀鹫犯！！！”克洛苏国王说。\n\n根据五大前向党组织提交的一份情况说明，菲利普·红兴于959年出生在特维特城郊乡下的一个富农家庭。978年，红兴拿着一本布罗德费尔德公国的护照前往阿奎莱亚，在天鹰城开始了他的留学生涯，学习师范专业。他对那里的印象并不好，师生公开嘲笑普里文的落后与愚昧，甚至在980年共和革命后也没有一点好转，那些自称的革命者展现出来的短视与无能更让他震惊。对阿奎莱亚失望的红兴于981年退学，又不想就此返回家乡，于是在普里文狮鹫较多，同时也是翼巴第共产党大本营的拉伯特大学找到了一份图书管理员的活计。\n\n正是在拉伯特，红兴系统地学习了马科思主义，从一名各种左翼思想在大脑里跑马的青年转变为坚定的马科思主义者，主张以革命的武装行动推翻君主制，彻底改变普里文被内外资本主义—封建主义剥削的现状。他加入了新生的布罗德费尔德社民工党翼巴第支部，之后迅速崭露头角，而后将支部彻底改造成了所谓“强硬派”分子的大本营，为此还在990年三大上公开做出过检讨。但是时间证明他是正确的。1000年召开的五大上，红兴适时地发出了将党改造为反抗君主独裁的战斗队的号召，得到了大多数代表的支持。\n\n五大后，红兴加紧筹划武装反抗。1003年夏，红兴秘密穿过黑空山脉，领导了白花起义，从未接受过军事训练的红兴很快展现了高超的指挥天才。在1007年，有些宣传已经把红兴吹成神乎其神的狮鹫了。但红兴一直很明白，他不过是普里文乡下一个农民的儿子。他的队伍从群众中来，也终归要回到群众中去。\n\n§Y备注：994年红兴曾罹患急性肺炎，不仅因此错过了四大，还几乎去世。这些年来他的肺病时有复发。如果革命发展到他认为可以离开的程度，他会选择回老家养病。§!"

###- 顾问 -###
GRW_Sonia_Cialaina: "索尼娅·齐亚莱娜"
GRW_Sonia_Cialaina_desc: "§Y生于：§!970年1月27日；西迪亚公国，西迪亚\n\n§Y背景：§!在民主联军的野战医院里随便找一个伤员，问他，你最想中央哪位同志来看望你？他大概会答：菲利普·红兴主席当然很好；理查德·尖矛同志就有点吓鹫了；要是索尼娅·齐亚莱娜女士能来该多好啊！这就是索尼娅·齐亚莱娜在根据地的形象。\n\n索尼娅·齐亚莱娜出生布罗德费尔德王国的外交大臣家里，是家里最小的孩子。老外交大臣是“宪政之友”协会创立时年龄最大、官职最高的参与者。他认为，如果布罗德费尔德想要推广宪政，那么首先需要让执政的精英阶级充分理解宪政，这就要求他们必须接受良好的教育。所以他相当重视子女的教育。小索尼娅也不例外。她自幼就接受了王国一流的教育，986年远渡重洋去往小马利亚学习，在996年取得了政治学博士学位后回到基韦辛。\n\n然而，甫一回到基韦辛，索尼娅·齐亚莱娜就被那饿殍遍野的景象吓呆了。十年前她离开国家时，这里还曾经是一片欣欣向荣的天地。身边贵族对如此的灾难漠不关心，甚至变本加厉地谋取私利的喙脸让她感觉恶心。更让她沮丧的是，她得知父亲已经在她回国前夕去世了。心情低落的索尼娅·齐亚莱娜找到父亲生前的挚友，博勒嘉德·虎珀博士，一开始只是想通过帮助他的工作，能够救济一些挣扎在死亡线上的狮鹫；但很快，索尼娅·齐亚莱娜就感受到一个事实：她爱上他了。虎珀博士于多年前丧偶，后来没有再娶。索尼娅向他表白时，他只是呵呵一笑，让她考虑清楚。不久他们结婚了。新婚夫妇在报纸上约法三章：一是齐亚莱娜不随夫姓，二是虎珀不干预齐亚莱娜的事业，三是未来的子女应由夫妻共同照顾。一时传为美谈。\n\n戒严时期，夫妇共同为恢复普里文的宪政而战斗，然而1002年那颗罪恶的子弹击中了虎珀博士。索尼娅·齐亚莱娜擦干泪水，接过他的衣钵，竭力维护宪政的旗帜。1003年春的阅兵式上，齐亚莱娜亲眼看见王后被刺客杀死。这之后她被软禁，眼睁睁看着丈夫生前的战友，甚至几名自己从小熟识的长辈死在屠刀之下。她再也无法忍受下去了。在共产党地下组织的帮助下，她逃出了基韦辛，加入奋战在白花的民主联军。很快，全军上下都认识了这位优雅善良而又勇敢无畏的索尼娅·齐亚莱娜女士。"
GRW_Lucian_Goldwing: "卢西安·金翼"
GRW_Lucian_Goldwing_desc: "§Y生于：§!968年10月24日；布罗德费尔德公国，白花\n\n§Y背景：§!如果卢西安·金翼算普里文共产党第二“倒霉”的中央委员，那恐怕没有狮鹫可以说是第一了。金翼成名很早，不仅是拉伯特大学法律系近三十年来成绩最优异的学生，还是第一个被抓进卡廷国立监狱的。那是987年，隼尔科战争最血腥的一年，拉伯特大学爆发了一场声势浩大的反战游行，而金翼居然以留学生的身份做到了游行的主要组织者。据说愤怒的加里波德·塔洛努埃尔三世国王亲自要求不能将其简单地驱逐出境，要他至少在翼巴第的大牢中吃点苦头再走，而他最终被释放且恢复学籍，还是翼巴第社会党中央亲自出面周旋的结果。\n\n似乎是吃一堑长一智，金翼出狱后看上去不怎么热心学生运动，倒是经常可以见他跑图书馆。没有谁知道高材生怎么会对一个看上去普普通通的图书管理员崇拜得五体投地。现在我们可以知道，红兴与金翼这对黄金搭档，以及他们后来主张的革命世界观与方法论，就是在这段时间内形成的。在毕业前后，金翼加入了以红兴为书记的社民工党翼巴第支部，参与普里文侨民劳工运动。但不久三大撤销了所有的海外支部，组织侨民罢工被党纪禁止，金翼经过与红兴的商讨，决定返回家乡，组织农民。\n\n金翼的家族是全白花闻名的神官家族。利用家族的威望，金翼一爪创立了普里文第一个马科思主义性质的农民协会——白花农会。短短一年里，农会披着三神信仰的皮疯狂滋长，很快就引起了当地警察部门的警觉，最终结果是卢西安因为“煽动罪”被判处五年监禁。然而不到四年，饥荒席卷了普里文，监狱因缺乏粮食将他提前释放。出狱后的金翼听说党的紧急会议将要召开，于是几乎是一路行乞到了西迪亚。上午，衣衫褴褛的卢西安·金翼出现在大会会场，下午就因为支持菲利普·红兴的路线被暂停了六个月党籍。\n\n卢西安·金翼永不气馁。不久，尚未恢复党籍的金翼以白花农会执行委员长的名义，在暗中着爪重建并发展白花的农民组织。当菲利普·红兴于1002年冬天路过白花时，他惊讶于当地良好的群众基础。一个大胆的想法开始在两位狮鹫的脑海里浮现。第二年白花起义之后，党中央转入革命根据地，卢西安·金翼顺理成章地增补为中央委员。被戏称为“小红兴”的他一直负责党的群众工作，在这条战线上坚定地贯彻执行着红兴的指示与部署。"
GRW_Ionel_Shortfeather: "若安内尔·短羽"
GRW_Ionel_Shortfeather_desc: "§Y生于：§!958年3月5日；布罗德费尔德公国，拉里奥斯\n\n§Y背景：§!党中央久经考验的秘书长也曾有过相当不羁的青年时代。977年，若安内尔·短羽被侨居狮鹫海姆的商鹫父亲送进了米登海姆经济学院。978年共和革命到来时，米登海姆公开的保皇立场使其在青年学生中的形象大损。像很多激进的同学一样，短羽跑到了曲鲁斯法尔，那里的经济学系虽然没有米登海姆实力雄厚，但却是当时狮鹫尼亚唯一一个敢讲焦糖·马科思的理论的。而且他还有一个理由，就是能借此摆脱他那财迷父亲的控制。\n\n980年，随着反革命站稳了脚跟，对“激进派”的清算提上日程，校方匆匆给高年级学生提前颁发了毕业证。但短羽觉得自己学到的东西已经足够多了。他一回国就加入了普工联——社民工党的前身之一，用七八个不同的笔名在报纸上发表文章，出席了社民工党的一大。这之后他担任社民工党中央技术秘书——后来是中央秘书长。\n\n在本职工作之外，994年，为了与金卫团的民兵对抗，他发起成立了中央政治保卫局（也就是后来的内务部），为了护卫同志，也是为了知晓这些极右翼的动向，避免最坏情况的发生。由于他的坚持、内务部保密的性质与切实的安全需求，即使是994年四大前后极度右倾的时期，这个机构也没有完全停止运转。1000年五大上，这位神秘而老资历的中央秘书长坚决表态支持红兴，使得不少摇摆不定的代表转向。\n\n时间进入1004年，白区斗争形势不断恶化，而根据地又急缺干部。若安内尔·短羽将白区工作交给克里斯蒂安·幽翼，自己进入根据地，辅佐中央工作。他以自己的斗争经验和智慧为革命做出了巨大贡献。\n\n§Y备注：他是真正的共产党员，从不屑于将自身利益与党的利益混为一谈。虽然曾经在五大之中毫无保留地支持红兴，但外界从不把他当“正统派”看——这或许只是他漫长党龄中一次基于信念的寻常抉择。至于他与红兴的真实关系，有来源不明的流言称二鹫实则不睦，真相恐怕只有当局者知晓。§!"
GRW_Bashir_Mistwing: "贝希尔·岚翼"
GRW_Bashir_Mistwing_desc: "§Y生于：§!950年3月20日；布罗德费尔德公国，特维特\n\n§Y背景：§!贝希尔·岚翼与红兴主席私交甚笃，也是铁杆的“正统派”。不过三十年多前，红兴还是一个穷学生的时候，岚翼同志已经是特维特的风云鹫物了。\n\n贝希尔·岚翼是特维特一个纱厂老板的儿子，于971年考入基绍公学学习会计与统计核算。学习期间，岚翼加入了“宪政之友”协会，接受了立宪派的思想和主义。976年，岚翼毕业返乡，同时也作为立宪派的使者，向家乡的士绅与农民宣传立宪的好处。当地士绅还算开明，经过一番游说后，纷纷表示会支持立宪；但对农民的宣传出了问题。在一次公开演讲中，贝希尔·岚翼被听众中的一名年轻狮鹫的尖锐提问搞得左支右绌：岚翼发现他必须要论证地主对农民的剥削是正当而必要的，但他实在说不出这种违心的话。走下讲台之后，他单独约这名农家子弟长谈，这就是岚翼同志与红兴同志三十年友谊的开始。\n\n此后，红兴出国留学，而岚翼不断追求真理，最终与红兴不约而同地走上了马科思主义的道路。他参加了社民工党的一大，而后作为社民工党一方的代表，与“宪政之友”协会改组而来的国家自由党谈判，结果是达成了允许社民工党参加中左翼联盟的“988年共识”。那之后，贝希尔·岚翼领导一个社民工党派驻国自党的工作小组，负责政党间协调与对话的工作。右倾时期，时任总书记夸提约韦亚努怒斥贝希尔·岚翼“破坏团结”，工作小组被撤销，岚翼被赶出基韦辛，到格里芬维尔省做他的老本行——经济调查与统计。这种活计在旁人看来几乎等于流放，岚翼却做得相当认真。红兴的著名报告《稻乡调查》就是在他的工作的基础之上完成的；那篇报告详细地说明了农村革命的紧迫性与可行性，为红兴的路线做了无可辩驳的论证。可以说，红兴在五大上取得胜利，也有岚翼的一份功劳。\n\n白花起义后，贝希尔·岚翼继续在经济战线上工作，管理根据地的经济建设。正如红兴所说，目前的工作并不是要在根据地大办工业化，但是只要“实行了有计划的有组织的经济建设工作，革命战争的胜利，无疑是属于我们的。”对于未来，岚翼构思着一条稳扎稳打、爪踏实地的经济建设道路。他已不再年轻，那一条道路也不会很短，但他相信只要坚定不移地走下去，一定能到达一个富饶而光荣的彼岸。"
GRW_Dumitru_Startail: "杜米特鲁·星尾"
GRW_Dumitru_Startail_desc: "§Y生于：§!967年10月22日；卢什亲王国，欧里戈克\n\n§Y背景：§!星尾家族是欧里戈克最大的土地拥有者，但杜米特鲁·星尾的家庭只是这个庞大家族中没落的一支。在他年少时，家里已经一日不似一日，终于要沦落到给别家做农奴的地步了，杜米特鲁·星尾咽不下这口气。在一个晚上，他独自冒险泅渡到普里河对岸，踏上了普里文的土地。举目无亲的星尾在两年之后游荡到了西迪亚港，在那里做码头工鹫，也就很自然地加入了社民工党外围的工会组织，进而进入了社民工党。星尾做工勤劳能干，又颇具天赋，学东西很快。党发觉了他的才能，将其作为重点培养的对象。\n\n992年，普里河洪水泛滥，收成并不好，而欧里戈克的地主将几十个抗租农奴枭首，公然把首级挂在神庙尖顶上。此事使整个埃维河谷一片哗然。消息传到基韦辛，社民工党中央高层认为帮助没有成熟革命政党的卢什进行革命运动是天经地义的事情，于是派出了出身该地的星尾率一个工作组，命令他们协调当地农民的抗租运动。\n\n比起地主的残酷压迫，星尾更痛心于家乡农奴的涣散与麻木。因此，他摸索着组建了欧里戈克农会。一开始，星尾把农会包装成当地农奴自发的灾年互助组织，从而打消了地主的警惕心；但逐渐壮大的农会团结了足够多的农奴，在地主有所动作之前，宣布剥夺地主的土地所有权，并把顽固分子驱逐出境。之后不久，卢米方面就大举出动军队镇压这群刁民。星尾只得再一次渡过普里河，回到西迪亚，而地主带着还乡团再一次于他的家乡作威作福。\n\n星尾后来总结，这场农民运动声势很大，得到的经验也很多。最大的教训就是农民没能组织起一支自己的军队，农会武装尚能对付地主的家丁，但在反动的正规军之前毫无抵抗力。狮鹫尼亚历史上的农民军没有一个能成事的，焦糖·马科思和火焰·恩吉尔也只看好劳工阶级。难道农民就不能利用革命的武器，真正掌控自己的命运了吗？第二年，红兴针对这场运动和先前金翼组织的白花农会运动的失败教训，提出了因地制宜运用马科思主义原理，依靠农民进行武装斗争的革命方法论。杜米特鲁·星尾如获至宝，成为了一名坚定的红兴派。经过多年的起起伏伏，这名“农民运动大王”目前在临时政府内分管农业，为着广大农民的利益而努力工作。"
GRW_George_Flamefeather: "乔治·焰翎"
GRW_George_Flamefeather_desc: "§Y生于：§!961年1月5日；西迪亚公国，西迪亚\n\n§Y背景：§!乔治·焰翎是自己阶级的背叛者。他的父亲是一名标准的普里文买办，为天落的一家粮食公司效力，靠着帮助公司兼并普里文的当地企业赚到了一大笔钱，之后就举家移居天落。乔治·焰翎自幼就知道自己优渥的生活来得并不道德，对父亲的厌恶也随年岁渐长而与日俱增。终有一天他逃离了自己的家庭，前往狮鹫海姆寻找新的生活。\n\n那时焰翎不过是一个学生，在狮鹫海姆以翻译小马利亚的书籍和文章勉强糊口。这样的生活不过经过了两三个月，他就因为翻译了一篇论述剩余价值的文章而被投入大牢，所幸不久之后暴动的革命者就释放了监狱之中的所有政治犯。这次身陷囹圄反而让乔治·焰翎对马科思主义产生了真正的兴趣：他与监狱中的政治犯交流，阅读他们推荐的马科思主义书籍。待到第二年反革命反扑前，乔治·焰翎已经可以称作一名马科思主义者了。\n\n自此之后，虽然革命不断地受挫，青年的心仍然滚烫。跟随着两次长征的队伍，乔治·焰翎来到了天际纳维亚。这些年间，他凭借精湛的语言能力，完成了《资本论》首个完整的普里文语译本，并创作了反映长征的小说《铁流》。这些作品在左翼地下网络中广为流传，成为重要的思想武器和精神食粮。但在革命的低潮中，马科思主义者内部出现了严重的分裂，社群派和国际派无休止地内耗，其后果之一就是焰翎被排挤到嘶大林格勒“学习理论”。白花起义后，乔治·焰翎跟随嘶大林格勒特派团抵达根据地的首府，这支队伍后来并入普里文的党组织，成为“国际派”的核心班底。\n\n在根据地，乔治·焰翎的理论水平与宣传能力首屈一指，他的文学名声和个鹫魅力也吸引了很多投奔共产党的进步青年。另一方面，党内总有关于他们的反对声音，有的同志认为他们缺乏实干精神，也有的同志厌恶他们的“洋”习气。乔治·焰翎和他的国际派战友们从来不惧怕这些指控。对于他们来说，这是一支代表先进革命理论与革命经验的力量，他们的革命意志最毋庸置疑，而他们的革命理想最经得起革命实践的考验。要知道，全狮鹫尼亚乃至全世界的革命才刚刚开始。"
GRW_Calin_Thunderfeather: "卡林·霆羽"
GRW_Calin_Thunderfeather_desc: "§Y生于：§!966年2月5日；布罗德费尔德公国，基绍\n\n§Y背景：§!老一代基绍狮鹫都知道老卡林·霆羽。他是基绍第一份民办报纸《钟鸣报》的创办者，同时也是公国最早的新闻记者之一。站在一种乌托邦社会主义立场上，《钟鸣报》旨在揭露社会黑暗与不公，老卡林·霆羽也因而得罪了不少当地权贵。在他的儿子诞生之前，霆羽先生偶感腹痛，几天之后就不明不白地死在了诊所里。\n\n《钟鸣报》按老卡林·霆羽的遗愿，交给其几个老友共同管理，继续为揭露不公和社会改良发声。972年，这些基绍的乌托邦社会主义者发起成立了“劳动者同盟”，《钟鸣报》自然而然地成为其机关报。982年劳动者同盟与普工联合并成立社民工党，《钟鸣报》也随之汇入新的《火星报》；而此时小卡林·霆羽已经决定了自己一生的志向。受这些新闻界和报界前辈照顾良多的卡林·霆羽决心要走父亲的老路，他真切地希望能通过揭露真相改变社会。\n\n986年，还是一名学生的霆羽撰写了长篇报告《格里富斯南洲会的历史》，揭露这个垄断性的外国公司如何残酷剥削普里文的农民。这篇报告酿成了一起外交事件，结果是以“发表煽动性文字”为由，卡林·霆羽被王家基韦辛大学文学系开除。好在《火星报》愿意收留他做记者。几年后，党内右倾的风刮到了报社，霆羽被“外派”到小马利亚做一个不痛不痒的“分社记者”，其实就是一种流放；然而霆羽敏锐地捕捉到了北部谢伟良纳劳农运动的进展，很快冬季革命就爆发了，卡林·霆羽立即前往彼得蹄，成为亲历那场革命的少数普里文狮鹫之一。作为战地记者，他撰写的报告甚至出现在呈递给国王的参考资料之中，尽管宫廷上下都对此不情不愿。\n\n第二年，普里文陷入骇人听闻的大饥荒，而后国家戒严，几次与党中央恢复联系的努力均以失败告终，传来的反而是旧日同志或叛变或牺牲的消息。这让霆羽误以为社民工党已经要么彻底右倾，要么被屠戮殆尽。直到白花起义军的明码宣言传到嘶大林格勒，卡林·霆羽才受嘶共委派，以特派团团长的身份回到普里文。作为嘶大林格勒来的“钦差”和源源不断的国际援助的协调者，目前他是某种国际共运“权威”的象征，调查记者的出身和嘶共的培养使他的口才相当优秀，理论水平相当高超，而观点又相当理想主义。他已经号召——或者说“鼓动”——起一批狮鹫，形成了所谓的“国际派”。"
GRW_Liviu_Moonbeak: "利维乌·月喙"
GRW_Liviu_Moonbeak_desc: "§Y生于：§!964年5月22日；布罗德费尔德公国，特维特\n\n§Y背景：§!虽然特维特的赤色分子不算少，但利维乌·月喙也“赤化”了的消息还是令他家乡的狮鹫吃了一惊。这名自幼沉默寡言，甚至似乎有些木讷的工程师看起来并不是一个标准的“过激党徒”。作为一个小康的工匠家庭的孩子，利维乌·月喙按照父亲设定好的路线，先上完高中，然后进入基绍公学学习两年针对性的机械预科，最后前往阿奎莱亚进修工程学。再过四年他学成之后，假以时日，就将成为特维特的一名受鹫尊敬的工程师，或者留在阿奎莱亚工作。\n\n变数出现在阿奎莱亚留学期间。利维乌·月喙赶上了阿奎莱亚革命的岁月。虽然表面上看起来，利维乌·月喙不像他的许多同窗那样醉心于革命与运动，但他一直以一个工程师的方式观察着这场革命，对照着若干共产主义理论著作，试着分析其运转的逻辑与需要修理的地方。利维乌·月喙结束学业回国的几个月后，君主制在阿奎莱亚复辟，革命者遭到了血腥的屠杀。看到特维特的报纸登载的相关新闻，他并不意外，也没太觉得伤心——这消息只是坚定了他对“革命需要更严密的组织”判断。986年，利维乌·月喙秘密加入了社民工党。\n\n白花起义后，利维乌·月喙响应党组织号召进入根据地。他无意于抛头露面的宣传工作，也缺乏军事经验，但很快得到展现出卓越的组织生产的能力。他曾带领几名技术骨干，用沼泽芦苇造出可堪一用的办公纸，解决了党中央的燃眉之急，这使他在根据地内部声名鹊起。不久之后，他便被任命为临时政府内一名分管基本民生工业的专员。\n\n鲜为鹫知的是，这名沉默寡言的骨干党员的思想其实相当……有创造性。他认为，既然共产主义革命是以劳工阶级为基础的，那么除了军事胜利之外，最重要的事情其实是培养壮大劳工阶级，为此可以牺牲很多必要的代价。他的观点目前只在一小撮技术官僚和专家的私下讨论中流传，但其在这个群体内部被接受的程度是不容忽视的。"
GRW_Trifan_Sidioveanu: "特里凡·西迪约韦亚努"
GRW_Trifan_Sidioveanu_desc: "§Y生于：§!约950年；西迪亚公国某地\n\n§Y背景：§!大约是951年的某一天，西迪亚大神庙的济贫院接收到了这一天的第三个弃婴。按照济贫院惯例的起名法，这名婴儿被暂时命名为“特里凡（‘三’）·厄里昂（‘信奉厄耳的’）”。如果婴儿顺利成活，他大概率会被一个体面的家庭收养走，届时就会换一个新的名字。然而小特里凡一直长到约六岁，仍然住在济贫院里。几名老修女经过简短的商量，给他找了一个在码头卖报的活计，就从法律上甩掉了这个累赘。\n\n码头上干活的狮鹫大多也是苦出身，他们对于这名孤儿报童十分同情，纷纷给予照顾。仓库管理员给他留下栖身之处，文化程度较高的工程师叫他认报纸上的字，船员们也乐于从微薄的收入中挤出一两个铜板，照顾他的生意。长大一些之后，他过上了半工半读的生活。967年，特里凡参加了基绍公学第一次在西迪亚举行的招生考试，居然考上了。他带着工友筹集的学费，告别码头上欢送他的父老乡亲，踏上了前往西方公国首都的轮船，并决心将自己的姓氏改为“西迪约韦亚努”，也就是“西迪亚的狮鹫”。\n\n大学期间，西迪约韦亚努学的是机械工程。他渴望快快制造出新的机器，减轻码头工鹫的负担。然而当他的学习逐渐深入，他越来越发觉，使那些狮鹫受苦受难的原因不是机械的缺乏，而恰恰是机械的发展。他苦恼地在书本中寻求答案，并与西迪亚的工鹫领袖通信，逐渐构筑起了马科思主义的宇宙观。到毕业时，特里凡·西迪约韦亚努已经是一名优秀的马科思主义者了，他回到了自己的故乡西迪亚，加入西迪亚码头工鹫协会，继续为改善工鹫的处境而工作，虽然是以与他最早设想的完全不同的方式。\n\n自990年以后，西迪约韦亚努一直领导着西迪亚劳工组织，在五大后成为共产党领导下的全国总工会主席。他在劳工中享有崇高的威望，也一直被视为劳工利益的代言者。白花起义后，西迪约韦亚努带领一部分同志坚持以西迪亚为中心的白区工作。尽管生命一直处于极大的危险之中，但他毫无畏惧。对于这名西迪亚劳工阶级抚养大的孤儿来讲，只要他的心脏还能跳动一天，他就要为劳工的福祉而全力战斗。"
GRW_Ianos_Amberpaw: "光波·布鲁诺"
GRW_Ianos_Amberpaw_desc: "§Y生于：§!940年4月2日；基韦辛公国，基韦辛\n\n§Y背景：§!“时代在发展，社会在进步，鹫也都在变。”光波·布鲁诺犹记得当时父亲送自己去狮鹫海姆读政治学的时候的嘱托。布鲁诺的家族可以明确上溯至基韦辛建城之时。自那时起，布鲁诺家族就是基韦辛的名门望族了。要说这个家族的连绵不断有什么秘诀，那就是——圆滑。光波·布鲁诺在儿时就被教导，家族的几名祖先虽然在普里文的历史里面评价不甚高，但他们是为了维护家族的存续与兴旺，他们是无可指摘的。\n\n也许是家族传统的一种表现，布鲁诺的父亲在六十年代就意识到，二三十年后对于一个贵族政客，“政治学专家”的头衔远比什么“国王陛下最忠实的仆从”或“某某地的领主”有用。在那个基韦辛贵族还普遍自命不凡的年代，光波·布鲁诺就被送到了狮鹫海姆。在帝国的心脏，布鲁诺第一次领略到什么是现代社会，什么叫现代意识形态，什么叫现代政治学。同时他也意识到，父亲给他选这条路似乎有点想当然——现代政治学不教宫廷权术斗争，而他本鹫也无意于此。所以他毕业之后就在庄园里，以业余学者的身份过他的上流贵族生活。对于他而言，971年加入博勒加德·虎珀的“宪政之友”协会、978年凑在一群贵族朋友之中号召立宪、后来接受王国工商业总督查的身份，都是自然而然的事情。从他这个身份出发，事情自然会这样，就如狮鹫总要吃饭喝水一样。\n\n这样的生活持续到996年，鹫到中年，大饥荒爆发了。\n\n大饥荒期间，光波·布鲁诺跟在虎珀后面，制定缝缝补补的政策，与反对派斗嘴，在辩论席上搞冗长演说……他本以为世界就会这样理所当然地按照他熟悉的游戏法则玩下去，大饥荒之后，王国还是那个王国，世界还是那个世界。然而998年国王绕过议会，直接启动了国家紧急状态。光波·布鲁诺眼睁睁看着自己熟悉的世界的栋梁被一根根抽走，直到博勒加德·虎珀博士被枪杀，这个大厦完全崩塌了。他不是在跟绅士跳交谊舞，而是要跟一群野狼一样的反动贵族搏斗；他们撕咬宪政派跟撕咬宪政本身一样野蛮。\n\n就这样，伴随着民主联军解放科罗维亚，光波·布鲁诺作为几名硕果仅存的宪政领袖之一也匆匆赶到了这座城镇。而这次，无论新政府的色彩如何，历经风雨的光波·布鲁诺都希望宪政的光芒不会再一次从普里文的大地上褪去。"
GRW_Marin_Dascalu: "马林·达斯卡卢"
GRW_Marin_Dascalu_desc: "§Y生于：§!945年；西迪亚公国，夸提亚\n\n§Y背景：§!马林·达斯卡卢是布罗德费尔德王国第一个教育学博士，他在基韦辛大学拿到了学士学位之后，就一直在江源城进修，直至974年回到普里文。达斯卡卢走上这条路的原因很简单：他认为缺乏教育是普里文一切贫困的根源。不会算数的农民只能被地主随意欺压，不识字的劳工只能在血汗工厂里兜兜转转，不懂科学的穷苦百姓只能教出更多愚昧的下一代，这一切事实似乎都在证明这个观点。他想要改变，而且认为不管是保守贵族还是立宪派，对于教育这种事总不会反对的。\n\n鉴于此，立宪之后，马林·达斯卡卢参与成立了一个小政党：民主进步党。其口号为“务实的政治”，也就是无意于政治斗争，而试图背靠中左翼执政联盟，提出一些修修补补的进步主义议案，这种思潮在那时的中上层知识分子中很受欢迎。作为民主进步党的一大重点工作，位于夸提亚的平民教育实验室于977年成立，而达斯卡卢在这里勤勤勉勉做了十多年的主任。鼎盛时期，实验室下辖近千名教师，负责数以万计的农民与贫苦劳工的教育，也吸引来了社会各界的关注。但达斯卡卢对其成效并不满意。王国的教育机关一直在试图推行“公民道德”的教育，实验室的资金也严重依赖“社会贤达”的捐赠，而995年的大饥荒终于成为压垮他们的最后一根稻草。实验室关门大吉，达斯卡卢五分之一的学生带着他宝贵的知识饿死在饥荒之中。\n\n赋闲不久，达斯卡卢被当局任命为基韦辛大学的校长。政府希望他这种不问政治的学者能管制住愈发躁动的大学生。然而1002年“九一四事件”中，军警先是枪杀了博勒嘉德·虎珀博士，然后竟向和平示威的学生队伍中使用机枪扫射。事后，面对着警方发来的上百份“失踪报告”的达斯卡卢震惊了，他无论如何也想不明白，为什么一个体面的国家机构能做出这种事。此事对达斯卡卢的打击甚至比实验室的失败更甚，导致他选择辞职回乡隐居。\n\n白花起义后，达斯卡卢偶然看到了一份走私来的根据地报纸；报纸刊登了十三岁游击队员用达斯卡卢的扫盲课本教战友写字的照片。那一刻他明白：只有枪杆子保卫的笔杆子，才能真正教化这片土地。他瞒着身边的狮鹫，带了三本扫盲教材，独自踏上了前往白花的道路。民主联军很器重这位平民教育元老，安排他负责根据地的扫盲工作。随着革命者军事上的不断胜利，马林·达斯卡卢也发现，自己离那个没有狮鹫不读书，没有狮鹫不识字的新普里文越来越近了。"
GRW_Anatol_Vilan: "阿纳托尔·维兰"
GRW_Anatol_Vilan_desc: "§Y生于：§!947年12月17日；基韦辛公国，基韦辛\n\n§Y背景：§!早在青年学者时期，阿纳托尔·维兰的言论与著作就在基韦辛的贵族圈子里形成过一阵风暴。据这名年轻的哲学家介绍，先进的现代的小马利亚正流行一种名为“实用主义”的思潮，亦即“有用即为真理”的观念。由此他劝勉贵族诸君要接纳实用的伦理，养成实用的观点，推行实用的政策，甚至对子女施以实用的教育。从结果来看，至少“实用主义的教育理念”成为了当时基韦辛的一种潮流。阿纳托尔·维兰就这样莫名其妙地成为了大众认知中的“教育家”。\n\n此后，阿纳托尔·维兰一直在王家基韦辛大学任教。这位声名远扬的学者一向谦逊和善，经常被邀请到基韦辛上流社会的晚宴和沙龙之中做客。但当大饥荒发生后，阿纳托尔·维兰好像是换了一名狮鹫一样，时常在公众场合批评政府救灾不力。最终，在一次著名的议会会议上，阿纳托尔·维兰议员先生毫无征兆地拿着一份979年宪法走上发言席，痛斥议员们是一群“鼠目寸光的废物”，正在“用你们的冷漠谋杀挨饿的国民”，最后在众目睽睽之下把爪中的宪法撕得粉碎。这次事件之后，国王亲自出面解除了他的职务，任命其为白花地区的教育督察，委任状上写满了冠冕堂皇的话语，但他一眼就看穿实际意思不过是让他滚远点。他冷笑着打包好家当前往白花，在他有限的工作中尽可能做些力所能及的事情。\n\n1003年八月的一天，阿纳托尔·维兰正在办公室中筹划着新一个学年的工作时，一声近处的炮响把他震昏了过去。等到他悠悠转醒，发觉自己已经做了起义军的俘虏。根据地的条件是艰苦的，与反动派的斗争是残酷的，而共产党虽不给予他夸张的优待，但也始终对他保持相对的关照和充分的尊重。与共产党的朝夕相处使他放下了心中的芥蒂，应下根据地政府的邀请，为扫盲运动出一份力。随着革命高潮的到来，这名“共产党的亲密战友”正动用着他在高级知识分子的影响力，争取他们转向和平民主的一方来；而另一面，仔细阅读了马科思主义书籍的哲学家先生正着爪撰写他的新讲义。一旦能回到基韦辛的讲台上，维兰就要为学生们开一个新科目——辩证唯物主义与历史唯物主义原理。"
GRW_XiaoZi: "赫尔穆特·肖兹"
GRW_XiaoZi_desc: "§Y生于：§!958年；弗羽西亚大公国，天落\n\n§Y背景：§!赫尔穆特·肖兹——或者你可以叫他朔尔茨——出生于天落城，狮鹫尼亚的自由之乡。受他教师父母的熏陶，肖兹从小就对卢森吠和李卜克内西的学说深感兴趣，并参与了978年共和主义革命。1005年，极度失望于国民共和党的无所作为，他告别了漫云城的艾斯德勒和翔日，自愿来到普里文共和国参加民主联军，投身于普里文鹫的解放事业，并在科罗维亚战役中立下军功。“共产主义有利于普里文”，他经常说，“但不论什么时候，我们都应该记住，民主之于无产阶级，就如同空气之于有机体，缺失了就无法发挥其作用。”作为唯一一只亲自见过菲利普·红兴并与之合作的国民共和党鹫，肖兹无论何时何地都将同普里文的同志们一起，建设独立的，社会主义的——最重要的是，民主的——普里文鹫民共和国。"
GRW_RainyBlaze: "雨露耀光"
GRW_RainyBlaze_desc: "§Y生于：§!960年；阿奎莱亚王国，里拉\n\n§Y背景：§!雨露耀光生于里拉外的一个小村镇。耀光的父亲是陆马工匠，母亲则是从威腾兰周游来此的独角兽医生，擅长使用治愈魔力。在967年，耀光的父母参与了当地的一次小型农民起义，挫败后一家被迫流亡弗羽西亚。在贫民窟流落的几年中，耀光尝到了马生疾苦，加深了对万恶的君主制的仇恨——显然，她也在这里认识了翔日，并与这位热忱的谐律主义者有过几面之缘。\n978年，在狮鹫海姆革命的高潮，她就读于振翼城小马区一所专门为独角兽开设的魔法培训学校，跟随母亲的道路修习治愈魔力。她密切关注革命动向，在国民共和党防守狮鹫海姆战局不利时主动从那里肄业，加入共和军作为后勤中的治疗者，一路随克梅斯凯流亡到了漫云，并继续在他们攻略漫云城时进行协助。\n攻克漫云后，她被安排了军队中的一个闲职，副业医疗学术研究。她渐渐看到了共和国986年对左派的暴行，见证了郊野逐步为军阀控制，以及国民共和党腐朽的另一面。她对克梅斯凯的好感也一点点磨灭。在此期间，她倒向国民共和党左派，并开始暗地里研读马科思的共产主义书籍。\n随着她对克梅斯凯的无所作为的厌恶进一步加深，她开始同情狮鹫尼亚的共产主义革命，但受制于国民共和党，她无法北上天际纳维亚支援革命。1003年，雨露耀光无意间听闻了白花革命的消息。兴奋万分的她暗中潜逃到了普里文，为狮鹫解放军担任战地医生。在战争中，她以高超的医术闻名，被尊为“太阳”——只给予，不得到。\n这位才华横溢，与来自赫兹兰，天落和鹦鹉维亚的民主派相处甚欢的小马医师，或许会在某个时刻得到重用。"
GRW_Cristian_Ghostwing: "克里斯蒂安·幽翼"
GRW_Cristian_Ghostwing_desc: "§Y生于：§!963年9月15日；基韦辛公国，科罗维亚\n\n§Y背景：§!克里斯蒂安·幽翼曾经是一名无政府主义者，或者确切地说，曾经是一名有无政府主义倾向的青年。他的母校科罗维亚中学曾经昙花一现过一个自称“安那其主义研究会”的小团体，克里斯蒂安·幽翼是其中的重要成员。他自告奋勇代表“安那其主义研究会”与校内信仰马科思主义的同学辩论，结果被对方驳得哑口无言；这反而使他对马科思主义产生了真正的兴趣，后来成为马科思主义的拥趸。\n\n984年，在当地左翼运动前辈的推荐下，幽翼前往西迪亚，为社民工党的机关刊物《火星报》工作。他的稿件反响平平，编辑工作也只可称得上四平八稳。这样的生活持续到988年，他的家乡，利夫省的首府科罗维亚爆发了大罢工；由于士绅极力鼓动，当地警察暴力驱散了罢工游行的劳工，进而开始抓捕当地的社民工党骨干。西迪亚的党中央连忙派出当地出身的幽翼与当局周旋。正是由这一事件开始，幽翼展现出的复杂条件下的伪装、联络与协调能力被党组织看中。若安内尔·短羽认为，让克里斯蒂安同志保持秘密远比他抛头露面更能发挥作用。于是，在短羽的筹划下，幽翼与几名同志在科罗维亚创办了一所中学，以此为掩护组织着整个地区的党的活动。\n\n大饥荒时期，幽翼的学校也陷入萧条，他南下再次回到西迪亚。在短羽的寓所里，他们一致认为，短则一两年，长则三五年，保守派势力一定会藉由大饥荒反扑，届时社民工党不仅很可能被取缔，甚至还有失败的风险；而幽翼应趁这段短暂的窗口期，迅速潜伏下来。自此之后，他以假身份逐渐取得了西迪亚官场的信任，得以打入当地的无线电管理局之中，为组织提供了无数价值连城的情报。1004年，短羽离开西迪亚前往根据地，白区情报工作即由幽翼接爪。负责内务部之后，他的工作多次受到包括短羽在内的，远在根据地的中央领导同志的一致好评。\n\n§Y备注：这名“红色特务头子”实际上相当和气——如果你不是他和他的组织要除掉的对象的话。他的对于自己工作的座右铭是：对待同志要像春天般的温暖，对待反动派要像严冬一样残酷无情。§!"

###- 理论家 -###
GRW_Codrin_Popescu: "科德林·波佩斯库"
GRW_Codrin_Popescu_desc: "§Y生于：§!962年12月4日；基韦辛公国，基韦辛\n\n§Y背景：§!是的。科德林·波佩斯库同志的右眼是假眼，那是他年轻时作为王家金盾骑士团的一位骑士总管，指挥部下对抗扎菲亚鹫侵袭的结果。\n\n于波佩斯库而言，那次战役的创伤更多是心理的，而非生理的。他至今忘不了，躺在担架上的他挨了一个老妇投来的石子。那老妇站在重甲骑士无法到达的高处厉声叫道：“这天杀的兵灾，你们还是快点死了好。”担架上因伤口发炎而高烧的波佩斯库却牢牢记得这句话。他为“保护”这些百姓而付出了一只眼睛，但百姓并不感激他们，这是为什么？\n\n手术后，金盾骑士团认为他已经不再适合执行军事活动，便安排他退役，在离基韦辛几十里远的乡下休养。出身军事贵族的科德林·波佩斯库在他的鹫生中第一次知道了大米是怎么从稻田里长出来的，又是怎么被地主和商家（借助他们控制的治安队甚至王国军杂牌部队）从农民爪里夺走。但他始终想不明白，为什么百姓不感激他们的守护者，直到他颤栗地在一本书中看到了那个“暴论”：军队是国家和阶级所有的，以维护国家和阶级统治为目的的，有组织的暴力工具。\n\n两年后，在普里文大地上自发游历了两年的科德林·波佩斯库，通过他这两年来的见闻和几十万字的笔记已经确信：现状是不对的，普里文必须要彻底的改变。布罗德费尔德的王国军根本不是在“保护”着他们的国民，而是恰恰相反，是国民在呻吟中供养着这支无能的军队。他开始笨拙而潜心地向农民和劳工学习，向马科思、恩吉尔以及嘶大林的著作学习。989年，科德林·波佩斯库秘密加入了普里文社民工党。他与全世界的暴动领袖、起义亲历者与进步军官通信，也通过军中的旧联系继续关注着军事进展，一套崭新的军事理论正在他的脑海中孵化……\n\n二十年弹指一挥。现在，科德林·波佩斯库同志早已坐稳了民主联军总参谋长的位置，实际上这个位置几乎也没有合格的挑战者。兼任民主联军军事学校校长的波佩斯库同志正在百忙之中继续他的著述。那部题为“鹫民战争”的著作将是他一生心血的结晶，不仅是为了培养民主联军将来的指挥官，更是为了在世界革命军事史的墙壁上，雕刻出一个属于普里文革命的位置。"
GRW_Vasile_Bila: "瓦西里·比拉"
