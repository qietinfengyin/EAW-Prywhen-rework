GRW_brownwater_strategy: "褐水战略"
GRW_brownwater_strategy_desc: "褐水战略，是指利用主要在靠近海岸的大陆架海域活动的海军力量，保卫本国海岸线安全的战略。由于我们的海军基本依赖大陆基地的支持，装备也仅以陆基武器和轻型舰船为主，我们不得不暂时放弃蓝水战略和绿水战略。"
GRW_militia_reserves: "民兵预备役"
GRW_militia_reserves_desc: "现在各地区的革命军事委员会正在将广大的工农阶级武装起来，以确保我们在面临外部威胁时，广大群众能够迅速形成一支强大的后备力量抵抗敌鹫的侵略。"
GRW_promote_political_commissar_system: "推广政委制度"
GRW_promote_political_commissar_system_desc: "其实早在革命战争全面爆发前，政委制度就已经在县大队与工鹫武装中存在雏形，但遗憾的是这一建设在后来的战争中让步于同反动政权做斗争的首要目标。\n而现在随着国内革命形势与社会形势的根本变化，我们现在必须保证解放军始终听命于我们的鹫民政权，而政委制度则是保障这一点的重要方式，虽然我们十分肯定目前由于我军的脱产性质而滋生的原始保守主义与军国主义会阻挠我们的政委制度推广实践，但菲利普同志十分清楚——这是容不得半点讨价还价的事。"
GRW_political_commissar_system: "政委制度"
GRW_political_commissar_system_desc: "政委下连级，党要指挥枪，我们是一支共产主义革命的先锋军！"
GRW_higher_military_academy: "鹫民解放军军事学院"
GRW_higher_military_academy_desc: "鹫民解放军军事学院已经成为培养我们新一代军事领袖的摇篮，每年，一批批忠诚、勇敢、智慧的军事鹫才都会在学院诞生，他们将成为保卫国家、捍卫社会主义事业的坚强盾牌。"
GRW_literacy_campaign: "扫盲运动进行中"
GRW_literacy_campaign_desc: "大量的教育工作者正在深入乡村和城市，为民众提供读写教育与思想指引。夜校、识字班如雨后春笋般涌现。我们希望在扫盲运动中鹫民不仅要学会了读写，还要理解社会主义的理念，最终能成为社会主义建设的坚定支持者。"
GRW_Six_Three_educational_system: "六三学制"
GRW_Six_Three_educational_system_desc: "大量的小鹫已经进入了学校，并开始接受小学初中教育。可以预料到六三学制的顺利实施使得共和国在未来将会涌现出一批批有理想、有道德、有文化、有纪律的青年，他们将肩负着推动共和国进步与繁荣的重任。"
GRW_bandit_hibernation: "匪徒蛰伏"
GRW_bandit_hibernation_desc: ""
GRW_threat_of_banditry_1: "治安问题：癣疥之疾"
GRW_threat_of_banditry_1_desc: "土匪的丧钟已经开始敲响。随着一批大盗要犯的伏法，普里文的治安已经开始显著好转。恶势力仍然在垂死挣扎，但是已经掀不起什么大风大浪。公民们普遍相信，随着治安部门的持续打击，这些匪徒最终也将尽数被扫进历史的垃圾堆里。"
GRW_threat_of_banditry_2: "治安问题：腠理之疾"
GRW_threat_of_banditry_2_desc: "盗匪仍然在严重威胁着普里文的社会秩序。公民出行时需要时刻提防，有村庄会被打秋风的盗匪袭击，间或传来江洋大盗洗劫银行店铺的消息。匪徒往往能搞到残次的军警用品，甚至公开与军警冲突或对峙，这给治安部门造成了不小的压力。"
GRW_threat_of_banditry_3: "治安问题：腹心之疾"
GRW_threat_of_banditry_3_desc: "公权力的崩溃几乎必然地导致了治安的崩溃。现在全国各地都能遇到成百上千的匪徒，他们有的是流民武装，有的纯粹是江洋大盗，有的甚至与反动派渊源不浅。最嚣张的匪帮已经割据一方，成为山大王。如果任由其横行下去，我们的政权有完蛋的危险。"
GRW_power_vacumn: "临时权力真空"
GRW_power_vacumn_desc: ""
GRW_general_tolerance: "普遍宽容"
GRW_general_tolerance_desc: "我们赦免了几乎所有曾经犯下反革命罪行的鹫——这既能彰显我们的大度，又是拉拢中间派分子转向我们的好爪段。显然地，这有利于新生共和国的稳定。"
GRW_farewell_old_welcome_new: "辞旧迎新"
GRW_farewell_old_welcome_new_desc: ""
GRW_cleanse_the_system: "涤尽污垢"
GRW_cleanse_the_system_desc: ""
GRW_state_bureau_of_political_defense_idea: "国家政治保卫局"
GRW_state_bureau_of_political_defense_idea_desc: "全称：革命政治保卫局。下辖有情报、内务防御、特务行动、特工训练与密码部门。是我国地下工作的主体，那里的同志们在国家看不见的战线上一直与反革命势力做着顽强的斗争。"
GRW_controlled_unions: "国家无神论"
GRW_controlled_unions_desc: "宗教被禁止进入公共生活层面，鹫民政府提倡反宗教政策。所有的宗教信仰都将被批判，神职不被社会所承认，也不能发挥任何作用。\n宗教是生灵们的鸦片——马科思"
GRW_free_unions: "信仰自由"
GRW_free_unions_desc: "宗教行为完全与鹫民政府无关，所有的政治团体都不能提倡任何宗教信仰。在此基础上虽然我们不会彻底批倒宗教，但我们可以让无神论的三观在无产阶级中率先推广"
GRW_women_emancipation_idea: "打破性别藩篱"
GRW_women_emancipation_idea_desc: "各级政府正在依照中央命令对各地的重男轻女的思想与行为进行纠正，很多妇女也逐渐参与到生产的道路上来。虽然道路坎坷，但我们相信，妇女撑起半边天的时刻很快就会到来了。"
GRW_women_emancipation_idea_1: "平等的两性权利"
GRW_women_emancipation_idea_1_desc: "两性平等的观念已经被广大鹫民广泛认同，在工厂，军队，政府，妇女工作的身影随处可见。现在，我们能骄傲的宣布：妇女撑起半边天的时代已经到来！"
GRW_current_status_of_agriculture_1: "农业现状：饿殍载道"
GRW_current_status_of_agriculture_1_desc: "在过去的十多年时间里，国家都深陷严重的饥荒之中。而现在由于战乱，粮食问题甚至已经到了这十多年了里最糟糕的地步，在部分地区，同类相食已经从传言变成了事实。"
GRW_current_status_of_agriculture_2: "农业现状：比岁不登"
GRW_current_status_of_agriculture_2_desc: "普里文的农业问题仍然万分棘爪。各地粮价维持在天文数字，狮鹫们普遍食不果腹，吃不饱穿不暖的无产阶级缺乏体力，更罔论生产了。这严重制约了经济的发展。"
GRW_current_status_of_agriculture_3: "农业现状：渐入正轨"
GRW_current_status_of_agriculture_3_desc: "是的，农业现状仍旧艰难，但是我们已经采取了国家级的应对措施，虽然粮食问题仍旧困扰着我们，但是在狮鹫们的百折不挠的毅力下，我们正在回归正轨。"
GRW_current_status_of_agriculture_4: "农业现状：稳步发展"
GRW_current_status_of_agriculture_4_desc: "普里文的饥馑阴霾正加速退散。狮鹫们不再为明日口粮忧心，粮仓渐满，市集谷袋日益鼓胀。田间劳作者褪去绝望，疲惫的翅膀梳理田垄的动作带着笃定——汗水正换来实在的收成。国家政策如犁铧持续深耕，农业如春苗拔节，虽缓却稳，一步一印迈向丰饶。"
GRW_current_status_of_agriculture_5: "农业现状：岁稔年丰"
GRW_current_status_of_agriculture_5_desc: "普里文农业丰收，狮鹫们满心鼓舞，有的已经开始举办庆祝收获的派对，即使是以前的丰年，恐怕在这一盛状面前也黯然失色。"
GRW_unfulfilled_promises_1: "未竟之业"
GRW_unfulfilled_promises_1_desc: "硝烟未散，国家板荡。当下，我们只能勉强维持民众最低的生存保障，关于土地、平等、福利的承诺，此刻只能停留在宣传册和口号上。新解放区的秩序仍在建立，旧世界的阴影尚未完全驱散，反动派在明处或暗处横行，鹫民政权仍然在经受严峻的生存考验。"
GRW_unfulfilled_promises_2_desc: "物力维艰，百端待举。内战结束之后，我们终于能初步伸爪触碰重建的工作。十年前大饥荒的创伤仍然没有完全疗愈，四年来内战的烽火又增添了新的伤痕。土改，扫盲，镇反，集体化与国有化，工业化与现代化……在这片希望的土地上，众多工作等待着我们去开展。"
GRW_unfulfilled_promises_3_desc: "艰苦创业，筚路蓝缕。轰轰烈烈的土地改革，使得千千万万农民第一次真正拥有了自己的土地。扫盲运动初见成效，民众权益得到一定维护。但是，触及根本利益的社会变革仍然阻力重重，分配制度的新尝试也面临效率与公平的难题。复杂的转变正牵扯着巨大的精力。"
GRW_unfulfilled_promises_4_desc: "破旧立新，民生甫安。土地改革基本完成，耕者有其田成为现实，农村面貌一新。基础教育和妇女解放运动深入人心。然而，更完善的福利体系和更精细、公平的产品分配机制仍在艰难构建中。城市工商业的改造与新兴劳工阶级权益的彻底保障，成为摆在面前的新课题。"
GRW_unfulfilled_promises_5_desc: "春风化雨，山乡巨变。土地公有制完全确立，新型的合作社经济开始探索，妇女广泛参与社会生产。基础教育和基本医疗覆盖面显著扩大，初步建立的社会保障网络正在延伸，公平分配的探索取得进展。匮乏与稀缺仍然存在，但社会对新制度的认同感正在增强。"
GRW_unfulfilled_promises_6_desc: "红日初升，大道如砥。土地、教育、民众权利等核心承诺已基本实现其目标框架。全面的温饱已经达成，福利制度覆盖了多数国民，分配机制日渐趋向合理。我们离达到尽善尽美还很遥远，也许永远也达不到尽善尽美的那一天，但是民众已能坚信，我们都将有光明的前途。"
GRW_accomplished_undertaking: "已竟之业"
GRW_accomplished_undertaking_desc: "沧海桑田，理想成真。 革命先辈为之奋斗的理想，已非空中楼阁，而是扎根于这片土地上的坚实制度。学有所教、劳有所得、病有所医、老有所养，从庄严的承诺化为寻常的生活。剥削与压迫的根基已被彻底铲除，公平正义成为社会运行的基石。新生的共和国及其制度，在民众心中铸就了不可撼动的信念，持续迸发着建设更美好未来的磅礴力量。"
GRW_chaotic_monetary_policy_1: "混乱的货币政策"
GRW_chaotic_monetary_policy_1_desc: ""
GRW_chaotic_monetary_policy_2_desc: ""
GRW_foreign_trade_restricted_1: "对外贸易受限"
GRW_foreign_trade_restricted_1_desc: ""
GRW_booming_foreign_trade: "繁荣的出口贸易"
GRW_booming_foreign_trade_desc: ""
GRW_grassroots_democracy_idea: "基层群众自治制度"
GRW_grassroots_democracy_idea_desc: "现在，无论是乡村还是城市，普通民众能够直接参与地方事务的管理和决策，鹫民大众参政议政的积极性已经被调动起来，各种政策也能更好的向基层落实。现在基层群众自治制度已经成为了广大鹫民群众学习民主、实践民主的成本低、效益高的大学校，这也使得我们在社会主义建设道路上迈出了坚实的一步。"
GRW_cradle_to_grave: "从摇篮到坟墓"
GRW_cradle_to_grave_desc: ""
GRW_birthplace_of_revolution_in_southernGriffonia: "社会主义的进步灯塔"
GRW_birthplace_of_revolution_in_southernGriffonia_desc: "普里文共和国是南狮鹫尼亚革命的发源地，是全狮鹫尼亚的先锋，是同天际纳维亚并列的赤红色珍珠。我们的邻国——乃至整个南狮鹫尼亚，都为我们的革命思潮所影响。"
GRW_anti_Prywhen_pact: "反共条约"
GRW_anti_Prywhen_pact_desc: "当缔约国一方遭到[GRW.GetAdjective]进攻时，那么所有成员国都将参战。"
GRW_LUS_cooperation_1: "与普里文合作"
GRW_LUS_cooperation_1_desc: "共产普里文向我们抛出了橄榄枝，我们现在正加强与普里文共和国的合作。相信这对我们两国都有利。"
GRW_LUS_cooperation_2_desc: "红色普里文在我国的影响越来越大，我们的合作也越来越紧密了。这会导致我们的文化风向更加倾向普里文。"
