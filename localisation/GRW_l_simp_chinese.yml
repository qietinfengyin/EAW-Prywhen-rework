#地块修正
GRW_temporary_party_central_headquarters: "党中央临时驻地"
GRW_temporary_party_central_headquarters_desc: "拉里奥斯在战争中几乎没有受到损害。党中央目前在这里办公，团结民主会议也会在这里召开，但城市自身的规模限制，交通的不便与到埃维河经济区域的距离较远，使得党中央不大可能在这里久驻。"
GRW_postwar_recovery_Kivessin: "战后恢复"
GRW_postwar_recovery_Kivessin_desc: "基韦辛经历过惨烈的围城战，街道上几乎处处都是瓦砾，大量居民沦为难民，附近的道路破坏也很严重。作为普里文国家无可替代的首都，这里必须得到重建。"
GRW_postwar_recovery_Sydia: "战后恢复"
GRW_postwar_recovery_Sydia_desc: "西迪亚是最后解放的大城市。虽然守军的抵抗意志薄弱，城市保存得较为完好，但城市内难免还有破坏分子在活动。城市有几百年没有遭受过战争了，安抚受惊的市民仍然是一大重点工作。"
GRW_kingdom_remnant_holdout: "王国残军盘踞"
GRW_kingdom_remnant_holdout_desc: "西迪亚解放后，仍有一部分拒不投降的王国军盘踞在与之隔海相望的盐岛上。这是反动派最后的武装堡垒。只要他们还没有被消灭，西迪亚的安全就无法保证。"
GRW_agri_cooperatives_dynamic_modifier: "农业合作社"
GRW_agri_cooperatives_dynamic_modifier_desc: "在进行土地改革后，我国政府引导鹫民自发地组成土地合作社。合作社通过统一采购、销售和技术服务，降低生产成本，提高农产品附加值，增加了农民收入——简单点说吧，农民们通过集体化劳作，可以抵抗更多天灾，修建更多利于农业的工程，最重要的，彻底摆脱封建的农业生产关系。"
