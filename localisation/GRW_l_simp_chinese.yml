###- 风味事件 -###
GRW_flavor.1.t: "末代皇帝"
GRW_flavor.1.d: "革命卫队在狮鹫海姆的城郊搜到小皇帝时，他已经吓得面色苍白，这让闻讯匆匆赶来的三中队政委科林·短喙想起来几年前亲眼见过的一个画面：当时克洛苏国王在一个多月的公审后被处决，甚至比他更不体面。但现在作为正师级部队的首长，他知道两件事不能混为一谈：克洛苏国王亲自签署过多少屠杀革命同志的命令？而眼前的这个瑟瑟发抖的孩子，就算说能“签署”什么，不过也就是个橡皮图章。\n\n由革命卫队的战士看守，由忠心的仆役（他们暂且被允许这样忠心一时）执行，小皇帝被换洗了一套干净而朴素的新衣物，然后被安排在城内一家空荡荡的贵族宅邸中，等待他接下来的命运。小皇帝大概听他的仆役说过很多次克洛苏国王被公开斩首示众的事情。距离被发现已经过去好几个小时了，现在他的面色仍如纸般惨白，而身边几个老仆低顺的眼睑中似乎也包藏着一种怒火：也许，只要革命者敢对皇帝有什么不敬，他们就会毫不犹豫地挡在前面，哪怕血溅五步。\n\n“军委来电报了！”参谋飞跑进来。\n“怎么讲？”\n“党中央、中央军委、政务院和最高检合署的电报，”参谋解释说，“中央一致认为狮鹫岩家的格罗弗六世不应该被追究任何违法犯罪责任，况且，他是未成年。”\n\n那边皇帝和仆役组成的小集体很明显没有反应过来这是什么意思。科林·短喙轻笑道：“走吧，我的贵族老爷们。中央说你们都是普通公民了——小皇帝想没想过以后怎么办？”他问那孩子。\n\n出乎他的意料，年轻的前皇帝陛下居然表现出与他年纪不符的一种平静与淡定。他清了清因紧张而一度失声的嗓子，说："
GRW_flavor.1.a: "“朕……我对园艺很有兴趣，我想长大以后当个花匠。”"
GRW_flavor.2.t: "《大米略取》"
GRW_flavor.2.d: "最近，红兴同志发表了《大米略取》这一最新著作，红兴以其深邃的政治经济洞察力，为我们展开了一幅关于普里文狮鹫非凡斗争的壮丽画卷。这部作品不仅有着对历史事件的生动叙述，还对党内教条主义、左倾右倾错误思想进行了深刻批判。红兴总结了普里文经验，指出了在埃维地区的资本主义发展不充分，工人阶级的力量尚显薄弱，应先进行新民主主义革命后再向社会主义过渡，形成了一套不同于嘶大林格勒模式的农村包围城市的新型革命路线。\n\n在这本书的后半部分，红兴则描绘了一副充满希望的革命蓝图。深入探讨了加速工业化，基础设施建设，科技创新上的实践方案，同时吸取了嘶大林格勒在农业上的惨痛教训，形成了一套新的农业发展路线，为埃维的未来发展指明了方向。这本书是红兴思想确立的标志，对国际共运产生了巨大影响，为各国革命者提供了新的革命路线和行动指南。"
GRW_flavor.2.a: "红兴，干得漂亮！"
GRW_flavor.3.t: "杂交水稻"
GRW_flavor.3.d: "实验室的灯光在深夜里显得格外刺眼。银穗揉了揉酸胀的眼睛，继续在显微镜下观察着最新一批水稻样本。她的鬃毛已经很久没有打理过了，乱糟糟地垂在额前。实验台上堆满了各种器皿和记录本，角落里还放着已经凉透的晚饭——她又一次忘记了吃饭。“第一百二十七次杂交实验，样本编号A-127...”她一边记录一边喃喃自语，“生长周期缩短了，但抗病性还是不够...”突然，她的笔尖顿住了。显微镜下的样本显示出了不同寻常的特征：叶片细胞壁明显增厚，而且...\n\n“这是...”她猛地站起身，椅子在地上发出刺耳的摩擦声。她几乎是扑向了旁边的样本柜，翻找着之前的记录本。\n\n找到了！三个月前在河谷深处采集的野生稻种样本！\n\n她的蹄有些发抖，小心翼翼地取出那个装着几粒不起眼稻种的玻璃瓶。当时她只是觉得这种野生稻种能在贫瘠的土地上生长很特别，没想到显微镜下，野生稻种的细胞结构与她最新培育的样本惊鹫地相似。更令马振奋的是，这种野生稻种在之前的实验中表现出了极强的抗虫害能力。银穗感觉自己的心跳快得几乎要跳出胸腔。她立刻开始准备新的实验，将这种野生稻种与现有的高产水稻进行杂交。窗外的天色渐渐亮了起来，但她浑然不觉。试管、培养皿、记录本...她的动作越来越快，仿佛有某种力量在推动着她。“银穗老师！”实验室的门突然被推开，她的助手气喘吁吁地冲了进来，“河谷那边...又爆发水稻病了！”\n\n银穗的蹄一抖，差点打翻了培养皿。她抬起头，看到助手脸上满是焦急。“这次比上次更严重，”助手的声音都在发抖，“已经有三块试验田被毁了...”银穗的心沉了下去。她知道这意味着什么：更多的饥荒，更多的痛苦。但她看着显微镜下的样本，突然有了一个大胆的想法。“帮我准备最大的一块试验田，”她说，声音里带着前所未有的坚定，“我要进行大规模种植实验。”“可是...”助手犹豫了，“如果失败了...”“不会失败的。”银穗打断他，“这次一定不会。”她看着显微镜下的样本，仿佛看到了整个普里文的希望。这种新型水稻不仅抗虫害，而且生长周期短，产量高。如果能成功...\n\n三个月后。银穗站在试验田边，看着眼前金灿灿的稻浪。新型水稻不仅成功抵御了水稻病，产量还比普通水稻高出三成。“银穗老师！”远处传来助手的喊声，“农业部的代表来了！他们想见您！”银穗深吸一口气，转身走向实验室。她知道，这只是开始。这种新型水稻将会改变整个普里文的命运，为社会主义建设带来新的希望。在实验室里，她看着显微镜下的水稻细胞，露出了欣慰的笑容。多少个不眠之夜，多少次失败与重来，终于在这一刻得到了回报。"
GRW_flavor.3.a: "就叫你希望一号吧"
GRW_flavor.4.t: "《红星照耀埃维》出版"
GRW_flavor.4.d: "最近，我们的国际友马烁光霜笔所写的《红星照耀埃维》席卷了全球。霜笔是一名在西迪亚工作的马国记者，为了解普里文革命的真实面貌，于1006年6月在索尼娅·齐亚莱娜的帮助下进入苏区，成为了第一位来到白花革命根据地的外国作家。\n\n霜笔先生在白花如愿遇到了红兴，采访持续了很久，接下来霜笔先生还陆续采访了短羽、尖矛、岚翼、裕鲁等共产党领袖和红军将领。在参观了白花，比卡尔，拉里奥斯等革命根据地后，霜笔已不满足于根据地后方，他还坚持到前线去了解红军战士是如何战斗的，为何敢于牺牲，并与士兵们打成一片。\n\n1006年10月，霜笔先生离开了普里文回到小马国后，将自己的所见所闻整理并写成了《红星照耀埃维》，这本书一经发售便畅销全球。在嘶大林格勒和天际纳维亚，这本书一度供不应求，乃至狮鹫帝国和阿奎莱亚这些反动堡垒都有大量进步狮鹫阅读，成功粉碎了反动势力对我们革命事业的谣言和污蔑。而在普里文，这本书被基韦辛政府严禁出版，因此，我们将书名改为《东行漫记》从而悄悄出版了霜笔先生的作品。"
GRW_flavor.4.a: "红星照耀埃维，也必将照耀整个世界！"
GRW_flavor.5.t: "《大米略取》"
GRW_flavor.5.d: "埃维联合社会主义共和国的领导人红兴发表了一本新书《大米略取》，该书讲述了埃维革命的斗争经历和革命路线。在这个变革的时代，随着此书销量日益增长，社会上也出现了很多声音表示担心其会引起我国的左翼思潮。"
GRW_flavor.5.a: "盯紧那帮赤色分子。"

###- 风味新闻 -###
GRW_flavor_news.1.t: "狮鹫尼亚的友谊之光"
GRW_flavor_news.1.d: "[This.GetNewspaperHeader]近日，一本以小马利亚为背景的童话书《友谊的征程》在鹫民中迅速走红，这本书不仅吸引了大量儿童读者，还在成年鹫民中引发了广泛的讨论和共鸣。《友谊的征程》讲述了主角暮光剪剪与朋友们跨越重洋来到狮鹫尼亚通过团结协作帮助狮鹫们化解危机的故事。《友谊的征程》的成功不仅在于其精彩的故事，更在于其巧妙的文化融合。它将小马利亚的友谊魔法与狮鹫尼亚的狮鹫精神相结合，创造出一种全新的叙事方式。这种叙事方式不仅让鹫民们感到亲切，也让他们更容易接受外来的文化理念。\n\n宣传部的文化学者认为，这本书的成功标志着狮鹫尼亚文化正在经历一次重要的转型。随着社会主义建设的深入，鹫民们开始更加开放地接受外来文化，同时也更加注重本土文化的传承与创新。"
GRW_flavor_news.1.a: "给我也来一本"
GRW_flavor_news.2.t: "KARDS卡组掀起狮鹫尼亚文化新浪潮"
GRW_flavor_news.2.d: "[This.GetNewspaperHeader]近日，来自南斑里加的冰龙部落的战略卡牌游戏《KARDS》，凭借独特的机制设计与文化内核在狮鹫尼亚大陆上风靡起来，这款游戏涵盖了从狮鹫帝国征服狮鹫尼亚大陆到风暴大王入侵斑马里加的所有内容，可以说他是第一款融合全大陆战争史的军事卡牌游戏，这款游戏不仅要求玩家在陆、海、空三维战场中争夺阵线控制权，还要求玩家关注卡牌战场动态与进行自身卡组资源管理。被玩家誉为“卡牌界的闪电战模拟器”。此外，卡牌能力如伏击，烟幕，重甲”等，进一步丰富了游玩策略，使每一局对战充满变数。正如某位玩家所言：“在这里，每一张卡牌都是历史的碎片，而每一次出牌，都是对智慧的致敬。”"
GRW_flavor_news.2.a: "为什么这张牌进预备了！可恶！"

