###- 第二阶段事件 -###
GRW_midgame.1.t: "第一届国民代表大会第一次会议"
GRW_midgame.1.d: "埃维联合社会主义共和国第一届全国国民代表大会第一次会议于首都基韦辛隆重召开，代表总鹫数1226鹫，其中除了领导鹫之外，基本上都是来自工农兵三个领域的底层鹫民。\n\n在会上，中央鹫民政府主席菲利普·红兴做开幕致辞，卢西安·金翼作《关于埃维联合社会主义共和国宪法草案的报告》。中央鹫民政府政务院总理若安内尔·短羽作《政府工作报告》。\n\n会议通过了《埃维联合社会主义共和国宪法》，并通过了一系列组织法：《国民代表大会组织法》、《国务院组织法》、《鸳民法院组织法》、《鹫民检察院组织法》。会议还决定选举菲利普·红兴同志为埃维联合社会主义共和国主席，卢西安·金翼同志为副主席。根据红兴同志的提名，决定若安内尔·短羽为埃维联合社会主义共和国国务院总理。\n\n这是我国社会主义革命与建设的伟大胜利，标志上我国广大工农群众真正掌握了国家权力，成为决定自己命运的主鹫。"
GRW_midgame.1.a: "一切权力归于鹫民！"
GRW_midgame.2.t: "第一届国民代表大会第二次会议"
GRW_midgame.2.d: "埃维联合社会主义共和国第一届全国国民代表大会第二次会议于基韦辛召开，代表总鹫数1118鹫。\n\n在会上，利维乌·月喙同志作《关于发展国民经济第一个五年计划的报告》，决定根据嘶大林格勒同志的经验并结合埃维自身国情成立国家计划委员会，并准备施行第一个五年计划，“一五计划”决定大力发展重工业，用以追赶我们和众多资本主义强国的硬实力差距。\n\n杜米特鲁·星尾作了关于农业发展问题的报告，长期以来我国的农业情况都颇为糟糕，普里文王国时期颗粒无收导致的饥荒甚至是常态。普里文鹫民共和国成立之后，通过土地改革，我们得以解决饥荒问题，但这并没有改变土地私有的本质，党中央根据我国农业现实情况，在嘶大林格勒建立农村合作社经验的基础上颁发了一系列的决议，规定了埃维的农业社会主义改造的路线、方针和政策，并成立了普共中央农村工作部，同时任命杜米特鲁·星尾为部长，推广农村合作社运动，彻底改变我国土地私有的现状。"
GRW_midgame.2.a: "向着社会主义社会大踏步前进！"
GRW_midgame.3.t: "第一届国民代表大会第三次会议"
GRW_midgame.3.d: "埃维联合社会主义共和国第一届全国国民代表大会第三次会议于基韦辛召开，代表总鹫数1041鹫。\n\n在会上，星空平等党的领袖里夫、格里菲亚社会民主劳工党的领袖赫鲁晓维奇、格里富斯统一劳工党的领袖安妮拉、卢什绿竿委员会的领袖塔雷丹慷慨陈词，对普里文共产党长期以来的援助表示感谢，并宣布支持普里文共产党的领导，未来也会坚定不移与普里文共产党保持友好、长期、互利共赢的合作。同时，各大民主党派的领袖：索尼娅·齐娅莱娜，马林·达斯卡卢，阿纳托尔·维兰和光波·布鲁诺等均发表讲话，宣布将贯彻长期共存、互相监督的方针，宣布愿意与普里文共产党保持友好关系，继续同普里文共产党站在同一战线，同心同德，艰苦奋斗。\n\n为了协调与各加盟社会主义兄弟党派以及各大民主党派的关系，会议中决定成立“普里文共产党中央委员会统一战线工作部”，负责管理执行普共中央关于统一战线的方针、政策，团结一切可以团结的力量，尽可能地孤立反动派势力。"
GRW_midgame.3.a: "团结起来向自由！"
GRW_midgame.4.t: "第一届国民代表大会第四次会议"
GRW_midgame.4.d: "埃维联合社会主义共和国第一届全国国民代表大会第四次会议于基韦辛召开，代表总鹫数1079鹫。\n\n民族区域自治是钢铁·嘶大林为了实现共产主义想出的解决民族问题的方法，他认为“凡是国内居民生活习惯或民族成分不同的区域，都应当享有广泛的自决和自治，其机构则用普遍、平等、秘密的投票方式来建立。”现在，随着我国领土的扩大，我们决定贯彻嘶大林主义关于民族问题的观点，决定确立并推广民族区域自治制度，在众多新解放的领土设置自治共和国，在这类自治地方设立自治机关，行使自治权，巩固普里文共产党和埃维少数民族之间的政治利益共同体关系，我国国体也由单一制国家开始向着联邦制社会主义共和国过渡。\n\n同时会议中还确立了东交西攻的外交战略，即联合以大江共和国为首的河间同盟，共同对抗反动、腐朽、威胁更大的狮鹫尼亚帝国。虽然我们和大江共和国意识形态上有着巨大的差异，但是目前狮鹫尼亚大陆上狮鹫尼亚帝国妄图“复兴帝国”的野心昭然若揭，我们和河间地必须联合起来共抗强权。"
GRW_midgame.4.a: "以力御暴，对抗帝国"
GRW_midgame.5.t: "第一届国民代表大会第五次会议"
GRW_midgame.5.d: "埃维联合社会主义共和国第一届全国国民代表大会第五次会议于基韦辛召开，会议代表1015鹫。\n\n狮鹫文字常常被鹫诟病过于繁琐，早在普里文革命时期就有许多有识之士认为简化狮鹫文字，普里文鹫民共和国成立后，菲利普·红兴同志发出号召要改革狮鹫文字，力求科学化、国际化、大众化。在这一号召的鼓舞下，“狮鹫文字改革协会”应运而生，在经过数年的呕心沥血之后他们递交上了一份令鹫满意的答卷——《狮鹫文字简化方案》，在以稳定性、实用性、适当的艺术性等原则为基础上大大简化了原本繁琐的狮鹫文字。\n\n在会议上经过讨论，决定通过这一文件，这使得清除文盲和愚昧落后的工作得以更加顺利的推行，广大工农群众也得以更加简洁、便利的方式书写美丽的狮鹫文字。\n\n与此同时，为利于各地交流，会议上还决定统一全国的语言，将这种统一的语言命名为“普通话”，使其成为全国狮鹫的共同语言。但这并不意味着我们就要消灭各地区的特色方言，相反，我们也会充分尊重各地区的本土方言。推广这一官方语言仅仅是为利于不同地区的鹫民交流和更长远的利益。\n\n同时会议根据我国目前落后的科研实力，认为为了尽快在科技上追赶如大江共和国和狮鹫帝国等资本主义强国，我国必须大力发展教育，尤其是高等教育。国家计划委员会已经制定了一系列计划来加速发展我国的教育事业，同时得益于嘶大林格勒和众多新加入的社会主义加盟共和国教育鹫员的帮助，相信在不久的将来我国就能在教育上就能赶上世界。"
GRW_midgame.5.a: "知识可以斩断奴隶的锁链！"
GRW_midgame.6.t: "大会的胜利闭幕"
GRW_midgame.6.d: "“亲爱的列奥尼德……”阿斯帕西娅一回到招待所，就急匆匆写下了信的开头。但她在这里停住了。她的确需要平复一下心情，组织一下语言，才能继续写她想写的那一长串东西。\n\n招待所在古老的埃维利亚娜大神庙斜对面，如果站在那标志性的尖顶上，也许就正好能看到正在三层尽头房间伏案写字的阿斯帕西娅。她的房间不算宽敞，甚至可以称得上是一个堪堪容身的盒子，这个设计方案一度在基韦辛市政系统引起了巨大的争议。时任市长亚历山德鲁·焰尾力排众议，坚持这个方案；直到这次规模前所未有的大会召开，大家这才意识到市长当年的高瞻远瞩。\n\n“……你知道吗？我这一次亲自给新宪法投了票，给新领袖投了票！我当然都是投的赞成，哈哈！”阿斯帕西娅写到这里嘴角上扬了一下，“你能想象吗？！七八年前我还是大字不识一个的乡下小姑娘呢，现在却能坐在首都的大会堂里，决定这个国家的命运——哪怕是很渺小的一票。我当时双爪都在哆嗦，抖得简直比当时给你包扎还厉害！……”\n\n“我见到了红兴主席！”阿斯帕西娅突然感觉鼻子一酸，“他瘦了很多。他很和蔼，跟我说话总带着笑，但他不时咳嗽，听得我心都揪起来了。让我们祝愿他健康长寿吧！也愿你，愿我们连队的大家都健康长寿！……”\n\n信写完了。阿斯帕西娅又取来另一页信纸，这一封要写给妈妈。下面呢，要写给弟弟，要写给村长，还要给列奥尼德买点纪念品……阿斯帕西娅的双颊浮上一抹红晕。这个女战士真诚地希望她的爱情能美满幸福，就正如她期待中这片土地上狮鹫的命运一样。"
GRW_midgame.6.a: "国家还有很多事情要做。"
GRW_midgame.7.t: "军委扩大会议"
GRW_midgame.7.d: "新一届的军委扩大会议召开了，长期以来我们的海空军实力相较陆军都非常薄弱。得益于我们近年来突飞猛进的工业增长，也因为我国专业鹫员的增加，会上决定正式成立埃维联合社会主义共和国的鹫民空军和鹫民海军。\n\n中央已经决定加大在海军方面的投入，争取几年内新下水几辆自主研发的新型军舰，海上的钢铁巨兽将会保卫祖国的领海。\n\n与此同时空军方面的投入也在不断增加，几架自主研发的新型飞机已经做好测试，马上投入生产，钢铁之翼将自由翱翔于祖国的蓝天。\n\n而把视线转向我们一直以来的主力——陆军，在会上，关于陆军未来发展方向军内分为两派，一派认为应该遵循一直以来的传统方式，生成更多便宜实用的装备，武装广大鹫民，动员群众来保卫国家，让鹫民战争的汪洋大海淹没敌军。而另一派则认为时代在改变，我们必须改变一直以来依赖“鹫海战术”的思维方式，而应当注重军队的现代化、信息化，现代战争更加注重质量而非数量，我们必须将我们军队打造成一支现代化精兵。\n\n在会上，两派之间争执不下，互不相让。在经过激烈讨论之后，我们决定采取折中路线，在吸收传统作战的优势的同时，又积极推进军队现代化。这的答案让绝大多数鹫满意。\n\n最终会议在庄严的国歌声中圆满落幕。"
GRW_midgame.7.a: "我们走在强军的大道上！"
