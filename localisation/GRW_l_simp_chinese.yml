###- 总司令 -###
GRW_Sorin_Yuru: "索林·裕鲁"
GRW_Sorin_Yuru_desc: "§Y生于：§!982年“秋天”；布罗德费尔德王国，锋锐森林省\n\n§Y背景：§!索林·裕鲁是家里三个孩子的老三。他所在的族群在锋锐森林省地方统计年鉴上被归为“干民”，据理查德·尖矛同志所说，这个奇怪的称呼的含义是“所有的一切完全被反动派榨干了，再也寻不出一点油水来”。不过索林·裕鲁一家还是要比很多狮鹫好一些的，起码逃过夭折的三个孩子没有一个被卖出去，这得益于家庭的经济基础和上层建筑——索林·裕鲁的父母勤劳且不抽鸦片，所以家里条件好一些；他们心地善良而富有民间智慧，这启发了索林·裕鲁后来走上革命的道路。\n\n索林·裕鲁生命前十五年的记忆就是周而复始地对着那租来的山脊上的三亩薄田。荞麦。荠麦。芋头。要么是深入到山那一边的森林里，砍下柴火来补贴家用。同龄狮鹫发现他很有攀援的天赋，每次比赛爬山，他几乎都是最早登顶的那一个。索林·裕鲁为此很是得意。他很快就会发现他的天赋不仅在这个方面。\n\n水稻枯萎病席卷普里文时，索林·裕鲁的家乡几乎没受到影响，因为这里水土过于恶劣，完全无法种植水稻。但是饥荒的次生灾难还是传导到了这个小村庄，流寇四起，村里陷入了恐慌。索林·裕鲁在同伴的起哄下一时热血上头，跋涉了几十里山路，抵达位于城市里的征兵办公室，告诉一脸困惑的文员说他要拿枪保卫自己的村子。机缘巧合之下，他被分到了理查德·尖矛的部队。矫健的身爪让他多次与死神擦肩而过。在一次遭遇夜袭之时，警觉的索林·裕鲁携带三枚爪榴弹，从一处峭壁迂回到敌军身后，使得他们误以为后续援军已经抵达，成功将其吓跑。战斗英雄得到了少校的器重，理查德·尖矛将这个小鬼留在身边，教他识字、看地图和读马科思。一名红色军官新星由此冉冉升起。\n\n1003年白花起义之后，索林·裕鲁愈发成为一名可以独当一面的将才。1005年末，眼光独到的红兴力排众议，将阻击王国两个军从锋锐森林增援的紧要任务交给了索林·裕鲁，不光是看中他对于当地形势的熟悉，还是因为欣赏他那与理查德·尖矛一脉相承的运动战直觉。索林·裕鲁证明了自己。现在他是赫赫有名的第十三“锋锐”军的军长，并且发誓要在后面的军事实践中进一步建立功勋。"
GRW_Victor_Ignatescu: "维克托·伊格纳泰斯库"
GRW_Victor_Ignatescu_desc: "§Y生于：§!965年11月19日；基韦辛公国，科罗维亚\n\n§Y背景：§!不了解维克托·伊格纳泰斯库同志的狮鹫只知道他是军内的装甲作战的提倡者，由此推导出一个结论：他一定是个夸夸其谈的疯子；普里文这么薄弱的工业底子，哪里能造坦克？如果拿着这个问题去问伊格纳泰斯库，他会笑着告诉你说，早在谢伟良纳革命者用拖拉机改装出第一辆坦克的近十年前，他就在战斗中发明出了“土坦克”。\n\n维克托·伊格纳泰斯库是基韦辛王家军事学院986级的毕业生。在军官家庭出身占绝大多数的同学之中，贫农的儿子维克托是一个异类，而他的毕业去向也是异于大多数同学。他选择前往贫困的比卡尔，之后就突然消失了。实际上，年轻的伊格纳泰斯库少尉当时已经是有两年多党龄的社民工党党员了，而他放弃了自己个鹫的事业前途，选择了组织交给他的任务：与赫利欧斯·龙戈夫的农民武装接触，看看能否使其倒向革命。\n\n在龙戈夫的军中，这名正规军事院校出身的青年军官很受器重，而伊格纳泰斯库也从未自矜于自己的“正规军”身份，而是与农民武装打成一片。在与老兵的交谈中，他得知在攻打王国军火力点的时候，披上湿棉被是一个防弹的好方法。受此启发，伊格纳泰斯库以多层棉被和木桌为材料，做出了第一个“移动防弹堡垒”。后来谢伟良纳红军制造出坦克后，这个发明被更多的党员称为“土坦克”。\n\n也许是由于这一经历，或者更多是来自多年眼见着战士硬顶炮火冲锋的心痛，维克托·伊格纳泰斯库后来十分关心装甲战术的发展。即使在“围剿”形势最恶劣的时候，他仍然在民主联军的临时军事学校里，用着从二手报纸剪贴出来的资料向学员讲述各国发明的最新型坦克，以及研究坦克的战术问题。这名乐观的老党员相信革命总有迈出埃维河谷的那一天，而到那时，埃维狮鹫自己制造的正规坦克将向世界展现革命军队的威力。"
