GRW_midgame.48.t: "铜岭社会党的命运"
GRW_midgame.48.d: "随着我们从狮鹫尼亚帝国的压迫中解放了铜岭，我们也要开始处理当地反动余孽的抵抗运动了。丘希尔的谐律保守党和高吠的国民联盟很明显无法成为我们的合作对象，我们只能对他们进行镇压，旧效忠派也随之被清理了。\n\n唯一值得注意的是罗莎 软毛的铜岭社会党，该党一方面对外宣称是一个社会主义政党，却同时也是旗帜鲜明的反共和主义的政党，推崇所谓的“社会主义君主制”。\n\n这种滑稽的组合，使得社会党显然并非真正的马科思主义政党。尽管我们与他们有诸多矛盾，但是我们两者都希望在铜岭进行社会主义改造，在此等大环境之下，也许后退一步未尝不可？同时我们还可以借此对其成员进行思想改造，让他们接触真正的马科思、嘶大林的学说。但话虽如此，真的值得为一群君主制的鼓吹者而妥协吗？也许直接将其列入非法党派才是最简单合适的做法。"
GRW_midgame.48.a: "我们不会和修正主义者谈判！"
GRW_midgame.48.b: "邀请他们进入政府，并对他们进行思想改造"
GRW_midgame.49.t: "整合冥翎与蔷薇木骑士团"
GRW_midgame.49.d: "无论怎样粉饰都无法改变一个事实：冥翎、蔷薇木两个骑士团就是侵略者的孑遗。众所周知，早在787年门界地区就建立了一个小马国家，但这个国家在格罗弗二世812年的东征中被摧毁了，留下冥翎骑士团与蔷薇木骑士团“拱卫东疆”，实则是一种野蛮的殖民主义。侵略者就是侵略者，任何社会主义者都不该为其辩白。\n\n到了近代，这两个骑士团的命运更让我们触目惊心；尤其是在冥翎骑士团中，极端种族主义者居然一度甚嚣尘上。好在，当我们在政治上摧毁反动派后，便能仔细收拾这两派军事组织了——虽然反动分子不在少数，但这两大骑士团亦非那么不可救药。军委特派团经过考察之后提出了解决方案：将两个骑士团中拥护社会主义的力量选练，成立两个标准化的，归于均为统一领导体系下的师级骑士作战单位，其余成员全部遣散。事实证明，将骑士对封建主的忠诚，转化为战士对共和国的忠诚，这条路走得通。瑟拉齐骑士团就是良好的先例。"
GRW_midgame.49.a: "就这样办。"
GRW_midgame.50.t: "加冕北风神官"
GRW_midgame.50.d: "“我要恭喜您，神官阁下，”若安内尔·短羽对海因里希·暮羽说道，“您即将成为历史上少见的由共和政权加冕的神官，这是一个伟大的先例。”\n海因里希·暮羽自嘲道：“哦。前无古鹫，我也希望后无来者。”\n“您难道不希望神的正义在地上施行吗？”\n“我当然希望，但我担心俗务会损害对三神的虔信，”暮羽眼睑低垂，在胸口画着十字。\n\n若安内尔·短羽似乎在想什么有趣的话题。\n“您曾经说您读过《共产党宣言》，是这本书推动了您的转变？”\n暮羽笑着说：“的确，那本书现在还在我的书架上珍藏着。那是我978年在火车旅行时，有一位陌生狮鹫交给我的。他叫米哈——米哈耶尔——米哈伊尔什么来着？”\n“——喙枯宁。”若安内尔·短羽立即接上了这个名字，“您真幸运，喙枯宁一般不言真名，除非他认为对方值得信任。”\n“哦，他怎么样了？”\n“我说实话，算年纪已经不小了，但其实还活的不错，”短羽的脸上带着一种哭笑不得的表情，“他最近在海外报纸上连发三篇作品，抨击加冕北风神官是社会主义国家的修正主义行为。宣传部的同志很头疼。”\n\n一名礼兵走近他们。“短羽同志。神官阁下。”\n“该走了。”暮羽整理了一下他的冠冕，轻掸袍子上的灰尘。他们就这样向大厅走去。"
GRW_midgame.50.a: ""Habemus Archontem! Habemus Archontem!""
GRW_midgame.8.t: "布罗德费尔德还是赫兹兰？"
GRW_midgame.8.d: "菲利普·红兴看着桌子上的一份份报告，紧紧皱起了眉头，许多地方干部抱怨各地方鹫的口音千奇百怪，有时候仅仅隔着几十里的两个县，鹫民的口音都有着巨大的差异。而绝大多数干部来自像基辛韦、西迪亚这样的大城市，试图让干部们听懂五花八门的狮鹫方言显然不太现实。他在几天前邀请了许多学者讨论在共和国内部选择一种语言作为标准方言，并鼓励狮鹫们学习。当然，他们毕竟不是克洛苏，这个疯子曾规定所有不会布罗菲尔德语的鹫不得进入公共单位工作。\n\n以何种爪段推行的问题解决了，现在的问题是，选择哪一种语言呢？\n\n那天的会议上来自不同地方的代表就这个问题喷出的唾沫星子差点淹了整个会场。有两种语言为大部分鹫所接受：\n\n布罗菲尔德语在王国时期就是官方通用语了，绝大部分生活在城市的鹫都使用这种语言，他自己在过去的几十年中也一直使用着这种语言。选择布罗菲尔德语作为普通话，无疑将减轻干部们的工作负担\n\n另一种则是赫兹兰语，在新生的共和国的国土内，操着这种语言的鹫的数量一点不比说布罗菲尔德语的鹫少。自格罗弗家族建立统治起，赫兹兰语就是狮鹫尼亚帝国的标准语，并伴随着帝国军队的铁蹄征服了一块又一块地区。虽然帝国早已成为一只病鸟，但赫兹兰语在这块大陆的统治地位并没有因这只病鸟而变得岌岌可危。\n\n思考良久之后，红兴决定："
GRW_midgame.8.a: "选择布罗德费尔德语作为共和国的普通话"
GRW_midgame.8.b: "“选择赫兹兰语作为共和国的普通话”"
GRW_midgame.9.t: "故乡"
GRW_midgame.9.d: "戈登·弗罗斯特从轮船上下来时，一个穿着正装的狮鹫走上前来，说到：“这么多年在外漂泊有没有想念埃维的米粉啊？”\n\n弗罗斯特扭头一看，“哈，是埃玛努约尔，没有我的作业让你‘借鉴’你的羽毛早就被老师拔光了！”，弗罗斯特一边说一边紧紧地抱住了自己的同学：“我记得你说想成为知名作家，后来怎么不见咱们的大文豪的作品发表啊？”。“一言难尽，我现在只是一个小公务员而已，倒是我们的大发明家在小马国待了那么久终究还是按捺不住自己的思乡之情了？”埃马努约尔说着拿过了弗罗斯特的行李并搬上了自己的汽车。“东西不少么，SMILE的家伙没有拦着你？”\n\n“还好，过程虽然曲折，但是最终我还是回来了，我爪边有一份详细报告，是关于……”\n\n埃马努约尔摆了摆爪子，然后打开了车门“上车，先去带你吃点好吃的，小马的食物又甜又腻，咱们狮鹫吃多了喙早晚烂掉。”，他又故作神秘地对弗罗斯特说：“有一个神秘的客鹫想见见您。”\n\n汽车缓缓停在了一家餐厅门口，弗罗斯特缓步走进餐厅后，只看见一只狮鹫正在读报“菲利普·红兴同志？”弗罗斯特几乎尖叫出来\n\n红兴笑了笑说到“欢迎你回国啊，弗罗斯特先生。听说小马国的一些报纸把我描绘成了九个爪子三个头的怪物，这个‘怪物’今天来就是为了让咱们的大科学家研究研究，也好为生物学发展做点贡献”，说着，红兴站起身来邀请弗罗斯特坐下\n\n弗罗斯特受宠若惊地说到“能见到大名鼎鼎的红兴同志是我的荣幸！”\n\n“什么话，能见到咱们知名的科学家才是我的荣幸，弗罗斯特先生您主编的《物理学通识》我读过了，可惜我对物理是一窍不通，不过听说这本书在小马国的学术圈引起了不小的轰动？要是我工作再少一半我一定花点时间钻研物理”\n\n“我这次回国前悄悄捎了一点笔记，对于未来的工作也许会有用。”弗罗斯特正说着，服务员端上了这次宴会的第一道菜。红兴笑着说到“一边吃一边谈吧，物理我不如你，但吃饭你不如我。”"
GRW_midgame.9.a: "故乡的味道总是这么让鹫怀念"
GRW_midgame.10.t: "东方外交政策"
GRW_midgame.10.d1: "随着国内局势逐渐安定，我们将目光投向东方。河间地的小马诸国在历史上曾与我们一样，遭受过格罗弗王朝的侵略。然而，狮鹫与小马之间的种族隔阂，使彼此仍存较深戒备；更值得注意的是，在资产阶级统治的河间诸国中，还生活着大量深受压迫与剥削的无产阶级。\n\n政府内部有同志提出，无论是出于地缘政治的需要，还是出于对世界无产阶级解放事业的追求，我们都不应选择与河间地合作，以避免该地区形成一个与我们体量相当、且很可能持反共立场的资本主义国家。但也有同志认为，共同反抗侵略的历史为我们提供了充分的合作基础，外交工作应更多以务实为导向，而不应简单地走向对抗。\n\n外交官们现在站在抉择的十字路口。"
GRW_midgame.10.d2: "随着国内局势逐渐安定，我们将目光投向东方。河间地的小马诸国在历史上曾与我们一样，遭受过格罗弗王朝的侵略。然而，狮鹫与小马之间的种族隔阂，使彼此仍存较深戒备；更值得注意的是，在资产阶级统治的河间诸国中，还生活着大量深受压迫与剥削的无产阶级。河间几个外围国家建立社会主义政权、与中心国家形成微妙对峙的局面，使地区局势更加复杂。\n\n政府内部有同志提出，无论是出于地缘政治的需要，还是出于对世界无产阶级解放事业的追求，我们都应该站在社会主义同志的一边，避免该地区形成一个与我们体量相当、且很可能持反共立场的资本主义国家。但也有同志认为，外交工作应更多以务实为导向；我们不应轻率行动，致使自身在地区局势发生重大改变后陷入被动。\n\n外交官们现在站在抉择的十字路口。"
GRW_midgame.10.d3: "随着国内局势逐渐安定，我们将目光投向东方。河间地的小马诸国在历史上曾与我们一样，遭受过格罗弗王朝的侵略。当下，河间地的心脏拥抱社会主义的新局面，更使得我们完全能够超越狮鹫与小马之间的种族隔阂，开展国际合作。\n\n政府内部一致认为，无论是出于地缘政治的需要，还是出于对世界无产阶级解放事业的追求，我们都应该站在社会主义同志的一边。我们应当积极支持红色盟友，不仅是履行国际主义义务，而且也要为自身争取一个安全的外部环境与战略纵深。\n\n我们外交官的选择毫无疑问。"
GRW_midgame.10.a: "韬光养晦，有所作为。"
GRW_midgame.10.b: "直到把反动派消灭干净！左满舵！"
GRW_midgame.10.c: "站在正义的一方，站在革命的一方！"
GRW_midgame.11.t: "[413.GetCapitalVictoryPointName]的茶歇时分"
GRW_midgame.11.d: "[413.GetCapitalVictoryPointName]城内，由[MCW.GetName]牵头的三方高层会议才刚刚经过了两个小时，除了仪式性的寒暄与介绍，尚未涉及实质性的话题。东道主[ZES.GetName]提议暂时休会，大家享用一些茶点，其余两方的代表欣然应允。\n\n[GetGRWCPGAdvisorName2]发觉，他面前的这盏“茶”，泛着绿色的一道……浓汤？或沉或浮着一些可疑的针叶，气味也不像是可食用之物，反倒让他想起了北方的密林。他抿了一口，感觉极度糟糕。显然厨师已经尽可能在里面放糖了，但这味道本身就不好。\n\n[ZES.GetName]的外交部长很明显察觉到了[GetGRWCPGAdvisorName2]的窘境。她微微一笑，说道：“[GetGRWCPGAdvisorName2]代表先生，这道松针茶，是905年我国遭到入侵时，物资短缺的卡萨军民为了抵抗坏血病而发明的。它是卡萨独立与不屈精神的一种象征。”\n\n[GetGRWCPGAdvisorName2]颔首。“难怪，难怪……”他清清嗓子，“[GRW.GetName]鹫民政府当然会尊重贵国的独立与不屈的伟大精神，这也是我们所追求的重要价值。”一边[MCW.GetName]的代表也在礼貌地微笑着，显然事态也在沿着其预想的方向发展。"
GRW_midgame.11.a: "喝了这盏茶吧，敬独立与不屈！"
GRW_midgame.11.b: "卡萨那边（非诗马领导）的选项"
GRW_midgame.11.c: "卡萨那边（诗马领导）的选项，大意是发出了合作的试探性请求：共同剿灭覆灭的格里富斯骑士团逃到烈火海岸占山为王的余孽，开启骑士团在卡萨的事件链。"
GRW_midgame.12.t: "卡萨的邀请"
GRW_midgame.12.d: "主要内容：女诗马领导的卡萨发出了合作的试探性请求：共同剿灭覆灭的格里富斯骑士团逃到烈火海岸占山为王的余孽，开启骑士团在卡萨的事件链。"
GRW_midgame.12.a: "同意"
GRW_midgame.24.t: "远方的朋友来相会"
GRW_midgame.24.d: "主要内容：埃维方面建议组织一场会议商讨埃维与河间的未来合作事宜，并且打破现在这种不信任的、紧张的关系，我们应该同意吗"
GRW_midgame.24.a: "当然如此。"
GRW_midgame.24.b: "赤匪就是赤匪。"
GRW_midgame.25.t: "河间接受邀约"
GRW_midgame.25.d: "河间方面愉快地接受了我们关于召开双边会议的邀请。\n\n根据双方先期的接触，会议地点选择在河间境内，具体而言，是威腾兰与扎菲亚边界不远处的高鬃城。这一选择不仅节省大量时间和旅途劳顿，释放尊重与让步的信号，更有威腾兰女王本马的考量——这里正是她的家乡。\n\n根据双方的进一步协商，会议将在一周以后召开。"
GRW_midgame.25.a: "那就一周后见啦。"
GRW_midgame.26.t: "河间拒绝邀约"
GRW_midgame.26.d: "河间方面严厉地拒绝了我们关于召开双边会议的邀请。\n\n河间方面声称，基于国家安全考虑和意识形态渗透风险，对方认为在当前条件下，双方缺乏战略互信，且并没有展开平等互惠合作的基础。也就是说，对方不留情面地拒绝了我方抛出的橄榄枝。\n\n虽然这让我们外交战线的同志颇为伤心，但好在对方还算比较克制，保持了基本的外交礼仪。长期来看，两国之间的关系转变还是有可能的。"
GRW_midgame.26.a: "现在要相信后人的智慧啰……"
GRW_midgame.27.t: "高鬃城会议"
GRW_midgame.27.d: "我们，[ROOT.GetName]的全权代表，与河间同盟的全权代表，鉴于双方人民在历史上曾共同遭受狮鹫尼亚帝国侵略与压迫的苦难经历；认识到尊重各国民众自主选择发展道路之权利的重要性，及维持东方地区和平、稳定与繁荣的共同愿望；本着平等互利、相互尊重主权和领土完整、互不干涉内政之原则；经过友好且富有建设性的会谈，双方达成以下共识：\n\n缔约双方郑重承诺，彼此互视为友好国家，在任何情况下均不得直接或间接使用武力或以武力相威胁侵犯对方。任何一方承诺不与第三国签订任何旨在反对另一方之同盟或协定。……\n双方同意在平等互利的基础上，大力发展双边贸易关系。……旨在造福双方全体民众，并充分尊重各国的国内经济法规与秩序。\n……双方重申，每个国家均有权根据其本国之国情与民众意愿，独立自主地选择其社会制度、发展道路与治理模式。……\n双方确认，复兴并日益具有侵略性的狮鹫尼亚帝国是当前地区和平与安全的最大威胁。……\n\n本共识自签署之日起生效。本共识之解释与执行中产生的任何分歧，应由双方通过友好协商与外交渠道解决。\n\n兹此为证，下列全权代表经各自政府正式授权，在本共识上签字盖章，以昭信守。"
GRW_midgame.27.a: "[ROOT.GetName] 全权代表：[GetGRWCPGAdvisorName2]（签字）"
GRW_midgame.27.b: "[ROOT.GetName] 全权代表：[ROOT.GetLeader]（签字）"
GRW_midgame.28.t: "河间断交"
GRW_midgame.28.d: "在与河间的关系发生重大变动之后，河间方面已经通过正式渠道向我方发出照会，宣布废除所有与我鹫民政府达成的双边协议，撤回一切在埃维的投资，并取消所有的和平承诺。\n\n即使仅仅从经济角度考虑，河间也是狮鹫尼亚大陆上一个相当重要的经济体。然而后患远不止于此。历史上河间与埃维两大文化区之间也并非相安无事，双方交恶必定导致扎菲亚与威腾兰之间的边境剑拔弩张。另外，卡萨、东鹿地等地区势必亦收到波及。\n\n也许意义更深远的是，双方之间达成的，象征狮鹫尼亚两大边缘文化区共同对抗中心威胁的同盟毁于一旦。这很可能加深双方的不信任感，并进一步导致狮鹫与小马之间的族群对立。"
GRW_midgame.28.a: "他们难道有信心再射死第二个格罗弗吗？"
GRW_midgame.29.t: "艾宛角纪念碑落成仪式"
GRW_midgame.29.d1: "这座巍峨的和平纪念碑，由两国各自提供的成吨钢铁铸成，被安放在艾宛角的市中心。纪念碑采用了极其大胆的未来主义风格，艺术家斧斫出相当抽象的曲线。也许，形状应该被解读为蹄铁与翅膀的变形与融合，象征两个族裔之间的交流与碰撞；又或许，那狰狞锋锐的钢铁结构，如同冻结于一瞬间的焰火，是在隐喻曾经的历史伤痕矢志不忘，而后代选择将其封存。无论如何，雕塑家宣称不垄断解释；而双方的代表视察小样时均不予置评，只是交换了雪茄，而后双双同意了方案。\n\n如今，纪念碑已然落成，但其引发的讨论从未停止。市民们称之为“那一坨铁水”。乐观者在扭曲的结构中看到了向上的翅膀，认为它预示着走出伤痛的未来；而那些伤痕未愈者，则依旧将其视为一道狰狞的警告，提醒人们勿忘火焰与掠夺的过去。这座纪念碑究竟是一个时代的终结，还是另一个更复杂时代的开始，取决于你问的是谁。\n\n至少在普里文狮鹫看来，他们为一桩古老的暴行定了性，这就足矣。"
GRW_midgame.29.d2: "这座巍峨的和平纪念碑，由两国各自提供的成吨钢铁铸成，被安放在艾宛角的市中心。纪念碑采用了极其大胆的未来主义风格，艺术家斧斫出相当抽象的曲线。也许，形状应该被解读为蹄铁与翅膀的变形与融合，象征两个族裔之间的交流与碰撞；又或许，那狰狞锋锐的钢铁结构，如同冻结于一瞬间的焰火，是在隐喻曾经的历史伤痕矢志不忘，而后代选择将其封存。无论如何，雕塑家宣称不垄断解释；而双方的代表视察小样时均不予置评，只是交换了雪茄，而后双双同意了方案。\n\n如今，纪念碑已然落成，但其引发的讨论从未停止。市民们称之为“那一坨铁水”。乐观者在扭曲的结构中看到了向上的翅膀，认为它预示着走出伤痛的未来；而那些伤痕未愈者，则依旧将其视为一道狰狞的警告，提醒人们勿忘火焰与掠夺的过去。这座纪念碑究竟是一个时代的终结，还是另一个更复杂时代的开始，取决于你问的是谁。\n\n至少在威腾兰小马看来，他们得到了一个暴行的承认与纪念，这就足矣。"
GRW_midgame.29.a: "铭记历史，开创未来。"
GRW_midgame.29.b: "铭记历史，开创未来。"
GRW_midgame.30.t: "[GRW.GetName]请求我国加入对河间的禁运之中"
GRW_midgame.30.d: "主要内容：[GRW.GetName]发布了一项对河间的贸易禁令，现在他们派使者来请求我国加入对河间的禁运之中"
GRW_midgame.30.a: "同意"
GRW_midgame.30.b: "拒绝"
GRW_midgame.31.t: "境外势力"
GRW_midgame.31.d: "主要内容：（完成河间对应间谍国策树后触发）我国的执法部门近日发现了境外势力与本国社会主义组织联系的迹象。如果我们不采取行动，我们将可能面对红色革命。"
GRW_midgame.31.a: "已阅"
GRW_midgame.32.t: "行动大获成功"
GRW_midgame.32.d: "本次渗透计划进行得十分顺利，我们派去的骨干进一步培育壮大了[FROM.FROM.GetAdjective]地区的政党组织。\n\n河间的意识形态十分复杂。我们的骨干努力让当地的劳工阶级明白，那一大堆名称花里胡哨的党派，像是什么共和派啦，保皇派啦，君主立宪派啦，统统是无产阶级的死敌，只有一个政党是革命的、坚定不移的、与反动派作斗争的——那就是共产党。河间的小马、狮鹫、钻石犬等不同种族的居民已经受够了压迫和战争，他们对我们党的宣传政策很有兴趣，因此纷纷响应我党，我们意识到时机已到，因此采取了行动。\n\n行动进行得十分顺利，[FROM.FROM.GetAdjective]居民大多更加认同我党的宣传政策，很多居民纷纷找到我们的骨干，表示愿意为共产主义事业贡献自己的一份力量。"
GRW_midgame.32.a: "干的漂亮，现在让我们一鼓作气，同志！"
GRW_midgame.33.t: "行动效果一般"
GRW_midgame.33.d: "本次渗透计划进行得不甚顺利，我们派去的骨干试图在[FROM.FROM.GetAdjective]宣传共产主义，但反响平平。\n\n河间的意识形态十分复杂。我们的骨干应该让[FROM.FROM.GetAdjective]的劳工阶级明白，那一大堆名称花里胡哨的党派，像是什么共和派啦，保皇派啦，君主立宪派啦，统统是无产阶级的死敌，只有一个政党是革命的、坚定不移的、与反动派作斗争的——那就是共产党。虽然河间的小马、狮鹫、钻石犬等不同种族的居民受够了压迫和战争，但我们党的宣传政策似乎只鼓动起了一些机会主义分子和失意者。这将给之后的党组织建设带来一定困难。\n\n行动进行得不太顺利，当地只有部分居民认同了我党的宣传政策和思想。[FROM.FROM.GetAdjective]的党组织在发展，但也仅仅是在发展而已。"
GRW_midgame.33.a: "已阅"
GRW_midgame.34.t: "行动效果不佳"
GRW_midgame.34.d: "本次渗透计划执行组成员被迫铩羽而归，我们派去[FROM.FROM.GetAdjective]的骨干在尝试后发现几乎无法开展工作。\n\n河间的意识形态十分复杂。我们的骨干应该让当地的劳工阶级明白，那一大堆名称花里胡哨的党派，像是什么共和派啦，保皇派啦，君主立宪派啦，统统是无产阶级的死敌，只有一个政党是革命的、坚定不移的、与反动派作斗争的——那就是共产党。河间的小马、狮鹫、钻石犬等不同种族的居民虽然受够了压迫和战争，但对我们党的宣传政策似乎完全没有兴趣。也许是当地群众还被谐律主义者的假面具蒙蔽着，也许是我们的干部自身修养还不够足，但无论怎样，当地反动派统治仍然稳固。\n\n行动完全失败了，[FROM.FROM.GetAdjective]几乎没有居民认同我党的宣传政策和思想。"
GRW_midgame.34.a: "我们失败了，但是不要气馁，让我们再来一次。"
GRW_midgame.35.t: "相关骨干被逮捕"
GRW_midgame.35.d: "本次渗透计划遭遇重大挫折，我们派往[FROM.FROM.GetAdjective]地区的宣传骨干不幸被捕。\n\n河间的意识形态十分复杂。我们的骨干应该让当地的劳工阶级明白，那一大堆名称花里胡哨的党派，像是什么共和派啦，保皇派啦，君主立宪派啦，统统是无产阶级的死敌，只有一个政党是革命的、坚定不移的、与反动派作斗争的——那就是共产党。然而，正当我们的工作刚刚触及核心群体时，骨干成员的身份与行踪已然暴露。河间的小马、狮鹫、钻石犬等不同种族的居民尽管受够了压迫和战争，但在反动当局的高压与白色恐怖下，我们不仅难以有效传达我党的政策，更使同志们身陷囹圄。\n\n行动遭致彻底失败。[FROM.FROM.GetAdjective]反动政权正利用此次逮捕大肆渲染，污蔑我党为“外部颠覆势力”，这不仅使现有的组织网络面临被破坏的严重风险，更让未来的工作陷入极其被动的局面。我们损失了一批宝贵的、富有经验的同志，[FROM.FROM.GetAdjective]地区的革命事业遭受沉重打击。"
GRW_midgame.35.a: "惨痛的教训，但我们不会放弃。"
GRW_midgame.36.t: "[FROM.GetAdjective]邀请我们加入河间大革命"
GRW_midgame.36.d: "主要内容：[FROM.GetAdjective]正在筹划河间大革命，来邀请我们加入他们"
GRW_midgame.36.a: "同意"
GRW_midgame.36.b: "拒绝"
GRW_midgame.37.t: "[FROM.GetAdjective]同意配合"
GRW_midgame.37.d: "来自[FROM.GetAdjective]的鸡毛信穿过一个又一个安全屋，最后成功抵达[ROOT.GetName]的控制区。信中，[FROM.GetAdjective]的社会主义者的领袖热情洋溢地褒扬了我们的国际主义信义，并欣然应许我们支援他们的行动。\n\n既然受苦受难的同志们发出了请求，那么，是时候派出军事顾问去支援他们了。狮鹫尼亚的解放事业又将向前迈进一大步。同志们，出发吧！为了红色的狮鹫尼亚！"
GRW_midgame.37.a: "雄赳赳，气昂昂。我们来了！"
GRW_midgame.38.t: "[FROM.GetAdjective]拒绝配合"
GRW_midgame.38.d: "来自[FROM.GetAdjective]的鸡毛信穿过一个又一个安全屋，最后成功抵达[ROOT.GetName]的控制区。信中，[FROM.GetAdjective]的社会主义者的领袖谨慎地传达了他们的理解与感谢，但鉴于“无产阶级应当自我解放”“别国同志开展工作恐有困难”等理由，他们拒绝了我们的好意。话虽冠冕，事则意外。\n\n那里的同志们似乎很有信心能够靠自己的力量解放河间地！我们热情洋溢的志愿者去不成了。可这是为什么呢？"
GRW_midgame.38.a: "见鬼了……"
GRW_midgame.39.t: "河间大革命胜利"
GRW_midgame.39.d: "红旗在最后一个河间国家的土地上升起，这场席卷整个河间地区的、史无前例的大革命以无产阶级的完全胜利告终。新成立的[RCT.GetName]政府向世界宣布：东狮鹫尼亚万千被压迫与被剥削的生灵，从宁部西亚的黑劳士到钻石山的奴隶，从江源城的劳工到威滕堡的农民，自此站起来了。一个崭新的河间屹立于世。\n\n[GRW.GetLeader]第一时间承认了这个新国家，并向对方发出了祝贺。建立外交关系的磋商正在进行，而经济部门的官僚已经开始兴奋地擘画着广泛的经济合作蓝图，军方则在商讨边防部队的新一步调动。无论如何，邻国革命的胜利对我们来说绝对是一个可喜可贺的消息。"
GRW_midgame.39.a: "我已经迫不及待想去威腾兰度假啦！"
GRW_midgame.40.t: "河间大革命失败"
GRW_midgame.40.d: "最后一支打着红旗的起义军走出堡垒向政府军投降，这场席卷整个河间地区的、史无前例的大革命以失败告终。从宁部西亚的黑劳士到钻石山的奴隶，从江源城的劳工到威滕堡的农民，前所未有的乌云笼罩着东狮鹫尼亚万千被压迫与被剥削的生灵。谐律情报局正在全境范围内反攻倒算，疯狂寻找所有逃之夭夭的“激进分子”。\n\n在[GRW.GetName]国内，河间革命失败也引起了不小的动荡。相当多的流亡革命者穿越了威腾兰—格里菲亚的边界线，或是经安之地这样的第三国港口中转来到我国，请求政治庇护；部分极端激进分子甚至在街头演讲鼓动热血青年，号召他们组建一支社会主义的十字军，打回老家去。内卫部门现在正在焦头烂额地收拾局面，而其他部门官僚的脸色普遍也不好看。对于一个挫败了革命的河间，在短期内，其反共的意愿是不可估量的。"
GRW_midgame.40.a: "太压抑了，河间小马的血都白流了。"
GRW_midgame.13.t: "第二届国民代表大会"
GRW_midgame.13.d: "列奥尼德·长羽觉得这几天过得好不真实。当他真正来首都报到的时候，他才发现整个解放军代表团居然只有他和阿斯帕西娅这一对情侣。这下好了，整个代表团都要拿他们寻开心。不过他也充满了骄傲；他已经想好，多年以后面对他的孙辈，他要说：你们的爷爷奶奶（外公外婆）当年去开第二届国民大会的时候，全国的几千名代表可都羡慕我们这一对神仙眷侣呢！\n\n几天下来，他算是体会到之前阿斯帕西娅到基韦辛开会时那种晕晕乎乎的感觉了。红兴主席像照片上一样和蔼，但似乎更瘦了；繁星皎皎同志烟瘾极大，她的座位上总是烟雾缭绕，这对于一名雌驹来讲颇为奇怪；里夫同志开会时强迫症很严重，不时调整着遮他那只废眼睛的眼罩，似乎忘了自己还坐在主席台上；米哈伊尔·喙枯宁无数次宣称要发言批判帝国主义，但因为只是列席旁听，总被制止……这些狮鹫尼亚大陆的风云人物就这样在他眼前活蹦乱跳，这怎能不让他感觉飘飘然呢？\n\n无论如何，长羽自认为他作为一个代表的履职工作还不错。会前，他向解放军代表团提交了一份关于下乡扫盲——他的本职工作——的详尽报告。在最后形成的大会报告之中，红兴主席用一个整章节阐述了扫盲工作的成绩与今后的相关方针政策，他确信这其中也有他的一份力，所以颇为得意。阿斯帕西娅写的东西是关于军民融合医疗的，在当前医保制度草创的背景下，她自然也有她的贡献。\n\n现在，随着大会闭幕式进行到最后一项，《国际歌》的前奏响起了。同这会堂中的几千名代表以及受邀出席的国际嘉宾——包括阿斯皮尔·镰爪、亚历山德拉·德西厄、安东尼奥·普罗莱塔里奥、利斯威拉德，甚至是来自嘶大林格勒的嘉宾，玛莎·诺鲁什金娜将军——一道，列奥尼德·长羽站了起来。不假思索，那熟悉的词曲自然从胸膛流淌而出："
GRW_midgame.13.a: "“起来，饥寒交迫的奴隶……”"
GRW_midgame.14.t: "来自[FROM.GetAdjective]的邀请"
GRW_midgame.14.d: "[FROM.GetAdjective]邀请我们加入他们的阵营，我们应该同意吗？"
GRW_midgame.14.a: "何乐而不为？"
GRW_midgame.15.t: "[FROM.GetAdjective]同意了"
GRW_midgame.15.d: "[FROM.GetAdjective]的同志在深思熟虑之后同意了我们的邀请，我们的联盟更加壮大了。"
GRW_midgame.15.a: "让我们在风暴中同舟并济！"
GRW_midgame.16.t: "与河间的关系"
GRW_midgame.16.d1: "风云变幻，时代更新，革命的势力不断增长。狮鹫尼亚的红旗虽已升起，却引起了河间地小马们的警惕与不安。面对这个新局面，我们必须做出决断：是寻求与他们和平共处、互利合作，还是坚定不移地将革命浪潮推向河间地区，支持那里的同志争取解放？"
GRW_midgame.16.d2: "风云变幻，时代更新，革命的势力不断增长。狮鹫尼亚的红旗已然升起，河间地小马也走上了社会主义道路。面对这个新局面，同为社会主义阵营中的革命同志，我们，[GRW.GetName]的革命者的决断自然不言而喻。"
GRW_midgame.16.a: "与河间地小马合作依旧是利大于弊。"
GRW_midgame.16.b: "河间竖子不足为谋。"
GRW_midgame.16.c: "我们将与河间的同志们合作。"
GRW_midgame.17.t: "海军建成"
GRW_midgame.17.d: "新式的战舰缓缓驶入西迪亚港口，这是嘶大林格勒同志的援助！自此之后，共和国将摆脱原本水上力量薄弱的窘境，向海军强国大踏步进军！"
GRW_midgame.17.a: "驾驭蓝海的坚实一步！"
GRW_midgame.18.t: "清剿海盗"
GRW_midgame.18.d: "随着共和国的领土不断扩张，鹫民共和国的海岸线也大大延长了——这带来了新的麻烦，海盗问题愈发严重，连迈耶的海军都时不时来抢我们一把。幸好在嘶大林格勒的援助下，我们有了一支足以守护领海的刚刚起步的海军。同志们，去为我们的运输船护航吧！"
GRW_midgame.18.a: "我们将掌控大海！"
GRW_midgame.19.t: "解放军未来改革方向"
GRW_midgame.19.d: "我们是一只久经考验的无产阶级武装，我们不仅在思想上与旧军队截然不同，物质基础与性质也是如此！我们的军队军民关系和睦；我们的军队不会给生灵带来兵灾，我们官兵平等，吃住同等，八小时训练和参加生产，八小时自由时间，八小时睡眠。\n\n而现在，我们要在保留革命军队传统的前提下进行军队现代化。这就使得我们需要更多的鹫力和物力，但这一切都将只会是短痛，我们的联盟的生产力正在空前发展，相信不久后——一颗共产主义的赤色红星将辐射全世界！"
GRW_midgame.19.a: "好极了"
GRW_midgame.20.t: "一个时代的落幕"
GRW_midgame.20.d: "红兴有时会在工作间隙，靠在椅背上苦笑。他清楚明白自己不过是肉体凡胎，他也会生病，也会变老，终有一天也会死去。他还记得宣布埃维社会主义联盟成立的那天，党内和统一战线中的不少狮鹫都向他说着多少带点肉麻的话，而他自己也感觉十分的得意。但就在那一天晚上，在办公室里凝视着埃维的地图时，他又一次咯血了。血在那地图上洇染了一片，很是难看，后来秘书只能把地图换掉。又有一次，医生劝他立刻放下工作，去嘶大林格勒检查病情，他不肯。直到后来基韦辛的医院进口了X光机，医生才发现他的一片肺叶几乎已经完全烂了……\n\n也许是时候休息了。红兴的床头除了书籍之外，还摆放着一样东西：全家福。那是三十多年前，他动身前往阿奎莱亚前，在当时特维特唯一的照相馆拍的。三十多年来，红兴与他的父母只见过两三次面，甚至在大饥荒到革命胜利后的十多年里没有联系，直到革命胜利后，红兴才又一次得到了故乡的消息。父亲已经无疾而终，而母亲仍然健在。他谈不上有多难过，但是几十年来一直萦绕着他的对家乡的思念，似乎因这个消息而愈发强烈。“是时候了。”红兴又一次擦拭着这张相片，对自己说。\n\n在最近的一次政治局会议上，红兴明确表示自己将会在不久的将来退休，理由是不断恶化的身体状况以及……..他还想在有生之年多陪陪母亲。政治局的委员们均表示理解支持。很快，下一次中央工作会议上宣布了菲利普·红兴同志正式辞去职务的消息，而根据宪法，卢西安·金翼副主席将自动继任主席职位。\n\n没有专列，没有护卫，红兴只提了一个小小的公文包，乘坐夜班火车回到了故乡特维特。他确信他只告诉过家里，但当他下火车的时候，却还是惊讶地发现火车站口挤满了密密麻麻的百姓。黑暗中，他们如铜墙铁壁一般，把站口围得水泄不通。红兴只得清一清嗓子向百姓们宣告：“乡亲们，麻烦让一让……”"
GRW_midgame.20.a: "“我妈妈还在家等我，我不想让她等太久……”"
GRW_midgame.21.t: "选择是否进行世界革命"
GRW_midgame.21.d: "深夜，基韦辛某地下革命军事指挥所\n\n金翼其实很清楚，他可以选拖几周，几个月，乃至几年，但是世界革命这个十分沉重的决策，以及联盟内因此出现的两大对立群体，主战和主和彼此间争论不休，再加上作为共产主义者所肩负的使命，还是让他决定在这个毫不起眼的时间和地点，召集全体高级同志开这次至关重要的会议。\n\n会议气氛时而沉重时而严肃，房间中烟雾缭绕，外面的秘书也在忙前忙后，一切在昏暗的吊灯下都显得像是一场地下牌赌。\n\n这次是关于“选择是否进行世界革命问题”的最后一次内部扩大会议，在昼夜不分的紧张讨论后，全体投票表决结果是……"
GRW_midgame.21.a: "主和派多数"
GRW_midgame.21.b: "主战派多数"
GRW_midgame.22.t: "红日西沉"
GRW_midgame.22.d: "基韦辛，永远那么迷鹫，那么宁静。西边的太阳就要落山了，普鲁特河静悄悄。尽管无法一赏红日落于河面的美景，红兴还是无比愉悦于波光粼粼的河面和拂面而来的清风。若安内尔·短羽爪中挽着菲利普·红兴的大衣，背身伫立在主席身旁，凝视着落日。\n\n“主席可真是好雅兴啊，”短羽语气中带着一丝戏谑，“放下狮鹫岩的同志们不管，回家来休息了。”短羽难以掩饰言语中的笑意。\n\n红兴猛吸了一口烟，起身欲站，忽又猛地咳嗽一声。长时间为国为民鞠躬尽瘁使可怜的红兴主席未老先衰。红兴招招爪，大笑起来，短羽也被他感染，笑声随余晖荡漾。\n\n“短羽同志，”红兴顺势又躺回太师椅上，“这几年，真像是一场梦呦……”\n\n“是啊，主席，”短羽转过身来附和，“从普里文这么小的地方打到整个狮鹫尼亚，历史上没有这种鹫的哦！”\n\n红兴闭上眼睛。这一路来的痛苦与喜悦，难以言说。他的眼前闪过了白花起义，埃维战争，赫兹兰战役，所有他爱的，他恨的鹫，以及他心心念念的——鹫民。\n\n“主席，晚上风大，穿上衣服吧”短羽将大衣递过去。\n\n红兴重新划火柴，又点了一支烟，“世界是我们的，也是年轻鹫的，”红兴向短羽示意，一飞冲天，“但是呦，归根结底是年轻鹫的。”两鹫谈笑间已飞了近十米，普鲁特河美景一览无余。\n\n“所以说，有你特别爱说的那句话吗，主席”短羽开口。\n\n“嗯。鹫民万岁！”\n\n“鹫民万岁！”\n\n两鹫的声音穿透淡淡的紫色薄雾。暮色苍茫，暮光闪烁，马上就要入夜。而在这安详静谧的夜中，蕴含着无比温柔而壮丽的黎明——一如狮鹫尼亚的未来。"
GRW_midgame.22.a: "保持乐观的心态，相信生活的美好，要知道，革命是无往不胜的！"
