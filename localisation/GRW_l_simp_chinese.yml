GRW_JER_autonomous_region: "阿奎莱亚社会主义自治共和国"
GRW_JER_autonomous_region_desc: "由工党领导下的阿奎莱亚社会主义自治共和国是阿奎莱亚两次革命的继承者，社会主义者团结了共和党与谐律主义者，在鹫民阵线模式下推进由工会主导政治的新体制。由工鹫民兵保卫的共和国将保证革命再也不会被任何暴君镇压。"
