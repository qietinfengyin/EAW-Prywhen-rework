GRW_Snowbunny: "雪兔同志"
GRW_Snowbunny_desc: "§Y生于：§!961年11月27日；水乡城郊森林\n\n§Y背景：§!兔子，作为未开智物种，往往生活在森林之中，而雪兔则是一个例外，他罕见地拥有着智慧 ，这使他于14岁主动离开了森林家园，前往狮鹫帝国首都狮鹫海姆。在那里，他了解到了飞机这一发明，并对其极度着迷，因此雪兔主动报名加入了新兴的帝国空军，凭借着体型优势学习并成为一名飞机维修员。然而，他内心渴望翱翔蓝天，工作之余不断向狮鹫飞行员请教驾驶技术和飞行技巧。\n\n在狮鹫海姆的三年间，这座金碧辉煌大都会里的贫富差距，奢靡的贵族皇室与困顿的工鹫、流浪汉形成鲜明对比，这一切都深深触动了他。偶然间，雪兔发现了一个社会主义俱乐部，由此接触了马科思主义，并迅速被这一新思想吸引。\n\n978年共和革命爆发，雪兔毅然加入共和空军。但次年革命的失败，使他被迫跟随迈耶流亡豪克兰，可迈耶随后背弃共和理想，并建立起专制统治，令雪兔深感失望。在豪克兰，他秘密搜集材料，耗费五年时间，终于在夜间组装出一架简陋的小型飞机，实现了飞翔的梦想。\n\n995年，谢韦良纳的冬季革命重新点燃了他的革命热情。得知革命胜利后，他立即驾驶自制的飞机，趁夜色叛逃至嘶大林格勒，并加入了嘶大林格勒空军。在其帮助下，雪兔完善了自己的飞机，还在彼得蹄空军学院系统学习了先进的空军作战理论。\n\n而在普里文革命胜利后，深受国际主义感召，雪兔同志作为志愿者，带着自己的飞机奔赴普里文，决心为那里的空军建设贡献力量。"
GRW_golden_sands: "金沙"
GRW_golden_sands_desc: "§Y生于：§!975年；小马利亚，马哈顿\n\n§Y背景：§!金沙，原名“翠绿微光”，是一名出生于马哈顿的独角兽，幼时的她就读于天才独角兽学院。在学校里她是拔尖的那批马，很多马觉得她一定会在魔法上深有造诣。但随着年龄的增长，她对魔法的兴趣开始慢慢转移到“科技”上。她开始以病态的热情投身于科研工作，并着手建立属于自己的实验室，她也因此获得了自己的可爱标志——一个原子符号。\n起初，虽然大家对此感到异常，但也没有表现出反对的迹象，直到995年，她发表了一篇名为《关于是否存在完美的生物》的文章，在其中她直言不讳的表示一切所谓的上帝都是无稽之谈，同时宣称大量证据表明“两公主并没有升降日月的能力，这是一个骗局”。这篇文章一经发表立刻引起轩然大波，尤其当时北方谢伟良纳的共产党活动频繁，因此她被打打上了“赤匪”的名号并送进了新查努斯克的监狱，她的实验室也被强制关闭。但冬季革命拯救了她，监狱中的她被共产党马救出，她也加入了钢铁·嘶大林的革命势力，在政府中作为一名文职马员。革命结束后，她系统地学习了马科思主义理论，深受启发，认定“只有在社会主义制度之下科学界才能蓬勃发展，而与此对应只有大力发展科技才能实现共产主义。”\n之后的她长期在嘶大林格勒居住，在此期间她取了新的名字“金沙”，寓意为沙子虽小但聚集起来能发出金子般的光芒。她原本想要帮助嘶大林格勒政府的重建工作，但阿尔季姬娅的软弱让她恼火不已，之后因党内分裂而造成的争吵更是让她大失所望，与其他马不同，金沙作为一名革命者的同时还是一位科学家，她认为政府稳定下来之后必须重视科技的发展，而不是在这里无休止的内讧。\n普里文革命爆发之后，或许是因为无产阶级国际主义，她来到了普里文。很快她因自己的知识的广博而备受尊敬，因此她被调配到教育部门，她也可以大展拳脚。她经常只身前往落后地区来亲自进行扫盲工作，有时遇到迷信的狮鹫她会直接用蹄枪强迫对方进行学习。而遇到宗教团体成员，她就会立刻下令处决，这种强硬的蹄段虽然鲁莽但也确实推进了扫盲工作的进行。\n在个马生活上，她几乎每天都要花费14、15小时在工作上，有时还要更多，睡觉休息的时间极为琐碎，很多同志都担心她的身体会吃不消，但是她不在乎。她的社交生活几乎没有，不但是因为她对工作的痴迷，更是因为她难以沟通的冷淡态度，在感情上她是冷血的。她常常在报纸上发表自己在闲暇时间写的科学论文，尽管没多少鹫能看懂，但是她仍然乐此不疲，她在其中提出了“电气化”和“自动化”的观点，认为这对于未来的社会主义建设必有极为重要的作用，很多同志不禁调侃“金沙同志想的太远了，我们现在还是农业社会，怎么就能妄谈什么电气化呢”。金沙还认为在不久的将来我们便可以冲破大气层的束缚，飞向浩瀚无垠的宇宙，但这一切的前提是政府必须在科研工作上下功夫。尽管很多同志对此不以为意，但金沙仍然不会放弃，毕竟嘶大林说过“真理永远掌握在少数马蹄里”，望着眼前落后的普里文，她坚信总有一天，这个落后的国家将会成为全世界国家望尘莫及的对象，而到那时，社会主义的优越性才能完全显现。那日子就快了……"

###- 陆军部长 -###
GRW_Linas_Bielu: "理查德·尖矛"
GRW_Linas_Bielu_desc: "§Y生于：§!971年10月24日；布罗德费尔德公国，特维特\n\n§Y背景：§!1007年，理查德·尖矛同志已经做到了革命军事委员会的第一副主席，并在红兴主席忙于民事时主持军委的日常工作。相比较与他同一级的同志们，理查德·尖矛同志显得有些年轻了——甚至比被老党员视为“毛头小子”的金翼还小三岁；但是他们绝不会这样称呼年轻的副主席。无他，只是因为尖矛同志“杀气太重”。\n\n990年，基韦辛王家军事学院毕业的尖矛以少尉衔进入蒂姆索拉军区任参谋。那时他还很沮丧，因为与黑空伯国的边境已经有几百年没有发生过战争了，军区一片死气沉沉，而自己又不过是个不带兵的参谋，他根本不知道该如何开展组织赋予的（也是自己的同乡兼入党介绍者菲利普·红兴交代的）兵运任务。不过这种奢侈的沮丧不久就被对自己生命安全的担忧取代，因为第二年那名自称“黑石”的江洋大盗来到了黑空。实际上，黑石最早物色的目标是富饶的普里文，黑空的贫瘠山地只是她暂时的落脚点。这些978年来经过残酷战争的老兵对阵腐朽透顶的蒂姆索拉军区，自然是屡屡得爪。\n\n军区进入紧急状态，所有可派的军官都被派往边境，带领新征召的农民军阻挡匪帮袭击。很多年轻军官就这样死在了惨烈的攻防战中，而理查德·尖矛却脱颖而出。与流寇交锋使他养成了运动战的指挥风格，战争和双方军队的性质使他摸索出一套原始的鹫民战争理论。到995年，军营新秀理查德·尖矛少校指挥的地方民团已经有一个正规团的兵力了。\n\n了解这个民团的狮鹫都知道，那里几乎在公开地搞赤化，理查德·尖矛本鹫甚至和他的部下一起挑水烧饭，简直成何体统。不过由于其战斗力顽强，甚至可以说他们是匪帮不会打到蒂姆索拉的唯一保证，军区和地方官员对其睁一只眼，闭一只眼。饥荒发生后，白花和锋锐森林省的乡村完全失去了控制，所幸那时匪帮已经在全力与伯国缠斗。焦头烂额的军区将尖矛的民团扩编为一个旅，派往白花城内驻防，希望他那亲民的部队能安抚住乡下的暴徒。1003年夏，菲利普·红兴秘密来到白花，在理查德·尖矛的城防司令部中拟定了白花起义的详细方案。起义后，理查德·尖矛一直号令着中央部队，凡红兴力有不逮的战阵指挥，都是尖矛同志在负责。\n\n§R军事胜利积累了他的威望，不过这种威望似乎在向不对劲的方向发展……§!"
GRW_Florian_von_Quixote: "弗洛里安·冯·吉诃德"
GRW_Florian_von_Quixote_desc: "§Y生于：§!956年2月29日；西迪亚公国，西迪亚\n\n§Y背景：§!弗洛里安·冯·吉诃德大团长阁下于逐月历千又二年接爪瑟拉齐（Săraci）骑士团。此“乞丐”骑士团素以其摒绝虚荣、躬耕自养闻名；其风自“基韦辛大公阁下的贫苦骑士团”之正名，遭“瑟拉齐”之俗谑湮没，已垂百年矣。而西迪亚之冯·吉诃德世家，如其姓氏所示，本非埃维河谷土著，乃自赫兹兰迁播之贵族。迄今，西迪亚犹有市民谙其故实：格罗弗二世之朝，一批贵族忤皇帝黩武之治，因而流徙帝国边陲，冯·吉诃德家亦在其列。\n\n至若弗洛里安·冯·吉诃德本鹫，行事多悖俗常。少时未承家荫，及登大团长之位，亦未假家族之力。大团长阁下年方十四，即易名登新马尔兰籍“海鹰”号，潜行出海，远遁赫兹兰。据其自言，曾于“海鹰”号上失足坠海，若非大副力谏船长施救，几葬鱼腹。二十余载间，尝为水手、报童、渔夫、魔术师，预九七八年之革命，甚或风传曾于某次兵事中，得亲卫克梅斯凯。九九三年于天落，重遇旧舟“海鹰”号。会该帆船几近拆卸，遂出资购存。同年，为其船长，扬帆归普里文，并投效布罗德费尔德国王殿下之贫苦骑士团。\n\n弗洛里安交游甚广，其风采迅即折服骑士团众，擢为军团长。千又二年九一四事变后，原任大团长托马斯·冯·托博索阁下辞职以示抗议，骑士团秘密会议公推弗洛里安·冯·吉诃德爵士阁下成为第六任骑士团大团长。新任大团长似无左倾之虞，御下甚为周严，亦令扎菲亚鹫不敢犯境，卓著功勋，俾克洛苏国王殿下深觉安泰；遂于第三次“围剿”之关键时期，命瑟拉齐骑士团前出增援，期毕其功于一役，以靖民主联军之“垂死顽抗”。然此大冒险家早于赫兹兰时即与左翼组织有旧，其与若安内尔·短羽尺素之交，更可溯至七零年代末。冯·吉诃德与普共中央之联络，悉由赫兹兰工会组织于狮鹫岩之密站转递，且仅止于最低限度，故国王浑然不察。于弗洛里安观之，虽骑士团格言之首为“忠诚”，然其“献身”“止战”之格言方为精义所在——“献身”即献身黎庶福祉，“止战”乃以义战遏不义之战。瑟拉齐骑士团本与贫苦百姓天然亲睦，是以其临阵倒戈遂举义旗，实乃水到渠成。\n\n举义之后，虽遵奉军委统一号令，然骑士团始终自成一体。大团长阁下不阻抑团员入党，然屡屡婉辞入党之邀：“见旗帜便拜，亦非礼也。”骑士团功业彪炳，军委诸正副主席与委员先生历经数次会议商议其地位，犹未得定议。"
GRW_Helios_Longov: "赫利欧斯·龙戈夫"
GRW_Helios_Longov_desc: "§Y生于：§!957年3月20日；布罗德费尔德公国，比卡尔\n\n§Y背景：§!革命军事委员会从未设计过军衔制，一般民主联军内部都是以职务相称，只有赫利欧斯·龙戈夫算半个例外——不少官兵以外号称呼他：“将军”。\n\n这位出身比卡尔乡下的农家子弟自幼就是村里的孩子王，带领家境相似的贫农的儿女玩打仗的游戏，而他每一次担任的职务都是“将军”。时光荏苒，进入八十年代，龙戈夫在王国军队服了三年役，这三年让他恨透了旧军队。退役回家后他以自己童年的狐朋狗友为骨干，招纳了若干抗租的农民，举起了“杀富济贫”的反旗。似乎是受童年游戏的启发，他自号“将军”，而当地农民也把“将军”吹得神乎其神。这个称号因此一直与他绑定在一起。\n\n维持农民武装是很不容易的，围剿他们的先是地方治安队，后是正规军。在四年的游击战中，他的队伍时聚时散。当党的特派员维克托·伊格纳泰斯库于987年找到他时，龙戈夫正藏身于一个只有老山民才知晓的山洞，对着最后两条枪和十几个部下发誓：“别说两条枪，只要给我两把菜刀，我就能拉出一支队伍来！”“得益”于当地地主的敲骨吸髓，龙戈夫“匪帮”很快又死灰复燃。\n\n龙戈夫的武装和社民工党一开始是某种程度上的合作关系，但当伊格纳泰斯库向这名半文盲深入浅出地讲解了马科思的唯物史观和政治经济学后，龙戈夫忽然就发现看清了自己反抗半生却一直未能窥其全貌的那个庞然大物：压迫性的阶级社会结构，封建主义—殖民主义的经济体系。如同盲人复明的龙戈夫欣喜若狂，要求加入社民工党，历经波折终于得偿所愿。作为党员的龙戈夫认识到“杀富济贫”这个口号的幼稚，于是在党的安排下接受了招安；但他不过是窥伺时机。1003年，“将军”率部意外地出现在白花，地方政府不久就明白过来他是要干什么，但那时已经太晚了。龙戈夫将军已经摇身一变，成为了民主联军的高级指挥官，为普里文狮鹫的解放奋战。"
GRW_Constantin_Caishen: "康斯坦丁·凯申"
GRW_Constantin_Caishen_desc: "§Y生于：§!954年3月9日；狮鹫尼亚帝国，主教市\n\n§Y背景：§!哪怕理查德·尖矛再风光，康斯坦丁·凯申也有底气跟他叫板。这不仅仅因为自己比他大将近二十岁，而且是因为他是民主联军内资历最老的军官，三十年来一直为革命事业兢兢业业，鞠躬尽瘁。\n\n978年革命时，康斯坦丁·凯申是帝国军队的一名军需参谋，这也是他的第一份军职。年轻的参谋早就受够了军需系统极度的贪污腐败，所以几乎是理所应当地，他向共和军报告了帝国军队几个仓库的位置，为革命立了大功。这之后他加入国民共和党，在共和军中仍任后勤官。当反革命如潮水般扑来时，康斯坦丁·凯申一边指挥战斗，一边收拢溃兵，在他们赶上一支向南溃退的大部队前，已经奇迹般地聚集了一批可观的物资。指挥这支部队的女将军喜出望外，安排他做自己的副爪，负责全军的后勤工作。在凯申精打细算的经营下，这支溃兵和匪徒构成的军队居然在狮鹫岩王国、安江、黑空的交界地带站稳了脚跟。但没过几年，康斯坦丁·凯申发现这支共和军部队正在迅速堕落成纯粹的匪帮。终于有一天，凯申与自己的上司大吵一架，带着主要由国民共和党党员构成的一小支部队不辞而别。\n\n他们本来想一举推翻压迫严重的卢石，在这个小国家建立起共和革命的新大本营，但是这些连卢石话都听不懂的外来户很快遭到了挫败。凯申的部下听说老部队已经成为黑石匪帮，大有入主普里文之势，纷纷前去投奔。沮丧的凯申不得已，也只好遣散了自己的部队，奔向南方寻找出路。缺乏军事干部的布罗德费尔德社民工党对这名经验丰富的革命前辈非常重视，不仅接纳了他，还承认其自978年在国民共和党左翼派系中的革命活动，党籍与党龄自该年起连续计算。\n\n加入社民工党后，凯申学习了马科思主义，总结自己前半生革命失败的教训，并在之后的工作中展现出完全不亚于年轻狮鹫的热情。白花起义后，他一直是民主联军的大管家，由于年纪较大，不常指挥一线部队，战士们却也相当尊敬他。但他向来不满理查德·尖矛一系，觉得他们不过是群激进而急躁的娃娃。尖矛的圈子内则认为这是因为军委副主席效力于王国军时，击毙了他的不少堕落为匪徒的老部下。双方目前相看两厌，如果不是为了革命事业，大有事态升级之可能。"

###- 海军部长 -###
GRW_Marino_Aquario: "马里诺·阿夸里奥"
GRW_Marino_Aquario_desc: "§Y生于：§!944年10月27日；隼尔科女王国，乔乔群岛\n\n§Y背景：§!二十年来，马里诺·阿夸里奥男爵阁下已经像是一个地地道道的普里文贵族，只有他的隼尔科名字和那显赫的姓氏还在诉说着一个不堪回首的过去。对于男爵来说，那过去曾经有多辉煌，现在就有多耻辱。\n\n马里诺是一个海军世家的最后孑遗。在他年少时，他的父亲，乔瓦尼·阿夸里奥海军中校，被一场突如其来的流感夺走了生命。马里诺流着泪来到父亲的病床前，发誓要不负父亲的遗愿和家族的荣誉，以后要做一名海军将军。965年，马里诺·阿夸里奥从隼尔科王家海军学校毕业，很快成为一名国际知名的“绿水学派”（Jeune École）理论家，坚信这一旨在缩小阿奎莱亚海军与帝国海军之间实力差距的学说，同样能够为在与翼巴第海军的竞争中处于劣势的隼尔科海军提供克敌制胜的思路。隼尔科战争前夕，他被任命为隼尔科海军主管作战的副总参谋长，在总参谋长支持下实际负责作战条令改革和舰队训练。但时间没有眷顾他，随着战争爆发，舰队匆匆忙忙地投入战场，最终遭受了灭顶之灾。战斗的过程直到二十年后仍然是他的梦魇。战后，他退出了军队，依靠家族的积蓄寓居于普里文的西迪亚港，既是表示负责，也是告别过去。\n\n但这名为海军而生的狮鹫不可能真正死心。马里诺·阿夸里奥发现，布罗德费尔德王国那可怜的海军与其贸易并不相称，于是以“特约军事评论员”的名义在宪政派报纸上发表文章，大谈现代海军对现代国家的作用，设想王国海军的发展前景；据说克洛苏国王和虎珀博士也是他的忠实读者。军方也一度聘请阿夸里奥做海军顾问，这使他一度重燃雄心壮志。但王国所谓的造舰计划最终流产，他的理想也再次化为泡影。\n\n即使历经动荡，阿夸里奥仍然没有离开他的第二故乡西迪亚。旧政权的横征暴敛已经让他失望透顶，而新政权的积极作为让他再一次看到了发展海军的潜力，他提出要留下来协助创办一支新海军。对于怎样经营一支弱势海军，他在隼尔科时早有研究，但共产党内部不乏对这名前贵族的质疑之声。最后是红兴主席拍板：技术型鹫才不可多得，有条件的应当全力争取。阿夸里奥深知岁月不饶鹫，与其背负着败军之将的名号踏进坟墓，他更愿意在播撒下一批新海军的种子之后，再自豪地去见父亲。"
GRW_Enache_Pescrush: "埃纳凯·佩斯克鲁什"
GRW_Enache_Pescrush_desc: "§Y生于：§!968年1月4日；西迪亚公国，盐岛\n\n§Y背景：§!埃纳凯·佩斯克鲁什的整个青少年时光都在盐岛度过，这里既是西迪亚贵族度假的好去处，也是商船开进西迪亚港之前的必经之地。少年埃纳凯曾经有无数个下午一边钓着鱼，一边望着船舶缓缓驶入港口，这让他对海上的生活无比向往。中学毕业后，埃纳凯瞒着父母，参加并通过了布罗德费尔德王国第一批五名海军留学生的遴选，被派往天落学习。出国之前，海军司令在老旧的基绍海军学校礼堂中向他们发誓，王国五年之内就会把老式风帆战舰组成的王国舰队升级成一支“具有远洋作战能力的新型大舰队”，届时布罗德费尔德王国会有能力保卫自己的海上交通线，而他们都会是前途似锦的军舰指挥官。\n\n凭借超凡的热情与毅力，埃纳凯·佩斯克鲁什在天落学习五年之后，以优异的笔试和实习成绩毕业。但回国他才得知，由于王国军系统性的腐败和短视，这个造舰计划几乎没有进展。数月后，他受命办理一项军队资产的出售业务，结果发现这件“资产”居然是一艘完工一半的驱逐舰船体。不久后，上级正式通知他们造舰计划取消，埃纳凯·佩斯克鲁什没有其他同学所具有的贵族家世，于是只被分到了一个闲职，直到大饥荒爆发。\n\n目睹军界政界统治阶级的腐朽，加上自己屡受命运的捉弄，使得埃纳凯·佩斯克鲁什对旧军队的不满到了极点。1000年时，他秘密与社民工党接上了线。1002年，红兴亲自指挥的挺进大军逼近科罗维亚时，王国军病急乱投医，命令其率领几艘老式燃煤-风帆混合动力战舰溯埃维河而上，炮击攻城的民主联军。佩斯克鲁什当然不可能乖乖照办。在舰队即将抵达科罗维亚的前一天晚上，他秘密联系了十余个可靠的水兵与地下党员，在停泊处布放炸药，将这支舰队送进了埃维河底。这之后他前往根据地，目前暂时在中央机关里做技术翻译的工作。虽然级别不算太高，参加革命的时间也比较晚，但如果要成立一支红海军，而且要选一名信得过的舰队指挥官的话，埃纳凯·佩斯克鲁什一定会出现在提交给军委的名单上，而且还是比较靠前的位置。"

