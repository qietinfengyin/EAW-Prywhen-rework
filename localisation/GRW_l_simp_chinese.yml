GRW_chairman_starry_night: "繁星皎皎主席"
GRW_chairman_starry_night_desc: "繁星皎皎，长剑地区富有盛名的游击运动领导者，门界的共产主义斗士。党中央相信，她拥有处理门界驹——鹫长期杂居，极端主义势力偶有死灰复燃的棘爪情况的丰富经验。接下来的一切只需交给时间和这位令鹫信服的解放者。"
