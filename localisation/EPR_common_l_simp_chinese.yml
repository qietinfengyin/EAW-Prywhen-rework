monument_to_the_peoples_heroes: "鹫民英雄纪念碑"
monument_to_the_peoples_heroes_desc: "鹫民英雄纪念碑整体是一个巨大的九棱柱，由狮鹫岩的花岗岩雕刻而成。碑体每一面为不同地区的艺术家雕刻的九幅浮雕，从正面看第一幅浮雕是格罗弗一世时期衣衫褴褛的起义农民，随后是两个代表古代狮鹫大陆开拓者的浮雕——以盾保护鹫民的阿克图利亚骑士，持望远镜立足船头的新狮鹫尼亚探险家。在古代狮鹫后是爪持火枪与软帽的烧炭党鹫，身穿军服指挥大炮开火的狮鹫海姆共和派，头戴贝雷帽高举旗帜的普利代公社社员，这些是自978年以来狮鹫大陆第一次革命浪潮的代表。随后是在风雪中前进的天际革命者，戴毡帽挥舞弯刀的白花起义军，以及作为狮鹫大陆小马革命者代表的长剑游击队。下方铭刻碑文“由此上溯一千年，从那时起，为了反对内外仇敌，争取民族统一和鹫民自由幸福，在历次斗争中牺牲的鹫民英雄们永垂不朽！”"
