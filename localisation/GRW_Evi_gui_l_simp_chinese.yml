GRW_Evi_area_introduction_Whiteflower: "§Y稻米之乡§!§L：在埃维河谷深处，白花如同被岁月浸透的稻穗，低垂在普里河的臂弯里。当季风到达位于爬行者山脉前最后的领地，整片平原便翻涌起翡翠与鎏金交织的潮汐——这是狮鹫尼亚最古老的稻作史诗，每株稻茎的纹路里都镌刻着先民驯服洪水的密码。普里河在此处放缓了奔流的脚步，将上游挟带的生物质沉淀成黑金般的沃土，那些在中世纪养活半个布罗德费尔德王国的传奇稻米，至今仍在农鹫们的指缝间簌簌作响。平原上的蛛网水渠仍保留着王国鼎盛时期的几何美学，花岗岩砌成的分流闸门长满青苔，像戴着翡翠戒指的沧桑爪子。曾经运送税粮的青铜水车半数已锈蚀成褐红色雕塑，但残存的车轴仍在雨季来临时吱呀转动，碾碎的光斑洒在田埂间，恍若撒落一地的旧王朝金币。西部丘陵的梯田如同大地的等高线谱，被遗弃的祭坛石柱从野生稻丛中探出头来，藤蔓缠绕的廊柱上，依稀可见布罗德费尔德太阳纹与灌溉神鹫的浮雕。§!"
GRW_Evi_area_introduction_Acute_Forest: "§Y丰饶之森§!§L：位于普里文共和国西南边陲的丰饶之森，作为旧王国时代遗留的矿产资源宝库，至今仍延续着其地质馈赠的神话。普鲁特河与锋锐河两条水系如同银色动脉贯穿全境，在冲积平原上孕育出延绵百里的原始林海。其西部隆起的森林丘陵实为爬行者山脉东向余脉，复杂的地质构造在此孕育出多种可开采矿藏。作为共和国矿产资源可采储量最集中的区域，这片古老森林的地下矿脉呈现出罕见的立体分布特征：地表浅层的常规金属矿脉向下延伸至玄武岩层后，逐渐过渡为稀有的战略矿产。最新地质勘探数据显示，已探明储量仅为资源总量的三分之一，深部找矿突破持续刷新着资源预期。依托得天独厚的资源优势，该地区构建起以矿业为核心的经济体系。贯穿全境的运河网络分别连接基绍港与中部枢纽拉里奥斯，每天有超过二十艘矿船经此将精炼矿石输往全国。然而繁荣背后暗藏隐忧：毗邻三国交界的特殊地理位置，使得跨境流窜的“黑矿帮”长期盘踞在废弃矿洞中。这些装备精良的匪徒不仅劫掠运输车队，更通过非法盗采每年造成一定的矿产资源流失。尽管共和国卫队设立了六个边防哨所，但复杂的地形仍为灰色交易提供了天然庇护。§!"
GRW_Evi_area_introduction_Griffonwill: "§Y翡翠之地§!§L：格里芬维尔坐落在普里文地区腹地，普鲁特河如同翡翠绶带围绕南境。西部绵延着终年苍翠的“翡翠之森”，东部展开广袤无垠的“黄金平原”，形成“西林东野”的独特格局。亚热带季风带来丰沛雨水，每年6-8月雨季时，普鲁特河水位上涨形成天然灌溉系统，使这里成为旧王国著名的“丰收之地”。作为旧王国第二大水稻产区，格里芬维尔的梯田艺术堪称天工：从翡翠之森边缘的螺旋梯田到黄金平原的棋盘状方田，形成了“春如碧玉簪，秋似黄金毯”的绝景。每年收获季，满载稻谷的彩绘驳船沿普鲁特河顺流而下，船队首尾相接可绵延三十里，蔚为壮观的“金色长龙”最终汇入基绍港的十二座巨型筒仓。这里出产的“金穗香米”因带有天然蜂蜜香气，因而广受欢迎。§!"
GRW_Evi_area_introduction_Brodfeld: "§Y海滨稻田§!§L：布罗德费尔德位于普里文地区南部，它依傍着海岸线，南侧是波澜壮阔的海洋，源源不断地输送着贸易的机遇与活力；西侧锋锐河潺潺流淌，如灵动的丝带环绕；而普鲁特河则像一条雄浑的巨龙，气势磅礴地贯穿全省。布罗德费尔德长期以来专注于商业化粮食种植，凭借肥沃的平原、纵横交错的水系以及优越的气候条件，稳坐旧王国水稻产出第一的宝座，在夏季时，绿油油的稻苗随风摇曳，与大海白云相互映衬，构成了独特特色的海上稻田；到了收获季节，金黄的稻穗沉甸甸地低垂着，与大海相互映衬。堪称“海滨稻田”。基绍更是凭借靠近海岸线的独特优势，发展成为了一座繁荣的港口城市，它不仅是布罗德费尔德的经济和文化中心，更是旧王国对外交流和贸易的重要门户。锋锐森林和白花地区的特色产品，以及本地丰富的农产品，都通过基绍港源源不断地销往世界各地。§!"
GRW_Evi_area_introduction_Terrible_Marsh: "§Y沼地灵乡§!§L：普里文地区的北部，有一片神秘而独特的土地——恐怖沼泽。它犹如一颗隐匿在旧王国边缘的明珠，散发着别样的魅力。埃维河如同一条灵动的丝带，蜿蜒流经该地，它不仅是这片土地的重要脉络，更为整个地区带来了源源不断的活力与生机。然而，由于此地处于河流汇聚之处，每当河流洪峰来临，大部分区域都会被洪水淹没。经年累月，洪水的反复侵袭，使得这里大部分地区逐渐演变成了广袤无垠的沼泽地貌。这里地广民稀，却拥有着丰富多样的生物资源。由于特殊的地理环境和相对原始的生态系统，许多在普里文其他地方难得一见的珍稀动物都选择在这里栖息繁衍。高大威猛的沼泽犀，身披厚重的铠甲，在沼泽中悠然漫步；色彩斑斓的羽冠鸟，拥有绚丽夺目的羽毛，在枝头欢快地歌唱；还有神秘莫测的沼泽鳄，潜伏在水中，伺机而动，为这片土地增添了几分神秘与危险的气息。除此之外，各种水生植物、浮游生物也在这片沼泽地中蓬勃生长，共同构成了一个复杂而又和谐的生态系统。§!"
GRW_Evi_area_introduction_Kivessin: "§Y埃维之心§!§L：在普里文地区的东部，坐落着一座古老而辉煌的城市——基韦辛。这里是旧王国的首都，也是整个国家的政治、经济和文化心脏。扎菲亚河从北向南蜿蜒流淌，与埃维河在此交汇，孕育出一片肥沃的河谷平原。平坦的地势、丰饶的土壤和充沛的水源，使基韦辛成为农业与城市发展的天然沃土。基韦辛城，这座承载着千年历史的城市，是普里文的灵魂所在。它的故事始于511年，最初只是埃维河边的一座河防要塞，肩负着抵御外敌的重任。然而，在波格丹王公的雄才伟略下，这座要塞逐渐蜕变为一座繁荣的城市。如今，基韦辛以其宏伟的建筑、悠久的历史和繁荣的商业，成为狮鹫尼亚大陆上一颗璀璨的明珠。基韦辛的历史，是一部充满传奇的史诗。从德罗古斯要塞的建立，到波格丹王公的崛起，再到格列佛一世的征服，这座城市见证了无数王朝更迭与历史风云。973年，布罗德费尔德王公克洛苏宣布自己为国王，并将首都定在基韦辛，从此，这座城市成为了王国的象征与荣耀。漫步在基韦辛的街头，你会发现这座城市的文化深深植根于狮鹫尼亚的传统与东部河流女神的信仰之中。埃维大神庙，这座东部河流女神信仰的核心圣地，每年吸引着成千上万的信徒前来朝圣。而骑士团教会的总部也坐落于此，骑士精神与信仰的力量在这里交织，塑造了基韦辛独特的文化气质。基韦辛不仅是一座历史的丰碑，更是一座充满活力的现代都市。鹫王河与埃维河的交汇处，商船往来如织，贸易繁荣不息。城市的交易广场上，来自全国各地的商人汇聚于此，粮食、木材、香料和手工艺品在这里流通，编织出一幅繁华的市井画卷。这里是埃维之心，是旧王国的骄傲，也是南部狮鹫尼亚大陆的瑰宝。无论是宏伟的国王宫、神圣的埃维大神庙，还是熙熙攘攘的交易广场，基韦辛的每一寸土地都在诉说着它的辉煌与传奇。在这片肥沃的河谷平原上，历史与未来交织，传统与现代共存，基韦辛正以它独特的魅力，书写着属于自己的不朽篇章。§!"
GRW_Evi_area_introduction_Lifov: "§Y利夫商谷§!§L：有一片充满活力的土地——利夫。它宛如一根绳子连接在商贸动脉上，一头连接着旧王国权力核心的首都基韦辛，一头毗邻着最为繁华的港口西迪亚，得天独厚的地理位置，使其自然而然地成为了王国的交通要道。穿梭不息的商队与旅人，不仅带来了物资的流通，也为利夫注入了源源不断的发展活力。从地理风貌来看，利夫宛如一幅由大自然精心绘制的绝美画卷。利夫的南北两端，是茂密繁盛的利夫森林，其间栖息着种类繁多的野生动物，处处洋溢着生机与野性。中部则是广袤无垠的平原，地势平坦开阔，肥沃的土壤孕育着无限可能。埃维河在它周边流淌，河水清澈且水量丰沛，不仅为万顷农田提供了充足的灌溉水源，更是连接起基韦辛与西迪亚的水上通途，承载着往来的船只，运输着货物与希望。利夫四季更迭分明，气候温润宜人，从而为农业发展铺就了金色大道，也让利夫成为旧王国稻米产量第二的产粮大省。发达的交通不仅带动了人员往来，更为利夫的商业繁荣插上了腾飞的翅膀。市场上，来自各地的奇珍异宝、特色商品琳琅满目，应有尽有。而当地独具匠心的木雕、精美绝伦的编织品等手工艺品，更是凭借其精湛的工艺和独特的设计，深受各地消费者的青睐，这些商品逐渐发展成为极具规模的特色产业，在这片土地上绽放出耀眼的光芒。§!"
GRW_Evi_area_introduction_Consta: "§Y交枢旺区§!§L：康斯塔，巧妙地连接着西迪亚与基绍这两座举足轻重的港口城市，同时也是通往旧王国首都基韦辛的必经之地。如此关键的交通枢纽地位，犹如一条无形的纽带，将康斯塔与外界紧密相连。发源于远方的埃维河，自东蜿蜒而过，一路奔腾不息，为这片土地慷慨地馈赠了丰沛的水源。河水所经之处，滋润了大地，也在康斯塔北部区域培育了一片连绵不绝的利夫森林。利夫森林不仅构筑起一道天然的生态屏障，更为木材相关产业提供了原材料，催生了诸如伐木、简单木器制作等行业的发展。除北部森林外，康斯塔内其余广袤区域皆为一望无垠的平原。这里土壤肥沃深厚，富含各种矿物质和养分，加上亚热带季风气候的眷顾，四季分明，雨热同期，为水稻种植创造了近乎完美的自然条件。放眼望去，大片的稻田在阳光雨露的润泽下茁壮成长，微风拂过，稻浪翻滚，沙沙作响。这些高品质的水稻不仅满足了康斯塔居民的日常所需，更是作为重要的出口商品，源源不断地运往各地，成为支撑康斯塔经济的中流砥柱。围绕着水稻种植这一核心产业，一系列与之相关的行业应运而生，从稻谷脱壳、碾米等基础粮食加工环节，到包装、运输等配套服务，逐渐形成了一条较为完整的产业链条，有力地带动了当地经济的繁荣发展。与此同时，康斯塔凭借其优越的交通位置，自然而然地成为了旧王国农产品的重要集散地。不仅康斯塔产出的丰富农产品在此汇聚，周边地区的各类物产也纷纷流向此地。随后，这些农产品搭乘便捷的交通网络，被运往西迪亚和基绍两大港口城市。在那里，它们登上远航的船只，远销至普里文各地乃至更远的地方。通过这样的贸易往来，康斯塔不仅换回了维持本地生产生活所需的物资，更为康斯塔经济注入了源源不断的活力与财富，进一步巩固和推动了当地农业经济的持续繁荣。§!"
GRW_Evi_area_introduction_Sydia: "§Y农粮之港§!§L：从狮鹫尼亚大陆的南部海岸线望去，西迪亚宛如一颗镶嵌在埃维河口旁的明珠，静静闪耀着独特的光芒。它坐落在普里文地区南部的小半岛上，是埃维河谷中最古老的城市，也是旧王国最大、最富裕的商业港口城市。这里气候温和，为航海和贸易活动提供了绝佳的自然条件。西迪亚自古以来便是普里文地区的商业中心。它位于河口附近，天然港口的优势使其始终兴盛不衰。城市内建筑风格融合了狮鹫尼亚的传统元素与海洋文化的开放气息，街道狭窄而繁华，市场热闹非凡，充满了异国情调。西迪亚城的历史可以追溯到埃维河谷的早期文明，是布罗德费尔德王国最古老的城市。当克洛苏亲王统一普里文时，他曾考虑将首都定在西迪亚，但最终选择了基韦辛。尽管如此，西迪亚依然拥有极高的政治和经济地位。西迪亚的文化深受航海和贸易的影响，民间故事中常有关于航海英雄和远方土地的传说。最著名的传说是关于最后一位独立的西迪亚公，她是一位勇敢的海员，曾向日出的方向航行探索遥远的土地，但从未返航。这个故事成为了西迪亚航海精神的象征。西迪亚是布罗德费尔德王国的经济引擎，港口内每天都有无数帆船和蒸汽船进出，运输着成吨的谷物、大米、木材、蜂蜜和埃维河谷的其他货物。海滨市场是城市的经济中心，每天都有无数渔民离港，为市场提供新鲜的渔获。此外，西迪亚还是国际贸易的重要枢纽。来自格里富斯、翼巴第、蓝百合与西卡梅翁的商鹫汇聚于此，甚至星空牛头怪、鹦鹉维亚哈比鸟和迦骀基斑马等异族也能在这里看到，格里富斯南洲会的华丽总部也坐落于海滨市场附近。西迪亚的居民以开放、多元和热情好客著称。他们世代从事航海和贸易，对海洋和远方充满了向往。居民们喜欢在温暖的夜晚聚集在小巷里，用各种语言激烈地讨价还价。西迪亚的文化融合了狮鹫尼亚的传统与多元的异族元素。每年夏季，城市会举办盛大的航海节，庆祝航海精神和贸易繁荣。节日期间，居民们会穿上传统服饰，举行船队游行和海滨烟火表演。每年秋季，西迪亚还会举办海滨市场节，庆祝一年的贸易成果。庆典中会有各种异族文化表演、美食品尝和手工艺品展览，热闹非凡。每年春季，这里的居民会举行西迪亚公纪念日，纪念最后一位独立的西迪亚公。居民们会在海滨点燃篝火，讲述航海英雄的故事。西迪亚的饮食以海鲜为主，搭配丰富的谷物和蔬菜。最具代表性的菜肴是“海滨炖鱼”，用新鲜的渔获和当地特产的香料慢炖而成，味道鲜美。此外，大米制成的米糕和蜂蜜酒也是当地居民日常饮食的重要组成部分。西迪亚的交通十分便利，天然港口使其成为王国最重要的航运中心。每天都有无数船只进出港口，运输着来自世界各地的货物。陆路方面，宽阔的官道连接了各城镇，旅者和货运车队络绎不绝。西迪亚是一个充满活力与多元文化的地方，繁荣的港口、勤劳的鹫民和丰富的文化传统共同塑造了这片土地的独特魅力。无论是繁忙的海滨市场、热闹的航海节，还是充满异国情调的小巷，都让鹫感受到这片土地的温暖与富足。这里是新生共和国的经济引擎，也是埃维河谷的一颗璀璨明珠。§!"
GRW_Evi_area_introduction_Salt_Island: "§Y盐海渔乡§!§L：盐岛，地处普里文地区最南端，是一座与港口城市西迪亚紧紧相邻的小岛。踏上这片土地，便能发现其地势极为平坦，尽管土壤较为贫瘠，却蕴含着丰富的盐分，也正因如此得天独厚的条件，这里从远古时期开始，就成为了晒盐的绝佳之所，“盐岛”之名也由此而来。盐岛的城市规模不大，却散发着独特的魅力。凭借源远流长的盐业历史以及得天独厚的地理位置，盐岛已然成为旧王国举足轻重的盐业基地，同时也吸引着来自各地的游客，成为远近闻名的旅游胜地。漫步在盐岛城，映入眼帘的是简约实用的建筑风格，狭窄的街道被打扫得十分整洁，弥漫着生活的气息。城市里的市场热闹非凡，盐制品摆满货架，各类新鲜的海鲜琳琅满目，处处都彰显着海滨小镇独有的迷鹫韵味。在经济方面，盐岛以盐业和渔业作为两大支柱产业。放眼望去，盐田密密麻麻地分布在全岛，每年都能产出数量可观的优质海盐。这些海盐不仅供应着布罗德费尔德王国，更远销至整个狮鹫尼亚。其海盐以纯净的品质和别具一格的口感，是旧王国重要的出口商品之一。盐岛的渔业同样发达，每天清晨，渔民们便迎着朝阳出海捕捞，傍晚时分，满载着新鲜的海货而归，为市场源源不断地输送着像盐渍鱼、干贝等特色海产品以及各类海鲜。§!"
GRW_Evi_area_introduction_LUS: "§L卢什，一片令鹫心驰神往的梦幻田园胜地。这里河流交错纵横，龙喉河、普里河，星溪河流过此处，为大地带来了丰沛的水源。北部与西北部的茂密森林是亲近自然、探索野趣的绝佳之地；广袤无垠的肥沃平原，每到收获季节，金黄的麦浪、泛红的焰麦、闪烁的夜光棉等，构成了一幅绝美的田园画卷。对于美食爱好者来说，卢什的美食值得一试。独具风味的焰麦面包，融合了辣椒粉的热烈与野蜂蜜的香甜，口感丰富；醇厚绵柔、香气馥郁的月藤葡萄酒，让味蕾沉醉其中；香甜可口的甜露果，汁水四溢，新鲜美味。除了美食，这里还有众多特色手工品值得收藏。这里的工匠，能凭借精湛技艺打造出高品质的产品；由 “歌木” 雕琢的精美乐器，音色独特；透气防水的雾纱披风，轻便实用；闪烁着神秘光芒的夜光棉布料，柔软舒适又独具魅力。这里的交通也极为便利，宽阔的河道为水上游览提供了绝佳的条件，乘船欣赏两岸风光，感受微风拂面，惬意十足。建筑风格也是卢什的一大亮点，这里既有充满历史韵味的古老宫殿，巍峨壮观，彰显着往昔的荣耀与奢华；又有融合了近现代与工业特色的现代建筑，色彩鲜艳，装饰精美，充满艺术气息。§!"
GRW_Evi_area_introduction_GRY: "§L格里菲亚如同一幅被诸神精心晕染的水彩长卷。当季风裹挟着海盐气息翻越埃维河谷，整片土地便开始了它永恒的变奏——金十字平原的闪耀燕麦田泛起星尘般的涟漪，索洛博达的荧光森林正悄然点亮千万盏魔法灯笼，为夜在上割爪区的星语森林，夜游者能听见花朵与星辰的秘语，那些随星象变幻纹路的星语花，会在满月夜将芬芳凝结成发光的露珠；顺流而下至虫木之森，晨雾中漂浮的星辉莓闪烁着被封印的古老灵魂，虫木精灵正用甲虫壳风铃演奏地脉的韵律。而在布佐维纳的森林中，扎菲亚河的支流托举着凤尾杉木筏漂向远方，筏工们的号子惊起一群彩虹蝶，翅尖抖落的磷粉在阳光下幻化成微型彩虹。格里菲亚最动鹫的时刻藏在晨昏交界处。当虫木之森的古树根系正渗出靛青色的雾气；布佐维纳的榫卯木匠打磨完最后一把会呼吸的七弦琴时，奇克奇林的农鹫恰好抖落翼膜上的稻壳，跃入被晚霞染成葡萄酒色的扎菲亚河。这就是格里菲亚，一个允许你在同一天抚摸千年树龄的年轮、品尝封印着晴雨记忆的果酒、在工业文明的脉搏中听见古老契约回响的国度。当季风再度转向，扎菲亚河会裹挟着星尘、稻香与荧光孢子的记忆奔涌入海，而每一道波浪都在发出邀请——来成为这片土地新故事的书写者吧。§!"
GRW_Evi_area_introduction_BAN: "§L黑石是一方险峻地貌与丰富资源的传奇之地，黑石由崎岖山脉、幽深森林与古老城邦交织而成。南部边境的爬行者山脉如巨龙盘踞，这里不仅蕴藏着钨、铁、水晶等矿脉，更以高塔镇为核心把控着边境贸易与军事命脉；其东麓的强盗之地虽以荒野山乡闻名，却在矿石镇凝聚着质朴的生活智慧，居民与未开发的自然资源共生共荣。西南部的黑空林谷宛如翡翠秘境，黑空河滋养的森林文明孕育出独特的树神信仰与手工技艺，四季庆典与黑空鱼美食彰显着生态与鹫文的和谐。中部的暗喙城静卧于黑石湖畔，古堡与教堂倒映碧波，鲜美的湖鱼与建筑景观吸引着八方来客。北境门户纳尼威志则在山林间架起发展桥梁，凭借通往狮鹫帝国的交通网络，将矿产、木雕与丰饶农产品输向远方。这片土地既有矿锤敲击岩层的铿锵，也有河灯漂流的静谧，既有古老传说的低语，也有商队穿越索道的喧嚣，多元文明在群山环抱中铸就了黑石刚柔并济的独特气质。§!"
GRW_Evi_area_introduction_GRU: "§L格里富斯，这片镶嵌在海洋与山脉之间的瑰丽之地，如同一本被自然与文明共同书写的奇幻典籍。从西北部辽阔的守护者之野到东南端的灯塔山，每一寸土地都浸润着独特的气息与传说。汹涌的埃维河与潺潺的沃诺什河如银链般环绕，将草原、森林、海岸与山谷串联成诗意的脉络。在守护者之野，无垠的草浪间回荡着哥萨克狮鹫的蹄声与吟游诗鹫的歌谣，卡玛菲港的姜饼香甜与琥珀微光交织成旅者难忘的味觉与视觉盛宴；而内陆的金色麦田与安宁村落，则让时光仿佛凝滞于田园牧歌的画卷中。向北深入夜之森，晨雾缭绕的松林宛如翡翠迷宫。彩虹蜜柚的霓彩果壳随天候变幻，星光橙在暮色中与银河共鸣。落叶松谷的秋日则是一场金色狂欢，松涛如琴弦震颤，矿洞深处的云母与松脂共舞。若沿河而下至东海岸，灯塔山的荧光海藻与魔法珊瑚碎枝在夜色中编织星河，渔鹫们驾驭虹彩帆船追逐逆向坠落的鱼群流星雨，咸涩海风裹挟着虹彩琉璃窗棂的传说，将海洋的私语镌刻进每粒砂石。当季风掠过格里富斯海的浪尖，咸湿水汽与松脂芬芳在临海平原缠绵成琥珀色薄雾；当秋分夜的百年古松与地脉共鸣，松子纹路悄然勾勒矿藏地图——这片土地永远在现实与传说间轻盈起舞。无论是追寻哥萨克驰骋草原的自由，还是沉醉于夜之森果实转瞬即逝的甘美，格里富斯总能以最纯粹的奇迹，让每位旅者相信：这里既是世界的尽头，亦是所有奇幻故事的起点。§!"

